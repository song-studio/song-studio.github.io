:root{--bg:oklch(18% .025 235);--ink:oklch(93% .02 220);--muted:oklch(70% .035 220);--line:oklch(37% .04 225);--panel:oklch(23% .03 230);--panel2:oklch(28% .04 225);--field:oklch(17% .025 230);--cyan:oklch(78% .13 205);--lime:oklch(84% .17 125);--amber:oklch(76% .15 75);--red:oklch(66% .18 28);--paper:oklch(95% .018 210);--mono:"Azeret Mono",monospace;--cond:"Archivo Condensed",sans-serif;--sans:"Noto Sans SC",system-ui,sans-serif}*{box-sizing:border-box}html{background:var(--bg);color:var(--ink)}body{margin:0;min-height:100vh;font-family:var(--sans);background:radial-gradient(circle at 18% 0,oklch(31% .07 205),transparent 34%),linear-gradient(180deg,oklch(17% .025 235),oklch(21% .032 215) 46%,oklch(18% .025 235));color:var(--ink)}button,input{font:inherit}button{cursor:pointer}a{color:inherit;text-decoration:none}.frame{max-width:1180px;margin:auto;padding:10px 10px 80px}.mast{position:sticky;top:0;z-index:20;display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 0 12px;background:linear-gradient(180deg,var(--bg),color-mix(in oklch,var(--bg),transparent 18%));backdrop-filter:blur(14px)}.brand{font-family:var(--cond);font-size:24px;font-weight:700;letter-spacing:.03em}.routeLink{font-family:var(--mono);font-size:11px;border:1px solid var(--line);padding:8px 10px;background:var(--panel)}.hero{display:grid;gap:10px}.console{border:1px solid var(--line);background:linear-gradient(145deg,var(--panel),oklch(19% .028 230));padding:14px;position:relative;overflow:hidden}.console:before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent 0 94%,color-mix(in oklch,var(--cyan),transparent 88%) 94% 95%,transparent 95%),linear-gradient(0deg,transparent 0 94%,color-mix(in oklch,var(--cyan),transparent 90%) 94% 95%,transparent 95%);background-size:28px 28px;opacity:.45;pointer-events:none}.eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.16em;color:var(--cyan);text-transform:uppercase}.title{position:relative}.title h1{font-family:var(--cond);font-size:clamp(48px,16vw,116px);line-height:.82;letter-spacing:-.055em;margin:10px 0 6px}.title p{margin:0;color:var(--muted);line-height:1.65;max-width:68ch}.search{position:relative;margin-top:16px;display:grid;gap:8px}.query{display:grid;grid-template-columns:1fr auto;gap:8px}.query input{min-width:0;border:1px solid var(--line);background:var(--field);color:var(--ink);padding:15px 13px;outline:none}.query input::placeholder{color:oklch(58% .035 220)}.query button{border:0;background:var(--lime);color:oklch(18% .04 125);font-weight:900;padding:0 17px}.chips{display:flex;gap:7px;overflow:auto;scrollbar-width:none}.chip{white-space:nowrap;border:1px solid var(--line);background:var(--panel2);color:var(--ink);padding:7px 10px;font-size:12px}.status{border:1px solid var(--line);background:var(--panel);padding:18px;color:var(--muted);line-height:1.7;margin-top:10px}.station{display:none}.station.show{display:grid;gap:10px;margin-top:10px}.loc{border:1px solid var(--line);background:var(--panel);padding:12px;display:grid;gap:8px}.locTop{display:flex;justify-content:space-between;gap:12px}.loc h2{font-size:24px;margin:3px 0 4px}.loc p{margin:0;color:var(--muted);font-size:13px}.confidence{font-family:var(--mono);font-size:11px;text-align:right}.confidence b{display:block;color:var(--lime);font-size:20px}.riskTape{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}.risk{border:1px solid var(--line);background:var(--field);padding:8px}.risk b{font-family:var(--mono);font-size:15px;display:block}.risk span{font-size:10px;color:var(--muted)}.risk.watch{border-color:color-mix(in oklch,var(--amber),var(--line) 35%)}.risk.danger{border-color:color-mix(in oklch,var(--red),var(--line) 30%)}.now{border:1px solid var(--line);background:var(--paper);color:oklch(18% .025 230);padding:14px}.nowGrid{display:grid;grid-template-columns:1fr auto;gap:10px}.temp{font-family:var(--mono);font-size:86px;line-height:.85;letter-spacing:-.1em;font-weight:700}.cond{display:grid;gap:5px;align-content:end;text-align:right;color:oklch(42% .035 230)}.cond b{font-size:20px;color:oklch(20% .03 230)}.metrics{display:grid;grid-template-columns:repeat(2,1fr);border:1px solid color-mix(in oklch,var(--line),white 22%);border-right:0;border-bottom:0;margin-top:12px}.metric{padding:10px;border-right:1px solid color-mix(in oklch,var(--line),white 22%);border-bottom:1px solid color-mix(in oklch,var(--line),white 22%)}.metric b{font-family:var(--mono);font-size:18px;display:block}.metric span{font-size:11px;color:oklch(45% .035 230)}.board{border:1px solid var(--line);background:var(--panel);padding:12px}.board h3{margin:0 0 8px;font-size:17px}.note{color:var(--muted);font-size:13px;line-height:1.55;margin-bottom:10px}.hours{display:grid;grid-template-columns:repeat(8,minmax(60px,1fr));gap:6px;overflow:auto}.hour{border:1px solid var(--line);background:var(--field);padding:8px 6px;min-width:60px;text-align:center}.hour b{font-family:var(--mono);font-size:12px}.hour span{display:block;color:var(--muted);font-size:11px}.meteogram{display:grid;gap:8px}.row{display:grid;grid-template-columns:52px 1fr;gap:8px;align-items:center}.rowLabel{font-family:var(--mono);font-size:10px;color:var(--muted)}svg{display:block;width:100%;height:74px;background:var(--field);border:1px solid var(--line)}.explain{display:grid;gap:8px}.explain div{display:grid;grid-template-columns:10px 1fr;gap:9px;color:var(--muted);line-height:1.55}.flag{width:10px;height:10px;background:var(--lime);margin-top:7px}.flag.watch{background:var(--amber)}.flag.danger{background:var(--red)}.refs{display:grid;gap:10px}.ref{border:1px solid var(--line);background:var(--panel);padding:12px}.refHead{display:flex;justify-content:space-between;gap:10px;margin-bottom:8px}.refHead b{display:block}.refHead span{font-family:var(--mono);font-size:10px;color:var(--muted)}.mapFrame{height:220px;border:1px solid var(--line);background:var(--field);display:grid;place-items:center;color:var(--muted);overflow:hidden}.mapFrame iframe{width:100%;height:100%;border:0}.src{border:1px solid var(--line);background:var(--panel);padding:12px;display:flex;justify-content:space-between;gap:12px}.src b{display:block}.src span{font-size:12px;color:var(--muted)}.model{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:10px}@media(min-width:850px){.frame{padding:18px 22px 100px}.hero{grid-template-columns:minmax(0,1.05fr) 420px;align-items:start}.station.show{grid-template-columns:420px 1fr}.loc,.now{grid-column:1}.riskTape{grid-template-columns:repeat(2,1fr)}.boards{grid-column:2;grid-row:1 / span 3;display:grid;gap:10px}.metrics{grid-template-columns:repeat(4,1fr)}.refs{grid-template-columns:1fr 1fr}}@media(max-width:430px){.query{grid-template-columns:1fr}.query button{height:48px}.temp{font-size:72px}.riskTape{grid-template-columns:repeat(2,1fr)}}
</style>
</head><body><div class="frame"><header class="mast"><a class="brand" href="https://song-studio.github.io/">山野气象台</a><a class="routeLink" href="route-pro.html">路线决策台</a></header><section class="hero"><div class="console"><div class="title"><div class="eyebrow">micro weather desk</div><h1>山野气象台</h1><p>查小地点，不查大城市平均值。输入村庄、山口、营地、湖泊、路线起点或坐标，先确认定位，再看风、雨、能见度、露点、气压和 24 小时风险。</p></div><form class="search" id="form"><div class="query"><input id="q" placeholder="雨崩村 / 四姑娘山镇 / 30.996,102.830"><button>读取气象</button></div><div class="chips" id="chips"></div></form></div><main id="main"><div class="status">等待查询。建议输入“省份 + 小地点”，例如“云南 德钦 雨崩村”。同名地点后续会进入候选确认流程。</div></main></section></div><script>
const AMAP_KEY='39a8c2f6ef75e494198f3e3751701ebe',WEATHER_PROCESSED='data/processed/weather_console_v5.json';const $=s=>document.querySelector(s);let rules=[],schema=[],sources=[],fallbacks=[];const WMO={0:'晴',1:'少云',2:'多云',3:'阴',45:'雾',48:'冻雾',51:'小毛毛雨',53:'毛毛雨',55:'强毛毛雨',61:'小雨',63:'中雨',65:'大雨',71:'小雪',73:'中雪',75:'大雪',80:'阵雨',81:'强阵雨',82:'暴雨',95:'雷暴',96:'雷暴冰雹',99:'强雷暴'};
function val(x,u=''){return Number.isFinite(x)?`${Math.round(x)}${u}`:'--'}function parseCoord(q){const m=q.match(/^\s*(-?\d+(?:\.\d+)?)\s*[,， ]\s*(-?\d+(?:\.\d+)?)\s*$/);if(!m)return null;let a=+m[1],b=+m[2];return Math.abs(a)<=90?{lat:a,lon:b,name:`${a.toFixed(4)}, ${b.toFixed(4)}`,admin:'坐标输入',source:'坐标',confidence:'A'}:{lat:b,lon:a,name:`${b.toFixed(4)}, ${a.toFixed(4)}`,admin:'坐标输入',source:'坐标',confidence:'A'}}
function gcj2wgs(lng,lat){const PI=Math.PI,a=6378245,ee=0.006693421622965943;function tx(x,y){let r=300+x+2*y+.1*x*x+.1*x*y+.1*Math.sqrt(Math.abs(x));r+=(20*Math.sin(6*x*PI)+20*Math.sin(2*x*PI))*2/3;r+=(20*Math.sin(x*PI)+40*Math.sin(x/3*PI))*2/3;r+=(150*Math.sin(x/12*PI)+300*Math.sin(x/30*PI))*2/3;return r}function ty(x,y){let r=-100+2*x+3*y+.2*y*y+.1*x*y+.2*Math.sqrt(Math.abs(x));r+=(20*Math.sin(6*x*PI)+20*Math.sin(2*x*PI))*2/3;r+=(20*Math.sin(y*PI)+40*Math.sin(y/3*PI))*2/3;r+=(160*Math.sin(y/12*PI)+320*Math.sin(y*PI/30))*2/3;return r}const dlng=tx(lng-105,lat-35),dlat=ty(lng-105,lat-35),rad=lat/180*PI,magic=1-ee*Math.sin(rad)**2;return[lng-dlng*180/(a/Math.sqrt(magic)*Math.cos(rad)*PI),lat-dlat*180/(a*(1-ee)/(magic*Math.sqrt(magic))*PI)]}
function confidence(source,q){if(source==='坐标')return'A';if(source.includes('兜底'))return'A';if(source.includes('高德')&&q.length>=5)return'B';if(source.includes('Open'))return'B';return'C'}
async function geocode(q){const c=parseCoord(q);if(c)return c;const fb=fallbacks.find(x=>x.query_zh===q||x.display_name===q||x.preferred_query===q);if(fb&&fb.manual_lat&&fb.manual_lng)return{name:fb.display_name||fb.query_zh||q,admin:fb.ambiguity_note||'小地点兜底',lat:fb.manual_lat,lon:fb.manual_lng,source:'v3.1 小地点兜底',confidence:'A'};let r=await fetch(`https://restapi.amap.com/v3/place/text?key=${AMAP_KEY}&keywords=${encodeURIComponent(q)}&offset=5&page=1&extensions=base`).then(r=>r.json()).catch(()=>null);let p=r?.pois?.[0];if(p?.location){const [lng,lat]=p.location.split(',').map(Number),[lon,wlat]=gcj2wgs(lng,lat);return{name:p.name||q,admin:[p.pname,p.cityname,p.adname].filter(Boolean).join(' · '),lat:wlat,lon,source:'高德 POI',confidence:confidence('高德',q),candidates:r.pois?.slice(0,5)||[]}}r=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=5&language=zh&format=json`).then(r=>r.json()).catch(()=>null);const g=r?.results?.[0];return g?{name:g.name,admin:g.admin1||g.country||'',lat:g.latitude,lon:g.longitude,source:'Open-Meteo Geocode',confidence:'B'}:null}
async function weather(g){const h='temperature_2m,apparent_temperature,precipitation_probability,precipitation,weather_code,wind_speed_10m,wind_gusts_10m,wind_direction_10m,relative_humidity_2m,dew_point_2m,pressure_msl,cloud_cover,visibility,uv_index';const d='temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,wind_speed_10m_max,wind_gusts_10m_max,uv_index_max,sunrise,sunset';return fetch(`https://api.open-meteo.com/v1/forecast?latitude=${g.lat}&longitude=${g.lon}&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,wind_gusts_10m,wind_direction_10m,relative_humidity_2m,pressure_msl&hourly=${h}&daily=${d}&timezone=auto&forecast_days=7`).then(r=>r.json())}
function graph(vals,color){const w=760,h=74,p=10,nums=vals.filter(Number.isFinite),min=Math.min(...nums),max=Math.max(...nums);const pts=vals.map((v,i)=>`${p+i*(w-p*2)/(vals.length-1)},${h-p-(v-min)/(max-min||1)*(h-p*2)}`).join(' ');return`<svg viewBox="0 0 ${w} ${h}"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>`}
function riskClass(v,type){if(type==='gust')return v>40?'danger':v>28?'watch':'';if(type==='rain')return v>65?'danger':v>45?'watch':'';if(type==='vis')return v<3000?'danger':v<6000?'watch':'';return''}function explain(a){const out=[];if(a.gust>40)out.push(['danger','阵风超过 40km/h，开阔山脊、湖边和垭口不适合轻量化行动。']);else if(a.gust>28)out.push(['watch','阵风偏强，注意横风、帐篷固定和体感降温。']);if(a.rain>55)out.push(['watch','降水概率偏高，需交叉查看雷达、Windy 或 Meteoblue。']);if(a.vis&&a.vis<5000)out.push(['watch','能见度偏低，雾、低云或降水会影响找路和观察。']);if(a.pressure<1000)out.push(['watch','气压偏低，后续天气系统活动需要关注。']);return out.length?out:[['','主要指标未触发明显阈值。小地点预报仍建议多模型交叉查看。']]}
function render(g,d){const c=d.current,h=d.hourly,day=d.daily,t=h.temperature_2m.slice(0,24),rain=h.precipitation_probability.slice(0,24),gust=h.wind_gusts_10m.slice(0,24),cloud=h.cloud_cover.slice(0,24),vis=h.visibility.slice(0,24),a={gust:Math.max(...gust),rain:Math.max(...rain),vis:Math.min(...vis),pressure:c.pressure_msl};const hours=h.time.filter((_,i)=>i<24&&i%3===0).map((x,i)=>{const k=i*3;return`<div class="hour"><b>${new Date(x).getHours()}时</b><span>体感 ${val(h.apparent_temperature[k],'°')}</span><span>雨 ${val(h.precipitation_probability[k],'%')}</span></div>`}).join('');$('#main').innerHTML=`<section class="station show"><div class="loc"><div class="locTop"><div><div class="eyebrow">定位确认</div><h2>${g.name}</h2><p>${g.admin||'小地点'} · ${g.lat.toFixed(4)}, ${g.lon.toFixed(4)} · ${g.source}</p></div><div class="confidence"><span>置信度</span><b>${g.confidence||'B'}</b></div></div><div class="riskTape"><div class="risk ${riskClass(c.wind_gusts_10m,'gust')}"><b>${val(c.wind_gusts_10m,'km/h')}</b><span>当前阵风</span></div><div class="risk ${riskClass(a.rain,'rain')}"><b>${val(a.rain,'%')}</b><span>24h最高降水</span></div><div class="risk ${riskClass(a.vis,'vis')}"><b>${val(a.vis/1000,'km')}</b><span>最低能见度</span></div><div class="risk"><b>${val(day.uv_index_max[0])}</b><span>UV</span></div></div></div><div class="now"><div class="nowGrid"><div><div class="eyebrow">当前实况</div><div class="temp">${val(c.temperature_2m,'°')}</div></div><div class="cond"><b>${WMO[c.weather_code]||'天气'}</b><span>体感 ${val(c.apparent_temperature,'°')}</span><span>湿度 ${val(c.relative_humidity_2m,'%')}</span></div></div><div class="metrics"><div class="metric"><b>${val(c.wind_speed_10m,'km/h')}</b><span>风速</span></div><div class="metric"><b>${val(c.wind_gusts_10m,'km/h')}</b><span>阵风</span></div><div class="metric"><b>${val(c.pressure_msl,'hPa')}</b><span>气压</span></div><div class="metric"><b>${val(c.wind_direction_10m,'°')}</b><span>风向</span></div></div></div><div class="boards"><div class="board"><h3>逐小时窗口</h3><div class="hours">${hours}</div></div><div class="board"><h3>24小时风险图</h3><div class="note">温度、降水概率、阵风、云量。手机上看趋势，不只看当前值。</div><div class="meteogram"><div class="row"><div class="rowLabel">温度</div>${graph(t,'#7bd1ff')}</div><div class="row"><div class="rowLabel">降水</div>${graph(rain,'#8ee86f')}</div><div class="row"><div class="rowLabel">阵风</div>${graph(gust,'#f0b95b')}</div><div class="row"><div class="rowLabel">云量</div>${graph(cloud,'#b5c2ce')}</div></div></div><div class="board"><h3>专业解释</h3><div class="explain">${explain(a).map(([c,t])=>`<div><span class="flag ${c}"></span><span>${t}</span></div>`).join('')}</div><div class="model">字段 ${schema.length} 项 · 解释规则 ${rules.length} 条 · 来源矩阵 ${sources.length} 项</div></div><div class="refs"><div class="ref"><div class="refHead"><div><b>Windy 风场参考</b><span>Wind / Radar / ECMWF</span></div><a target="_blank" href="https://www.windy.com/?${g.lat},${g.lon},8">打开</a></div><div class="mapFrame"><iframe loading="lazy" src="https://embed.windy.com/embed2.html?lat=${g.lat}&lon=${g.lon}&detailLat=${g.lat}&detailLon=${g.lon}&width=650&height=450&zoom=7&level=surface&overlay=wind&product=ecmwf&menu=&message=true&marker=true&calendar=now&pressure=&type=map&location=coordinates&detail=&metricWind=km%2Fh&metricTemp=%C2%B0C&radarRange=-1"></iframe></div></div><div class="ref"><div class="refHead"><div><b>Meteoblue 专业参考</b><span>Meteogram / Multi-model</span></div><a target="_blank" href="https://www.meteoblue.com/">打开</a></div><div class="mapFrame">Meteoblue 作为外部专业参考，不假装已接入商业 API。</div></div></div><a class="src" href="route-pro.html?q=${encodeURIComponent(g.name)}"><div><b>转路线决策台</b><span>带入当前地点</span></div><span>打开</span></a></div></section>`}
async function search(q=$('#q').value.trim()){if(!q)return;$('#main').innerHTML='<div class="status">正在定位小地点并读取气象模型...</div>';const g=await geocode(q);if(!g){$('#main').innerHTML='<div class="status">没有找到地点。请加省份、景区名，或直接输入经纬度。</div>';return}const d=await weather(g);history.replaceState(null,'',`?q=${encodeURIComponent(q)}`);render(g,d)}
async function init(){const data=await fetch(WEATHER_PROCESSED).then(r=>r.json()).catch(()=>({}));rules=data.rules||[];schema=data.metrics||[];sources=data.sources||[];fallbacks=data.geocode_fallbacks||[];['云南 德钦 雨崩村','四姑娘山镇','哈巴村','独库公路','冈仁波齐','纳木错','墨脱','喀拉峻'].forEach(x=>$('#chips').insertAdjacentHTML('beforeend',`<button class="chip" type="button" onclick="search('${x}')">${x}</button>`));const p=new URLSearchParams(location.search);if(p.get('q')){$('#q').value=p.get('q');search(p.get('q'))}}$('#form').addEventListener('submit',e=>{e.preventDefault();search()});init();
</script></body></html>
