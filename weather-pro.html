<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>气象查询 · 路线规划</title>
<style>
/* ── Design tokens (inspired by Capsule + Signal + Blue Professional) ── */
:root{
  --bg:#f7f5f0;
  --card:#fff;
  --text:#1e1e1e;
  --sub:#6b6b6b;
  --accent:#3b6fb6;
  --accent-light:#e8f0fa;
  --rain:#5b8cb8;
  --warm:#d4743a;
  --uv:#e07b39;
  --green:#4a8c5c;
  --drive:#3b6fb6;
  --bike:#4a8c5c;
  --walk:#d4743a;
  --shadow-sm:0 1px 3px rgba(0,0,0,.06);
  --shadow-md:0 2px 12px rgba(0,0,0,.08);
  --radius:14px;
}
*{margin:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family:-apple-system,'PingFang SC','Noto Sans SC','Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  line-height:1.5;
}
.wrap{max-width:760px;margin:0 auto;padding:12px 14px 60px}

/* ── Tab bar ── */
.tab-bar{
  display:flex;
  background:var(--card);
  border-radius:16px;
  padding:5px;
  margin-bottom:16px;
  box-shadow:var(--shadow-sm);
  gap:4px;
  position:sticky;
  top:8px;
  z-index:20;
}
.tab-btn{
  flex:1;
  text-align:center;
  padding:11px 8px;
  border-radius:12px;
  border:none;
  background:transparent;
  cursor:pointer;
  font-size:.84em;
  font-weight:500;
  transition:all .2s;
  color:var(--sub);
  letter-spacing:.02em;
}
.tab-btn.active{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(59,111,182,.3)}
.tab-btn:active{transform:scale(.96)}
.tab-panel{display:none}
.tab-panel.show{display:block}

/* ── Search ── */
.search-bar{position:sticky;top:68px;z-index:10;background:var(--bg);padding:8px 0 14px}
.search-box{
  display:flex;gap:8px;
  background:var(--card);
  border-radius:var(--radius);
  padding:5px 5px 5px 16px;
  box-shadow:var(--shadow-md);
  align-items:center;
  border:1px solid #eee;
}
.search-box input{flex:1;border:none;outline:none;font-size:.95em;background:none;color:var(--text);padding:9px 0;min-width:0}
.search-box input::placeholder{color:#c5c0b8}
.search-box button{
  flex-shrink:0;
  background:var(--accent);
  color:#fff;
  border:none;
  border-radius:10px;
  padding:10px 20px;
  font-size:.85em;
  font-weight:600;
  cursor:pointer;
  letter-spacing:.03em;
}
.search-box button:active{opacity:.85}
.search-hint{font-size:.63em;color:#c5c0b8;margin-top:6px;padding-left:2px;letter-spacing:.02em}
.suggestions{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.sug-chip{
  font-size:.68em;
  padding:5px 12px;
  background:var(--card);
  border-radius:20px;
  cursor:pointer;
  color:var(--sub);
  box-shadow:var(--shadow-sm);
  border:1px solid #eee;
  transition:all .15s;
}
.sug-chip:hover{background:var(--accent-light);border-color:var(--accent);color:var(--accent)}
.sug-chip:active{transform:scale(.95)}

/* ── Status ── */
.status{text-align:center;padding:60px 0;color:var(--sub)}
.status.error{color:var(--warm)}
.spinner{
  display:inline-block;width:22px;height:22px;
  border:2px solid #e0dcd6;
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin .6s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Site header ── */
.site-header{text-align:center;padding:8px 0 6px}
.site-header h1{font-size:1.05em;font-weight:600;letter-spacing:.01em}
.site-header .loc{font-size:.78em;color:var(--sub);margin-top:3px}
.src-bar{
  display:flex;justify-content:center;gap:16px;padding:2px 0 10px;
  font-size:.64em;color:#bbb;flex-wrap:wrap;
}
.src-bar span{display:flex;align-items:center;gap:4px}
.src-bar .dot{width:5px;height:5px;border-radius:50%}
.dot.om{background:var(--accent)}.dot.wy{background:#1e88e5}.dot.mb{background:#f48fb1}

/* ── Now card ── */
.now-card{
  background:linear-gradient(135deg,#3b6fb6,#5b93d4);
  color:#fff;
  border-radius:18px;
  padding:24px 22px;
  margin-bottom:18px;
  box-shadow:0 4px 20px rgba(59,111,182,.25);
}
.now-card .now-temp{font-size:3.2em;font-weight:200;line-height:1;letter-spacing:-.02em}
.now-card .now-label{font-size:.85em;opacity:.9;margin-top:4px}
.now-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:18px}
@media(max-width:480px){.now-grid{grid-template-columns:repeat(2,1fr)}}
.now-item{background:rgba(255,255,255,.14);border-radius:12px;padding:12px 8px;text-align:center;backdrop-filter:blur(4px)}
.now-item .nv{font-size:1.05em;font-weight:600}
.now-item .nl{font-size:.62em;opacity:.7;margin-top:2px}

/* ── Section title ── */
.sec-title{
  font-size:.72em;
  color:var(--sub);
  margin:22px 0 10px;
  letter-spacing:.04em;
  font-weight:500;
  text-transform:uppercase;
  display:flex;
  align-items:center;
  gap:6px;
}

/* ── Day cards ── */
.days{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:18px}
@media(max-width:680px){.days{grid-template-columns:repeat(3,1fr);gap:6px}}
@media(max-width:380px){.days{grid-template-columns:repeat(2,1fr)}}
.day-card{
  background:var(--card);
  border-radius:var(--radius);
  padding:14px 8px 10px;
  text-align:center;
  cursor:pointer;
  transition:all .18s;
  box-shadow:var(--shadow-sm);
  border:1px solid #eee;
  user-select:none;
}
.day-card:active{transform:scale(.96)}
.day-card.active{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent);background:var(--accent-light)}
.day-card .dow{font-size:.76em;font-weight:600;color:var(--text)}
.day-card .date{font-size:.62em;color:var(--sub);margin-bottom:4px}
.day-card .icon{font-size:1.6em;margin:4px 0;display:block}
.day-card .temps{font-size:.85em;font-weight:500}
.day-card .temps .lo{color:var(--sub);margin-left:2px}
.day-card .rain-bar{margin-top:6px;height:3px;background:#eee;border-radius:2px;overflow:hidden}
.day-card .rain-bar .fill{height:100%;background:var(--rain);border-radius:2px;transition:width .3s}
.day-card .tag{font-size:.58em;color:var(--sub);margin-top:3px}

/* ── Detail panel ── */
.detail{background:var(--card);border-radius:var(--radius);padding:20px 16px;margin-bottom:14px;box-shadow:var(--shadow-sm);border:1px solid #eee;display:none}
.detail.show{display:block}
.detail h3{font-size:.92em;margin-bottom:14px;color:var(--accent);font-weight:600}
.dg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
@media(max-width:480px){.dg{grid-template-columns:repeat(2,1fr);gap:6px}}
.di{background:#f8f7f4;border-radius:10px;padding:12px 10px;text-align:center}
.di .l{font-size:.64em;color:var(--sub)}
.di .v{font-size:.95em;font-weight:600;margin-top:4px}

/* ── Hourly ── */
.hs-wrap{margin-top:16px}
.hs-label{font-size:.7em;color:var(--sub);margin-bottom:8px}
.hs{display:flex;overflow-x:auto;gap:4px;padding-bottom:8px;-webkit-overflow-scrolling:touch}
.hs::-webkit-scrollbar{height:3px}.hs::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}
.hc{flex:0 0 auto;min-width:48px;text-align:center;padding:6px 4px;background:#f8f7f4;border-radius:8px;font-size:.6em}
.hc.nw{background:var(--accent-light);border:1px solid #c8d8e8}
.hc .h{font-weight:600;margin-bottom:3px;display:block}
.hc .t{margin-bottom:1px}
.hc .r{color:var(--rain)}

/* ── Chart ── */
.chart-wrap{margin-top:12px;width:100%;overflow-x:auto}
.chart-wrap svg{min-width:500px;width:100%;height:auto}

/* ── Outdoor indices ── */
.outdoor{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:16px 0}
@media(max-width:480px){.outdoor{grid-template-columns:1fr}}
.oc{
  background:var(--card);
  border-radius:var(--radius);
  padding:16px;
  box-shadow:var(--shadow-sm);
  border:1px solid #eee;
}
.oc .oh{font-size:.78em;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.oc .ov{font-size:1.15em;font-weight:300;margin-bottom:4px}
.oc .od{font-size:.68em;color:var(--sub);line-height:1.5}
.oe{display:inline-block;padding:3px 10px;border-radius:14px;font-size:.7em;font-weight:600}
.oe.good{background:#e6f4ea;color:var(--green)}
.oe.warn{background:#fef3e4;color:var(--warm)}
.oe.bad{background:#fce4e4;color:#c44}

/* ── Windy ── */
.extern{margin:20px 0}
.extern h4{font-size:.74em;color:var(--sub);margin-bottom:10px;font-weight:500}
.windy-box{border-radius:14px;overflow:hidden;box-shadow:var(--shadow-md);height:340px}
.windy-box iframe{width:100%;height:100%;border:0}
@media(max-width:480px){.windy-box{height:220px}}
.ext-links{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.ext-link{
  flex:1;min-width:130px;
  background:var(--card);
  border-radius:12px;padding:14px;text-align:center;
  text-decoration:none;color:var(--text);
  box-shadow:var(--shadow-sm);
  font-size:.76em;
  border:1px solid #eee;
  transition:all .2s;
}
.ext-link:hover{transform:translateY(-1px);box-shadow:var(--shadow-md)}

/* ── Route search ── */
.route-search{
  background:var(--card);
  border-radius:16px;
  padding:16px;
  margin-bottom:14px;
  box-shadow:var(--shadow-sm);
  border:1px solid #eee;
}
.route-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.route-row .rdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.route-row .rdot.from{background:var(--accent);box-shadow:0 0 0 3px rgba(59,111,182,.2)}
.route-row .rdot.to{background:var(--warm);box-shadow:0 0 0 3px rgba(212,116,58,.2)}
.route-row input{
  flex:1;border:1px solid #e8e4df;border-radius:10px;
  padding:10px 12px;font-size:.88em;outline:none;
  background:#fafaf8;min-width:0;
}
.route-row input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,111,182,.08)}
.swap-btn{
  flex-shrink:0;width:34px;height:34px;border-radius:50%;
  border:1px solid #e8e4df;background:var(--card);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:1.1em;transition:all .2s;
}
.swap-btn:hover{background:#f5f5f5;transform:rotate(180deg)}

/* ── Mode selector ── */
.modes{display:flex;gap:6px;flex-wrap:wrap}
.mode-chip{
  flex:1;min-width:70px;text-align:center;
  padding:10px 6px;border-radius:10px;
  border:1px solid #e8e4df;background:var(--card);
  cursor:pointer;font-size:.74em;font-weight:500;
  transition:all .15s;
}
.mode-chip.sel{color:#fff;border-color:transparent;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.mode-chip.sel.drive{background:var(--drive)}
.mode-chip.sel.bike{background:var(--bike)}
.mode-chip.sel.walk{background:var(--walk)}
.mode-chip .emoji{display:block;font-size:1.3em;margin-bottom:2px}

/* ── Action button ── */
.go-btn{
  width:100%;margin-top:10px;padding:12px;
  border:none;border-radius:10px;
  background:var(--accent);color:#fff;
  font-size:.88em;font-weight:600;
  cursor:pointer;letter-spacing:.03em;
  transition:all .15s;
}
.go-btn:hover{background:#3563a3}
.go-btn:active{transform:scale(.98)}
.go-btn:disabled{opacity:.5;pointer-events:none}

/* ── Map ── */
.map-wrap{
  border-radius:16px;overflow:hidden;
  box-shadow:var(--shadow-md);height:380px;
  margin-bottom:14px;position:relative;
  border:1px solid #eee;
}
@media(max-width:480px){.map-wrap{height:250px}}
#rmap{width:100%;height:100%}

/* ── Route summary ── */
.route-summary{
  background:var(--card);
  border-radius:16px;
  padding:18px;
  margin-bottom:14px;
  box-shadow:var(--shadow-sm);
  border:1px solid #eee;
  display:none;
}
.route-summary .rs-header{
  display:flex;align-items:center;gap:10px;
  margin-bottom:14px;padding-bottom:14px;
  border-bottom:1px solid #f0ece6;
}
.rs-header .rs-mode-icon{
  width:40px;height:40px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.3em;
}
.rs-header .rs-route-name{font-weight:600;font-size:.9em}
.rs-header .rs-route-path{font-size:.68em;color:var(--sub);margin-left:auto}
.rs-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
@media(max-width:480px){.rs-grid{grid-template-columns:repeat(2,1fr)}}
.rs-item{
  text-align:center;
  background:#f8f7f4;
  border-radius:12px;
  padding:14px 8px;
}
.rs-item .rsv{font-size:1.1em;font-weight:600;margin-bottom:2px}
.rs-item .rsl{font-size:.62em;color:var(--sub)}
.rs-mini{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px}
.rs-mini .rs-item{padding:10px 8px}
.rs-mini .rsv{font-size:.88em}

/* ── Weather panels ── */
.weather-panels{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
@media(max-width:500px){.weather-panels{grid-template-columns:1fr}}
.wp{
  background:var(--card);
  border-radius:16px;
  padding:16px;
  box-shadow:var(--shadow-sm);
  border:1px solid #eee;
}
.wp.from{border-left:3px solid var(--accent)}
.wp.to{border-left:3px solid var(--warm)}
.wp .wpn{font-size:.68em;color:var(--sub);margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em}
.wp .wpt{font-size:.85em;font-weight:600;margin-bottom:8px}
.wp .wph{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.wp .wph .big{font-size:2em;font-weight:200}
.wp .wph .icon{font-size:1.6em}
.wpg{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.wgi{
  background:#f8f7f4;border-radius:8px;
  padding:8px;text-align:center;font-size:.7em;
}
.wgi .wgiv{font-weight:600;display:block;margin-bottom:1px}
.wgi .wgil{color:var(--sub);font-size:.88em}

/* ── Route suggestions ── */
.route-sug{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.rsug{
  font-size:.64em;padding:4px 10px;
  background:#f0efeb;border-radius:14px;
  cursor:pointer;color:var(--sub);
  border:1px solid transparent;
  transition:all .15s;
}
.rsug:hover{background:var(--accent-light);border-color:var(--accent);color:var(--accent)}
.rsug:active{transform:scale(.95)}

/* ── Footer ── */
footer{text-align:center;padding:30px 0 0;color:#d0ccc4;font-size:.6em;letter-spacing:.02em}
footer a{color:#bbb}
.hidden{display:none}
</style>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
// ── Route state ─────────────────────────────────────────
let RSTATE={mode:'driving',fromGeo:null,toGeo:null,route:null,rmap:null,markers:[],routeLine:null};

function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.textContent.includes(tab==='weather'?'天气':'路线')));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('show'));
  document.getElementById('tab-'+tab).classList.add('show');
  if(tab==='route'&&!RSTATE.rmap)initRMap();
  if(tab==='route')setTimeout(()=>RSTATE.rmap&&RSTATE.rmap.invalidateSize(),200);
}

function initRMap(){
  RSTATE.rmap=L.map('rmap').setView([27,106],6);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>',
    maxZoom:18
  }).addTo(RSTATE.rmap);
}

function setMode(m){
  RSTATE.mode=m;
  document.querySelectorAll('#tab-route .mode-chip').forEach(c=>{
    c.classList.remove('sel');
    if(c.dataset.mode===m)c.classList.add('sel');
  });
}

function swap(){
  const t=document.getElementById('fromInput').value;
  document.getElementById('fromInput').value=document.getElementById('toInput').value;
  document.getElementById('toInput').value=t;
  if(RSTATE.fromGeo&&RSTATE.toGeo){
    const tmp=RSTATE.fromGeo;RSTATE.fromGeo=RSTATE.toGeo;RSTATE.toGeo=tmp;
    renderRouteAll();
  }
}

function preset(f,t,m){
  document.getElementById('fromInput').value=f;
  document.getElementById('toInput').value=t;
  setMode(m);
  plan();
}

async function routeGeocode(q){
  try{
    const c=new AbortController();
    const t=setTimeout(()=>c.abort(),5000);
    const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=3&accept-language=zh`,{signal:c.signal});
    clearTimeout(t);
    const d=await r.json();
    if(d&&d.length){
      const p=d[0].display_name.split(', ');
      return {latitude:parseFloat(d[0].lat),longitude:parseFloat(d[0].lon),name:p[0],country:p[p.length-1]||'',admin1:p.length>2?p[p.length-2]:''};
    }
  }catch(e){}
  const r=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=3&language=zh&format=json`);
  const d=await r.json();
  if(!d.results||!d.results.length)return null;
  return d.results[0];
}

async function getRoute(from,to,mode){
  const profiles={driving:'car',cycling:'bike',walking:'foot'};
  const profile=profiles[mode]||'car';
  const u=`https://router.project-osrm.org/route/v1/${profile}/${from.longitude},${from.latitude};${to.longitude},${to.latitude}?overview=full&geometries=geojson&steps=true&alternatives=false`;
  const r=await fetch(u);
  const d=await r.json();
  if(!d.routes||!d.routes.length)return null;
  return d.routes[0];
}

async function getRouteWeather(lat,lon){
  const u=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,relative_humidity_2m&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weather_code,wind_speed_10m_max,uv_index_max,sunshine_duration,precipitation_sum&timezone=auto&forecast_days=3`;
  const r=await fetch(u);
  return await r.json();
}

async function plan(){
  const fromQ=document.getElementById('fromInput').value.trim();
  const toQ=document.getElementById('toInput').value.trim();
  if(!fromQ||!toQ)return;

  document.getElementById('routeSummary').style.display='none';
  document.getElementById('weatherPanels').innerHTML='';
  const goBtn=document.getElementById('goBtn');
  goBtn.disabled=true;goBtn.textContent='规划中…';

  try{
    const[fg,tg]=await Promise.all([routeGeocode(fromQ),routeGeocode(toQ)]);
    if(!fg||!tg){
      alert(`未找到：${!fg?fromQ:''} ${!tg?toQ:''}`);
      goBtn.disabled=false;goBtn.textContent='开始规划';
      return;
    }
    RSTATE.fromGeo=fg;RSTATE.toGeo=tg;

    const[route,fromW,toW]=await Promise.all([
      getRoute(fg,tg,RSTATE.mode),
      getRouteWeather(fg.latitude,fg.longitude),
      getRouteWeather(tg.latitude,tg.longitude)
    ]);

    if(!route){
      alert('未找到可行路线\n\n可能原因：\n1. 两地距离太远或太近\n2. 该区域不支持所选交通方式\n3. 网络问题\n\n请尝试：更换交通方式、调整起终点、或选择预设路线');
      goBtn.disabled=false;goBtn.textContent='开始规划';
      return;
    }
    RSTATE.route=route;
    RSTATE.fromW=fromW;RSTATE.toW=toW;
    renderRouteAll();
  }catch(e){
    alert('网络错误：'+e.message);
  }
  goBtn.disabled=false;goBtn.textContent='开始规划';
}

function renderRouteAll(){
  const m=RSTATE.rmap;
  if(!m)return;
  RSTATE.markers.forEach(mk=>mk.remove());
  if(RSTATE.routeLine)m.removeLayer(RSTATE.routeLine);

  const bounds=L.latLngBounds([
    [RSTATE.fromGeo.latitude,RSTATE.fromGeo.longitude],
    [RSTATE.toGeo.latitude,RSTATE.toGeo.longitude]
  ]);

  const fromM=L.marker([RSTATE.fromGeo.latitude,RSTATE.fromGeo.longitude],{
    icon:L.divIcon({html:'<div style="background:#4a7eb5;color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;box-shadow:0 2px 6px rgba(0,0,0,.3)">起</div>',iconSize:[28,28],iconAnchor:[14,14]})
  }).addTo(m).bindPopup(`<b>起点</b><br>${RSTATE.fromGeo.name}`);
  const toM=L.marker([RSTATE.toGeo.latitude,RSTATE.toGeo.longitude],{
    icon:L.divIcon({html:'<div style="background:#d47a2e;color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;box-shadow:0 2px 6px rgba(0,0,0,.3)">终</div>',iconSize:[28,28],iconAnchor:[14,14]})
  }).addTo(m).bindPopup(`<b>终点</b><br>${RSTATE.toGeo.name}`);
  RSTATE.markers=[fromM,toM];

  const coords=RSTATE.route.geometry.coordinates.map(c=>[c[1],c[0]]);
  RSTATE.routeLine=L.polyline(coords,{color:'#4a7eb5',weight:4,opacity:.8}).addTo(m);
  bounds.extend(coords);
  m.fitBounds(bounds,{padding:[40,40]});

  const dist=(RSTATE.route.distance/1000).toFixed(1);
  const dur=Math.round(RSTATE.route.duration/60);
  const hrs=Math.floor(dur/60),mins=dur%60;
  const durStr=hrs>0?`${hrs}h${mins}m`:`${mins}分钟`;
  const modeName={driving:'驾车',cycling:'骑行',walking:'步行'};
  const speed=(RSTATE.route.distance/1000)/(RSTATE.route.duration/3600);
  let gain=0;
  for(let i=1;i<coords.length;i++){const diff=coords[i][0]-coords[i-1][0];if(diff>0)gain+=diff*111000;}
  gain=Math.round(gain);

  const modeIcons={driving:'🚗',cycling:'🚴',walking:'🥾'};
  const modeColors={driving:'#4a7eb5',cycling:'#5a9a6a',walking:'#d47a2e'};
  document.getElementById('routeSummary').style.display='block';
  const mc=modeColors[RSTATE.mode];
  const mi=modeIcons[RSTATE.mode];
  const fromT=(RSTATE.fromW.current.temperature_2m||0).toFixed(1);
  const toT=(RSTATE.toW.current.temperature_2m||0).toFixed(1);
  const fromW=w(RSTATE.fromW.current.weather_code);
  const toW=w(RSTATE.toW.current.weather_code);
  document.getElementById('routeSummary').innerHTML=`
    <div class="rs-header">
      <div class="rs-mode-icon" style="background:${mc}20;color:${mc}">${mi}</div>
      <div>
        <div class="rs-route-name">${modeName[RSTATE.mode]}路线</div>
        <div style="font-size:.66em;color:var(--sub)">OSRM 路径引擎</div>
      </div>
      <div class="rs-route-path">${RSTATE.fromGeo.name} → ${RSTATE.toGeo.name}</div>
    </div>
    <div class="rs-grid">
      <div class="rs-item"><div class="rsv">📏 ${dist}</div><div class="rsl">总距离 km</div></div>
      <div class="rs-item"><div class="rsv">⏱ ${durStr}</div><div class="rsl">预计用时</div></div>
      <div class="rs-item"><div class="rsv">🏃 ${speed.toFixed(1)}</div><div class="rsl">均速 km/h</div></div>
      <div class="rs-item"><div class="rsv">⛰ ~${gain}</div><div class="rsl">爬升 m</div></div>
    </div>
    <div class="rs-mini">
      <div class="rs-item" style="border-left:3px solid ${mc}">
        <div class="rsv">${fromT}° ${fromW.i}</div>
        <div class="rsl">📍 ${RSTATE.fromGeo.name}</div>
      </div>
      <div class="rs-item" style="border-left:3px solid var(--warm)">
        <div class="rsv">${toT}° ${toW.i}</div>
        <div class="rsl">📍 ${RSTATE.toGeo.name}</div>
      </div>
    </div>
  `;

  const container=document.getElementById('weatherPanels');
  container.innerHTML='';
  renderRouteWP('from',RSTATE.fromGeo,RSTATE.fromW,container);
  renderRouteWP('to',RSTATE.toGeo,RSTATE.toW,container);
}

function renderRouteWP(side,geo,data,container){
  const now=data.current;
  const today=data.daily;
  const wc=w(now.weather_code);
  const label=side==='from'?'起点':'终点';
  const cls=side==='from'?'from':'to';

  const panel=document.createElement('div');
  panel.className='wp '+cls;
  panel.innerHTML=`
    <div class="wpn">${label}</div>
    <div class="wpt">${geo.name} · ${geo.admin1||''} · ${geo.country||''}</div>
    <div class="wph">
      <span class="big">${now.temperature_2m.toFixed(1)}°</span>
      <span class="icon">${wc.i}</span>
      <span style="font-size:.8em;color:var(--sub)">${wc.l}<br>体感 ${now.apparent_temperature.toFixed(1)}°</span>
    </div>
    <div class="wpg">
      <div class="wgi"><span class="wgiv">🌬 ${now.wind_speed_10m} km/h</span><span class="wgil">风速</span></div>
      <div class="wgi"><span class="wgiv">💧 ${now.relative_humidity_2m}%</span><span class="wgil">湿度</span></div>
      <div class="wgi"><span class="wgiv">🌧 ${today.precipitation_probability_max[0]}%</span><span class="wgil">降雨概率</span></div>
      <div class="wgi"><span class="wgiv">☀️ UV${today.uv_index_max[0]}</span><span class="wgil">紫外线</span></div>
      <div class="wgi"><span class="wgiv">🌡 ${today.temperature_2m_max[0]}°/${today.temperature_2m_min[0]}°</span><span class="wgil">最高/低</span></div>
      <div class="wgi"><span class="wgiv">☀ ${(today.sunshine_duration[0]/3600).toFixed(1)}h</span><span class="wgil">日照</span></div>
    </div>
  `;
  if(side==='from')container.prepend(panel);
  else container.appendChild(panel);
}

document.getElementById('fromInput').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('toInput').focus()});
document.getElementById('toInput').addEventListener('keydown',e=>{if(e.key==='Enter')plan()});

</script>

<script>
// ── State ────────────────────────────────────────────
let STATE={lat:39.90,lon:116.40,name:'北京',country:'中国',elev:55,admin:'北京',data:null};
const WMO={0:{i:'☀️',l:'晴'},1:{i:'🌤️',l:'少云'},2:{i:'⛅',l:'多云'},3:{i:'☁️',l:'阴'},45:{i:'🌫️',l:'雾'},48:{i:'🌫️',l:'冻雾'},51:{i:'🌧️',l:'小雨'},53:{i:'🌧️',l:'中雨'},55:{i:'🌧️',l:'大雨'},56:{i:'🌧️',l:'冻雨'},57:{i:'🌧️',l:'冻雨'},61:{i:'🌦️',l:'小阵雨'},63:{i:'🌧️',l:'中阵雨'},65:{i:'🌧️',l:'大阵雨'},66:{i:'🌧️',l:'冻雨'},67:{i:'🌧️',l:'冻雨'},71:{i:'❄️',l:'小雪'},73:{i:'❄️',l:'中雪'},75:{i:'❄️',l:'大雪'},77:{i:'❄️',l:'雪粒'},80:{i:'🌦️',l:'阵雨'},81:{i:'🌦️',l:'中阵雨'},82:{i:'🌧️',l:'大阵雨'},85:{i:'❄️',l:'小阵雪'},86:{i:'❄️',l:'大阵雪'},95:{i:'⛈️',l:'雷暴'},96:{i:'⛈️',l:'雷暴冰雹'},99:{i:'⛈️',l:'强雷暴冰雹'}};
function w(c){return WMO[c]||{i:'🌥️',l:'未知'}}
const WK=['周日','周一','周二','周三','周四','周五','周六'];

// ── Geocode & fetch ──────────────────────────────────
async function geocode(q){
  // Try Nominatim first (better small-place coverage, but blocked in China)
  try{
    const c=new AbortController();
    const t=setTimeout(()=>c.abort(),5000);
    const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=5&accept-language=zh`,{signal:c.signal});
    clearTimeout(t);
    const d=await r.json();
    if(d&&d.length){
      const p=d[0].display_name.split(', ');
      return {latitude:parseFloat(d[0].lat),longitude:parseFloat(d[0].lon),name:p[0],country:p[p.length-1]||'',admin1:p.length>2?p[p.length-2]:'',elevation:0};
    }
  }catch(e){}
  // Fallback to Open-Meteo (works in China, but fewer small places)
  const r=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=5&language=zh&format=json`);
  const d=await r.json();
  if(!d.results||!d.results.length)return null;
  return d.results[0];
}

async function fetchWeather(lat,lon){
  const u=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,precipitation_sum,weather_code,wind_speed_10m_max,wind_direction_10m_dominant,uv_index_max,sunshine_duration,pressure_msl_max,visibility_max&hourly=temperature_2m,apparent_temperature,precipitation_probability,weather_code,wind_speed_10m,wind_direction_10m,relative_humidity_2m,uv_index,pressure_msl,visibility,cloud_cover,dew_point_2m&timezone=auto&forecast_days=6`;
  const r=await fetch(u);
  return await r.json();
}

async function initFromParams(){
  const p=new URLSearchParams(location.search);
  const q=p.get('q');
  if(q){
    document.getElementById('q').value=q;
    const geo=await geocode(q);
    if(geo){
      STATE.lat=geo.latitude;STATE.lon=geo.longitude;STATE.name=geo.name;STATE.country=geo.country||'';
      STATE.admin=geo.admin1||'';STATE.elev=geo.elevation||0;
    }
  }
  STATE.data=await fetchWeather(STATE.lat,STATE.lon);
  render();
}

async function doSearch(){
  const q=document.getElementById('q').value.trim();
  if(!q)return;
  document.getElementById('main').innerHTML='<div class="status"><div class="spinner"></div><br><br>搜索中…</div>';
  const geo=await geocode(q);
  if(!geo){document.getElementById('main').innerHTML='<div class="status error">未找到「'+q+'」，请换个关键词试试</div>';return}
  STATE.lat=geo.latitude;STATE.lon=geo.longitude;STATE.name=geo.name;STATE.country=geo.country||'';
  STATE.admin=geo.admin1||'';STATE.elev=geo.elevation||0;
  history.pushState(null,'','?q='+encodeURIComponent(q));
  document.getElementById('main').innerHTML='<div class="status"><div class="spinner"></div><br><br>获取气象数据…</div>';
  STATE.data=await fetchWeather(STATE.lat,STATE.lon);
  render();
}

function quickSearch(q){document.getElementById('q').value=q;doSearch();}
document.getElementById('q').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch()});

// ── Render ───────────────────────────────────────────
function render(){
  const d=STATE.data;
  const locName=[STATE.name,STATE.admin,STATE.country].filter(Boolean).join(' · ');
  const now=d.current;

  // Outdoor indices
  const today=d.daily;
  const maxRain=Math.max(...today.precipitation_probability_max);
  const avgWind=Math.round(today.wind_speed_10m_max.reduce((a,b)=>a+b,0)/6);
  const avgVis=Math.round(today.visibility_max.reduce((a,b)=>a+b,0)/6/1000);
  const maxUV=Math.max(...today.uv_index_max);
  const totalRain=today.precipitation_sum.reduce((a,b)=>a+b,0).toFixed(1);
  const sunshineH=(today.sunshine_duration[0]/3600).toFixed(1);

  // Comfort index: temp + humidity adjustment
  const comfortT=now.apparent_temperature;
  let comfortL='舒适',comfortC='good';
  if(comfortT<5){comfortL='偏冷';comfortC='warn'}
  else if(comfortT>32){comfortL='炎热';comfortC='bad'}
  else if(comfortT>28){comfortL='偏热';comfortC='warn'}

  // Hiking index
  let hikeScore=10,hikeL='极佳',hikeC='good';
  if(maxRain>80)hikeScore-=4;
  else if(maxRain>50)hikeScore-=2;
  if(avgWind>30)hikeScore-=2;
  else if(avgWind>15)hikeScore-=1;
  if(avgVis<2)hikeScore-=2;
  else if(avgVis<5)hikeScore-=1;
  if(maxUV>10)hikeScore-=1;
  if(hikeScore>=8){hikeL='极佳';hikeC='good'}
  else if(hikeScore>=6){hikeL='适宜';hikeC='good'}
  else if(hikeScore>=4){hikeL='可出行';hikeC='warn'}
  else{hikeL='不建议';hikeC='bad'}

  // UV risk
  let uvL='安全',uvC='good';
  if(maxUV>10){uvL='极高风险';uvC='bad'}
  else if(maxUV>7){uvL='高风险';uvC='warn'}
  else if(maxUV>5){uvL='中等';uvC='warn'}
  else if(maxUV>2){uvL='低风险';uvC='good'}

  // Best window: find a time period with low rain probability and comfortable temp
  const hrs=d.hourly;
  let bestH=0,bestScore=999;
  for(let i=0;i<Math.min(48,hrs.time.length);i++){
    const score=hrs.precipitation_probability[i]*2+Math.abs(hrs.temperature_2m[i]-22)*3+(hrs.cloud_cover?hrs.cloud_cover[i]:0)/10;
    if(score<bestScore){bestScore=score;bestH=i;}
  }
  const bestTime=hrs.time[bestH].slice(11,16);
  const bestDate=hrs.time[bestH].slice(5,10);

  const html=`
<div class="site-header">
  <h1>${w(dailyW(0)).i} ${locName}</h1>
  <div class="loc">${STATE.lat.toFixed(4)}°N, ${STATE.lon.toFixed(4)}°E · 海拔 ${STATE.elev||'~'}m</div>
</div>
<div class="src-bar">
  <span><span class="dot om"></span> Open-Meteo</span>
  <span><span class="dot wy"></span> Windy</span>
  <span><span class="dot mb"></span> Meteoblue</span>
</div>

<!-- Current conditions -->
<div class="now-card">
  <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px">

<!-- Outdoor indices -->
<div class="sec-title">🏕️ 户外与出行指数</div>
<div class="outdoor">
  <div class="oc">

  <div class="oc">
    <div class="oh">🌡️ 体感舒适度</div>

  </div>
  <div class="oc">
    <div class="oh">☀️ 紫外线风险</div>
    <div class="ov"><span class="oe ${uvC}">${uvL}</span> UV峰值${maxUV}</div>
    <div class="od">${maxUV>7?'需SPF30+防晒霜、遮阳帽、墨镜':maxUV>5?'建议涂防晒霜':'无需特殊防护'}。高海拔地区紫外线偏强</div>
  </div>
  <div class="oc">
    <div class="oh">⏰ 最佳户外窗口</div>
    <div class="ov">${bestDate} ${bestTime}</div>
    <div class="od">48小时内综合温湿风雨最优时段。累计降水${totalRain}mm，${maxRain>80?'建议室内活动':maxRain>50?'带伞可出行':'出行无忧'}</div>
  </div>
</div>

<!-- 6-day cards -->

<!-- Windy -->
<div class="extern">
  <h4>🌍 Windy 实时风场 & 雷达</h4>
  <div class="windy-box">
    <iframe src="https://embed.windy.com/embed2.html?lat=${STATE.lat}&lon=${STATE.lon}&detailLat=${STATE.lat}&detailLon=${STATE.lon}&zoom=10&level=surface&overlay=wind&product=ecmwf&calendar=now&pressure=true&type=map&location=coordinates&detail=true&metricWind=km%2Fh&metricTemp=%C2%B0C&radarRange=-1" loading="lazy"></iframe>
  </div>
  <div class="ext-links">
    <a class="ext-link" href="https://www.windy.com/?${STATE.lat},${STATE.lon},10" target="_blank" rel="noopener">
      🔗 <strong>Windy</strong> 全图层<br><small style="color:var(--sub)">风·雨·雷·温·浪·气压</small>
    </a>
    <a class="ext-link" href="https://www.meteoblue.com/en/weather/week/index?lat=${STATE.lat}&lon=${STATE.lon}" target="_blank" rel="noopener">
      🔗 <strong>Meteoblue</strong> 专业预报<br><small style="color:var(--sub)">瑞士模型·14天·多模式对比</small>
    </a>
  </div>
</div>
`;

  document.getElementById('main').innerHTML=html;

  // Build day cards
  buildDays();
  // Show first day detail
  showDetail(0);
  // Scroll to top
  window.scrollTo({top:0,behavior:'smooth'});
}

function dailyW(i){
  return STATE.data.daily.weather_code[i];
}

function windDir(d){
  const dirs=['北','东北','东','东南','南','西南','西','西北'];
  return dirs[Math.round(d/45)%8];
}

function uvLabel(v){
  if(v<3)return'低';if(v<6)return'中';if(v<8)return'高';if(v<11)return'很高';return'极高';
}
function visLabel(m){
  if(m>10000)return'优秀';if(m>5000)return'良好';if(m>2000)return'一般';if(m>500)return'较差';return'极差';
}

function buildDays(){
  const daysEl=document.getElementById('days');
  if(!daysEl)return;
  const today=STATE.data.daily;
  today.time.forEach((d,i)=>{
    const dt=new Date(d+'T12:00');
    const wc=w(today.weather_code[i]);
    const c=document.createElement('div');
    c.className='day-card'+(i===0?' active':'');
    c.dataset.idx=i;
    c.innerHTML=`<div class="dow">${i===0?'今天':WK[dt.getDay()]}</div><div class="date">${(dt.getMonth()+1)+'/'+dt.getDate()}</div><span class="icon">${wc.i}</span><div class="temps"><span>${today.temperature_2m_max[i]}°</span><span class="lo">${today.temperature_2m_min[i]}°</span></div><div class="rain-bar"><div class="fill" style="width:${today.precipitation_probability_max[i]}%"></div></div><div class="tag">${wc.l} · 雨${today.precipitation_probability_max[i]}%</div>`;
    c.onclick=()=>showDetail(i);
    daysEl.appendChild(c);
  });
}

function showDetail(i){
  document.querySelectorAll('.day-card').forEach((c,j)=>c.classList.toggle('active',j===i));
  const today=STATE.data.daily;
  const dt=new Date(today.time[i]+'T12:00');
  const wc=w(today.weather_code[i]);
  const panel=document.getElementById('detail');
  if(!panel)return;
  panel.classList.add('show');
  document.getElementById('detail-title').textContent=`${i===0?'今天':WK[dt.getDay()]} ${(dt.getMonth()+1)+'月'+dt.getDate()+'日'} · ${wc.l}`;
  document.getElementById('detail-grid').innerHTML=`
    <div class="di"><div class="l">最高/低温</div><div class="v">${today.temperature_2m_max[i]}° / ${today.temperature_2m_min[i]}°</div></div>
    <div class="di"><div class="l">降雨概率</div><div class="v" style="color:var(--rain)">${today.precipitation_probability_max[i]}%</div></div>
    <div class="di"><div class="l">降水量</div><div class="v">${today.precipitation_sum[i]} mm</div></div>
    <div class="di"><div class="l">UV 峰值</div><div class="v" style="color:var(--uv)">${today.uv_index_max[i]} · ${uvLabel(today.uv_index_max[i])}</div></div>
    <div class="di"><div class="l">日照时长</div><div class="v">${(today.sunshine_duration[i]/3600).toFixed(1)} h</div></div>
    <div class="di"><div class="l">风速</div><div class="v">${today.wind_speed_10m_max[i]} km/h</div></div>
    <div class="di"><div class="l">风向</div><div class="v">${windDir(today.wind_direction_10m_dominant[i])}</div></div>
    <div class="di"><div class="l">气压</div><div class="v">${today.pressure_msl_max[i]} hPa</div></div>
    <div class="di"><div class="l">能见度</div><div class="v">${(today.visibility_max[i]/1000).toFixed(1)} km</div></div>
  `;

  // Hourly strip
  const hrs=STATE.data.hourly;
  const s=i*24,e=s+24;
  const nowH=new Date().getHours();
  let hh='';
  for(let h=s;h<e;h++){
    const hour=h%24;
    const isNow=(i===0&&hour===nowH);
    hh+=`<div class="hc${isNow?' nw':''}">
      <span class="h">${String(hour).padStart(2,'0')}:00</span>
      <span class="t">${hrs.temperature_2m[h].toFixed(1)}°</span>
      <span class="r">${w(hrs.weather_code[h]).i} ${hrs.precipitation_probability[h]}%</span>
      <span style="font-size:.85em;color:#999;display:block">体感${hrs.apparent_temperature[h].toFixed(1)}° · UV${hrs.uv_index[h].toFixed(1)}</span>
      <span style="font-size:.8em;color:#bbb;display:block">☁️${(hrs.cloud_cover?hrs.cloud_cover[h]:'?')}% · 💧${(hrs.dew_point_2m?hrs.dew_point_2m[h].toFixed(1):'?')}°</span>
    </div>`;
  }
  document.getElementById('hourly-strip').innerHTML=hh;

  // Chart
  drawChart(s,e);
  panel.scrollIntoView({behavior:'smooth',block:'center'});
}

function drawChart(s,e){
  const temps=STATE.data.hourly.temperature_2m.slice(s,e);
  const feels=STATE.data.hourly.apparent_temperature.slice(s,e);
  const all=[...temps,...feels];
  const min=Math.floor(Math.min(...all))-1,max=Math.ceil(Math.max(...all))+1,range=max-min||1;
  const W=720,H=130,p=28;
  const toXY=(arr)=>{
    return arr.map((t,i)=>({x:p+(i/(arr.length-1))*(W-p*2),y:H-p-((t-min)/range)*(H-p*2),t}));
  };
  const pts=toXY(temps),ptsF=toXY(feels);
  const path=pts.map((x,i)=>(i===0?'M':'L')+x.x.toFixed(1)+','+x.y.toFixed(1)).join(' ');
  const pathF=ptsF.map((x,i)=>(i===0?'M':'L')+x.x.toFixed(1)+','+x.y.toFixed(1)).join(' ');
  let labels='';for(let h=0;h<24;h+=3)labels+=`<text x="${pts[h].x.toFixed(1)}" y="${H-6}" text-anchor="middle" font-size="9" fill="#aaa">${h}h</text>`;
  let dots=pts.filter((_,i)=>i%3===0).map(p=>`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="2.5" fill="#4a7eb5"/><text x="${p.x.toFixed(1)}" y="${p.y-7}" text-anchor="middle" font-size="9" font-weight="600" fill="#333">${p.t.toFixed(1)}°</text>`).join('');
  document.getElementById('chart').innerHTML=`
    <text x="10" y="14" font-size="10" fill="#4a7eb5">━ 实际温度</text>
    <text x="10" y="28" font-size="10" fill="#d47a2e">━ 体感温度</text>
    <path d="${path}" fill="none" stroke="#4a7eb5" stroke-width="2" stroke-linejoin="round"/>
    <path d="${pathF}" fill="none" stroke="#d47a2e" stroke-width="1.5" stroke-dasharray="5,3" stroke-linejoin="round"/>
    ${dots}
    ${labels}
  `;
  document.getElementById('chart').setAttribute('viewBox',`0 0 ${W} ${H}`);
}

// Boot
initFromParams();

// ── Route state ─────────────────────────────────────────
let RSTATE={mode:'driving',fromGeo:null,toGeo:null,route:null,rmap:null,markers:[],routeLine:null};

function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.textContent.includes(tab==='weather'?'天气':'路线')));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('show'));
  document.getElementById('tab-'+tab).classList.add('show');
  if(tab==='route'&&!RSTATE.rmap)initRMap();
  if(tab==='route')setTimeout(()=>RSTATE.rmap&&RSTATE.rmap.invalidateSize(),200);
}

function initRMap(){
  RSTATE.rmap=L.map('rmap').setView([27,106],6);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>',
    maxZoom:18
  }).addTo(RSTATE.rmap);
}

function setMode(m){
  RSTATE.mode=m;
  document.querySelectorAll('#tab-route .mode-chip').forEach(c=>{
    c.classList.remove('sel');
    if(c.dataset.mode===m)c.classList.add('sel');
  });
}

function swap(){
  const t=document.getElementById('fromInput').value;
  document.getElementById('fromInput').value=document.getElementById('toInput').value;
  document.getElementById('toInput').value=t;
  if(RSTATE.fromGeo&&RSTATE.toGeo){
    const tmp=RSTATE.fromGeo;RSTATE.fromGeo=RSTATE.toGeo;RSTATE.toGeo=tmp;
    renderRouteAll();
  }
}

function preset(f,t,m){
  document.getElementById('fromInput').value=f;
  document.getElementById('toInput').value=t;
  setMode(m);
  plan();
}

async function routeGeocode(q){
  try{
    const c=new AbortController();
    const t=setTimeout(()=>c.abort(),5000);
    const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=3&accept-language=zh`,{signal:c.signal});
    clearTimeout(t);
    const d=await r.json();
    if(d&&d.length){
      const p=d[0].display_name.split(', ');
      return {latitude:parseFloat(d[0].lat),longitude:parseFloat(d[0].lon),name:p[0],country:p[p.length-1]||'',admin1:p.length>2?p[p.length-2]:''};
    }
  }catch(e){}
  const r=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=3&language=zh&format=json`);
  const d=await r.json();
  if(!d.results||!d.results.length)return null;
  return d.results[0];
}

async function getRoute(from,to,mode){
  const profiles={driving:'car',cycling:'bike',walking:'foot'};
  const profile=profiles[mode]||'car';
  const u=`https://router.project-osrm.org/route/v1/${profile}/${from.longitude},${from.latitude};${to.longitude},${to.latitude}?overview=full&geometries=geojson&steps=true&alternatives=false`;
  const r=await fetch(u);
  const d=await r.json();
  if(!d.routes||!d.routes.length)return null;
  return d.routes[0];
}

async function getRouteWeather(lat,lon){
  const u=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,relative_humidity_2m&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weather_code,wind_speed_10m_max,uv_index_max,sunshine_duration,precipitation_sum&timezone=auto&forecast_days=3`;
  const r=await fetch(u);
  return await r.json();
}

async function plan(){
  const fromQ=document.getElementById('fromInput').value.trim();
  const toQ=document.getElementById('toInput').value.trim();
  if(!fromQ||!toQ)return;

  document.getElementById('routeSummary').style.display='none';
  document.getElementById('weatherPanels').innerHTML='';
  const goBtn=document.getElementById('goBtn');
  goBtn.disabled=true;goBtn.textContent='规划中…';

  try{
    const[fg,tg]=await Promise.all([routeGeocode(fromQ),routeGeocode(toQ)]);
    if(!fg||!tg){
      alert(`未找到：${!fg?fromQ:''} ${!tg?toQ:''}`);
      goBtn.disabled=false;goBtn.textContent='开始规划';
      return;
    }
    RSTATE.fromGeo=fg;RSTATE.toGeo=tg;

    const[route,fromW,toW]=await Promise.all([
      getRoute(fg,tg,RSTATE.mode),
      getRouteWeather(fg.latitude,fg.longitude),
      getRouteWeather(tg.latitude,tg.longitude)
    ]);

    if(!route){
      alert('未找到可行路线\n\n可能原因：\n1. 两地距离太远或太近\n2. 该区域不支持所选交通方式\n3. 网络问题\n\n请尝试：更换交通方式、调整起终点、或选择预设路线');
      goBtn.disabled=false;goBtn.textContent='开始规划';
      return;
    }
    RSTATE.route=route;
    RSTATE.fromW=fromW;RSTATE.toW=toW;
    renderRouteAll();
  }catch(e){
    alert('网络错误：'+e.message);
  }
  goBtn.disabled=false;goBtn.textContent='开始规划';
}

function renderRouteAll(){
  const m=RSTATE.rmap;
  if(!m)return;
  RSTATE.markers.forEach(mk=>mk.remove());
  if(RSTATE.routeLine)m.removeLayer(RSTATE.routeLine);

  const bounds=L.latLngBounds([
    [RSTATE.fromGeo.latitude,RSTATE.fromGeo.longitude],
    [RSTATE.toGeo.latitude,RSTATE.toGeo.longitude]
  ]);

  const fromM=L.marker([RSTATE.fromGeo.latitude,RSTATE.fromGeo.longitude],{
    icon:L.divIcon({html:'<div style="background:#4a7eb5;color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;box-shadow:0 2px 6px rgba(0,0,0,.3)">起</div>',iconSize:[28,28],iconAnchor:[14,14]})
  }).addTo(m).bindPopup(`<b>起点</b><br>${RSTATE.fromGeo.name}`);
  const toM=L.marker([RSTATE.toGeo.latitude,RSTATE.toGeo.longitude],{
    icon:L.divIcon({html:'<div style="background:#d47a2e;color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;box-shadow:0 2px 6px rgba(0,0,0,.3)">终</div>',iconSize:[28,28],iconAnchor:[14,14]})
  }).addTo(m).bindPopup(`<b>终点</b><br>${RSTATE.toGeo.name}`);
  RSTATE.markers=[fromM,toM];

  const coords=RSTATE.route.geometry.coordinates.map(c=>[c[1],c[0]]);
  RSTATE.routeLine=L.polyline(coords,{color:'#4a7eb5',weight:4,opacity:.8}).addTo(m);
  bounds.extend(coords);
  m.fitBounds(bounds,{padding:[40,40]});

  const dist=(RSTATE.route.distance/1000).toFixed(1);
  const dur=Math.round(RSTATE.route.duration/60);
  const hrs=Math.floor(dur/60),mins=dur%60;
  const durStr=hrs>0?`${hrs}h${mins}m`:`${mins}分钟`;
  const modeName={driving:'驾车',cycling:'骑行',walking:'步行'};
  const speed=(RSTATE.route.distance/1000)/(RSTATE.route.duration/3600);
  let gain=0;
  for(let i=1;i<coords.length;i++){const diff=coords[i][0]-coords[i-1][0];if(diff>0)gain+=diff*111000;}
  gain=Math.round(gain);

  const modeIcons={driving:'🚗',cycling:'🚴',walking:'🥾'};
  const modeColors={driving:'#4a7eb5',cycling:'#5a9a6a',walking:'#d47a2e'};
  document.getElementById('routeSummary').style.display='block';
  const mc=modeColors[RSTATE.mode];
  const mi=modeIcons[RSTATE.mode];
  const fromT=(RSTATE.fromW.current.temperature_2m||0).toFixed(1);
  const toT=(RSTATE.toW.current.temperature_2m||0).toFixed(1);
  const fromW=w(RSTATE.fromW.current.weather_code);
  const toW=w(RSTATE.toW.current.weather_code);
  document.getElementById('routeSummary').innerHTML=`
    <div class="rs-header">
      <div class="rs-mode-icon" style="background:${mc}20;color:${mc}">${mi}</div>
      <div>
        <div class="rs-route-name">${modeName[RSTATE.mode]}路线</div>
        <div style="font-size:.66em;color:var(--sub)">OSRM 路径引擎</div>
      </div>
      <div class="rs-route-path">${RSTATE.fromGeo.name} → ${RSTATE.toGeo.name}</div>
    </div>
    <div class="rs-grid">
      <div class="rs-item"><div class="rsv">📏 ${dist}</div><div class="rsl">总距离 km</div></div>
      <div class="rs-item"><div class="rsv">⏱ ${durStr}</div><div class="rsl">预计用时</div></div>
      <div class="rs-item"><div class="rsv">🏃 ${speed.toFixed(1)}</div><div class="rsl">均速 km/h</div></div>
      <div class="rs-item"><div class="rsv">⛰ ~${gain}</div><div class="rsl">爬升 m</div></div>
    </div>
    <div class="rs-mini">
      <div class="rs-item" style="border-left:3px solid ${mc}">
        <div class="rsv">${fromT}° ${fromW.i}</div>
        <div class="rsl">📍 ${RSTATE.fromGeo.name}</div>
      </div>
      <div class="rs-item" style="border-left:3px solid var(--warm)">
        <div class="rsv">${toT}° ${toW.i}</div>
        <div class="rsl">📍 ${RSTATE.toGeo.name}</div>
      </div>
    </div>
  `;

  const container=document.getElementById('weatherPanels');
  container.innerHTML='';
  renderRouteWP('from',RSTATE.fromGeo,RSTATE.fromW,container);
  renderRouteWP('to',RSTATE.toGeo,RSTATE.toW,container);
}

function renderRouteWP(side,geo,data,container){
  const now=data.current;
  const today=data.daily;
  const wc=w(now.weather_code);
  const label=side==='from'?'起点':'终点';
  const cls=side==='from'?'from':'to';

  const panel=document.createElement('div');
  panel.className='wp '+cls;
  panel.innerHTML=`
    <div class="wpn">${label}</div>
    <div class="wpt">${geo.name} · ${geo.admin1||''} · ${geo.country||''}</div>
    <div class="wph">
      <span class="big">${now.temperature_2m.toFixed(1)}°</span>
      <span class="icon">${wc.i}</span>
      <span style="font-size:.8em;color:var(--sub)">${wc.l}<br>体感 ${now.apparent_temperature.toFixed(1)}°</span>
    </div>
    <div class="wpg">
      <div class="wgi"><span class="wgiv">🌬 ${now.wind_speed_10m} km/h</span><span class="wgil">风速</span></div>
      <div class="wgi"><span class="wgiv">💧 ${now.relative_humidity_2m}%</span><span class="wgil">湿度</span></div>
      <div class="wgi"><span class="wgiv">🌧 ${today.precipitation_probability_max[0]}%</span><span class="wgil">降雨概率</span></div>
      <div class="wgi"><span class="wgiv">☀️ UV${today.uv_index_max[0]}</span><span class="wgil">紫外线</span></div>
      <div class="wgi"><span class="wgiv">🌡 ${today.temperature_2m_max[0]}°/${today.temperature_2m_min[0]}°</span><span class="wgil">最高/低</span></div>
      <div class="wgi"><span class="wgiv">☀ ${(today.sunshine_duration[0]/3600).toFixed(1)}h</span><span class="wgil">日照</span></div>
    </div>
  `;
  if(side==='from')container.prepend(panel);
  else container.appendChild(panel);
}

// Route enter key
document.getElementById('fromInput').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('toInput').focus()});
document.getElementById('toInput').addEventListener('keydown',e=>{if(e.key==='Enter')plan()});

</script>
