<!DOCTYPE html>
<html lang="zh-CN">
<head>

<link rel="preconnect" href="https://fonts.googleapis.com">

<title>气象查询 · Song Studio</title>
<style>
:root{
  --bg:#0f1512;
  --panel:#151d19;
  --panel-2:#1b2520;
  --panel-3:#212c26;
  --ink:#f3f0e8;
  --text:#d6d1c5;
  --muted:#928c80;
  --line:rgba(243,240,232,.12);
  --line-2:rgba(243,240,232,.2);
  --green:#65c083;
  --cyan:#62b6c8;
  --amber:#dca54a;
  --red:#e06457;
  --blue:#7aa7ff;
  --shadow:0 24px 80px rgba(0,0,0,.35);
  --radius:7px;
}
*{box-sizing:border-box;margin:0;-webkit-tap-highlight-color:transparent}
html{background:var(--bg)}
body{
  min-height:100vh;background:
    linear-gradient(180deg,rgba(101,192,131,.08),transparent 280px),
    radial-gradient(circle at 78% 0,rgba(98,182,200,.11),transparent 360px),
    var(--bg);
  color:var(--text);
  font-family:'Jost','Noto Serif SC',-apple-system,BlinkMacSystemFont,sans-serif;
  font-size:17px;line-height:1.55;-webkit-font-smoothing:antialiased;
}
button,input{font:inherit}
a{color:inherit;text-decoration:none}
.wrap{width:min(1440px,100%);margin:0 auto;padding:18px clamp(14px,2.6vw,34px) 54px}
.hidden{display:none}
.status{padding:80px 0;text-align:center;color:var(--muted)}
.status.error{color:var(--red)}
.spinner{display:inline-block;width:22px;height:22px;border:2px solid var(--line);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
footer{color:var(--muted);font-size:.82rem;text-align:center;padding-top:34px}
footer a:hover{color:var(--ink)}

.tab-panel{display:block}
.search-bar{
  position:sticky;top:0;z-index:30;
  display:grid;grid-template-columns:1fr;gap:10px;
  padding:12px 0 16px;margin-bottom:14px;
  background:linear-gradient(180deg,var(--bg) 70%,rgba(15,21,18,.86));
  border-bottom:1px solid var(--line);
  backdrop-filter:blur(16px);
}
.search-bar::before{
  content:'Song Studio / Weather Pro';
  color:var(--green);font-family:'JetBrains Mono',monospace;font-size:.78rem;
  letter-spacing:.08em;text-transform:uppercase;font-weight:800;
}
.search-box{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:10px;max-width:920px}
.search-box input{
  min-width:0;background:var(--panel);border:1px solid var(--line-2);border-radius:var(--radius);
  color:var(--ink);outline:none;padding:13px 15px;font-size:1.02rem;
}
.search-box input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(101,192,131,.15)}
.search-box input::placeholder{color:var(--muted)}
.search-box button{
  border:0;border-radius:var(--radius);background:var(--green);color:#07100b;
  padding:13px 22px;font-weight:900;cursor:pointer;
}
.search-hint{display:none}
.tool-note{
  max-width:920px;color:var(--muted);font-size:.82rem;line-height:1.65;
  border-left:2px solid var(--green);padding-left:10px;
}
.tool-note strong{color:var(--text);font-weight:900}
.suggestions{display:flex;gap:8px;flex-wrap:wrap}

}

}
.site-header h1{
  color:var(--ink);font-family:'Noto Serif SC','Playfair Display',serif;
  font-size:clamp(2.2rem,4.8vw,5.6rem);line-height:1;font-weight:700;letter-spacing:0;
}
.site-header .loc{color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:.78rem;text-align:right;white-space:nowrap}
.hero-block{
  display:grid;grid-template-columns:minmax(300px,.9fr) minmax(320px,1.1fr);
  gap:18px;margin:16px 0;
}
.hero-current,.hero-readout,.ss-item,.oc,.di,.hc,.day-card,.windy-box,.ext-link{
  background:linear-gradient(180deg,var(--panel-2),var(--panel));
  border:1px solid var(--line);

}
.hero-current{padding:22px}
.hero-readout{padding:22px;display:flex;flex-direction:column;justify-content:center}
.hero-loc{font-family:'JetBrains Mono',monospace;color:var(--green);font-size:.8rem;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.hero-temp{
  display:block;color:var(--ink);font-family:'JetBrains Mono',monospace;
  font-size:clamp(4.8rem,10vw,9rem);font-weight:800;letter-spacing:-.06em;line-height:.9;cursor:pointer;
}
.hero-temp small{font-size:.12em!important;color:var(--muted)!important;letter-spacing:.08em!important}
.hero-label{color:var(--ink);font-size:1.45rem;font-weight:900;margin-bottom:14px}
.hero-label em{font-style:normal;color:var(--red)}
.hero-summary{max-width:62ch;color:var(--text);font-size:1rem;line-height:1.85;border-left:2px solid var(--green);padding-left:15px}
.stat-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:10px 0 24px}
.ss-item{padding:16px}.ssv{display:block;color:var(--ink);font-family:'JetBrains Mono',monospace;font-size:2rem;font-weight:900}.ssv small{font-size:.75rem;color:var(--muted);margin-left:4px}.ssl{color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:.72rem;text-transform:uppercase}
.sec-title{display:flex;gap:12px;align-items:center;margin:28px 0 12px;color:var(--cyan);font-family:'JetBrains Mono',monospace;font-size:.8rem;text-transform:uppercase;letter-spacing:.08em;font-weight:800}.sec-title::after{content:'';height:1px;background:var(--line);flex:1}

.risk-cell small{color:var(--muted)}
.risk-cell .good{color:var(--green)}.risk-cell .warn{color:var(--amber)}.risk-cell .bad{color:var(--red)}
.outdoor{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.oc{padding:16px;min-height:138px;display:flex;flex-direction:column;justify-content:space-between}
.oc.feature{grid-column:span 2;border-color:rgba(101,192,131,.38);background:linear-gradient(180deg,rgba(101,192,131,.16),var(--panel))}
.oh{color:var(--ink);font-weight:900;font-size:1rem}.ov{color:var(--ink);font-weight:900;font-size:1.05rem}.od{color:var(--muted);font-size:.88rem;line-height:1.5}
.oe{display:inline-flex;border-radius:999px;padding:2px 8px;font-family:'JetBrains Mono',monospace;font-size:.72rem;font-weight:900}.oe.good{color:var(--green);background:rgba(101,192,131,.12)}.oe.warn{color:var(--amber);background:rgba(220,165,74,.13)}.oe.bad{color:var(--red);background:rgba(224,100,87,.13)}
.days,.hs,.ext-links{display:flex;gap:10px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.day-card{flex:1 0 128px;padding:14px;cursor:pointer;box-shadow:none}.day-card.active{border-color:var(--green);background:rgba(101,192,131,.12)}
.dow{color:var(--ink);font-weight:900}.date,.tag{color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:.72rem}.icon{display:block;color:var(--cyan);font-size:1.35rem;margin:12px 0}.temps{color:var(--ink);font-weight:900}.lo{color:var(--muted);margin-left:4px}.rain-bar{height:4px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden;margin:8px 0}.fill{height:100%;background:var(--cyan)}
.detail{display:none;margin-top:18px}.detail.show{display:block}.detail h3{color:var(--ink);font-size:1.6rem;margin-bottom:12px}
.dg{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}.di{padding:14px;box-shadow:none}.di .l{color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:.7rem}.di .v{color:var(--ink);font-weight:900}
.hs-wrap{margin-top:18px}.hs-label{color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:.78rem;margin-bottom:8px}.hc{flex:0 0 78px;padding:12px 8px;text-align:center;font-size:.78rem;box-shadow:none}.hc.nw{background:var(--green);color:#07100b}.hc .h,.hc .t{display:block;font-weight:900}.hc .r{color:var(--cyan)}
.chart-wrap{margin-top:14px;overflow-x:auto;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:10px}.chart-wrap svg{min-width:640px;width:100%}
.extern{margin-top:28px}.extern h4{color:var(--ink);font-size:1.25rem;margin-bottom:10px}.windy-box{height:420px;overflow:hidden}.windy-box iframe{width:100%;height:100%;border:0}.ext-link{flex:1;text-align:center;padding:13px;font-weight:900;box-shadow:none}.ext-link:hover{border-color:var(--green)}
.src-bar{display:flex;gap:16px;flex-wrap:wrap;margin-top:16px;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:.78rem}.dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px}.om{background:var(--red)}.wy{background:var(--cyan)}.mb{background:var(--green)}
@media(max-width:960px){.hero-block{grid-template-columns:1fr}.outdoor,.risk-grid{grid-template-columns:repeat(2,1fr)}.dg{grid-template-columns:repeat(2,1fr)}}
@media(max-width:620px){body{font-size:16px}.wrap{padding-inline:12px}.search-box{grid-template-columns:1fr}.stat-strip{grid-template-columns:repeat(2,1fr)}.outdoor,.risk-grid{grid-template-columns:1fr}.oc.feature{grid-column:auto}.site-header{grid-template-columns:1fr}.site-header .loc{text-align:left}.windy-box{height:300px}}
</style>

<body>
<div class="wrap" id="app">



<div class="tab-panel show" id="tab-weather">
<div class="search-bar">
  <div class="search-box">
    <input type="text" id="q" placeholder="搜索地点…" autocomplete="off">
    <button onclick="doSearch()">搜索</button>
  </div>
  <div class="tool-note"><strong>专业气象台：</strong>高德精确定位 + Open-Meteo 逐时预报，重点看降雨、风、UV、能见度、日照、云量、露点、气压和户外活动窗口。</div>
  <div class="suggestions">
    <span class="sug-chip" onclick="quickSearch('北京')">北京</span>

    <span class="sug-chip" onclick="quickSearch('昆明')">昆明</span>
    <span class="sug-chip" onclick="quickSearch('大理')">大理</span>
    <span class="sug-chip" onclick="quickSearch('乌镇')">乌镇</span>
    <span class="sug-chip" onclick="quickSearch('凤凰')">凤凰</span>
    <span class="sug-chip" onclick="quickSearch('Tokyo')">东京</span>
    <span class="sug-chip" onclick="quickSearch('Paris')">巴黎</span>
  </div>
</div>


<div id="main"><div class="status"><div class="spinner"></div><br><br>正在加载北京气象基准...</div></div>

</div><!-- end tab-weather -->



<footer><a href="https://song-studio.github.io">song-studio.github.io</a> · <a href="route-pro.html">路线规划</a></footer>
</div>

<script>
// ── State ────────────────────────────────────────────
let STATE={lat:39.90,lon:116.40,name:'北京',country:'中国',elev:55,admin:'北京',data:null,tempUnit:'C'};
const WMO={0:{i:'sun',l:'晴'},1:{i:'sun',l:'少云'},2:{i:'cloud-sun',l:'多云'},3:{i:'cloud',l:'阴'},45:{i:'smog',l:'雾'},48:{i:'smog',l:'冻雾'},51:{i:'cloud-rain',l:'小雨'},53:{i:'cloud-rain',l:'中雨'},55:{i:'cloud-showers-heavy',l:'大雨'},56:{i:'cloud-rain',l:'冻雨'},57:{i:'cloud-rain',l:'冻雨'},61:{i:'cloud-rain',l:'小阵雨'},63:{i:'cloud-showers-heavy',l:'中阵雨'},65:{i:'cloud-showers-heavy',l:'大阵雨'},66:{i:'cloud-rain',l:'冻雨'},67:{i:'cloud-rain',l:'冻雨'},71:{i:'snowflake',l:'小雪'},73:{i:'snowflake',l:'中雪'},75:{i:'snowflake',l:'大雪'},77:{i:'snowflake',l:'雪粒'},80:{i:'cloud-rain',l:'阵雨'},81:{i:'cloud-showers-heavy',l:'中阵雨'},82:{i:'cloud-showers-heavy',l:'大阵雨'},85:{i:'snowflake',l:'小阵雪'},86:{i:'snowflake',l:'大阵雪'},95:{i:'bolt',l:'雷暴'},96:{i:'bolt',l:'雷暴冰雹'},99:{i:'bolt',l:'强雷暴冰雹'}};
function w(c){return WMO[c]||{i:'cloud',l:'未知'}}
function wi(c){return'<i class="fa-solid fa-'+w(c).i+'"></i>'}
function tC(c){return STATE.tempUnit==='F'?Math.round(c*9/5+32)+'°F':c.toFixed(1)+'°'}
function tC0(c){return STATE.tempUnit==='F'?Math.round(c*9/5+32)+'°':c.toFixed(0)+'°'}
const WK=['周日','周一','周二','周三','周四','周五','周六'];
const AMAP_KEY='39a8c2f6ef75e494198f3e3751701ebe';

// GCJ-02 → WGS-84 (Amap coords → OSM/Open-Meteo compatibility)
function gcj2wgs(lng,lat){
  const PI=Math.PI,a=6378245,ee=0.006693421622965943;
  function tx(x,y){let r=300+x+2*y+0.1*x*x+0.1*x*y+0.1*Math.sqrt(Math.abs(x));r+=(20*Math.sin(6*x*PI)+20*Math.sin(2*x*PI))*2/3;r+=(20*Math.sin(x*PI)+40*Math.sin(x/3*PI))*2/3;r+=(150*Math.sin(x/12*PI)+300*Math.sin(x/30*PI))*2/3;return r}
  function ty(x,y){let r=-100+2*x+3*y+0.2*y*y+0.1*x*y+0.2*Math.sqrt(Math.abs(x));r+=(20*Math.sin(6*x*PI)+20*Math.sin(2*x*PI))*2/3;r+=(20*Math.sin(y*PI)+40*Math.sin(y/3*PI))*2/3;r+=(160*Math.sin(y/12*PI)+320*Math.sin(y*PI/30))*2/3;return r}
  const dlng=tx(lng-105,lat-35),dlat=ty(lng-105,lat-35);
  const radLat=lat/180*PI,magic=1-ee*Math.sin(radLat)*Math.sin(radLat);
  return[lng-dlng*180/(a/Math.sqrt(magic)*Math.cos(radLat)*PI),lat-dlat*180/(a*(1-ee)/(magic*Math.sqrt(magic))*PI)];
}

// ── Geocode (高德 + Open-Meteo 双源) ──────────────────
async function geocode(q){
  const hasLatin=/[a-zA-Z]/.test(q);

  async function omGeo(){
    try{
      const r=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=1&language=zh&format=json`);
      const d=await r.json();
      if(d.results&&d.results.length)return d.results[0];
    }catch(e){}
    return null;
  }

  // Latin-script → Open-Meteo
  if(hasLatin){
    const om=await omGeo();
    if(om){const cName=om.country||'';const isCN=cName==='China'||cName==='中国';return{latitude:om.latitude,longitude:om.longitude,name:om.name||q,country:cName,admin1:isCN?(om.admin1||''):'',elevation:0};}
    return null;
  }

  // Chinese → Amap geocode
  const amapR=await fetch(`https://restapi.amap.com/v3/geocode/geo?key=${AMAP_KEY}&address=${encodeURIComponent(q)}`).then(r=>r.json());
  if(!amapR.geocodes||!amapR.geocodes.length){
    const om=await omGeo();
    if(om){const cName=om.country||'';const isCN=cName==='China'||cName==='中国';return{latitude:om.latitude,longitude:om.longitude,name:om.name||q,country:cName,admin1:isCN?(om.admin1||''):'',elevation:0};}
    return null;
  }

  function fmt(g){
    const [lng,lat]=g.location.split(',').map(Number);
    const [wgsLng,wgsLat]=gcj2wgs(lng,lat);
    let short=(g.name||q).replace(/[省市]{1,2}$/,'');
    if(!g.name&&g.formatted_address){
      const parts=g.formatted_address.split(/省|市|区|县|自治州/);
      short=parts[parts.length-1]||g.formatted_address;
    }
    let admin=(g.province||g.city||'').replace(/省|市|自治区|自治州|特别行政区$/,'');
    if(g.city&&g.city!==g.province)admin=g.city.replace(/省|市|自治区|自治州$/,'');
    return{
      latitude:wgsLat,longitude:wgsLng,
      name:short,country:g.country||'中国',
      admin1:admin,elevation:0,
      rawLat:lat,rawLng:lng
    };
  }

  // Single result → use directly
  if(amapR.geocodes.length===1)return fmt(amapR.geocodes[0]);

  // Multiple results → use input tips to find the right province
  try{
    const tipsR=await fetch(`https://restapi.amap.com/v3/assistant/inputtips?key=${AMAP_KEY}&keywords=${encodeURIComponent(q)}`);
    const tipsD=await tipsR.json();
    if(tipsD.tips&&tipsD.tips.length){
      const tip=tipsD.tips.find(t=>t.district&&t.district.length>0);
      if(tip){
        const match=amapR.geocodes.find(g=>g.province&&tip.district.includes(g.province));
        if(match)return fmt(match);
      }
    }
  }catch(e){}

  // Fallback: first geocode result
  return fmt(amapR.geocodes[0]);
}

async function fetchWeather(lat,lon){
  const u=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,pressure_msl&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,precipitation_sum,weather_code,wind_speed_10m_max,wind_direction_10m_dominant,uv_index_max,sunshine_duration,sunrise,sunset,pressure_msl_max&hourly=temperature_2m,apparent_temperature,precipitation_probability,weather_code,wind_speed_10m,relative_humidity_2m,uv_index,cloud_cover,dew_point_2m,pressure_msl,visibility&timezone=auto&forecast_days=7`;
  const c=new AbortController();
  const t=setTimeout(()=>c.abort(),12000);
  try{const r=await fetch(u,{signal:c.signal});clearTimeout(t);return await r.json();}
  catch(e){clearTimeout(t);throw e;}
}

async function initFromParams(){
  const p=new URLSearchParams(location.search);
  const q=p.get('q')||'北京';
  if(q){
    document.getElementById('q').value=q;
    document.getElementById('main').innerHTML='<div class="status"><div class="spinner"></div><br><br>加载中…</div>';
    const geo=await geocode(q);
    if(!geo){document.getElementById('main').innerHTML='<div class="status error">未找到「'+q+'」，请换个关键词试试</div>';return}
    STATE.lat=geo.latitude;STATE.lon=geo.longitude;STATE.name=geo.name;STATE.country=geo.country||'';
    STATE.admin=geo.admin1||'';STATE.elev=geo.elevation||0;
    try{STATE.data=await fetchWeather(STATE.lat,STATE.lon);render();}catch(e){document.getElementById('main').innerHTML='<div class="status error">气象数据获取失败，请检查网络后重试</div>';}
  }
}

async function doSearch(){
  const q=document.getElementById('q').value.trim();
  if(!q)return;
  document.getElementById('main').innerHTML='<div class="status"><div class="spinner"></div><br><br>搜索中…</div>';
  const geo=await geocode(q);
  if(!geo){document.getElementById('main').innerHTML='<div class="status error">未找到「'+q+'」，请换个关键词试试</div>';return}
  STATE.lat=geo.latitude;STATE.lon=geo.longitude;STATE.name=geo.name;STATE.country=geo.country||'';
  STATE.admin=geo.admin1||'';STATE.elev=geo.elevation||0;
  history.pushState(null,'','?q='+encodeURIComponent(q));
  document.getElementById('main').innerHTML='<div class="status"><div class="spinner"></div><br><br>获取气象数据…</div>';
  try{STATE.data=await fetchWeather(STATE.lat,STATE.lon);render();}catch(e){document.getElementById('main').innerHTML='<div class="status error">气象数据获取失败，请检查网络后重试</div>';}
}

function quickSearch(q){document.getElementById('q').value=q;doSearch();}
document.getElementById('q').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch()});

// ── Render ───────────────────────────────────────────
// ── Moon phase (0=new, 0.25=firstQ, 0.5=full, 0.75=lastQ) ──
function moonPhase(date){
  const d=new Date(date+'T12:00');const y=d.getFullYear(),m=d.getMonth()+1,dy=d.getDate();
  let yy=y;if(m<3){yy--;}
  const c=Math.floor(yy/100);const e=Math.floor(c/4);const f=2-e+Math.floor((8*c+13)/25);
  const g=Math.floor(365.25*(yy+4716))+Math.floor(30.6001*((m<3?m+12:m)+1))+dy+f-1524;
  const jd=g+2451556.1;const n=(jd-2451550.1)/29.53058867;
  return(n-Math.floor(n));
}
function moonIcon(p){
  if(p<.03||p>.97)return'<i class="fa-solid fa-moon"></i> 朔';
  if(p<.22)return'<i class="fa-solid fa-moon"></i> 眉月';if(p<.28)return'<i class="fa-solid fa-moon"></i> 上弦';if(p<.47)return'<i class="fa-solid fa-moon"></i> 盈凸';
  if(p<.53)return'<i class="fa-solid fa-moon"></i> 望';if(p<.72)return'<i class="fa-solid fa-moon"></i> 亏凸';if(p<.78)return'<i class="fa-solid fa-moon"></i> 下弦';return'<i class="fa-solid fa-moon"></i> 残月';
}

// ── Natural language weather summary ──────────────────
function weatherSummary(){
  var d=STATE.data;if(!d)return'';
  var now=d.current,today=d.daily,hrs=d.hourly;
  var parts=[],t=now.temperature_2m;
  if(t<5)parts.push('气温偏低');else if(t>32)parts.push('天气炎热');else if(t>28)parts.push('体感偏热');else if(t<10)parts.push('偏凉');
  var nextRain=hrs.precipitation_probability.slice(0,6);
  var maxR6=Math.max.apply(null,nextRain);
  var maxRH=nextRain.indexOf(maxR6);
  if(maxR6>60)parts.push(maxRH+'时前后降雨概率'+maxR6+'%，建议带伞');
  else if(maxR6>30)parts.push('可能有短时阵雨('+maxR6+'%)');
  else if(maxR6<10)parts.push('未来6小时无降雨');
  if(now.wind_speed_10m>20)parts.push('风力较大');
  var uv=today.uv_index_max[0];
  if(uv>7)parts.push('紫外线强，注意防晒');
  var wc=now.weather_code;
  var isRain=wc>=51&&wc<=67||wc>=80&&wc<=82||wc>=95;
  var isCloud=wc==2||wc==3;
  var isClear=wc==0||wc==1;
  var verdict;
  if(isRain)verdict='有雨，不太适合户外出行';
  else if(maxR6<15&&t>=15&&t<=28&&now.wind_speed_10m<15&&isClear)verdict='适合户外活动';
  else if(maxR6>70||t>35||t<0)verdict='不建议户外出行';
  else verdict='出行建议关注天气变化';
  return verdict+' · '+parts.join('；');
}

function drawChart(s,e){
  const temps=STATE.data.hourly.temperature_2m.slice(s,e);
  const feels=STATE.data.hourly.apparent_temperature.slice(s,e);
  const all=[...temps,...feels];
  const min=Math.floor(Math.min(...all))-1,max=Math.ceil(Math.max(...all))+1,range=max-min||1;
  const W=720,H=130,p=28;
  const toXY=(arr)=>{
    return arr.map((t,i)=>({x:p+(i/(arr.length-1))*(W-p*2),y:H-p-((t-min)/range)*(H-p*2),t}));
  };
  const pts=toXY(temps),ptsF=toXY(feels);
  const path=pts.map((x,i)=>(i===0?'M':'L')+x.x.toFixed(1)+','+x.y.toFixed(1)).join(' ');
  const pathF=ptsF.map((x,i)=>(i===0?'M':'L')+x.x.toFixed(1)+','+x.y.toFixed(1)).join(' ');
  let labels='';for(let h=0;h<24;h+=3)labels+=`<text x="${pts[h].x.toFixed(1)}" y="${H-6}" text-anchor="middle" font-size="9" fill="#556880">${h}h</text>`;
  let dots=pts.filter((_,i)=>i%3===0).map(p=>`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="2.5" fill="#e0a44e"/><text x="${p.x.toFixed(1)}" y="${p.y-7}" text-anchor="middle" font-size="9" font-weight="600" fill="#e4ecf4">${p.t.toFixed(1)}°</text>`).join('');
  document.getElementById('chart').innerHTML=`
    <text x="10" y="14" font-size="10" fill="#e0a44e">━ 实际温度</text>
    <text x="10" y="28" font-size="10" fill="#6b9fbd">━ 体感温度</text>
    <path d="${path}" fill="none" stroke="#e0a44e" stroke-width="2" stroke-linejoin="round"/>
    <path d="${pathF}" fill="none" stroke="#6b9fbd" stroke-width="1.5" stroke-dasharray="5,3" stroke-linejoin="round"/>
    ${dots}
    ${labels}
  `;
  document.getElementById('chart').setAttribute('viewBox',`0 0 ${W} ${H}`);
}

// Boot
initFromParams();
