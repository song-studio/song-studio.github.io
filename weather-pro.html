<style>
:root{--bg:#e8edf1;--ink:#121821;--muted:#66727f;--line:#c9d2dc;--panel:#f8fafb;--panel2:#eef3f7;--blue:#1557ff;--cyan:#00a6c8;--green:#237a57;--amber:#b77908;--red:#c6342f;--dark:#101820;--mono:"Azeret Mono",monospace;--sans:"Noto Sans SC",system-ui,sans-serif}*{box-sizing:border-box}html{background:var(--bg);color:var(--ink)}body{margin:0;font-family:var(--sans);background:linear-gradient(180deg,#f6f8fa 0,#e7edf2 38%,#dce5ec 100%);min-height:100vh}button,input{font:inherit}button{cursor:pointer}a{color:inherit;text-decoration:none}.frame{max-width:1240px;margin:auto;padding:10px 10px 88px}.mast{position:sticky;top:0;z-index:50;background:rgba(246,248,250,.88);backdrop-filter:blur(18px);border:1px solid var(--line);display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:10px;margin-bottom:10px}.brand{font-family:var(--mono);font-weight:700;letter-spacing:.14em;font-size:12px}.routeLink{font-family:var(--mono);font-size:12px;border:1px solid var(--line);padding:8px 10px;background:#fff}.hero{display:grid;gap:12px;margin:14px 0}.title{border:1px solid var(--line);background:var(--panel);padding:16px}.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--blue);font-weight:700}.title h1{font-size:clamp(38px,12vw,92px);line-height:.88;letter-spacing:-.08em;margin:10px 0 10px;font-weight:900}.title p{margin:0;color:var(--muted);line-height:1.72}.search{background:var(--dark);color:#f7fbff;padding:12px;display:grid;gap:10px}.search label{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#9fb3c6}.query{display:grid;grid-template-columns:1fr auto;gap:8px}.query input{min-width:0;border:1px solid #43505c;background:#16232d;color:#fff;padding:14px;outline:none}.query input::placeholder{color:#8ea0af}.query button{border:0;background:var(--blue);color:#fff;padding:0 18px;font-weight:800}.chips{display:flex;gap:7px;overflow:auto;scrollbar-width:none}.chip{white-space:nowrap;border:1px solid #43505c;background:#16232d;color:#d9e4ed;padding:7px 10px;font-size:12px}.status{border:1px solid var(--line);background:var(--panel);padding:22px;color:var(--muted);line-height:1.7}.station{display:none}.station.show{display:block}.obsGrid{display:grid;gap:10px}.now{background:var(--dark);color:#fff;border:1px solid #0a1017;padding:16px}.place{display:flex;justify-content:space-between;gap:16px}.place h2{font-size:30px;margin:6px 0 4px;letter-spacing:-.04em}.place p{margin:0;color:#a9bac7}.stamp{font-family:var(--mono);font-size:11px;color:#9fb3c6;text-align:right}.temp{font-family:var(--mono);font-size:88px;line-height:.86;font-weight:700;letter-spacing:-.1em;margin-top:18px}.cond{display:flex;justify-content:space-between;gap:10px;margin-top:8px;color:#d9e4ed}.metricStrip{display:grid;grid-template-columns:repeat(2,1fr);border:1px solid var(--line);border-bottom:0;border-right:0;background:var(--panel)}.metric{padding:12px;border-right:1px solid var(--line);border-bottom:1px solid var(--line)}.metric b{font-family:var(--mono);font-size:19px;display:block}.metric span{font-size:12px;color:var(--muted)}.board{border:1px solid var(--line);background:var(--panel);padding:12px}.board h3{margin:0 0 8px;font-size:18px}.note{color:var(--muted);font-size:13px;line-height:1.55;margin-bottom:10px}.meteogram{display:grid;gap:8px}.row{display:grid;grid-template-columns:54px 1fr;gap:8px;align-items:center}.rowLabel{font-family:var(--mono);font-size:11px;color:var(--muted)}svg{display:block;width:100%;height:84px;background:#f2f6f9;border:1px solid var(--line)}.hours{display:grid;grid-template-columns:repeat(8,minmax(56px,1fr));gap:6px;overflow:auto}.hour{border:1px solid var(--line);background:#fff;padding:8px 5px;text-align:center;min-width:56px}.hour b{font-family:var(--mono);font-size:12px}.hour span{display:block;color:var(--muted);font-size:11px}.explain{display:grid;gap:8px}.explain div{display:grid;grid-template-columns:10px 1fr;gap:9px;align-items:start;color:var(--muted);line-height:1.55}.flag{width:10px;height:10px;background:var(--green);margin-top:7px}.flag.watch{background:var(--amber)}.flag.danger{background:var(--red)}.sourceGrid{display:grid;gap:8px}.src{border:1px solid var(--line);background:#fff;padding:12px;display:flex;justify-content:space-between;gap:12px}.src b{display:block}.src span{color:var(--muted);font-size:12px}.model{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:10px}@media(min-width:820px){.frame{padding:18px 22px 110px}.hero{grid-template-columns:1fr 420px}.obsGrid{grid-template-columns:420px 1fr}.metricStrip{grid-template-columns:repeat(4,1fr)}.sourceGrid{grid-template-columns:repeat(3,1fr)}}@media(max-width:420px){.query{grid-template-columns:1fr}.query button{height:48px}.temp{font-size:74px}.metricStrip{grid-template-columns:repeat(2,1fr)}}
</style>
</head><body><div class="frame"><header class="mast"><a class="brand" href="https://song-studio.github.io/">天气窗口</a><a class="routeLink" href="route-pro.html">路径工作台</a></header><section class="hero"><div class="title"><div class="eyebrow">小地点专业气象</div><h1>天气窗口</h1><p>只做专业气象查询。输入很小的地名、营地、山口、湖泊、路线起点或坐标，输出实况、小时趋势、风、雨、能见度、气压、露点、模型与来源。</p></div><form class="search" id="form"><label>地点查询</label><div class="query"><input id="q" placeholder="雨崩村 / 四姑娘山镇 / 30.996,102.830"><button>查询</button></div><div class="chips" id="chips"></div></form></section><main id="main"><div class="status">等待查询。天气页不混入徒步、骑行、登山判断，只把气象读数做专业。</div></main></div><script>
const AMAP_KEY='39a8c2f6ef75e494198f3e3751701ebe',WEATHER_PROCESSED='data/processed/weather_console_v4.json';const $=s=>document.querySelector(s);let rules=[],schema=[],sources=[],fallbacks=[],layers=[],badges=[];const WMO={0:'晴',1:'少云',2:'多云',3:'阴',45:'雾',48:'冻雾',51:'小毛毛雨',53:'毛毛雨',55:'强毛毛雨',61:'小雨',63:'中雨',65:'大雨',71:'小雪',73:'中雪',75:'大雪',80:'阵雨',81:'强阵雨',82:'暴雨',95:'雷暴',96:'雷暴冰雹',99:'强雷暴'};
function val(x,u=''){return Number.isFinite(x)?`${Math.round(x)}${u}`:'--'}function parseCoord(q){const m=q.match(/^\s*(-?\d+(?:\.\d+)?)\s*[,， ]\s*(-?\d+(?:\.\d+)?)\s*$/);if(!m)return null;let a=+m[1],b=+m[2];return Math.abs(a)<=90?{lat:a,lon:b,name:`${a.toFixed(4)}, ${b.toFixed(4)}`,admin:'坐标',source:'坐标输入'}:{lat:b,lon:a,name:`${b.toFixed(4)}, ${a.toFixed(4)}`,admin:'坐标',source:'坐标输入'}}
function gcj2wgs(lng,lat){const PI=Math.PI,a=6378245,ee=0.006693421622965943;function tx(x,y){let r=300+x+2*y+.1*x*x+.1*x*y+.1*Math.sqrt(Math.abs(x));r+=(20*Math.sin(6*x*PI)+20*Math.sin(2*x*PI))*2/3;r+=(20*Math.sin(x*PI)+40*Math.sin(x/3*PI))*2/3;r+=(150*Math.sin(x/12*PI)+300*Math.sin(x/30*PI))*2/3;return r}function ty(x,y){let r=-100+2*x+3*y+.2*y*y+.1*x*y+.2*Math.sqrt(Math.abs(x));r+=(20*Math.sin(6*x*PI)+20*Math.sin(2*x*PI))*2/3;r+=(20*Math.sin(y*PI)+40*Math.sin(y/3*PI))*2/3;r+=(160*Math.sin(y/12*PI)+320*Math.sin(y*PI/30))*2/3;return r}const dlng=tx(lng-105,lat-35),dlat=ty(lng-105,lat-35),rad=lat/180*PI,magic=1-ee*Math.sin(rad)**2;return[lng-dlng*180/(a/Math.sqrt(magic)*Math.cos(rad)*PI),lat-dlat*180/(a*(1-ee)/(magic*Math.sqrt(magic))*PI)]}
async function geocode(q){const c=parseCoord(q);if(c)return c;const fb=fallbacks.find(x=>x.query_zh===q||x.display_name===q);if(fb&&fb.manual_lat&&fb.manual_lng)return{name:fb.display_name||q,admin:'兜底坐标',lat:fb.manual_lat,lon:fb.manual_lng,source:'v3.1 小地点兜底'};let r=await fetch(`https://restapi.amap.com/v3/place/text?key=${AMAP_KEY}&keywords=${encodeURIComponent(q)}&offset=1&page=1&extensions=base`).then(r=>r.json()).catch(()=>null);let p=r?.pois?.[0];if(p?.location){const [lng,lat]=p.location.split(',').map(Number),[lon,wlat]=gcj2wgs(lng,lat);return{name:p.name||q,admin:p.cityname||p.pname||'',lat:wlat,lon,source:'高德 POI'}}r=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=1&language=zh&format=json`).then(r=>r.json()).catch(()=>null);const g=r?.results?.[0];return g?{name:g.name,admin:g.admin1||g.country||'',lat:g.latitude,lon:g.longitude,source:'Open-Meteo Geocode'}:null}
async function weather(g){const h='temperature_2m,apparent_temperature,precipitation_probability,precipitation,weather_code,wind_speed_10m,wind_gusts_10m,wind_direction_10m,relative_humidity_2m,dew_point_2m,pressure_msl,cloud_cover,visibility,uv_index';const d='temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,wind_speed_10m_max,wind_gusts_10m_max,uv_index_max,sunrise,sunset';return fetch(`https://api.open-meteo.com/v1/forecast?latitude=${g.lat}&longitude=${g.lon}&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,wind_gusts_10m,wind_direction_10m,relative_humidity_2m,pressure_msl&hourly=${h}&daily=${d}&timezone=auto&forecast_days=7`).then(r=>r.json())}
function graph(vals,color){const w=760,h=84,p=12,nums=vals.filter(Number.isFinite),min=Math.min(...nums),max=Math.max(...nums);const pts=vals.map((v,i)=>`${p+i*(w-p*2)/(vals.length-1)},${h-p-(v-min)/(max-min||1)*(h-p*2)}`).join(' ');return`<svg viewBox="0 0 ${w} ${h}"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>`}
function explain(a){const out=[];if(a.gust>40)out.push(['danger','阵风超过 40km/h，风向变化和开阔地体感会明显增强。']);else if(a.gust>28)out.push(['watch','阵风偏强，注意风向和短时波动。']);if(a.rain>55)out.push(['watch','24小时内降水概率偏高，建议交叉查看雷达或 Windy。']);if(a.vis&&a.vis<5000)out.push(['watch','能见度低于 5km，雾、低云或降水可能影响观察。']);if(a.pressure<1000)out.push(['watch','气压偏低，后续天气系统活动需要关注。']);return out.length?out:[['','主要气象指标未触发明显阈值，但小地点预报仍建议多模型交叉查看。']]}
function render(g,d){const c=d.current,h=d.hourly,day=d.daily,t=h.temperature_2m.slice(0,24),rain=h.precipitation_probability.slice(0,24),gust=h.wind_gusts_10m.slice(0,24),cloud=h.cloud_cover.slice(0,24),a={gust:Math.max(...gust),rain:Math.max(...rain),vis:Math.min(...h.visibility.slice(0,24)),pressure:c.pressure_msl};const hours=h.time.filter((_,i)=>i<24&&i%3===0).map((x,i)=>{const k=i*3;return`<div class="hour"><b>${new Date(x).getHours()}时</b><span>${val(h.apparent_temperature[k],'°')}</span><span>雨${val(h.precipitation_probability[k],'%')}</span></div>`}).join('');document.querySelector('#main').innerHTML=`<section class="station show"><div class="obsGrid"><div class="now"><div class="place"><div><div class="eyebrow">${g.source}</div><h2>${g.name}</h2><p>${g.admin||'小地点'} · ${g.lat.toFixed(4)}, ${g.lon.toFixed(4)}</p></div><div class="stamp">Open-Meteo<br>${new Date().toLocaleString('zh-CN',{hour12:false})}</div></div><div class="temp">${val(c.temperature_2m,'°')}</div><div class="cond"><span>${WMO[c.weather_code]||'天气'}</span><span>体感 ${val(c.apparent_temperature,'°')} · 湿度 ${val(c.relative_humidity_2m,'%')}</span></div></div><div><div class="metricStrip"><div class="metric"><b>${val(c.wind_speed_10m,'km/h')}</b><span>风速</span></div><div class="metric"><b>${val(c.wind_gusts_10m,'km/h')}</b><span>阵风</span></div><div class="metric"><b>${val(c.pressure_msl,'hPa')}</b><span>气压</span></div><div class="metric"><b>${val(day.uv_index_max[0])}</b><span>UV</span></div></div><div class="board" style="margin-top:10px"><h3>逐小时</h3><div class="hours">${hours}</div></div></div></div><div class="board" style="margin-top:10px"><h3>24小时气象图</h3><div class="note">温度、降水概率、阵风、云量。手机上优先看趋势，不只看当前值。</div><div class="meteogram"><div class="row"><div class="rowLabel">温度</div>${graph(t,'#1557ff')}</div><div class="row"><div class="rowLabel">降水</div>${graph(rain,'#00a6c8')}</div><div class="row"><div class="rowLabel">阵风</div>${graph(gust,'#b77908')}</div><div class="row"><div class="rowLabel">云量</div>${graph(cloud,'#66727f')}</div></div></div><div class="board" style="margin-top:10px"><h3>专业解释</h3><div class="explain">${explain(a).map(([c,t])=>`<div><span class="flag ${c}"></span><span>${t}</span></div>`).join('')}</div><div class="model">字段标准：${schema.length} 项 · 解释规则：${rules.length} 条 · 数据源矩阵：${sources.length} 项</div></div><div class="sourceGrid" style="margin-top:10px"><a class="src" target="_blank" href="https://www.windy.com/?${g.lat},${g.lon},8"><div><b>Windy</b><span>风场、雷达、模型</span></div><span>打开</span></a><a class="src" target="_blank" href="https://www.meteoblue.com/"><div><b>Meteoblue</b><span>meteogram 与多模型</span></div><span>打开</span></a><a class="src" href="route-pro.html?q=${encodeURIComponent(g.name)}"><div><b>转路径</b><span>仅传地点</span></div><span>打开</span></a></div></section>`}
async function search(q=$('#q').value.trim()){if(!q)return;$('#main').innerHTML='<div class="status">正在定位小地点并读取气象模型...</div>';const g=await geocode(q);if(!g){$('#main').innerHTML='<div class="status">没有找到地点。试试加省份、景区名，或输入经纬度。</div>';return}const d=await weather(g);history.replaceState(null,'',`?q=${encodeURIComponent(q)}`);render(g,d)}
async function init(){const data=await fetch(WEATHER_PROCESSED).then(r=>r.json()).catch(()=>({}));rules=data.rules||[];schema=data.metrics||[];sources=data.sources||[];fallbacks=data.geocode_fallbacks||[];layers=data.meteogram_layers||[];badges=data.model_badges||[];['四姑娘山镇','雨崩村','哈巴村','独库公路','冈仁波齐','纳木错','墨脱','喀拉峻'].forEach(x=>$('#chips').insertAdjacentHTML('beforeend',`<button class="chip" type="button" onclick="search('${x}')">${x}</button>`));const p=new URLSearchParams(location.search);if(p.get('q')){$('#q').value=p.get('q');search(p.get('q'))}}$('#form').addEventListener('submit',e=>{e.preventDefault();search()});init();
</script></body></html>
