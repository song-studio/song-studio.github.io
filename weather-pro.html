</head><body><div class="frame"><header class="mast"><a class="brand" href="https://song-studio.github.io/">气象山野</a><a class="routeLink" href="route-pro.html">路线决策</a></header><section class="hero"><div class="console"><div class="title"><div class="eyebrow">METEO DECISION DESK</div><h1>气象山野</h1><p>查城市，也查村庄、垭口、登山口和营地。普通天气应用容易定位偏的点，这里先校准位置，再判断风险。</p><div class="featureGrid"><div class="feature"><b>127个校准地点</b><span>高德定位、人工坐标和海拔校验并用</span></div><div class="feature"><b>只看行动指标</b><span>阵风、能见度、露点、气压、CAPE，优先看会影响出行的指标</span></div><div class="feature"><b>风险阈值</b><span>把数字翻译成提醒：可行、谨慎、停止</span></div><div class="feature"><b>多源交叉参考</b><span>保留 Windy、Meteoblue 入口，便于复核风场和多模型</span></div></div></div><form class="search" id="form"><div class="query"><input id="q" placeholder="雨崩村 / 四姑娘山镇 / 30.996,102.830"><button>查风险</button></div><div class="chips" id="chips"></div></form></div><main id="main"><div class="status">输入城市、景区、村庄、营地或经纬度。小地点建议加省份或路线名，例如“云南 德钦 雨崩村”。</div></main></section></div><script>
const AMAP_KEY='39a8c2f6ef75e494198f3e3751701ebe',WEATHER_PROCESSED='data/processed/weather_console_v7.json';const $=s=>document.querySelector(s);let rules=[],schema=[],sources=[],fallbacks=[],modules=[];const WMO={0:'晴',1:'少云',2:'多云',3:'阴',45:'雾',48:'冻雾',51:'小毛毛雨',53:'毛毛雨',55:'强毛毛雨',61:'小雨',63:'中雨',65:'大雨',71:'小雪',73:'中雪',75:'大雪',80:'阵雨',81:'强阵雨',82:'暴雨',95:'雷暴',96:'雷暴冰雹',99:'强雷暴'};
function val(x,u=''){return Number.isFinite(x)?`${Math.round(x)}${u}`:'--'}function parseCoord(q){const m=q.match(/^\s*(-?\d+(?:\.\d+)?)\s*[,， ]\s*(-?\d+(?:\.\d+)?)\s*$/);if(!m)return null;let a=+m[1],b=+m[2];return Math.abs(a)<=90?{lat:a,lon:b,name:`${a.toFixed(4)}, ${b.toFixed(4)}`,admin:'坐标输入',source:'坐标',confidence:'A'}:{lat:b,lon:a,name:`${b.toFixed(4)}, ${a.toFixed(4)}`,admin:'坐标输入',source:'坐标',confidence:'A'}}
function gcj2wgs(lng,lat){const PI=Math.PI,a=6378245,ee=0.006693421622965943;function tx(x,y){let r=300+x+2*y+.1*x*x+.1*x*y+.1*Math.sqrt(Math.abs(x));r+=(20*Math.sin(6*x*PI)+20*Math.sin(2*x*PI))*2/3;r+=(20*Math.sin(x*PI)+40*Math.sin(x/3*PI))*2/3;r+=(150*Math.sin(x/12*PI)+300*Math.sin(x/30*PI))*2/3;return r}function ty(x,y){let r=-100+2*x+3*y+.2*y*y+.1*x*y+.2*Math.sqrt(Math.abs(x));r+=(20*Math.sin(6*x*PI)+20*Math.sin(2*x*PI))*2/3;r+=(20*Math.sin(y*PI)+40*Math.sin(y/3*PI))*2/3;r+=(160*Math.sin(y/12*PI)+320*Math.sin(y*PI/30))*2/3;return r}const dlng=tx(lng-105,lat-35),dlat=ty(lng-105,lat-35),rad=lat/180*PI,magic=1-ee*Math.sin(rad)**2;return[lng-dlng*180/(a/Math.sqrt(magic)*Math.cos(rad)*PI),lat-dlat*180/(a*(1-ee)/(magic*Math.sqrt(magic))*PI)]}
function confidence(source,q){if(source==='坐标')return'A';if(source.includes('校准'))return'A';if(source.includes('高德')&&q.length>=5)return'B';if(source.includes('Open'))return'B';return'C'}function moduleCards(){return modules.slice(0,4).map(m=>`<div class="module"><b>${m.module_title_zh}</b><span>${m.copy_zh||m.what_user_gets}</span></div>`).join('')}
async function geocode(q){const c=parseCoord(q);if(c)return c;const fb=fallbacks.find(x=>x.query_zh===q||x.display_name===q||x.preferred_query===q);if(fb&&fb.manual_lat&&fb.manual_lng)return{name:fb.display_name||fb.query_zh||q,admin:fb.ambiguity_note||'校准坐标',lat:fb.manual_lat,lon:fb.manual_lng,source:'v7 校准坐标',confidence:fb.confidence||'A',elevation_m:fb.elevation_m,ambiguity_note:fb.ambiguity_note,recommended_query:fb.recommended_query,v7_quality:fb.v7_quality};let r=await fetch(`https://restapi.amap.com/v3/place/text?key=${AMAP_KEY}&keywords=${encodeURIComponent(q)}&offset=5&page=1&extensions=base`).then(r=>r.json()).catch(()=>null);let p=r?.pois?.[0];if(p?.location){const [lng,lat]=p.location.split(',').map(Number),[lon,wlat]=gcj2wgs(lng,lat);return{name:p.name||q,admin:[p.pname,p.cityname,p.adname].filter(Boolean).join(' · '),lat:wlat,lon,source:'高德 POI',confidence:confidence('高德',q),candidates:r.pois?.slice(0,5)||[]}}r=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=5&language=zh&format=json`).then(r=>r.json()).catch(()=>null);const g=r?.results?.[0];return g?{name:g.name,admin:g.admin1||g.country||'',lat:g.latitude,lon:g.longitude,source:'Open-Meteo Geocode',confidence:'B'}:null}
async function weather(g){const h='temperature_2m,apparent_temperature,precipitation_probability,precipitation,weather_code,wind_speed_10m,wind_gusts_10m,wind_direction_10m,relative_humidity_2m,dew_point_2m,pressure_msl,cloud_cover,cloud_cover_low,visibility,uv_index,cape';const d='temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,wind_speed_10m_max,wind_gusts_10m_max,uv_index_max,sunrise,sunset';return fetch(`https://api.open-meteo.com/v1/forecast?latitude=${g.lat}&longitude=${g.lon}&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,wind_gusts_10m,wind_direction_10m,relative_humidity_2m,pressure_msl&hourly=${h}&daily=${d}&timezone=auto&forecast_days=7`).then(r=>r.json())}
function graph(vals,color){const w=760,h=74,p=10,nums=vals.filter(Number.isFinite),min=Math.min(...nums),max=Math.max(...nums);const pts=vals.map((v,i)=>`${p+i*(w-p*2)/(vals.length-1)},${h-p-(v-min)/(max-min||1)*(h-p*2)}`).join(' ');return`<svg viewBox="0 0 ${w} ${h}"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>`}
function riskClass(v,type){if(type==='gust')return v>40?'danger':v>28?'watch':'';if(type==='rain')return v>65?'danger':v>45?'watch':'';if(type==='vis')return v<3000?'danger':v<6000?'watch':'';if(type==='cape')return v>=1500?'danger':v>=800?'watch':v>=300?'watch':'';return''}function explain(a){const out=[];if(a.gust>40)out.push(['danger','阵风超过 40km/h，开阔山脊、湖边和垭口不适合轻量化行动。']);else if(a.gust>28)out.push(['watch','阵风偏强，注意横风、帐篷固定和体感降温。']);if(a.rain>55)out.push(['watch','降水概率偏高，需交叉查看雷达、Windy 或 Meteoblue。']);if(a.vis&&a.vis<5000)out.push(['watch','能见度偏低，雾、低云或降水会影响找路和观察。']);if(a.pressure<1000)out.push(['watch','气压偏低，后续天气系统活动需要关注。']);if(a.cape>=1500)out.push(['danger','CAPE 超过 1500J/kg，强对流潜势高，避免山顶、山脊和开阔地。']);else if(a.cape>=800)out.push(['watch','CAPE 偏高，雷暴发展条件存在，午后尤其需要保守。']);return out.length?out:[['','主要指标暂未触发风险阈值。小地点预报仍建议用多模型复核。']]}
function render(g,d){const c=d.current,h=d.hourly,day=d.daily,t=h.temperature_2m.slice(0,24),rain=h.precipitation_probability.slice(0,24),gust=h.wind_gusts_10m.slice(0,24),cloud=h.cloud_cover.slice(0,24),low=h.cloud_cover_low?.slice(0,24)||[],cape=h.cape?.slice(0,24)||[],vis=h.visibility.slice(0,24),a={gust:Math.max(...gust),rain:Math.max(...rain),vis:Math.min(...vis),pressure:c.pressure_msl,cape:Math.max(...cape.filter(Number.isFinite),0),low:Math.max(...low.filter(Number.isFinite),0)};const hours=h.time.filter((_,i)=>i<24&&i%3===0).map((x,i)=>{const k=i*3;return`<div class="hour"><b>${new Date(x).getHours()}时</b><span>体感 ${val(h.apparent_temperature[k],'°')}</span><span>雨 ${val(h.precipitation_probability[k],'%')}</span></div>`}).join('');$('#main').innerHTML=`<section class="station show"><div class="loc"><div class="locTop"><div><div class="eyebrow">位置校验</div><h2>${g.name}</h2><p>${g.admin||'定位结果'} · ${g.lat.toFixed(4)}, ${g.lon.toFixed(4)} · ${g.source}${g.elevation_m?' · '+Math.round(g.elevation_m)+'m':''}</p>${g.v7_quality?.ambiguity_risk==='high'?`<div class="qualityNote">同名地点较多：建议用「${g.v7_quality.recommended_query_zh||g.name}」或补充省份/景区。</div>`:''}</div><div class="confidence"><span>可信度</span><b>${g.confidence||'B'}</b></div></div><div class="riskTape"><div class="risk ${riskClass(c.wind_gusts_10m,'gust')}"><b>${val(c.wind_gusts_10m,'km/h')}</b><span>当前阵风</span></div><div class="risk ${riskClass(a.rain,'rain')}"><b>${val(a.rain,'%')}</b><span>24h最高降水</span></div><div class="risk ${riskClass(a.vis,'vis')}"><b>${val(a.vis/1000,'km')}</b><span>最低能见度</span></div><div class="risk ${riskClass(a.cape,'cape')}"><b>${val(a.cape)}</b><span>CAPE 雷暴</span></div></div></div><div class="now"><div class="nowGrid"><div><div class="eyebrow">当前天气</div><div class="temp">${val(c.temperature_2m,'°')}</div></div><div class="cond"><b>${WMO[c.weather_code]||'天气'}</b><span>体感 ${val(c.apparent_temperature,'°')}</span><span>湿度 ${val(c.relative_humidity_2m,'%')}</span></div></div><div class="metrics"><div class="metric"><b>${val(c.wind_speed_10m,'km/h')}</b><span>风速</span></div><div class="metric"><b>${val(c.wind_gusts_10m,'km/h')}</b><span>阵风</span></div><div class="metric"><b>${val(c.pressure_msl,'hPa')}</b><span>气压</span></div><div class="metric"><b>${val(c.wind_direction_10m,'°')}</b><span>风向</span></div></div></div><div class="boards"><div class="board"><h3>逐小时行动窗口</h3><div class="hours">${hours}</div></div><div class="board"><h3>24小时风险曲线</h3><div class="note">看未来 24 小时趋势，不只看当前值。重点关注降水、阵风、低云和对流。</div><div class="meteogram"><div class="row"><div class="rowLabel">温度</div>${graph(t,'#7bd1ff')}</div><div class="row"><div class="rowLabel">降水</div>${graph(rain,'#8ee86f')}</div><div class="row"><div class="rowLabel">阵风</div>${graph(gust,'#f0b95b')}</div><div class="row"><div class="rowLabel">云量</div>${graph(cloud,'#b5c2ce')}</div><div class="row"><div class="rowLabel">CAPE</div>${graph(cape,'#ef7d4d')}</div></div></div><div class="board"><h3>雷暴与对流</h3><div class="note">CAPE ${val(a.cape,'J/kg')}。300 以上关注，800 以上警戒，1500 以上避开山脊、山顶和开阔地。</div></div><div class="board"><h3>风险解释</h3><div class="explain">${explain(a).map(([c,t])=>`<div><span class="flag ${c}"></span><span>${t}</span></div>`).join('')}</div><div class="model">已接入 ${schema.length} 项指标 · ${rules.length} 条解释规则 · ${sources.length} 个来源 · ${modules.length} 个决策模块</div></div><div class="board"><h3>判断依据</h3><div class="moduleGrid">${moduleCards()}</div></div><div class="refs"><div class="ref"><div class="refHead"><div><b>Windy 风场参考</b><span>Wind / Radar / ECMWF</span></div><a target="_blank" href="https://www.windy.com/?${g.lat},${g.lon},8">打开</a></div><div class="mapFrame"><iframe loading="lazy" src="https://embed.windy.com/embed2.html?lat=${g.lat}&lon=${g.lon}&detailLat=${g.lat}&detailLon=${g.lon}&width=650&height=450&zoom=7&level=surface&overlay=wind&product=ecmwf&menu=&message=true&marker=true&calendar=now&pressure=&type=map&location=coordinates&detail=&metricWind=km%2Fh&metricTemp=%C2%B0C&radarRange=-1"></iframe></div></div><div class="ref"><div class="refHead"><div><b>Meteoblue 专业参考</b><span>Meteogram / Multi-model</span></div><a target="_blank" href="https://www.meteoblue.com/">打开</a></div><div class="mapFrame">Meteoblue 暂作为外部复核入口。本站未接入其商业 API，不把外部页面包装成自有数据。</div></div></div><a class="src" href="route-pro.html?q=${encodeURIComponent(g.name)}"><div><b>查看附近路线</b><span>把当前位置带入路线工具</span></div><span>打开</span></a></div></section>`}
async function search(q=$('#q').value.trim()){if(!q)return;$('#main').innerHTML='<div class="status">正在定位并读取逐小时预报...</div>';const g=await geocode(q);if(!g){$('#main').innerHTML='<div class="status">没有找到可靠位置。请加省份、景区名，或直接输入经纬度。</div>';return}const d=await weather(g);history.replaceState(null,'',`?q=${encodeURIComponent(q)}`);render(g,d)}
async function init(){const data=await fetch(WEATHER_PROCESSED).then(r=>r.json()).catch(()=>({}));rules=data.rules||[];schema=data.metrics||[];sources=data.sources||[];fallbacks=data.geocode_fallbacks||[];modules=data.decision_modules||[];['云南 德钦 雨崩村','四姑娘山镇','哈巴村','独库公路','冈仁波齐','纳木错','墨脱','喀拉峻'].forEach(x=>$('#chips').insertAdjacentHTML('beforeend',`<button class="chip" type="button" onclick="search('${x}')">${x}</button>`));const p=new URLSearchParams(location.search);if(p.get('q')){$('#q').value=p.get('q');search(p.get('q'))}}$('#form').addEventListener('submit',e=>{e.preventDefault();search()});init();
</script></body></html>
