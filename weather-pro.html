<style>
:root{--night:oklch(18% .035 245);--blue:oklch(42% .09 235);--mist:oklch(93% .018 235);--paper:oklch(97% .012 235);--ink:oklch(19% .025 235);--muted:oklch(50% .035 235);--line:oklch(76% .035 235 / .5);--cyan:oklch(66% .11 213);--green:oklch(58% .12 154);--amber:oklch(68% .14 78);--red:oklch(58% .16 30);--shadow:0 18px 44px oklch(18% .04 240 / .22);--radius:26px}*{box-sizing:border-box}html{background:var(--night);color:var(--ink);scroll-behavior:smooth}body{margin:0;min-height:100vh;font-family:"IBM Plex Sans",system-ui,sans-serif;background:linear-gradient(180deg,oklch(89% .035 224),var(--mist) 38%,oklch(86% .03 205));-webkit-font-smoothing:antialiased}button,input,select{font:inherit}button{cursor:pointer}a{color:inherit;text-decoration:none}.shell{width:min(1120px,100%);margin:0 auto;padding:14px 14px 96px}.topbar{position:sticky;top:0;z-index:20;margin:0 -14px;padding:10px 14px;background:oklch(92% .025 220 / .86);backdrop-filter:blur(18px);border-bottom:1px solid oklch(70% .035 224 / .38);display:flex;justify-content:space-between;align-items:center;gap:10px}.brand{font-family:"Space Grotesk",sans-serif;font-weight:700;letter-spacing:.04em}.navlink{font-size:13px;color:var(--muted);padding:8px 10px;border:1px solid var(--line);border-radius:999px;background:oklch(98% .012 220 / .56)}.hero{padding:26px 0 18px}.eyebrow{font-family:"Space Grotesk",sans-serif;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--blue);font-weight:700}.hero h1{font-family:"Noto Serif SC",serif;font-size:clamp(42px,13vw,88px);line-height:.92;margin:10px 0 14px;letter-spacing:-.05em}.hero p{margin:0;color:var(--muted);font-size:17px;line-height:1.75;max-width:760px}.search-panel{background:var(--night);color:var(--paper);border-radius:32px;padding:18px;box-shadow:0 24px 60px oklch(12% .04 240 / .33);position:relative;overflow:hidden}.search-panel:before{content:"";position:absolute;right:-90px;top:-70px;width:220px;height:220px;border-radius:50%;background:oklch(67% .12 210 / .24)}.field{position:relative;z-index:1;margin-bottom:14px}.label{display:block;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:oklch(78% .04 225);font-family:"Space Grotesk",sans-serif;margin-bottom:8px}.search{width:100%;border:1px solid oklch(72% .04 225 / .38);border-radius:19px;padding:14px 15px;background:oklch(26% .04 240);color:var(--paper);outline:none}.search::placeholder{color:oklch(72% .035 225)}.mode-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.mode-btn{border:1px solid oklch(72% .04 225 / .38);background:oklch(26% .04 240);color:var(--paper);border-radius:18px;padding:13px 8px;text-align:left;font-weight:700}.mode-btn span{display:block;font-size:12px;color:oklch(76% .035 225);font-weight:500;margin-top:2px}.mode-btn.active{background:var(--cyan);color:oklch(14% .035 225);border-color:transparent}.mode-btn.active span{color:oklch(28% .05 225)}.selects{display:grid;grid-template-columns:1fr 1fr;gap:8px}.selects select{width:100%;border:1px solid oklch(72% .04 225 / .38);border-radius:17px;padding:12px;background:oklch(26% .04 240);color:var(--paper);outline:none}.primary{width:100%;border:0;border-radius:22px;padding:16px;background:linear-gradient(135deg,var(--paper),oklch(80% .1 207));color:var(--night);font-weight:800;box-shadow:0 14px 28px oklch(10% .04 240 / .25)}.chips{display:flex;gap:8px;overflow:auto;padding:2px 0 6px;scrollbar-width:none}.chip{white-space:nowrap;border:1px solid var(--line);background:oklch(98% .012 220 / .7);border-radius:999px;padding:8px 12px;color:var(--muted);font-size:13px}.section{margin-top:18px}.section-title{display:flex;align-items:end;justify-content:space-between;gap:16px;margin:24px 0 10px}.section-title h2{font-family:"Noto Serif SC",serif;font-size:27px;margin:0;letter-spacing:-.03em}.section-title small{color:var(--muted);font-family:"Space Grotesk",sans-serif}.desk{border-radius:32px;background:var(--paper);border:1px solid var(--line);box-shadow:var(--shadow);overflow:hidden}.desk-head{padding:18px;background:linear-gradient(135deg,oklch(31% .07 235),oklch(38% .08 205));color:var(--paper);position:relative}.verdict{display:inline-flex;border-radius:999px;padding:7px 10px;background:oklch(95% .02 220 / .12);border:1px solid oklch(80% .04 225 / .24);font-weight:800;font-size:13px}.desk-head h2{font-family:"Noto Serif SC",serif;font-size:34px;line-height:1.08;margin:14px 0 8px}.desk-head p{margin:0;color:oklch(84% .03 225);line-height:1.65}.metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--line)}.metric{background:oklch(98% .012 220);padding:14px}.metric b{display:block;font-family:"Space Grotesk",sans-serif;font-size:21px}.metric span{display:block;color:var(--muted);font-size:12px;margin-top:2px}.cards{display:grid;grid-template-columns:1fr;gap:10px;padding:12px}.card{border:1px solid var(--line);border-radius:24px;padding:15px;background:oklch(99% .01 220)}.card h3{margin:0 0 8px;font-size:18px}.timeline{display:grid;grid-template-columns:repeat(8,minmax(54px,1fr));gap:6px;overflow:auto;padding-bottom:4px}.hour{min-width:54px;border-radius:16px;padding:10px 6px;text-align:center;background:oklch(94% .02 220);border:1px solid var(--line)}.hour b{display:block;font-family:"Space Grotesk"}.hour span{font-size:12px;color:var(--muted)}.list{display:grid;gap:8px}.list div{display:flex;gap:10px;align-items:flex-start;color:var(--muted);line-height:1.55}.mark{width:22px;height:22px;border-radius:50%;display:inline-grid;place-items:center;flex:0 0 22px;background:oklch(88% .06 210);color:var(--blue);font-weight:900;font-size:12px}.gauge{display:grid;gap:10px}.risk{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center}.risk i{width:10px;height:10px;border-radius:50%;background:var(--green)}.risk.warn i{background:var(--amber)}.risk.bad i{background:var(--red)}.bar{height:7px;background:oklch(89% .02 220);border-radius:999px;overflow:hidden}.bar span{display:block;height:100%;background:var(--green);border-radius:999px}.risk.warn .bar span{background:var(--amber)}.risk.bad .bar span{background:var(--red)}.sources{display:grid;grid-template-columns:1fr;gap:10px}.source{border:1px solid var(--line);border-radius:22px;padding:14px;background:oklch(98% .012 220);display:flex;justify-content:space-between;gap:12px}.source b{display:block}.source span{font-size:13px;color:var(--muted)}.empty{padding:18px;border:1px dashed var(--line);border-radius:24px;color:var(--muted);background:oklch(98% .012 220)}.toast{position:fixed;left:14px;right:14px;bottom:18px;z-index:50;background:var(--night);color:var(--paper);border-radius:20px;padding:14px 16px;box-shadow:var(--shadow);transform:translateY(120%);transition:.28s ease}.toast.show{transform:translateY(0)}
@media(min-width:780px){.shell{padding:22px 24px 110px}.hero-grid{display:grid;grid-template-columns:1fr 430px;gap:22px;align-items:start}.search-panel{position:sticky;top:84px}.cards{grid-template-columns:repeat(3,1fr)}.metrics{grid-template-columns:repeat(4,1fr)}.sources{grid-template-columns:repeat(3,1fr)}.topbar{margin:0 -24px;padding-inline:24px}}
@media(max-width:420px){.shell{padding-inline:12px}.topbar{margin:0 -12px}.navlink{padding:7px 8px}.mode-grid{gap:7px}.mode-btn{font-size:14px}.desk-head h2{font-size:29px}.selects{grid-template-columns:1fr}.metric b{font-size:19px}}
</style>
</head>
<body>
<div class="shell">
  <header class="topbar"><a class="brand" href="https://song-studio.github.io/">SONG METEO</a><nav><a class="navlink" href="route-pro.html">山野行动台</a></nav></header>
  <section class="hero-grid">
    <div><div class="hero"><div class="eyebrow">Hyperlocal Weather Window</div><h1>天气窗口</h1><p>查城市，也查山口、营地、景区入口和路线起点。它不只告诉你天气，而是把风、雨、雷、温差、能见度翻译成户外行动建议。</p></div></div>
    <form class="search-panel" id="weatherForm"><div class="field"><span class="label">01 小地点查询</span><input class="search" id="q" placeholder="例如 四姑娘山镇、雨崩村、独库公路"></div><div class="field"><span class="label">02 活动类型</span><div class="mode-grid" id="modeGrid"><button type="button" class="mode-btn active" data-mode="hiking">徒步<span>雨、路滑、补给</span></button><button type="button" class="mode-btn" data-mode="cycling">骑行<span>风、返程、暴晒</span></button><button type="button" class="mode-btn" data-mode="mountaineering">登山<span>雷暴、风寒、能见度</span></button></div></div><div class="field selects"><label><span class="label">日期</span><select id="day"><option value="0">今天</option><option value="1" selected>明天</option><option value="2">后天</option></select></label><label><span class="label">策略</span><select id="style"><option value="strict">保守</option><option value="normal" selected>标准</option><option value="loose">宽松</option></select></label></div><button class="primary" type="submit">研判天气窗口</button></form>
  </section>
  <section class="section"><div class="chips" id="chips"></div></section>
  <main id="result"><div class="empty">输入一个小地点，先生成适不适合行动的判断。</div></main>
</div><div class="toast" id="toast"></div>
<script>
const AMAP_KEY='39a8c2f6ef75e494198f3e3751701ebe';let state={mode:'hiking',geo:null,data:null};const $=s=>document.querySelector(s);function toast(msg){const el=$('#toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2600)}
function chips(){['四姑娘山镇','雨崩村','武功山','独库公路','青海湖','虎跳峡','大理古城','贡嘎山'].forEach(n=>{$('#chips').insertAdjacentHTML('beforeend',`<button class="chip" onclick="quick('${n}')">${n}</button>`)})}chips();function quick(n){$('#q').value=n;search()}
function gcj2wgs(lng,lat){const PI=Math.PI,a=6378245,ee=0.006693421622965943;function tx(x,y){let r=300+x+2*y+0.1*x*x+0.1*x*y+0.1*Math.sqrt(Math.abs(x));r+=(20*Math.sin(6*x*PI)+20*Math.sin(2*x*PI))*2/3;r+=(20*Math.sin(x*PI)+40*Math.sin(x/3*PI))*2/3;r+=(150*Math.sin(x/12*PI)+300*Math.sin(x/30*PI))*2/3;return r}function ty(x,y){let r=-100+2*x+3*y+0.2*y*y+0.1*x*y+0.2*Math.sqrt(Math.abs(x));r+=(20*Math.sin(6*x*PI)+20*Math.sin(2*x*PI))*2/3;r+=(20*Math.sin(y*PI)+40*Math.sin(y/3*PI))*2/3;r+=(160*Math.sin(y/12*PI)+320*Math.sin(y*PI/30))*2/3;return r}const dlng=tx(lng-105,lat-35),dlat=ty(lng-105,lat-35),radLat=lat/180*PI,magic=1-ee*Math.sin(radLat)**2;return[lng-dlng*180/(a/Math.sqrt(magic)*Math.cos(radLat)*PI),lat-dlat*180/(a*(1-ee)/(magic*Math.sqrt(magic))*PI)]}
async function geocode(q){let res=await fetch(`https://restapi.amap.com/v3/place/text?key=${AMAP_KEY}&keywords=${encodeURIComponent(q)}&offset=1&page=1&extensions=base`).then(r=>r.json()).catch(()=>null);let p=res?.pois?.[0];if(p?.location){const [lng,lat]=p.location.split(',').map(Number);const [wlon,wlat]=gcj2wgs(lng,lat);return {name:p.name||q,admin:p.cityname||p.pname||'',lat:wlat,lon:wlon,rawLat:lat,rawLon:lng}}res=await fetch(`https://restapi.amap.com/v3/geocode/geo?key=${AMAP_KEY}&address=${encodeURIComponent(q)}`).then(r=>r.json()).catch(()=>null);p=res?.geocodes?.[0];if(p?.location){const [lng,lat]=p.location.split(',').map(Number);const [wlon,wlat]=gcj2wgs(lng,lat);return {name:q,admin:p.city||p.province||'',lat:wlat,lon:wlon,rawLat:lat,rawLon:lng}}const om=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=1&language=zh&format=json`).then(r=>r.json()).catch(()=>null);const g=om?.results?.[0];if(g)return {name:g.name,admin:g.admin1||g.country||'',lat:g.latitude,lon:g.longitude,rawLat:g.latitude,rawLon:g.longitude};return null}
async function fetchWeather(g){const url=`https://api.open-meteo.com/v1/forecast?latitude=${g.lat}&longitude=${g.lon}&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,relative_humidity_2m&hourly=temperature_2m,apparent_temperature,precipitation_probability,weather_code,wind_speed_10m,wind_gusts_10m,visibility,cloud_cover,uv_index&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,wind_speed_10m_max,wind_gusts_10m_max,uv_index_max,sunrise,sunset&timezone=auto&forecast_days=3`;return fetch(url).then(r=>r.json())}
function sliceDay(data){const d=+$('#day').value;const start=d*24,end=start+24;const h=data.hourly;return {time:h.time.slice(start,end),temp:h.temperature_2m.slice(start,end),feel:h.apparent_temperature.slice(start,end),rain:h.precipitation_probability.slice(start,end),code:h.weather_code.slice(start,end),wind:h.wind_speed_10m.slice(start,end),gust:h.wind_gusts_10m.slice(start,end),vis:h.visibility.slice(start,end),uv:h.uv_index.slice(start,end),cloud:h.cloud_cover.slice(start,end)}}
function max(a){return Math.max(...a.filter(Number.isFinite),0)}function min(a){return Math.min(...a.filter(Number.isFinite),0)}
function assess(day){const mode=state.mode,style=$('#style').value;let wind=max(day.gust),rain=max(day.rain),storm=day.code.some(c=>c>=95)?55:0,uv=max(day.uv),vis=min(day.vis)/1000,tempMin=min(day.feel),tempMax=max(day.feel);let risk=rain*.45+wind*.7+storm+(uv>8?10:0)+(vis&&vis<3?16:0)+(tempMin<0?12:0)+(tempMax>32?12:0);if(mode==='cycling')risk+=wind>30?12:0;if(mode==='mountaineering')risk+=storm>0?18:0,risk+=wind>35?10:0,risk+=vis<5?8:0;if(style==='strict')risk+=8;if(style==='loose')risk-=8;risk=Math.max(0,Math.min(100,Math.round(risk)));let v=risk>=68?'不建议':risk>=42?'谨慎':'适合';let cls=risk>=68?'bad':risk>=42?'warn':'good';return {risk,v,cls,wind,rain,storm,uv,vis,tempMin,tempMax}}
function windowText(day,a){let best=[];day.time.forEach((t,i)=>{const hour=new Date(t).getHours();const ok=hour>=7&&hour<=16&&day.rain[i]<45&&day.wind[i]<32&&day.code[i]<95;if(ok)best.push(hour)});if(!best.length)return '无稳定窗口';return `${String(best[0]).padStart(2,'0')}:00 至 ${String(best[best.length-1]+1).padStart(2,'0')}:00`}
function advice(a){const arr=[];if(a.risk>=68)arr.push('今天不要把目标设成必须完成，换低海拔、短距离或直接改期。');else if(a.risk>=42)arr.push('可以行动，但要缩短路线，提前设置硬折返点。');else arr.push('窗口相对干净，适合按计划出发，但不要拖到下午。');if(a.rain>50)arr.push('降水概率偏高，路滑、溪沟涨水和能见度下降要提前考虑。');if(a.wind>35)arr.push('阵风偏强，骑行横风、山脊暴露段和失温风险都会上升。');if(a.storm>0)arr.push('有雷暴信号，听到雷声或看到闪电，立刻离开山脊、水边和孤立树木。');if(a.uv>8)arr.push('紫外线强，补水、防晒和午间降强度比速度更重要。');return arr.slice(0,5)}
function render(){const g=state.geo,d=state.data,day=sliceDay(d),a=assess(day),win=windowText(day,a);const hours=day.time.filter((_,i)=>i%3===0).map((t,i)=>{const idx=i*3;return `<div class="hour"><b>${new Date(t).getHours()}时</b><span>${Math.round(day.feel[idx])}°</span><span>${day.rain[idx]}%</span></div>`}).join('');const risks=[['降水',a.rain,a.rain>55?'bad':a.rain>35?'warn':'good'],['阵风',Math.min(100,a.wind*1.6),a.wind>42?'bad':a.wind>28?'warn':'good'],['雷暴',a.storm,a.storm?'bad':'good'],['能见度',a.vis?Math.max(0,100-a.vis*10):22,a.vis&&a.vis<3?'bad':a.vis&&a.vis<8?'warn':'good']];$('#result').innerHTML=`<section class="section"><div class="desk"><div class="desk-head"><span class="verdict">${a.v}</span><h2>${g.name}</h2><p>${g.admin} · ${win} 是当前最可用的行动窗口。天气判断来自 Open-Meteo，小地点定位优先用高德 POI。</p></div><div class="metrics"><div class="metric"><b>${win}</b><span>最佳窗口</span></div><div class="metric"><b>${Math.round(a.tempMin)}°/${Math.round(a.tempMax)}°</b><span>体感范围</span></div><div class="metric"><b>${Math.round(a.wind)}km/h</b><span>最大阵风</span></div><div class="metric"><b>${a.risk}</b><span>风险指数</span></div></div><div class="cards"><article class="card"><h3>行动建议</h3><div class="list">${advice(a).map(x=>`<div><span class="mark">${a.cls==='bad'?'!':'✓'}</span><span>${x}</span></div>`).join('')}</div></article><article class="card"><h3>风险雷达</h3><div class="gauge">${risks.map(([n,v,c])=>`<div class="risk ${c}"><i></i><span>${n}</span><b>${Math.round(v)}</b><div></div><div class="bar"><span style="width:${Math.round(v)}%"></span></div><span></span></div>`).join('')}</div></article><article class="card"><h3>小时窗口</h3><div class="timeline">${hours}</div></article></div></div></section><section class="section"><div class="section-title"><h2>专业参考</h2><small>外部源不替代现场判断</small></div><div class="sources"><a class="source" href="https://www.windy.com/?${g.lat},${g.lon},8" target="_blank"><div><b>Windy 风场</b><span>看风、雷达、模型切换</span></div><span>打开</span></a><a class="source" href="https://www.meteoblue.com/" target="_blank"><div><b>Meteoblue</b><span>看多模型和山地预报</span></div><span>打开</span></a><a class="source" href="route-pro.html?from=${encodeURIComponent(g.name)}&mode=${state.mode}" target="_blank"><div><b>转入路线</b><span>把天气窗口带入行动台</span></div><span>打开</span></a></div></section>`}
async function search(){const q=$('#q').value.trim();if(!q){toast('先输入一个地点');return}$('#result').innerHTML='<div class="empty">正在定位小地点并读取天气数据...</div>';const g=await geocode(q);if(!g){$('#result').innerHTML='<div class="empty">没有找到这个地点，换个更具体的名字试试。</div>';return}state.geo=g;state.data=await fetchWeather(g);history.replaceState(null,'',`?q=${encodeURIComponent(q)}&mode=${state.mode}`);render()}
$('#modeGrid').addEventListener('click',e=>{const b=e.target.closest('.mode-btn');if(!b)return;state.mode=b.dataset.mode;document.querySelectorAll('.mode-btn').forEach(x=>x.classList.toggle('active',x===b));if(state.data)render()});$('#weatherForm').addEventListener('submit',e=>{e.preventDefault();search()});const p=new URLSearchParams(location.search);if(p.get('mode')){const b=document.querySelector(`[data-mode="${p.get('mode')}"]`);if(b)b.click()}if(p.get('q')){$('#q').value=p.get('q');search()}
</script>
</body>
</html>
