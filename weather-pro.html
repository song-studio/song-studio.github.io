<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>天气窗口 · Song Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=Noto+Serif+SC:wght@600;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:oklch(15% .025 248);
  --bg2:oklch(20% .035 246);
  --panel:oklch(96% .012 238);
  --panel2:oklch(91% .018 238);
  --ink:oklch(18% .025 244);
  --muted:oklch(48% .035 244);
  --line:oklch(76% .032 240 / .58);
  --blue:oklch(57% .13 235);
  --cyan:oklch(70% .12 208);
  --green:oklch(62% .13 157);
  --amber:oklch(72% .14 82);
  --red:oklch(61% .17 29);
  --white:oklch(98% .008 238);
  --shadow:0 24px 64px oklch(12% .03 248 / .24);
  --r:28px;
}
*{box-sizing:border-box}html{background:var(--bg);color:var(--ink)}body{margin:0;min-height:100vh;font-family:"IBM Plex Sans",system-ui,sans-serif;background:radial-gradient(circle at 20% -10%,oklch(54% .13 224 / .35),transparent 360px),linear-gradient(180deg,oklch(88% .032 229),oklch(94% .014 238) 44%,oklch(89% .018 224));-webkit-font-smoothing:antialiased}button,input{font:inherit}button{cursor:pointer}a{color:inherit;text-decoration:none}.app{width:min(1180px,100%);margin:0 auto;padding:12px 12px 96px}.top{position:sticky;top:0;z-index:40;margin:0 -12px;padding:10px 12px;background:oklch(92% .018 232 / .84);backdrop-filter:blur(20px);border-bottom:1px solid oklch(72% .03 232 / .46);display:flex;align-items:center;justify-content:space-between}.brand{font-family:"IBM Plex Mono",monospace;font-weight:700;font-size:13px;letter-spacing:.12em}.top a:last-child{border:1px solid var(--line);border-radius:999px;padding:8px 10px;color:var(--muted);font-size:13px;background:oklch(98% .008 238 / .52)}.hero{padding:28px 0 16px}.kicker{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--blue);font-weight:700}.hero h1{font-family:"Noto Serif SC",serif;font-size:clamp(46px,15vw,96px);line-height:.9;letter-spacing:-.07em;margin:10px 0 12px}.hero p{margin:0;color:var(--muted);font-size:16px;line-height:1.72;max-width:740px}.searchDock{background:linear-gradient(145deg,var(--bg),oklch(24% .045 240));color:var(--white);border-radius:34px;padding:16px;box-shadow:0 24px 70px oklch(12% .035 248 / .35);position:relative;overflow:hidden}.searchDock:after{content:"";position:absolute;right:-70px;top:-80px;width:220px;height:220px;border-radius:50%;background:oklch(66% .13 210 / .26)}.searchDock label{position:relative;display:block;font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:oklch(76% .04 220);margin-bottom:9px}.query{position:relative;display:grid;grid-template-columns:1fr auto;gap:8px}.query input{min-width:0;border:1px solid oklch(72% .035 230 / .38);border-radius:20px;padding:15px;background:oklch(25% .035 245);color:var(--white);outline:none}.query input::placeholder{color:oklch(70% .03 230)}.query button{border:0;border-radius:20px;padding:0 18px;background:var(--cyan);color:oklch(16% .03 235);font-weight:800}.coordNote{position:relative;margin-top:10px;color:oklch(78% .035 224);font-size:12px;line-height:1.55}.micro{position:relative;margin-top:12px;display:flex;gap:8px;overflow:auto;scrollbar-width:none}.micro button{white-space:nowrap;border:1px solid oklch(72% .035 230 / .34);background:oklch(29% .04 244);color:oklch(84% .025 230);border-radius:999px;padding:8px 11px;font-size:13px}.grid{display:grid;gap:12px}.section{margin-top:18px}.weather{border:1px solid var(--line);border-radius:34px;background:var(--panel);box-shadow:var(--shadow);overflow:hidden}.obs{background:linear-gradient(145deg,oklch(27% .055 240),oklch(37% .08 220));color:var(--white);padding:18px}.place{display:flex;justify-content:space-between;gap:14px;align-items:start}.place h2{font-family:"Noto Serif SC",serif;font-size:31px;line-height:1.1;margin:10px 0 4px}.place p{margin:0;color:oklch(82% .026 228);line-height:1.5}.stamp{font-family:"IBM Plex Mono",monospace;font-size:11px;color:oklch(76% .04 220);text-align:right}.tempLine{display:flex;align-items:end;justify-content:space-between;gap:12px;margin-top:18px}.temp{font-family:"IBM Plex Mono",monospace;font-size:78px;line-height:.82;font-weight:700;letter-spacing:-.08em}.condition{display:grid;gap:4px;text-align:right}.condition b{font-size:18px}.condition span{color:oklch(82% .026 228);font-size:13px}.metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--line)}.metric{background:oklch(98% .008 238);padding:14px}.metric b{display:block;font-family:"IBM Plex Mono",monospace;font-size:20px}.metric span{display:block;color:var(--muted);font-size:12px;margin-top:3px}.card{border:1px solid var(--line);border-radius:28px;background:oklch(98% .008 238);padding:15px}.card h3{margin:0 0 10px;font-size:18px}.sub{color:var(--muted);font-size:13px;line-height:1.55;margin-top:-4px;margin-bottom:12px}.chart{height:138px;border-radius:22px;background:linear-gradient(180deg,oklch(94% .016 238),oklch(90% .02 238));border:1px solid var(--line);overflow:hidden}.timeline{display:grid;grid-template-columns:repeat(8,minmax(58px,1fr));gap:7px;overflow:auto;padding-bottom:2px}.hour{min-width:58px;border:1px solid var(--line);border-radius:18px;background:oklch(96% .012 238);padding:9px 6px;text-align:center}.hour b{display:block;font-family:"IBM Plex Mono",monospace;font-size:13px}.hour span{display:block;color:var(--muted);font-size:12px}.windRose{height:210px;border-radius:50%;margin:8px auto 0;aspect-ratio:1;background:radial-gradient(circle,transparent 0 31%,oklch(88% .02 238) 32% 33%,transparent 34% 62%,oklch(86% .025 238) 63% 64%,transparent 65%),conic-gradient(from 0deg,oklch(64% .12 208),oklch(72% .14 82),oklch(62% .13 157),oklch(64% .12 208));position:relative}.needle{position:absolute;left:50%;top:50%;width:4px;height:42%;background:var(--bg);border-radius:999px;transform-origin:50% 0;transform:rotate(var(--deg)) translate(-50%,-4px)}.windRose:after{content:"N";position:absolute;left:50%;top:10px;transform:translateX(-50%);font-family:"IBM Plex Mono";font-weight:700}.explain{display:grid;gap:9px}.explain div{display:flex;gap:9px;align-items:start;color:var(--muted);line-height:1.55}.dot{width:9px;height:9px;border-radius:50%;background:var(--green);margin-top:8px;flex:0 0 9px}.dot.watch{background:var(--amber)}.dot.danger{background:var(--red)}.sources{display:grid;gap:10px}.source{display:flex;justify-content:space-between;gap:12px;border:1px solid var(--line);border-radius:22px;padding:13px;background:oklch(98% .008 238)}.source b{display:block}.source span{color:var(--muted);font-size:12px}.empty{border:1px dashed var(--line);border-radius:28px;padding:18px;background:oklch(98% .008 238);color:var(--muted);line-height:1.7}.loader{padding:28px;text-align:center;color:var(--muted)}.toast{position:fixed;left:12px;right:12px;bottom:16px;background:var(--bg);color:var(--white);border-radius:22px;padding:14px 16px;box-shadow:var(--shadow);transform:translateY(120%);transition:.25s ease;z-index:80}.toast.show{transform:translateY(0)}
@media(min-width:820px){.app{padding:22px 24px 120px}.top{margin:0 -24px;padding-inline:24px}.layout{display:grid;grid-template-columns:1fr 430px;gap:22px;align-items:start}.searchDock{position:sticky;top:76px}.metrics{grid-template-columns:repeat(4,1fr)}.grid.two{grid-template-columns:1.2fr .8fr}.grid.three{grid-template-columns:repeat(3,1fr)}}
@media(max-width:420px){.query{grid-template-columns:1fr}.query button{height:50px}.temp{font-size:68px}.place{display:block}.stamp{text-align:left;margin-top:8px}.metrics{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="app">
<header class="top"><a class="brand" href="https://song-studio.github.io/">SONG METEO</a><a href="route-pro.html">路径工具</a></header>
<section class="layout">
  <div><div class="hero"><div class="kicker">Point Forecast Console</div><h1>天气窗口</h1><p>输入城市、村镇、山口、营地、湖泊、景区入口或坐标。这里只做气象：实况、小时趋势、风、雨、雷暴、能见度、气压和数据来源。</p></div></div>
  <form class="searchDock" id="form"><label for="q">小地点查询</label><div class="query"><input id="q" autocomplete="off" placeholder="四姑娘山镇 / 雨崩村 / 29.59,101.99"><button>查询</button></div><div class="coordNote">支持村镇、景区、山口、湖泊、营地、路线起点和经纬度。小地点优先用高德 POI，海外地点回退 Open-Meteo。</div><div class="micro" id="micro"></div></form>
</section>
<main id="main" class="section"><div class="empty">先输入一个地点。专业天气页不判断你该不该出发，它只把气象数据讲清楚。</div></main>
</div><div class="toast" id="toast"></div>
<script>
const AMAP_KEY='39a8c2f6ef75e494198f3e3751701ebe';
const WMO={0:'晴',1:'少云',2:'多云',3:'阴',45:'雾',48:'冻雾',51:'小毛毛雨',53:'毛毛雨',55:'强毛毛雨',61:'小雨',63:'中雨',65:'大雨',71:'小雪',73:'中雪',75:'大雪',80:'阵雨',81:'强阵雨',82:'暴雨',95:'雷暴',96:'雷暴冰雹',99:'强雷暴'};
const $=s=>document.querySelector(s);let state={geo:null,data:null};
function toast(t){const el=$('#toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2400)}
function gcj2wgs(lng,lat){const PI=Math.PI,a=6378245,ee=0.006693421622965943;function tx(x,y){let r=300+x+2*y+.1*x*x+.1*x*y+.1*Math.sqrt(Math.abs(x));r+=(20*Math.sin(6*x*PI)+20*Math.sin(2*x*PI))*2/3;r+=(20*Math.sin(x*PI)+40*Math.sin(x/3*PI))*2/3;r+=(150*Math.sin(x/12*PI)+300*Math.sin(x/30*PI))*2/3;return r}function ty(x,y){let r=-100+2*x+3*y+.2*y*y+.1*x*y+.2*Math.sqrt(Math.abs(x));r+=(20*Math.sin(6*x*PI)+20*Math.sin(2*x*PI))*2/3;r+=(20*Math.sin(y*PI)+40*Math.sin(y/3*PI))*2/3;r+=(160*Math.sin(y/12*PI)+320*Math.sin(y*PI/30))*2/3;return r}const dlng=tx(lng-105,lat-35),dlat=ty(lng-105,lat-35),rad=lat/180*PI,magic=1-ee*Math.sin(rad)**2;return[lng-dlng*180/(a/Math.sqrt(magic)*Math.cos(rad)*PI),lat-dlat*180/(a*(1-ee)/(magic*Math.sqrt(magic))*PI)]}
function parseCoord(q){const m=q.match(/^\s*(-?\d+(?:\.\d+)?)\s*[,， ]\s*(-?\d+(?:\.\d+)?)\s*$/);if(!m)return null;let a=+m[1],b=+m[2];if(Math.abs(a)<=90&&Math.abs(b)<=180)return{lat:a,lon:b,name:`${a.toFixed(4)}, ${b.toFixed(4)}`,admin:'坐标'};return{lat:b,lon:a,name:`${b.toFixed(4)}, ${a.toFixed(4)}`,admin:'坐标'}}
async function geocode(q){const c=parseCoord(q);if(c)return c;const poi=await fetch(`https://restapi.amap.com/v3/place/text?key=${AMAP_KEY}&keywords=${encodeURIComponent(q)}&offset=1&page=1&extensions=base`).then(r=>r.json()).catch(()=>null);let p=poi?.pois?.[0];if(p?.location){const [lng,lat]=p.location.split(',').map(Number),[lon,wlat]=gcj2wgs(lng,lat);return{name:p.name||q,admin:p.cityname||p.pname||'',lat:wlat,lon,rawLat:lat,rawLon:lng,source:'高德 POI'}}const geo=await fetch(`https://restapi.amap.com/v3/geocode/geo?key=${AMAP_KEY}&address=${encodeURIComponent(q)}`).then(r=>r.json()).catch(()=>null);p=geo?.geocodes?.[0];if(p?.location){const [lng,lat]=p.location.split(',').map(Number),[lon,wlat]=gcj2wgs(lng,lat);return{name:q,admin:p.city||p.province||'',lat:wlat,lon,rawLat:lat,rawLon:lng,source:'高德地理编码'}}const om=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=1&language=zh&format=json`).then(r=>r.json()).catch(()=>null);const g=om?.results?.[0];if(g)return{name:g.name,admin:g.admin1||g.country||'',lat:g.latitude,lon:g.longitude,source:'Open-Meteo Geocoding'};return null}
async function weather(g){const params='temperature_2m,apparent_temperature,precipitation_probability,precipitation,weather_code,wind_speed_10m,wind_gusts_10m,wind_direction_10m,relative_humidity_2m,dew_point_2m,pressure_msl,cloud_cover,visibility,uv_index';const daily='temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,wind_speed_10m_max,wind_gusts_10m_max,uv_index_max,sunrise,sunset';const url=`https://api.open-meteo.com/v1/forecast?latitude=${g.lat}&longitude=${g.lon}&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,wind_gusts_10m,wind_direction_10m,relative_humidity_2m,pressure_msl&hourly=${params}&daily=${daily}&timezone=auto&forecast_days=7`;return fetch(url).then(r=>r.json())}
function val(x,u=''){return Number.isFinite(x)?`${Math.round(x)}${u}`:'--'}
function nowISO(){return new Date().toLocaleString('zh-CN',{hour12:false})}
function chart(values,color){const w=640,h=138,p=18;const nums=values.filter(Number.isFinite);const min=Math.min(...nums),max=Math.max(...nums);const pts=values.map((v,i)=>{const x=p+i*(w-p*2)/(values.length-1);const y=h-p-(v-min)/(max-min||1)*(h-p*2);return`${x.toFixed(1)},${y.toFixed(1)}`}).join(' ');return`<svg viewBox="0 0 ${w} ${h}" width="100%" height="100%"><path d="M0 ${h-28} H${w}" stroke="oklch(76% .032 240 / .55)"/><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/></svg>`}
function explain(a){const out=[];if(a.gust>40)out.push(['danger','阵风已经进入需要关注的区间，开阔地、水面和高处会更明显。']);else if(a.gust>28)out.push(['watch','阵风偏强，体感和风寒会被放大。']);if(a.rain>55)out.push(['watch','降水概率较高，短时变化需要看雷达或 Windy。']);if(a.vis&&a.vis<5000)out.push(['watch','能见度偏低，雾、低云或降水都可能影响观察。']);if(a.pressure<1000)out.push(['watch','海平面气压偏低，注意后续天气系统变化。']);if(!out.length)out.push(['','当前主要指标没有明显异常，但小地点预报仍建议交叉查看模型。']);return out}
function render(){const g=state.geo,d=state.data,c=d.current,h=d.hourly,day=d.daily;const temp24=h.temperature_2m.slice(0,24),rain24=h.precipitation_probability.slice(0,24),wind24=h.wind_gusts_10m.slice(0,24);const a={gust:Math.max(...wind24),rain:Math.max(...rain24),vis:Math.min(...h.visibility.slice(0,24)),pressure:c.pressure_msl};const hours=h.time.filter((_,i)=>i<24&&i%3===0).map((t,i)=>{const k=i*3;return`<div class="hour"><b>${new Date(t).getHours()}时</b><span>${val(h.apparent_temperature[k],'°')}</span><span>雨 ${val(h.precipitation_probability[k],'%')}</span></div>`}).join('');$('#main').innerHTML=`<section class="weather"><div class="obs"><div class="place"><div><div class="kicker">${g.source||'定位'}</div><h2>${g.name}</h2><p>${g.admin||'小地点'} · ${g.lat.toFixed(4)}, ${g.lon.toFixed(4)}</p></div><div class="stamp">更新<br>${nowISO()}</div></div><div class="tempLine"><div class="temp">${val(c.temperature_2m,'°')}</div><div class="condition"><b>${WMO[c.weather_code]||'天气'}</b><span>体感 ${val(c.apparent_temperature,'°')}</span><span>湿度 ${val(c.relative_humidity_2m,'%')}</span></div></div></div><div class="metrics"><div class="metric"><b>${val(c.wind_speed_10m,' km/h')}</b><span>当前风速</span></div><div class="metric"><b>${val(c.wind_gusts_10m,' km/h')}</b><span>当前阵风</span></div><div class="metric"><b>${val(c.pressure_msl,' hPa')}</b><span>海平面气压</span></div><div class="metric"><b>${val(day.uv_index_max[0])}</b><span>今日 UV</span></div></div></section><section class="section grid two"><article class="card"><h3>24 小时温度曲线</h3><div class="sub">温度和体感不要只看当前值，趋势更重要。</div><div class="chart">${chart(temp24,'oklch(57% .13 235)')}</div></article><article class="card"><h3>逐小时窗口</h3><div class="timeline">${hours}</div></article></section><section class="section grid two"><article class="card"><h3>风场读数</h3><div class="sub">风向 ${val(c.wind_direction_10m,'°')}，阵风峰值 ${val(a.gust,' km/h')}。</div><div class="windRose" style="--deg:${c.wind_direction_10m||0}deg"><span class="needle"></span></div></article><article class="card"><h3>降水与能见度</h3><div class="metrics" style="grid-template-columns:1fr 1fr;background:transparent;gap:8px"><div class="metric"><b>${val(a.rain,'%')}</b><span>24h 最大降水概率</span></div><div class="metric"><b>${val(a.vis/1000,' km')}</b><span>最低能见度</span></div></div><div class="chart" style="margin-top:10px">${chart(rain24,'oklch(70% .12 208)')}</div></article></section><section class="section grid two"><article class="card"><h3>专业解释</h3><div class="explain">${explain(a).map(([c,t])=>`<div><span class="dot ${c}"></span><span>${t}</span></div>`).join('')}</div></article><article class="card"><h3>气压与湿度</h3><div class="metrics" style="grid-template-columns:1fr 1fr;background:transparent;gap:8px"><div class="metric"><b>${val(c.pressure_msl,' hPa')}</b><span>当前气压</span></div><div class="metric"><b>${val(h.dew_point_2m[0],'°')}</b><span>露点</span></div></div><div class="sub" style="margin-top:10px">露点接近气温时，雾、低云和闷湿体感更容易出现。</div></article><article class="card"><h3>7 日趋势</h3><div class="timeline">${day.time.map((t,i)=>`<div class="hour"><b>${new Date(t).getMonth()+1}/${new Date(t).getDate()}</b><span>${val(day.temperature_2m_min[i],'°')} / ${val(day.temperature_2m_max[i],'°')}</span><span>雨 ${val(day.precipitation_probability_max[i],'%')}</span></div>`).join('')}</div></article></section><section class="section"><div class="sources"><a class="source" target="_blank" href="https://www.windy.com/?${g.lat},${g.lon},8"><div><b>Windy</b><span>风场、雷达、模型切换</span></div><span>打开</span></a><a class="source" target="_blank" href="https://www.meteoblue.com/"><div><b>Meteoblue</b><span>多模型、meteogram、山地参考</span></div><span>打开</span></a><a class="source" href="route-pro.html?q=${encodeURIComponent(g.name)}"><div><b>转到路径</b><span>只传地点，不混入气象判断</span></div><span>打开</span></a></div></section>`}
async function search(q=$('#q').value.trim()){if(!q){toast('先输入地点');return}$('#main').innerHTML='<div class="loader">正在定位小地点并读取专业气象字段...</div>';const g=await geocode(q);if(!g){$('#main').innerHTML='<div class="empty">没有找到这个地点。试试加上省份、景区名，或直接输入经纬度。</div>';return}state.geo=g;state.data=await weather(g);history.replaceState(null,'',`?q=${encodeURIComponent(q)}`);render()}
$('#form').addEventListener('submit',e=>{e.preventDefault();search()});['四姑娘山镇','雨崩村','哈巴村','独库公路','青海湖','冈仁波齐','墨脱','喀拉峻'].forEach(x=>$('#micro').insertAdjacentHTML('beforeend',`<button type="button" onclick="search('${x}')">${x}</button>`));const p=new URLSearchParams(location.search);if(p.get('q')){$('#q').value=p.get('q');search(p.get('q'))}
</script>
</body>
</html>
