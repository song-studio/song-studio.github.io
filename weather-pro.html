<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Serif+SC:wght@400;700&family=Jost:ital,wght@0,300;0,500;0,700;1,300&family=JetBrains+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>气象查询 · Song Studio</title>
<style>
/* ═══════════════════════════════════════════
   Grove Weather · 山野气象
   Dark forest immersive · warm cream text
   Inspired by nature, built for outdoors
   ═══════════════════════════════════════════ */
:root{
  --bg:#192B1B;
  --bg-elevated:#1E3320;
  --text:#D4CFBF;
  --text-dim:#A8A090;
  --text-muted:#6B6758;
  --ink:#EDE8DC;
  --accent:#C8524A;
  --accent-dim:rgba(200,82,74,.12);
  --accent-glow:rgba(200,82,74,.25);
  --cool:#7BA4B8;
  --cool-dim:rgba(123,164,184,.12);
  --warm:#D4943A;
  --warm-dim:rgba(212,148,58,.12);
  --green:#6B9E6F;
  --green-dim:rgba(107,158,111,.12);
  --rule:rgba(212,207,191,.08);
  --rule-strong:rgba(212,207,191,.15);
  --surface:#1E3320;
}
*{margin:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{background:var(--bg)}
body{
  font-family:'Jost','Noto Serif SC',-apple-system,sans-serif;
  font-weight:300;
  background:var(--bg);color:var(--text);
  min-height:100vh;-webkit-font-smoothing:antialiased;
  line-height:1.55;font-size:17px;text-wrap:pretty;
}
.wrap{max-width:780px;margin:0 auto;padding:0 24px 80px}

/* ── Search ── */
.search-bar{padding:28px 0 8px}
.search-box{
  display:flex;gap:0;align-items:center;
  border-bottom:1px solid var(--rule-strong);padding:0 0 8px;
  transition:border-color .3s;
}
.search-box:focus-within{border-bottom-color:var(--accent)}
.search-box input{
  flex:1;border:none;outline:none;font-size:1em;
  background:none;color:var(--text);padding:8px 0;min-width:0;
  font-family:'Jost','Noto Serif SC',sans-serif;font-weight:300;
}
.search-box input::placeholder{color:var(--text-muted)}
.search-box button{
  flex-shrink:0;background:var(--accent);color:#FFF;
  border:none;padding:8px 20px;font-size:.7em;cursor:pointer;
  letter-spacing:.06em;font-weight:700;
  font-family:'Jost','Noto Serif SC',sans-serif;
  transition:all .2s;
}
.search-box button:hover{background:#E06A5E}
.search-hint{font-size:.54em;color:var(--text-muted);margin-top:6px}
.suggestions{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.sug-chip{
  font-size:.55em;padding:4px 12px;background:none;cursor:pointer;
  color:var(--text-dim);border:1px solid var(--rule-strong);
  font-weight:300;transition:all .2s;
}
.sug-chip:hover{background:var(--accent);color:#FFF;border-color:var(--accent)}

/* ── Status ── */
.status{text-align:center;padding:120px 0;color:var(--text-muted)}
.status.error{color:var(--accent)}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--rule-strong);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ═══ SITE HEADER ═══ */
.site-header{padding:8px 0 0}
.site-header h1{font-size:.9em;font-weight:500;letter-spacing:.06em;color:var(--ink);text-transform:uppercase;font-family:'Jost','Noto Serif SC',sans-serif}
.site-header .loc{font-size:.5em;color:var(--text-muted);margin-top:4px;font-family:'JetBrains Mono',monospace}
.src-bar{
  display:flex;gap:16px;flex-wrap:wrap;
  padding:6px 0 16px;font-size:.46em;color:var(--text-muted);
  letter-spacing:.06em;font-family:'JetBrains Mono',monospace;
}
.src-bar .dot{width:5px;height:5px;display:inline-block;margin-right:5px;vertical-align:middle;border-radius:50%}
.dot.om{background:var(--accent)}.dot.wy{background:var(--cool)}.dot.mb{background:var(--green)}

/* ═══ HERO · Massive temperature ═══ */
.hero-block{
  text-align:center;padding:36px 0 44px;
  position:relative;
}
.hero-block .hero-loc{
  font-size:.56em;color:var(--accent);font-weight:500;
  letter-spacing:.12em;text-transform:uppercase;
  font-family:'Jost','Noto Serif SC',sans-serif;
  margin-bottom:12px;
}
.hero-block .hero-temp{
  font-size:clamp(5.5em,13vw,8em);font-weight:400;line-height:.85;
  letter-spacing:-.04em;color:var(--ink);
  font-family:'Playfair Display','Noto Serif SC',Georgia,serif;
  display:block;
}
.hero-block .hero-label{
  font-size:.64em;color:var(--text-dim);margin-top:10px;display:block;
  font-weight:300;line-height:1.6;
}
.hero-block .hero-label em{font-style:italic;font-weight:400;color:var(--accent);font-family:'Playfair Display','Noto Serif SC',Georgia,serif}

/* ═══ STAT STRIP ═══ */
.stat-strip{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:1px;background:var(--rule-strong);
  margin-bottom:40px;
}
@media(max-width:500px){.stat-strip{grid-template-columns:repeat(2,1fr)}}
.stat-strip .ss-item{
  padding:18px 14px;text-align:left;
  background:var(--bg-elevated);
}
.stat-strip .ssv{font-size:1.4em;font-weight:700;color:var(--ink);display:block;letter-spacing:-.02em;font-family:'Jost',sans-serif}
.stat-strip .ssv small{font-size:.46em;font-weight:300;color:var(--text-dim);margin-left:3px}
.stat-strip .ssl{font-size:.44em;color:var(--text-muted);margin-top:4px;display:block;text-transform:uppercase;letter-spacing:.1em;font-weight:500;font-family:'JetBrains Mono',monospace}

/* ═══ SECTION TITLE ═══ */
.sec-title{
  font-size:.48em;color:var(--accent);margin:44px 0 18px;
  letter-spacing:.16em;text-transform:uppercase;font-weight:500;
  font-family:'JetBrains Mono',monospace;
  display:flex;align-items:center;gap:12px;
}
.sec-title::after{content:'';flex:1;height:1px;background:var(--rule-strong)}

/* ═══ OUTDOOR INDICES ═══ */
.outdoor{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:1px;background:var(--rule-strong);
}
@media(max-width:700px){.outdoor{grid-template-columns:1fr 1fr}}
@media(max-width:440px){.outdoor{grid-template-columns:1fr}}
.oc{
  padding:20px 16px;background:var(--bg-elevated);
  display:flex;flex-direction:column;gap:4px;
  transition:background .2s;
}
.oc:hover{background:#223625}
.oc.feature{
  grid-column:1/-1;
  display:grid;grid-template-columns:1fr auto;
  align-items:center;gap:12px 24px;
  background:var(--accent-dim);
}
@media(max-width:500px){.oc.feature{grid-template-columns:1fr}}
.oc .oh{font-size:.62em;font-weight:500;color:var(--ink);letter-spacing:.02em}
.oc.feature .oh{color:var(--accent);font-size:.66em}
.oc .ov{font-size:.82em;font-weight:500;color:var(--ink)}
.oc .od{font-size:.48em;color:var(--text-dim);line-height:1.7;font-weight:300}
.oe{display:inline-block;padding:2px 8px;font-size:.64em;font-weight:700;letter-spacing:.04em;text-transform:uppercase;font-family:'JetBrains Mono',monospace}
.oe.good{background:var(--green-dim);color:var(--green)}
.oe.warn{background:var(--warm-dim);color:var(--warm)}
.oe.bad{background:var(--accent-dim);color:var(--accent)}

/* ═══ DAY FILMSTRIP ═══ */
.days{
  display:flex;overflow-x:auto;gap:1px;
  -webkit-overflow-scrolling:touch;
  background:var(--rule-strong);
}
.days::-webkit-scrollbar{height:2px}.days::-webkit-scrollbar-thumb{background:var(--accent)}
.day-card{
  flex:0 0 auto;min-width:96px;
  padding:16px 8px;text-align:center;
  cursor:pointer;transition:all .15s;user-select:none;
  background:var(--bg-elevated);
}
.day-card:hover{background:#223625}
.day-card.active{background:var(--accent);color:#FFF}
.day-card.active .dow,.day-card.active .temps{color:#FFF}
.day-card.active .lo,.day-card.active .date,.day-card.active .tag{color:rgba(255,255,255,.5)}
.day-card .dow{font-size:.54em;font-weight:500;text-transform:uppercase;letter-spacing:.04em;color:var(--ink)}
.day-card .date{font-size:.48em;color:var(--text-muted);margin-bottom:3px;font-family:'JetBrains Mono',monospace}
.day-card .icon{font-size:1.1em;margin:3px 0;display:block}
.day-card .temps{font-size:.74em;font-weight:700;color:var(--ink);font-family:'Jost',sans-serif}
.day-card .temps .lo{color:var(--text-dim);font-weight:300;margin-left:2px}
.day-card .rain-bar{margin-top:3px;height:2px;background:var(--rule);overflow:hidden}
.day-card .rain-bar .fill{height:100%;background:var(--cool)}
.day-card .tag{font-size:.42em;color:var(--text-dim);margin-top:2px;font-weight:300}

/* ═══ DETAIL ═══ */
.detail{display:none;margin-top:24px}
.detail.show{display:block}
.detail h3{
  font-size:.76em;margin-bottom:14px;color:var(--ink);
  font-weight:500;letter-spacing:.02em;
  padding-bottom:10px;border-bottom:1px solid var(--rule-strong);
  font-family:'Playfair Display','Noto Serif SC',Georgia,serif;
}
.dg{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--rule-strong)}
@media(max-width:480px){.dg{grid-template-columns:repeat(2,1fr)}}
.di{padding:14px 10px;text-align:center;background:var(--bg-elevated)}
.di .l{font-size:.44em;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;font-weight:500;font-family:'JetBrains Mono',monospace}
.di .v{font-size:.82em;font-weight:700;margin-top:4px;color:var(--ink)}

/* ── Hourly strip ── */
.hs-wrap{margin-top:20px}
.hs-label{font-size:.48em;color:var(--text-muted);margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;font-family:'JetBrains Mono',monospace}
.hs{display:flex;overflow-x:auto;gap:1px;-webkit-overflow-scrolling:touch;background:var(--rule-strong)}
.hs::-webkit-scrollbar{height:2px}.hs::-webkit-scrollbar-thumb{background:var(--accent)}
.hc{
  flex:0 0 auto;min-width:50px;text-align:center;padding:10px 3px;
  font-size:.46em;background:var(--bg-elevated);
}
.hc.nw{background:var(--accent);color:#FFF}
.hc.nw .r{color:rgba(255,255,255,.5)}
.hc .h{font-weight:700;margin-bottom:2px;display:block;font-size:1.05em;font-family:'JetBrains Mono',monospace}
.hc .t{font-weight:700;display:block;margin:2px 0;font-family:'Jost',sans-serif}
.hc .r{color:var(--cool);font-size:.9em}

/* ── Chart ── */
.chart-wrap{margin-top:16px;width:100%;overflow-x:auto}
.chart-wrap svg{min-width:500px;width:100%;height:auto}

/* ═══ WINDY ═══ */
.extern{margin:36px 0}
.extern h4{
  font-size:.48em;color:var(--text-muted);margin-bottom:10px;
  letter-spacing:.12em;text-transform:uppercase;font-weight:500;
  font-family:'JetBrains Mono',monospace;
}
.windy-box{overflow:hidden;height:360px;border:1px solid var(--rule-strong)}
.windy-box iframe{width:100%;height:100%;border:0}
@media(max-width:480px){.windy-box{height:220px}}
.ext-links{display:flex;gap:1px;background:var(--rule-strong)}
.ext-link{
  flex:1;padding:16px;text-align:center;text-decoration:none;
  color:var(--ink);font-size:.56em;transition:all .2s;font-weight:300;
  background:var(--bg-elevated);
}
.ext-link:hover{background:var(--accent-dim);color:var(--accent)}

footer{
  text-align:center;padding:48px 0 0;color:var(--text-muted);
  font-size:.5em;letter-spacing:.04em;font-weight:300;
}
footer a{color:var(--text-dim);text-decoration:none}
footer a:hover{color:var(--accent)}
.hidden{display:none}
</style>

<script>
// ── State ────────────────────────────────────────────
let STATE={lat:39.90,lon:116.40,name:'北京',country:'中国',elev:55,admin:'北京',data:null};
const WMO={0:{i:'☀️',l:'晴'},1:{i:'🌤️',l:'少云'},2:{i:'⛅',l:'多云'},3:{i:'☁️',l:'阴'},45:{i:'🌫️',l:'雾'},48:{i:'🌫️',l:'冻雾'},51:{i:'🌧️',l:'小雨'},53:{i:'🌧️',l:'中雨'},55:{i:'🌧️',l:'大雨'},56:{i:'🌧️',l:'冻雨'},57:{i:'🌧️',l:'冻雨'},61:{i:'🌦️',l:'小阵雨'},63:{i:'🌧️',l:'中阵雨'},65:{i:'🌧️',l:'大阵雨'},66:{i:'🌧️',l:'冻雨'},67:{i:'🌧️',l:'冻雨'},71:{i:'❄️',l:'小雪'},73:{i:'❄️',l:'中雪'},75:{i:'❄️',l:'大雪'},77:{i:'❄️',l:'雪粒'},80:{i:'🌦️',l:'阵雨'},81:{i:'🌦️',l:'中阵雨'},82:{i:'🌧️',l:'大阵雨'},85:{i:'❄️',l:'小阵雪'},86:{i:'❄️',l:'大阵雪'},95:{i:'⛈️',l:'雷暴'},96:{i:'⛈️',l:'雷暴冰雹'},99:{i:'⛈️',l:'强雷暴冰雹'}};
function w(c){return WMO[c]||{i:'🌥️',l:'未知'}}
const WK=['周日','周一','周二','周三','周四','周五','周六'];
const AMAP_KEY='39a8c2f6ef75e494198f3e3751701ebe';

// GCJ-02 → WGS-84 (Amap coords → OSM/Open-Meteo compatibility)
function gcj2wgs(lng,lat){
  const PI=Math.PI,a=6378245,ee=0.006693421622965943;
  function tx(x,y){let r=300+x+2*y+0.1*x*x+0.1*x*y+0.1*Math.sqrt(Math.abs(x));r+=(20*Math.sin(6*x*PI)+20*Math.sin(2*x*PI))*2/3;r+=(20*Math.sin(x*PI)+40*Math.sin(x/3*PI))*2/3;r+=(150*Math.sin(x/12*PI)+300*Math.sin(x/30*PI))*2/3;return r}
  function ty(x,y){let r=-100+2*x+3*y+0.2*y*y+0.1*x*y+0.2*Math.sqrt(Math.abs(x));r+=(20*Math.sin(6*x*PI)+20*Math.sin(2*x*PI))*2/3;r+=(20*Math.sin(y*PI)+40*Math.sin(y/3*PI))*2/3;r+=(160*Math.sin(y/12*PI)+320*Math.sin(y*PI/30))*2/3;return r}
  const dlng=tx(lng-105,lat-35),dlat=ty(lng-105,lat-35);
  const radLat=lat/180*PI,magic=1-ee*Math.sin(radLat)*Math.sin(radLat);
  return[lng-dlng*180/(a/Math.sqrt(magic)*Math.cos(radLat)*PI),lat-dlat*180/(a*(1-ee)/(magic*Math.sqrt(magic))*PI)];
}

// ── Geocode (高德 + Open-Meteo 双源) ──────────────────
async function geocode(q){
  const hasLatin=/[a-zA-Z]/.test(q);

  async function omGeo(){
    try{
      const r=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=1&language=zh&format=json`);
      const d=await r.json();
      if(d.results&&d.results.length)return d.results[0];
    }catch(e){}
    return null;
  }

  // Latin-script → Open-Meteo
  if(hasLatin){
    const om=await omGeo();
    if(om)return{latitude:om.latitude,longitude:om.longitude,name:om.name||q,country:om.country||'',admin1:om.admin1||'',elevation:0};
    return null;
  }

  // Chinese → Amap geocode
  const amapR=await fetch(`https://restapi.amap.com/v3/geocode/geo?key=${AMAP_KEY}&address=${encodeURIComponent(q)}`).then(r=>r.json());
  if(!amapR.geocodes||!amapR.geocodes.length){
    const om=await omGeo();
    if(om)return{latitude:om.latitude,longitude:om.longitude,name:om.name||q,country:om.country||'',admin1:om.admin1||'',elevation:0};
    return null;
  }

  function fmt(g){
    const [lng,lat]=g.location.split(',').map(Number);
    const [wgsLng,wgsLat]=gcj2wgs(lng,lat);
    let short=g.name||q;
    if(!g.name&&g.formatted_address){
      const parts=g.formatted_address.split(/省|市|区|县|自治州/);
      short=parts[parts.length-1]||g.formatted_address;
    }
    let admin=g.province||g.city||'';
    if(g.city&&g.city!==g.province)admin=g.city;
    return{
      latitude:wgsLat,longitude:wgsLng,
      name:short,country:g.country||'中国',
      admin1:admin,elevation:0,
      rawLat:lat,rawLng:lng
    };
  }

  // Single result → use directly
  if(amapR.geocodes.length===1)return fmt(amapR.geocodes[0]);

  // Multiple results → use input tips to find the right province
  try{
    const tipsR=await fetch(`https://restapi.amap.com/v3/assistant/inputtips?key=${AMAP_KEY}&keywords=${encodeURIComponent(q)}`);
    const tipsD=await tipsR.json();
    if(tipsD.tips&&tipsD.tips.length){
      const tip=tipsD.tips.find(t=>t.district&&t.district.length>0);
      if(tip){
        const match=amapR.geocodes.find(g=>g.province&&tip.district.includes(g.province));
        if(match)return fmt(match);
      }
    }
  }catch(e){}

  // Fallback: first geocode result
  return fmt(amapR.geocodes[0]);
}

async function fetchWeather(lat,lon){
  const u=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,pressure_msl&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,precipitation_sum,weather_code,wind_speed_10m_max,wind_direction_10m_dominant,uv_index_max,sunshine_duration,sunrise,sunset,pressure_msl_max,visibility_max&hourly=temperature_2m,apparent_temperature,precipitation_probability,weather_code,wind_speed_10m,relative_humidity_2m,uv_index,cloud_cover,dew_point_2m,pressure_msl&timezone=auto&forecast_days=4`;
  const c=new AbortController();
  const t=setTimeout(()=>c.abort(),12000);
  try{const r=await fetch(u,{signal:c.signal});clearTimeout(t);return await r.json();}
  catch(e){clearTimeout(t);throw e;}
}

async function initFromParams(){
  const p=new URLSearchParams(location.search);

    document.getElementById('q').value=q;

    STATE.lat=geo.latitude;STATE.lon=geo.longitude;STATE.name=geo.name;STATE.country=geo.country||'';
    STATE.admin=geo.admin1||'';STATE.elev=geo.elevation||0;

}

// ── Moon phase (0=new, 0.25=firstQ, 0.5=full, 0.75=lastQ) ──
function moonPhase(date){
  const d=new Date(date+'T12:00');const y=d.getFullYear(),m=d.getMonth()+1,dy=d.getDate();
  let yy=y;if(m<3){yy--;}
  const c=Math.floor(yy/100);const e=Math.floor(c/4);const f=2-e+Math.floor((8*c+13)/25);
  const g=Math.floor(365.25*(yy+4716))+Math.floor(30.6001*((m<3?m+12:m)+1))+dy+f-1524;
  const jd=g+2451556.1;const n=(jd-2451550.1)/29.53058867;
  return(n-Math.floor(n));
}
function moonEmoji(p){
  if(p<.03||p>.97)return'🌑';
  if(p<.22)return'🌒';if(p<.28)return'🌓';if(p<.47)return'🌔';
  if(p<.53)return'🌕';if(p<.72)return'🌖';if(p<.78)return'🌗';return'🌘';
}

function render(){

  const now=d.current;

  // ── Compute all indices ──
  const maxRain=Math.max(...today.precipitation_probability_max);
  const avgWind=Math.round(today.wind_speed_10m_max.reduce((a,b)=>a+b,0)/6);
  const avgVis=Math.round(today.visibility_max.reduce((a,b)=>a+b,0)/6/1000);
  const maxUV=Math.max(...today.uv_index_max);
  const totalRain=today.precipitation_sum.reduce((a,b)=>a+b,0).toFixed(1);
  const sunshineH=(today.sunshine_duration[0]/3600).toFixed(1);

  // 1. Hiking 徒步
  let hikeS=10,hikeL='极佳',hikeC='good';
  if(maxRain>80)hikeS-=4;else if(maxRain>50)hikeS-=2;
  if(avgWind>30)hikeS-=2;else if(avgWind>15)hikeS-=1;
  if(avgVis<2)hikeS-=2;else if(avgVis<5)hikeS-=1;
  if(maxUV>10)hikeS-=1;
  if(hikeS>=8){hikeL='极佳';hikeC='good'}else if(hikeS>=6){hikeL='适宜';hikeC='good'}else if(hikeS>=4){hikeL='可出行';hikeC='warn'}else{hikeL='不建议';hikeC='bad'}

  // 2. Comfort 体感
  const comfortT=now.apparent_temperature;
  let comfortL='舒适',comfortC='good';
  if(comfortT<5){comfortL='偏冷';comfortC='warn'}else if(comfortT>32){comfortL='炎热';comfortC='bad'}else if(comfortT>28){comfortL='偏热';comfortC='warn'}

  // 3. UV
  let uvL='安全',uvC='good';
  if(maxUV>10){uvL='极高风险';uvC='bad'}else if(maxUV>7){uvL='高风险';uvC='warn'}else if(maxUV>5){uvL='中等';uvC='warn'}else if(maxUV>2){uvL='低风险';uvC='good'}

  // 4. Best window
  let bestH=0,bestScore=999;
  for(let i=0;i<Math.min(48,hrs.time.length);i++){
    const s=hrs.precipitation_probability[i]*2+Math.abs(hrs.temperature_2m[i]-22)*3+(hrs.cloud_cover?hrs.cloud_cover[i]:0)/10;
    if(s<bestScore){bestScore=s;bestH=i;}
  }

  // 5. Camping 露营 — night temp + wind + rain
  const nightT=Math.min(...hrs.temperature_2m.slice(0,24).filter((_,i)=>i%24>=20||i%24<6));
  let campS=10,campL='极佳',campC='good';
  if(nightT<5)campS-=4;else if(nightT<10)campS-=2;
  if(maxRain>60)campS-=3;else if(maxRain>30)campS-=1;
  if(avgWind>25)campS-=2;else if(avgWind>12)campS-=1;
  if(campS>=8){campL='极佳';campC='good'}else if(campS>=6){campL='适宜';campC='good'}else if(campS>=4){campL='勉强';campC='warn'}else{campL='不建议';campC='bad'}

  // 6. Stargazing 观星 — cloud + moon + light
  const nightCloud=hrs.cloud_cover?hrs.cloud_cover.filter((_,i)=>i%24>=20||i%24<6).reduce((a,b)=>a+b,0)/8:50;
  const mp=moonPhase(today.time[0]);
  let starS=10,starL='极佳',starC='good';
  if(nightCloud>80)starS-=5;else if(nightCloud>50)starS-=3;else if(nightCloud>30)starS-=1;
  if(mp>.3&&mp<.7)starS-=4;else if(mp>.2&&mp<.8)starS-=2;
  if(starS>=8){starL='极佳';starC='good'}else if(starS>=5){starL='尚可';starC='good'}else if(starS>=3){starL='较差';starC='warn'}else{starL='不宜';starC='bad'}

  // 7. Photography 摄影 — golden/blue hour
  const sunrise=today.sunrise[0]?today.sunrise[0].slice(11,16):'06:30';
  const sunset=today.sunset[0]?today.sunset[0].slice(11,16):'18:30';

  if(dayCloud>80){photoL='不佳';photoC='bad'}else if(dayCloud>50){photoL='一般';photoC='warn'}else if(dayCloud<20){photoL='极佳';photoC='good'}

  // 8. Fishing 钓鱼 — pressure trend + wind
  const pNow=now.pressure_msl||1013;
  const pLater=hrs.pressure_msl?hrs.pressure_msl[6]:pNow;
  const pTrend=pLater>pNow+2?'↗上升':pLater<pNow-2?'↘下降':'→平稳';
  let fishS=10,fishL='极佳',fishC='good';
  if(pTrend.includes('下降'))fishS-=3;
  if(avgWind>20)fishS-=2;else if(avgWind>12)fishS-=1;
  if(maxRain>60)fishS-=2;else if(maxRain>30)fishS-=1;
  if(fishS>=8){fishL='极佳';fishC='good'}else if(fishS>=6){fishL='适宜';fishC='good'}else if(fishS>=4){fishL='一般';fishC='warn'}else{fishL='不宜';fishC='bad'}

  // 9. Climbing 攀岩 — rain + wind + temp
  let climbS=10,climbL='极佳',climbC='good';
  if(maxRain>50)climbS-=4;else if(maxRain>20)climbS-=2;
  if(avgWind>25)climbS-=3;else if(avgWind>15)climbS-=1;
  if(now.temperature_2m>35||now.temperature_2m<0)climbS-=3;else if(now.temperature_2m>30||now.temperature_2m<5)climbS-=1;
  if(climbS>=8){climbL='极佳';climbC='good'}else if(climbS>=6){climbL='适宜';climbC='good'}else if(climbS>=4){climbL='勉强';climbC='warn'}else{climbL='不建议';climbC='bad'}

  // Altitude adjustment
  const alt=STATE.elev||0;
  const altNote=alt>2500?'⛰️ 高海拔：UV增强~20%，温度较平原偏低，注意高反':alt>1500?'⛰️ 中高海拔：UV偏强，温差大':'';

  const html=`
<div class="site-header">
  <h1>${locName}</h1>
  <div class="loc">${STATE.lat.toFixed(2)}°N ${STATE.lon.toFixed(2)}°E · ${alt||'~'}m</div>
</div>

<div class="hero-block">
  <div class="hero-loc">${STATE.admin||''} · ${STATE.country||''}</div>
  <span class="hero-temp">${now.temperature_2m.toFixed(1)}°</span>
  <div class="hero-label">${w(now.weather_code).i} <em>${w(now.weather_code).l}</em> · 体感 ${now.apparent_temperature.toFixed(1)}°</div>
</div>

<div class="stat-strip">

  <div class="ss-item"><span class="ssv">${now.relative_humidity_2m}<small>%</small></span><span class="ssl">湿度</span></div>
  <div class="ss-item"><span class="ssv">${sunshineH}<small>h</small></span><span class="ssl">日照</span></div>
  <div class="ss-item"><span class="ssv">${today.precipitation_sum[0]}<small>mm</small></span><span class="ssl">降水量</span></div>
</div>

<div class="sec-title">Outdoor Index · 户外指数</div>
<div class="outdoor">
  <div class="oc feature">
    <div><div class="oh">徒步适宜度</div><div class="od">降雨概率 ${maxRain}% · 风速 ${avgWind}km/h · 能见度 ${avgVis}km · UV ${maxUV}</div></div>
    <div class="ov" style="text-align:right"><span class="oe ${hikeC}">${hikeL}</span> ${hikeS} / 10</div>
  </div>
  <div class="oc"><div class="oh">露营</div><div class="ov"><span class="oe ${campC}">${campL}</span> ${campS}/10</div><div class="od">夜间 ${nightT.toFixed(0)}° · 雨${maxRain}% · 风${avgWind}km/h</div></div>
  <div class="oc"><div class="oh">观星</div><div class="ov"><span class="oe ${starC}">${starL}</span> ${starS}/10</div><div class="od">云量${nightCloud.toFixed(0)}% · 月相${moonEmoji(mp)}</div></div>
  <div class="oc"><div class="oh">摄影</div><div class="ov"><span class="oe ${photoC}">${photoL}</span></div><div class="od">日出${sunrise} · 日落${sunset} · 云${dayCloud.toFixed(0)}%</div></div>
  <div class="oc"><div class="oh">钓鱼</div><div class="ov"><span class="oe ${fishC}">${fishL}</span> ${fishS}/10</div><div class="od">气压${pTrend} ${Math.round(pNow)}hPa · 风${avgWind}km/h</div></div>
  <div class="oc"><div class="oh">攀岩</div><div class="ov"><span class="oe ${climbC}">${climbL}</span> ${climbS}/10</div><div class="od">雨${maxRain}% · 风${avgWind}km/h · ${now.temperature_2m.toFixed(0)}°</div></div>
  <div class="oc"><div class="oh">UV · 紫外线</div><div class="ov"><span class="oe ${uvC}">${uvL}</span> UV${maxUV}</div><div class="od">${maxUV>7?'SPF30+ · 遮阳帽 · 墨镜':maxUV>5?'建议防晒':'无需防护'}${altNote?' · '+altNote:''}</div></div>
  <div class="oc"><div class="oh">Comfort · 体感</div><div class="ov"><span class="oe ${comfortC}">${comfortL}</span> ${comfortT.toFixed(1)}°</div><div class="od">湿度${now.relative_humidity_2m}% · ${comfortT<10?'厚外套':comfortT>30?'防暑降温':'宜出行'}</div></div>
  <div class="oc"><div class="oh">最佳窗口</div><div class="ov">${hrs.time[bestH].slice(5,10)} ${hrs.time[bestH].slice(11,16)}</div><div class="od">48h最优时段 · 累计降水${totalRain}mm</div></div>
</div>

function dailyW(i){
  return STATE.data.daily.weather_code[i];
}

function windDir(d){
  const dirs=['北','东北','东','东南','南','西南','西','西北'];
  return dirs[Math.round(d/45)%8];
}

function uvLabel(v){
  if(v<3)return'低';if(v<6)return'中';if(v<8)return'高';if(v<11)return'很高';return'极高';
}
function visLabel(m){
  if(m>10000)return'优秀';if(m>5000)return'良好';if(m>2000)return'一般';if(m>500)return'较差';return'极差';
}

function buildDays(){
  const daysEl=document.getElementById('days');
  if(!daysEl)return;
  const today=STATE.data.daily;
  today.time.forEach((d,i)=>{
    const dt=new Date(d+'T12:00');
    const wc=w(today.weather_code[i]);
    const c=document.createElement('div');
    c.className='day-card'+(i===0?' active':'');
    c.dataset.idx=i;
    c.innerHTML=`<div class="dow">${i===0?'今天':WK[dt.getDay()]}</div><div class="date">${(dt.getMonth()+1)+'/'+dt.getDate()}</div><span class="icon">${wc.i}</span><div class="temps"><span>${today.temperature_2m_max[i]}°</span><span class="lo">${today.temperature_2m_min[i]}°</span></div><div class="rain-bar"><div class="fill" style="width:${today.precipitation_probability_max[i]}%"></div></div><div class="tag">${wc.l} · 雨${today.precipitation_probability_max[i]}%</div>`;
    c.onclick=()=>showDetail(i);
    daysEl.appendChild(c);
  });
}

function showDetail(i){
  document.querySelectorAll('.day-card').forEach((c,j)=>c.classList.toggle('active',j===i));
  const today=STATE.data.daily;
  const dt=new Date(today.time[i]+'T12:00');
  const wc=w(today.weather_code[i]);
  const panel=document.getElementById('detail');
  if(!panel)return;
  panel.classList.add('show');
  document.getElementById('detail-title').textContent=`${i===0?'今天':WK[dt.getDay()]} ${(dt.getMonth()+1)+'月'+dt.getDate()+'日'} · ${wc.l}`;
  document.getElementById('detail-grid').innerHTML=`
    <div class="di"><div class="l">最高/低温</div><div class="v">${today.temperature_2m_max[i]}° / ${today.temperature_2m_min[i]}°</div></div>
    <div class="di"><div class="l">降雨概率</div><div class="v" style="color:var(--cool)">${today.precipitation_probability_max[i]}%</div></div>
    <div class="di"><div class="l">降水量</div><div class="v">${today.precipitation_sum[i]} mm</div></div>
    <div class="di"><div class="l">UV 峰值</div><div class="v" style="color:var(--warm)">${today.uv_index_max[i]} · ${uvLabel(today.uv_index_max[i])}</div></div>
    <div class="di"><div class="l">日照时长</div><div class="v">${(today.sunshine_duration[i]/3600).toFixed(1)} h</div></div>
    <div class="di"><div class="l">风速</div><div class="v">${today.wind_speed_10m_max[i]} km/h</div></div>
    <div class="di"><div class="l">风向</div><div class="v">${windDir(today.wind_direction_10m_dominant[i])}</div></div>
    <div class="di"><div class="l">气压</div><div class="v">${today.pressure_msl_max[i]} hPa</div></div>
    <div class="di"><div class="l">能见度</div><div class="v">${(today.visibility_max[i]/1000).toFixed(1)} km</div></div>
  `;

  // Hourly strip
  const hrs=STATE.data.hourly;
  const s=i*24,e=s+24;
  const nowH=new Date().getHours();
  let hh='';
  for(let h=s;h<e;h++){
    const hour=h%24;
    const isNow=(i===0&&hour===nowH);
    hh+=`<div class="hc${isNow?' nw':''}">
      <span class="h">${String(hour).padStart(2,'0')}:00</span>
      <span class="t">${hrs.temperature_2m[h].toFixed(1)}°</span>
      <span class="r">${w(hrs.weather_code[h]).i} ${hrs.precipitation_probability[h]}%</span>
      <span style="font-size:.85em;color:var(--sub);display:block">体感${hrs.apparent_temperature[h].toFixed(1)}° · UV${hrs.uv_index[h].toFixed(1)}</span>
      <span style="font-size:.8em;color:var(--muted);display:block">☁️${(hrs.cloud_cover?hrs.cloud_cover[h]:'?')}% · 💧${(hrs.dew_point_2m?hrs.dew_point_2m[h].toFixed(1):'?')}°</span>
    </div>`;
  }
  document.getElementById('hourly-strip').innerHTML=hh;

  // Chart
  drawChart(s,e);
  // Detail shown above — user scrolls naturally
}

function drawChart(s,e){
  const temps=STATE.data.hourly.temperature_2m.slice(s,e);
  const feels=STATE.data.hourly.apparent_temperature.slice(s,e);
  const all=[...temps,...feels];
  const min=Math.floor(Math.min(...all))-1,max=Math.ceil(Math.max(...all))+1,range=max-min||1;
  const W=720,H=130,p=28;
  const toXY=(arr)=>{
    return arr.map((t,i)=>({x:p+(i/(arr.length-1))*(W-p*2),y:H-p-((t-min)/range)*(H-p*2),t}));
  };
  const pts=toXY(temps),ptsF=toXY(feels);
  const path=pts.map((x,i)=>(i===0?'M':'L')+x.x.toFixed(1)+','+x.y.toFixed(1)).join(' ');
  const pathF=ptsF.map((x,i)=>(i===0?'M':'L')+x.x.toFixed(1)+','+x.y.toFixed(1)).join(' ');
  let labels='';for(let h=0;h<24;h+=3)labels+=`<text x="${pts[h].x.toFixed(1)}" y="${H-6}" text-anchor="middle" font-size="9" fill="#556880">${h}h</text>`;
  let dots=pts.filter((_,i)=>i%3===0).map(p=>`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="2.5" fill="#e0a44e"/><text x="${p.x.toFixed(1)}" y="${p.y-7}" text-anchor="middle" font-size="9" font-weight="600" fill="#e4ecf4">${p.t.toFixed(1)}°</text>`).join('');
  document.getElementById('chart').innerHTML=`
    <text x="10" y="14" font-size="10" fill="#e0a44e">━ 实际温度</text>
    <text x="10" y="28" font-size="10" fill="#6b9fbd">━ 体感温度</text>
    <path d="${path}" fill="none" stroke="#e0a44e" stroke-width="2" stroke-linejoin="round"/>
    <path d="${pathF}" fill="none" stroke="#6b9fbd" stroke-width="1.5" stroke-dasharray="5,3" stroke-linejoin="round"/>
    ${dots}
    ${labels}
  `;
  document.getElementById('chart').setAttribute('viewBox',`0 0 ${W} ${H}`);
}
