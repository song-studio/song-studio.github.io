<style>

.wrap{max-width:760px;margin:0 auto;padding:16px 14px 50px;}

/* Search */
.search-bar{position:sticky;top:0;z-index:10;background:var(--bg);padding:8px 0 12px}
.search-box{display:flex;gap:8px;background:var(--card);border-radius:14px;padding:6px 6px 6px 16px;box-shadow:0 2px 8px rgba(0,0,0,.08);align-items:center}

.search-hint{font-size:.64em;color:#bbb;margin-top:6px;padding-left:4px}
.suggestions{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.sug-chip{font-size:.7em;padding:4px 10px;background:var(--card);border-radius:20px;cursor:pointer;color:var(--sub);box-shadow:var(--shadow)}

/* Status */
.status{text-align:center;padding:60px 0;color:var(--sub)}
.status.error{color:var(--warm)}
.spinner{display:inline-block;width:24px;height:24px;border:2px solid #ddd;border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}

.now-item{background:rgba(255,255,255,.15);border-radius:10px;padding:10px 8px;text-align:center}
.now-item .nv{font-size:1.1em;font-weight:600}
.now-item .nl{font-size:.64em;opacity:.75;margin-top:2px}

.oe{display:inline-block;padding:2px 8px;border-radius:12px;font-size:.72em;font-weight:600}
.oe.good{background:#e6f4ea;color:var(--green)}

.ext-links{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}

async function geocode(q){

    <div class="ov"><span class="oe ${comfortC}">${comfortL}</span> дљУжДЯ${comfortT.toFixed(1)}¬∞</div>
    <div class="od">дљУжДЯжЄ©еЇ¶зїЉеРИж∞ФжЄ©гАБжєњеЇ¶гАБй£ОйАЯиЃ°зЃЧгАВ${comfortT<10?'йЬАз©њеОЪе§Це•Ч':comfortT>30?'ж≥®жДПйШ≤жЪСйЩНжЄ©':'жЄ©еЇ¶йАВеЃЬеЗЇи°М'}</div>
  </div>
  <div class="oc">
    <div class="oh">вШАпЄП зіЂе§ЦзЇњй£ОйЩ©</div>
    <div class="ov"><span class="oe ${uvC}">${uvL}</span> UVе≥∞еАЉ${maxUV}</div>
    <div class="od">${maxUV>7?'йЬАSPF30+йШ≤жЩТйЬЬгАБйБЃйШ≥еЄљгАБеҐ®йХЬ':maxUV>5?'еїЇиЃЃжґВйШ≤жЩТйЬЬ':'жЧ†йЬАзЙєжЃКйШ≤жК§'}гАВйЂШжµЈжЛФеЬ∞еМЇзіЂе§ЦзЇњеБПеЉЇ</div>
  </div>
  <div class="oc">
    <div class="oh">вП∞ жЬАдљ≥жИЈе§Цз™ЧеП£</div>
    <div class="ov">${bestDate} ${bestTime}</div>
    <div class="od">48е∞ПжЧґеЖЕзїЉеРИжЄ©жєњй£ОйЫ®жЬАдЉШжЧґжЃµгАВзіѓиЃ°йЩНж∞і${totalRain}mmпЉМ${maxRain>80?'еїЇиЃЃеЃ§еЖЕжіїеК®':maxRain>50?'еЄ¶дЉЮеПѓеЗЇи°М':'еЗЇи°МжЧ†ењІ'}</div>
  </div>
</div>

<!-- 6-day cards -->
<div class="sec-title">рЯУЕ 6жЧ•йҐДжК• ¬Ј зВєеЗїжЯ•зЬЛйАРжЧґиѓ¶жГЕ</div>
<div class="days" id="days"></div>

<div class="detail" id="detail">
  <h3 id="detail-title"></h3>
  <div class="dg" id="detail-grid"></div>
  <div class="sun-row" id="sun-row"></div>
  <div class="hs-wrap">
    <div class="hs-label">24 е∞ПжЧґйАРжЧґ (жЄ©еЇ¶¬ЈйЩНйЫ®¬ЈUV¬ЈдљУжДЯ¬Јж∞ФеОЛ¬ЈдЇСйЗП¬ЈйЬ≤зВє) вАФ еЈ¶еП≥жїСеК®</div>
    <div class="hs" id="hourly-strip"></div>
  </div>
  <div class="chart-wrap"><svg id="chart"></svg></div>
</div>

<!-- Windy -->
<div class="extern">
  <h4>рЯМН Windy еЃЮжЧґй£ОеЬЇ & йЫЈиЊЊ</h4>
  <div class="windy-box">
    <iframe src="https://embed.windy.com/embed2.html?lat=${STATE.lat}&lon=${STATE.lon}&detailLat=${STATE.lat}&detailLon=${STATE.lon}&zoom=10&level=surface&overlay=wind&product=ecmwf&calendar=now&pressure=true&type=map&location=coordinates&detail=true&metricWind=km%2Fh&metricTemp=%C2%B0C&radarRange=-1" loading="lazy"></iframe>
  </div>
  <div class="ext-links">
    <a class="ext-link" href="https://www.windy.com/?${STATE.lat},${STATE.lon},10" target="_blank" rel="noopener">
      рЯФЧ <strong>Windy</strong> еЕ®еЫЊе±В<br><small style="color:var(--sub)">й£О¬ЈйЫ®¬ЈйЫЈ¬ЈжЄ©¬Јжµ™¬Јж∞ФеОЛ</small>
    </a>
    <a class="ext-link" href="https://www.meteoblue.com/en/weather/week/index?lat=${STATE.lat}&lon=${STATE.lon}" target="_blank" rel="noopener">
      рЯФЧ <strong>Meteoblue</strong> дЄУдЄЪйҐДжК•<br><small style="color:var(--sub)">зСЮе£Ђж®°еЮЛ¬Ј14е§©¬Је§Ъж®°еЉПеѓєжѓФ</small>
    </a>
  </div>
</div>
`;

  document.getElementById('main').innerHTML=html;

  // Build day cards
  buildDays();
  // Show first day detail
  showDetail(0);
  // Scroll to top
  window.scrollTo({top:0,behavior:'smooth'});
}

function dailyW(i){
  return STATE.data.daily.weather_code[i];
}

function windDir(d){
  const dirs=['еМЧ','дЄЬеМЧ','дЄЬ','дЄЬеНЧ','еНЧ','и•њеНЧ','и•њ','и•њеМЧ'];
  return dirs[Math.round(d/45)%8];
}

function uvLabel(v){
  if(v<3)return'дљО';if(v<6)return'дЄ≠';if(v<8)return'йЂШ';if(v<11)return'еЊИйЂШ';return'жЮБйЂШ';
}
function visLabel(m){
  if(m>10000)return'дЉШзІА';if(m>5000)return'иЙѓе•љ';if(m>2000)return'дЄАиИђ';if(m>500)return'иЊГеЈЃ';return'жЮБеЈЃ';
}

function buildDays(){
  const daysEl=document.getElementById('days');
  if(!daysEl)return;
  const today=STATE.data.daily;
  today.time.forEach((d,i)=>{
    const dt=new Date(d+'T12:00');
    const wc=w(today.weather_code[i]);
    const c=document.createElement('div');
    c.className='day-card'+(i===0?' active':'');
    c.dataset.idx=i;
    c.innerHTML=`<div class="dow">${i===0?'дїКе§©':WK[dt.getDay()]}</div><div class="date">${(dt.getMonth()+1)+'/'+dt.getDate()}</div><span class="icon">${wc.i}</span><div class="temps"><span>${today.temperature_2m_max[i]}¬∞</span><span class="lo">${today.temperature_2m_min[i]}¬∞</span></div><div class="rain-bar"><div class="fill" style="width:${today.precipitation_probability_max[i]}%"></div></div><div class="tag">${wc.l} ¬Ј йЫ®${today.precipitation_probability_max[i]}%</div>`;
    c.onclick=()=>showDetail(i);
    daysEl.appendChild(c);
  });
}

function showDetail(i){
  document.querySelectorAll('.day-card').forEach((c,j)=>c.classList.toggle('active',j===i));
  const today=STATE.data.daily;
  const dt=new Date(today.time[i]+'T12:00');
  const wc=w(today.weather_code[i]);
  const panel=document.getElementById('detail');
  if(!panel)return;
  panel.classList.add('show');
  document.getElementById('detail-title').textContent=`${i===0?'дїКе§©':WK[dt.getDay()]} ${(dt.getMonth()+1)+'жЬИ'+dt.getDate()+'жЧ•'} ¬Ј ${wc.l}`;
  document.getElementById('detail-grid').innerHTML=`
    <div class="di"><div class="l">жЬАйЂШ/дљОжЄ©</div><div class="v">${today.temperature_2m_max[i]}¬∞ / ${today.temperature_2m_min[i]}¬∞</div></div>
    <div class="di"><div class="l">йЩНйЫ®ж¶ВзОЗ</div><div class="v" style="color:var(--rain)">${today.precipitation_probability_max[i]}%</div></div>
    <div class="di"><div class="l">йЩНж∞ійЗП</div><div class="v">${today.precipitation_sum[i]} mm</div></div>
    <div class="di"><div class="l">UV е≥∞еАЉ</div><div class="v" style="color:var(--uv)">${today.uv_index_max[i]} ¬Ј ${uvLabel(today.uv_index_max[i])}</div></div>
    <div class="di"><div class="l">жЧ•зЕІжЧґйХњ</div><div class="v">${(today.sunshine_duration[i]/3600).toFixed(1)} h</div></div>
    <div class="di"><div class="l">й£ОйАЯ</div><div class="v">${today.wind_speed_10m_max[i]} km/h</div></div>
    <div class="di"><div class="l">й£ОеРС</div><div class="v">${windDir(today.wind_direction_10m_dominant[i])}</div></div>
    <div class="di"><div class="l">ж∞ФеОЛ</div><div class="v">${today.pressure_msl_max[i]} hPa</div></div>
    <div class="di"><div class="l">иГљиІБеЇ¶</div><div class="v">${(today.visibility_max[i]/1000).toFixed(1)} km</div></div>
  `;

  // Hourly strip
  const hrs=STATE.data.hourly;
  const s=i*24,e=s+24;
  const nowH=new Date().getHours();
  let hh='';
  for(let h=s;h<e;h++){
    const hour=h%24;
    const isNow=(i===0&&hour===nowH);
    hh+=`<div class="hc${isNow?' nw':''}">
      <span class="h">${String(hour).padStart(2,'0')}:00</span>
      <span class="t">${hrs.temperature_2m[h].toFixed(1)}¬∞</span>
      <span class="r">${w(hrs.weather_code[h]).i} ${hrs.precipitation_probability[h]}%</span>
      <span style="font-size:.85em;color:#999;display:block">дљУжДЯ${hrs.apparent_temperature[h].toFixed(1)}¬∞ ¬Ј UV${hrs.uv_index[h].toFixed(1)}</span>
      <span style="font-size:.8em;color:#bbb;display:block">вШБпЄП${(hrs.cloud_cover?hrs.cloud_cover[h]:'?')}% ¬Ј рЯТІ${(hrs.dew_point_2m?hrs.dew_point_2m[h].toFixed(1):'?')}¬∞</span>
    </div>`;
  }
  document.getElementById('hourly-strip').innerHTML=hh;

  // Chart
  drawChart(s,e);
  panel.scrollIntoView({behavior:'smooth',block:'center'});
}

function drawChart(s,e){
  const temps=STATE.data.hourly.temperature_2m.slice(s,e);
  const feels=STATE.data.hourly.apparent_temperature.slice(s,e);
  const all=[...temps,...feels];
  const min=Math.floor(Math.min(...all))-1,max=Math.ceil(Math.max(...all))+1,range=max-min||1;
  const W=720,H=130,p=28;
  const toXY=(arr)=>{
    return arr.map((t,i)=>({x:p+(i/(arr.length-1))*(W-p*2),y:H-p-((t-min)/range)*(H-p*2),t}));
  };
  const pts=toXY(temps),ptsF=toXY(feels);
  const path=pts.map((x,i)=>(i===0?'M':'L')+x.x.toFixed(1)+','+x.y.toFixed(1)).join(' ');
  const pathF=ptsF.map((x,i)=>(i===0?'M':'L')+x.x.toFixed(1)+','+x.y.toFixed(1)).join(' ');
  let labels='';for(let h=0;h<24;h+=3)labels+=`<text x="${pts[h].x.toFixed(1)}" y="${H-6}" text-anchor="middle" font-size="9" fill="#aaa">${h}h</text>`;
  let dots=pts.filter((_,i)=>i%3===0).map(p=>`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="2.5" fill="#4a7eb5"/><text x="${p.x.toFixed(1)}" y="${p.y-7}" text-anchor="middle" font-size="9" font-weight="600" fill="#333">${p.t.toFixed(1)}¬∞</text>`).join('');
  document.getElementById('chart').innerHTML=`
    <text x="10" y="14" font-size="10" fill="#4a7eb5">вФБ еЃЮйЩЕжЄ©еЇ¶</text>
    <text x="10" y="28" font-size="10" fill="#d47a2e">вФБ дљУжДЯжЄ©еЇ¶</text>
    <path d="${path}" fill="none" stroke="#4a7eb5" stroke-width="2" stroke-linejoin="round"/>
    <path d="${pathF}" fill="none" stroke="#d47a2e" stroke-width="1.5" stroke-dasharray="5,3" stroke-linejoin="round"/>
    ${dots}
    ${labels}
  `;
  document.getElementById('chart').setAttribute('viewBox',`0 0 ${W} ${H}`);
}

// Boot
initFromParams();
</script>
