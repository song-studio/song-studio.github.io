<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>路线规划 + 气象 · A→B 出行分析</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
:root{--bg:#f5f3ef;--card:#fff;--text:#2c2c2c;--sub:#767676;--accent:#4a7eb5;--rain:#5b8cb8;--warm:#d47a2e;--green:#5a9a6a;--drive:#4a7eb5;--bike:#5a9a6a;--walk:#d47a2e;--shadow:0 1px 3px rgba(0,0,0,.06)}
*{margin:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'PingFang SC','Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.wrap{max-width:800px;margin:0 auto;padding:14px 14px 50px}

.header{text-align:center;padding:20px 0 6px}
.header h1{font-size:1.2em;font-weight:600}
.header p{font-size:.7em;color:#bbb;margin-top:2px}

/* Search */
.search-section{background:var(--card);border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}
.search-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.search-row .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.search-row .dot.from{background:var(--accent)}
.search-row .dot.to{background:var(--warm)}
.search-row input{flex:1;border:1px solid #e8e4df;border-radius:10px;padding:10px 12px;font-size:.92em;outline:none;background:#fafaf8;min-width:0}
.search-row input:focus{border-color:var(--accent)}
.search-row .swap-btn{flex-shrink:0;width:32px;height:32px;border-radius:50%;border:1px solid #e8e4df;background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.1em}
.search-row .swap-btn:active{background:#f0f0f0}

/* Mode selector */
.modes{display:flex;gap:8px;flex-wrap:wrap}
.mode-chip{flex:1;min-width:70px;text-align:center;padding:9px 6px;border-radius:10px;border:1px solid #e8e4df;background:var(--card);cursor:pointer;font-size:.78em;font-weight:500;transition:all .15s}
.mode-chip:active{transform:scale(.96)}
.mode-chip.sel{color:#fff;border-color:transparent}
.mode-chip.sel.drive{background:var(--drive)}
.mode-chip.sel.bike{background:var(--bike)}
.mode-chip.sel.walk{background:var(--walk)}
.mode-chip .emoji{display:block;font-size:1.3em;margin-bottom:2px}

.go-btn{width:100%;margin-top:10px;padding:11px;border:none;border-radius:10px;background:var(--accent);color:#fff;font-size:.9em;font-weight:600;cursor:pointer}
.go-btn:active{opacity:.85}
.go-btn:disabled{opacity:.5;pointer-events:none}

/* Map */
.map-container{border-radius:16px;overflow:hidden;box-shadow:var(--shadow);height:360px;margin-bottom:14px;position:relative}
@media(max-width:480px){.map-container{height:260px}}
#map{width:100%;height:100%}

/* Route summary */
.route-summary{background:var(--card);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:var(--shadow);display:none}
.route-summary .rs-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
@media(max-width:480px){.route-summary .rs-grid{grid-template-columns:repeat(2,1fr)}}
.rs-item{text-align:center;background:#fafaf8;border-radius:10px;padding:12px 8px}
.rs-item .rsv{font-size:1.2em;font-weight:600}
.rs-item .rsl{font-size:.64em;color:var(--sub);margin-top:2px}

/* Weather panels */
.weather-panels{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
@media(max-width:500px){.weather-panels{grid-template-columns:1fr}}
.wp{background:var(--card);border-radius:14px;padding:16px;box-shadow:var(--shadow)}
.wp.from{border-left:3px solid var(--accent)}
.wp.to{border-left:3px solid var(--warm)}
.wp .wpn{font-size:.72em;color:var(--sub);margin-bottom:4px}
.wp .wpt{font-size:.88em;font-weight:600;margin-bottom:8px}
.wp .wph{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.wp .wph .big{font-size:2.2em;font-weight:200}
.wp .wph .icon{font-size:1.8em}
.wp .wpg{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.wp .wgi{background:#fafaf8;border-radius:8px;padding:8px;text-align:center;font-size:.72em}
.wp .wgi .wgiv{font-weight:600;display:block}
.wp .wgi .wgil{color:var(--sub);font-size:.9em}

.loading{text-align:center;padding:60px 0;color:var(--sub)}
.spinner{display:inline-block;width:22px;height:22px;border:2px solid #ddd;border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Elevation */
.elev-chart{margin-top:12px;height:80px;overflow-x:auto}
.elev-chart svg{min-width:400px;width:100%;height:100%}

footer{text-align:center;padding:20px 0 0;color:#ccc;font-size:.62em}
footer a{color:#bbb}

.suggestions{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.sug{font-size:.64em;padding:3px 8px;background:#f0efeb;border-radius:12px;cursor:pointer;color:var(--sub)}
.sug:active{background:#e0ddd8}
</style>
</head>
<body>
<div class="wrap">

<div class="header">
  <h1>🗺️ A→B 路线规划 + 气象分析</h1>
  <p>OpenStreetMap 路网 · OSRM 路径引擎 · Open-Meteo 气象 · 三源融合</p>
</div>

<div class="search-section">
  <div class="search-row">
    <span class="dot from"></span>
    <input type="text" id="fromInput" placeholder="起点… 例：六盘水" autocomplete="off">
    <button class="swap-btn" onclick="swap()" title="交换起终点">⇅</button>
  </div>
  <div class="search-row">
    <span class="dot to"></span>
    <input type="text" id="toInput" placeholder="终点… 例：贵阳" autocomplete="off">
  </div>
  <div class="modes">
    <div class="mode-chip sel drive" data-mode="driving" onclick="setMode('driving')">
      <span class="emoji">🚗</span>驾车
    </div>
    <div class="mode-chip bike" data-mode="cycling" onclick="setMode('cycling')">
      <span class="emoji">🚴</span>骑行
    </div>
    <div class="mode-chip walk" data-mode="walking" onclick="setMode('walking')">
      <span class="emoji">🥾</span>步行
    </div>
  </div>
  <button class="go-btn" id="goBtn" onclick="plan()">开始规划</button>
  <div class="suggestions">
    <span class="sug" onclick="preset('六盘水','贵阳','driving')">六盘水→贵阳</span>
    <span class="sug" onclick="preset('贵阳','遵义','cycling')">贵阳→遵义(骑行)</span>
    <span class="sug" onclick="preset('成都','重庆','driving')">成都→重庆</span>
    <span class="sug" onclick="preset('昆明','大理','driving')">昆明→大理</span>
    <span class="sug" onclick="preset('北京','天津','cycling')">北京→天津(骑行)</span>
  </div>
</div>

<div class="map-container"><div id="map"></div></div>

<div class="route-summary" id="routeSummary"></div>
<div class="weather-panels" id="weatherPanels"></div>

<div class="loading" id="loading" style="display:none">
  <div class="spinner"></div><br><br>规划路线中…
</div>

<footer><a href="https://song-studio.github.io">song-studio.github.io</a> · OSM + OSRM + Open-Meteo</footer>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// State
let STATE={mode:'driving',fromGeo:null,toGeo:null,route:null,map:null,markers:[],routeLine:null};
const WMO={0:{i:'☀️',l:'晴'},1:{i:'🌤️',l:'少云'},2:{i:'⛅',l:'多云'},3:{i:'☁️',l:'阴'},45:{i:'🌫️',l:'雾'},51:{i:'🌧️',l:'小雨'},53:{i:'🌧️',l:'中雨'},55:{i:'🌧️',l:'大雨'},61:{i:'🌦️',l:'小阵雨'},63:{i:'🌧️',l:'中阵雨'},65:{i:'🌧️',l:'大阵雨'},80:{i:'🌦️',l:'阵雨'},81:{i:'🌦️',l:'中阵雨'},82:{i:'🌧️',l:'大阵雨'},95:{i:'⛈️',l:'雷暴'},96:{i:'⛈️',l:'雷暴冰雹'},99:{i:'⛈️',l:'强雷暴'}};
function wm(c){return WMO[c]||{i:'🌥️',l:'未知'}}

// Init map
STATE.map=L.map('map').setView([27,106],6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>',
  maxZoom:18
}).addTo(STATE.map);

function setMode(m){
  STATE.mode=m;
  document.querySelectorAll('.mode-chip').forEach(c=>{
    c.classList.remove('sel');
    if(c.dataset.mode===m)c.classList.add('sel');
  });
}

function swap(){
  const t=document.getElementById('fromInput').value;
  document.getElementById('fromInput').value=document.getElementById('toInput').value;
  document.getElementById('toInput').value=t;
  if(STATE.fromGeo&&STATE.toGeo){
    const tmp=STATE.fromGeo;STATE.fromGeo=STATE.toGeo;STATE.toGeo=tmp;
    renderAll();
  }
}

function preset(f,t,m){
  document.getElementById('fromInput').value=f;
  document.getElementById('toInput').value=t;
  setMode(m);
  plan();
}

// Geocode
async function geocode(q){
  const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=3&accept-language=zh`);
  const d=await r.json();
  if(!d||!d.length)return null;
  const p=d[0].display_name.split(', ');
  return {latitude:parseFloat(d[0].lat),longitude:parseFloat(d[0].lon),name:p[0],country:p[p.length-1]||'',admin1:p.length>2?p[p.length-2]:''};
}

// Route (OSRM)
async function getRoute(from,to,mode){
  const profiles={driving:'car',cycling:'bike',walking:'foot'};
  const profile=profiles[mode]||'car';
  const u=`https://router.project-osrm.org/route/v1/${profile}/${from.lon},${from.lat};${to.lon},${to.lat}?overview=full&geometries=geojson&steps=true&alternatives=false`;
  const r=await fetch(u);
  const d=await r.json();
  if(!d.routes||!d.routes.length)return null;
  return d.routes[0];
}

// Weather
async function getWeather(lat,lon){
  const u=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,relative_humidity_2m&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weather_code,wind_speed_10m_max,uv_index_max,sunshine_duration,precipitation_sum&timezone=auto&forecast_days=3`;
  const r=await fetch(u);
  return await r.json();
}

// Main
async function plan(){
  const fromQ=document.getElementById('fromInput').value.trim();
  const toQ=document.getElementById('toInput').value.trim();
  if(!fromQ||!toQ)return;

  document.getElementById('loading').style.display='block';
  document.getElementById('routeSummary').style.display='none';
  document.getElementById('weatherPanels').innerHTML='';
  const goBtn=document.getElementById('goBtn');
  goBtn.disabled=true;goBtn.textContent='规划中…';

  try{
    // Geocode both
    const[fg,tg]=await Promise.all([geocode(fromQ),geocode(toQ)]);
    if(!fg||!tg){
      alert(`未找到：${!fg?fromQ:''} ${!tg?toQ:''}`);
      goBtn.disabled=false;goBtn.textContent='开始规划';
      document.getElementById('loading').style.display='none';
      return;
    }
    STATE.fromGeo=fg;STATE.toGeo=tg;

    // Get route + weather in parallel
    const[route,fromW,toW]=await Promise.all([
      getRoute(fg,tg,STATE.mode),
      getWeather(fg.latitude,fg.longitude),
      getWeather(tg.latitude,tg.longitude)
    ]);

    if(!route){
      alert('未找到可行路线，请尝试其他交通方式');
      goBtn.disabled=false;goBtn.textContent='开始规划';
      document.getElementById('loading').style.display='none';
      return;
    }
    STATE.route=route;
    STATE.fromW=fromW;STATE.toW=toW;
    renderAll();
  }catch(e){
    alert('网络错误：'+e.message);
  }
  goBtn.disabled=false;goBtn.textContent='开始规划';
  document.getElementById('loading').style.display='none';
}

function renderAll(){
  const m=STATE.map;
  // Clear
  STATE.markers.forEach(mk=>m.removeLayer(mk));
  if(STATE.routeLine)m.removeLayer(STATE.routeLine);

  // Bounds
  const bounds=L.latLngBounds([
    [STATE.fromGeo.latitude,STATE.fromGeo.longitude],
    [STATE.toGeo.latitude,STATE.toGeo.longitude]
  ]);

  // Markers
  const fromM=L.marker([STATE.fromGeo.latitude,STATE.fromGeo.longitude],{
    icon:L.divIcon({html:'<div style="background:#4a7eb5;color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;box-shadow:0 2px 6px rgba(0,0,0,.3)">起</div>',iconSize:[28,28],iconAnchor:[14,14]})
  }).addTo(m).bindPopup(`<b>起点</b><br>${STATE.fromGeo.name}`);
  const toM=L.marker([STATE.toGeo.latitude,STATE.toGeo.longitude],{
    icon:L.divIcon({html:'<div style="background:#d47a2e;color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;box-shadow:0 2px 6px rgba(0,0,0,.3)">终</div>',iconSize:[28,28],iconAnchor:[14,14]})
  }).addTo(m).bindPopup(`<b>终点</b><br>${STATE.toGeo.name}`);
  STATE.markers=[fromM,toM];

  // Route line
  const coords=STATE.route.geometry.coordinates.map(c=>[c[1],c[0]]);
  STATE.routeLine=L.polyline(coords,{color:'#4a7eb5',weight:4,opacity:.8}).addTo(m);
  bounds.extend(coords);
  m.fitBounds(bounds,{padding:[40,40]});

  // Route summary
  const dist=(STATE.route.distance/1000).toFixed(1);
  const dur=Math.round(STATE.route.duration/60);
  const hrs=Math.floor(dur/60),mins=dur%60;
  const durStr=hrs>0?`${hrs}h${mins}m`:`${mins}分钟`;
  const modeName={driving:'驾车',cycling:'骑行',walking:'步行'};
  const speed=(STATE.route.distance/1000)/(STATE.route.duration/3600);
  const elevationGain=estimateElevation(coords);

  document.getElementById('routeSummary').style.display='block';
  document.getElementById('routeSummary').innerHTML=`
    <div class="rs-grid">
      <div class="rs-item"><div class="rsv">${dist} km</div><div class="rsl">总距离</div></div>
      <div class="rs-item"><div class="rsv">${durStr}</div><div class="rsl">预计用时 (${modeName[STATE.mode]})</div></div>
      <div class="rs-item"><div class="rsv">${speed.toFixed(1)} km/h</div><div class="rsl">平均速度</div></div>
      <div class="rs-item"><div class="rsv">~${elevationGain}m</div><div class="rsl">估算爬升</div></div>
    </div>
  `;

  // Weather panels
  renderWeather('from',STATE.fromGeo,STATE.fromW);
  renderWeather('to',STATE.toGeo,STATE.toW);
}

function estimateElevation(coords){
  // Rough estimate from route geometry
  let gain=0;
  for(let i=1;i<coords.length;i++){
    const diff=coords[i][0]-coords[i-1][0]; // lat diff as rough proxy
    if(diff>0)gain+=diff*111000; // ~111km per degree
  }
  return Math.round(gain);
}

function renderWeather(side,geo,data){
  const now=data.current;
  const today=data.daily;
  const wc=wm(now.weather_code);
  const label=side==='from'?'起点':'终点';
  const cls=side==='from'?'from':'to';

  const panel=document.createElement('div');
  panel.className='wp '+cls;
  panel.innerHTML=`
    <div class="wpn">${label}</div>
    <div class="wpt">${geo.name} · ${geo.admin1||''} · ${geo.country||''}</div>
    <div class="wph">
      <span class="big">${now.temperature_2m.toFixed(1)}°</span>
      <span class="icon">${wc.i}</span>
      <span style="font-size:.8em;color:var(--sub)">${wc.l}<br>体感 ${now.apparent_temperature.toFixed(1)}°</span>
    </div>
    <div class="wpg">
      <div class="wgi"><span class="wgiv">${now.wind_speed_10m} km/h</span><span class="wgil">风速</span></div>
      <div class="wgi"><span class="wgiv">${now.relative_humidity_2m}%</span><span class="wgil">湿度</span></div>
      <div class="wgi"><span class="wgiv">${today.precipitation_probability_max[0]}%</span><span class="wgil">降雨概率</span></div>
      <div class="wgi"><span class="wgiv">${today.uv_index_max[0]}</span><span class="wgil">UV 指数</span></div>
      <div class="wgi"><span class="wgiv">${today.temperature_2m_max[0]}° / ${today.temperature_2m_min[0]}°</span><span class="wgil">今最高/低</span></div>
      <div class="wgi"><span class="wgiv">${(today.sunshine_duration[0]/3600).toFixed(1)}h</span><span class="wgil">日照时长</span></div>
    </div>
  `;

  const container=document.getElementById('weatherPanels');
  if(side==='from')container.prepend(panel);
  else container.appendChild(panel);
}

// Enter key
document.getElementById('fromInput').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('toInput').focus()});
document.getElementById('toInput').addEventListener('keydown',e=>{if(e.key==='Enter')plan()});
</script>
</body>
</html>
