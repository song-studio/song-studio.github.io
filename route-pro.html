<style>
:root{--ink:#11140f;--muted:#66705f;--paper:#f2efe3;--panel:#fffdf3;--line:#cfc7ae;--olive:#4d6f27;--acid:#c8f05a;--clay:#a45a32;--blue:#2b67d1;--red:#bf3d2c;--dark:#171b12;--mono:"Roboto Mono",monospace;--cond:"Archivo Condensed",sans-serif;--sans:"Noto Sans SC",system-ui,sans-serif}*{box-sizing:border-box}html,body{height:100%;margin:0}body{font-family:var(--sans);color:var(--ink);background:var(--paper);overflow:hidden}button,input{font:inherit}button{cursor:pointer}a{color:inherit;text-decoration:none}.app{height:100%;display:grid;grid-template-rows:auto 1fr}.top{z-index:1000;display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#f8f5e8;border-bottom:1px solid var(--line)}.brand{font-family:var(--cond);font-size:20px;font-weight:700;letter-spacing:.04em}.weather{font-family:var(--mono);font-size:12px;border:1px solid var(--line);padding:7px 9px;background:#fff}.mapWrap{position:relative;min-height:0}#map{position:absolute;inset:0}.sheet{position:absolute;left:8px;right:8px;bottom:8px;z-index:500;background:var(--panel);border:1px solid var(--line);box-shadow:0 24px 70px rgba(17,20,15,.28);max-height:76vh;display:grid;grid-template-rows:auto auto 1fr}.sheet.detailMode .list{display:none}.sheet.detailMode .tools{display:none}.sheet.detailMode .detail{margin-top:0;border-top:0}.sheet.detailMode .count{display:none}.grab{height:24px;display:grid;place-items:center}.grab:before{content:"";width:42px;height:4px;background:#b9af93}.tools{padding:0 12px 10px;border-bottom:1px solid var(--line)}.modes{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px}.mode{border:1px solid var(--line);background:#f4f0dd;padding:9px 4px;font-size:13px;font-weight:900}.mode.active{background:var(--dark);color:#fff;border-color:var(--dark)}.tabs{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}.tab{border:1px solid var(--line);background:#fff;padding:9px;font-size:13px;font-weight:800}.tab.active{background:var(--acid);border-color:#9bb941}.searchLine{display:grid;grid-template-columns:1fr auto;gap:6px}.searchLine input{min-width:0;border:1px solid var(--line);background:#fff;padding:12px;outline:none}.searchLine button{border:0;background:var(--olive);color:#fff;padding:0 14px;font-weight:900}.ab{display:grid;grid-template-columns:1fr;gap:6px}.ab input{border:1px solid var(--line);padding:12px}.content{overflow:auto;padding:10px 12px 14px}.count{font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:8px}.list{display:grid;gap:8px}.route{border:1px solid var(--line);background:#fff;padding:11px;text-align:left;display:grid;grid-template-columns:1fr auto;gap:10px}.route.active{outline:3px solid rgba(200,240,90,.9)}.route h3{margin:0 0 4px;font-size:17px}.route p{margin:0;color:var(--muted);font-size:12px;line-height:1.45}.score{font-family:var(--cond);font-size:28px;color:var(--olive);font-weight:700}.detail{margin-top:10px;border-top:2px solid var(--dark);padding-top:10px}.detail h2{font-family:var(--cond);font-size:34px;line-height:.95;margin:0 0 8px;letter-spacing:-.03em}.summary{color:var(--muted);line-height:1.55;margin:0 0 10px}.metrics{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--line);border-right:0;border-bottom:0;margin-bottom:10px}.metric{background:#fff;border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:8px}.metric b{font-family:var(--mono);display:block;font-size:15px}.metric span{font-size:10px;color:var(--muted)}.cards{display:grid;gap:8px}.card{background:#fff;border:1px solid var(--line);padding:10px}.card h3{margin:0 0 7px;font-size:16px}.item{display:grid;grid-template-columns:18px 1fr;gap:7px;color:var(--muted);font-size:13px;line-height:1.5;margin:5px 0}.mark{font-family:var(--mono);color:var(--olive);font-weight:700}.empty{border:1px dashed var(--line);background:#fff;padding:12px;color:var(--muted);line-height:1.6}.legend{position:absolute;top:10px;left:10px;z-index:450;background:rgba(255,253,243,.92);border:1px solid var(--line);padding:8px;font-family:var(--mono);font-size:11px}.src{display:flex;justify-content:space-between;border:1px solid var(--line);padding:9px;margin-top:6px;background:#f8f5e8;font-size:13px}.backList{display:none;border:1px solid var(--line);background:var(--acid);padding:10px 12px;font-weight:900;margin-bottom:10px;width:100%;text-align:left}.sheet.detailMode .backList{display:block}@media(min-width:860px){.sheet{left:auto;right:14px;top:14px;bottom:14px;width:430px;max-height:none}.content{padding-bottom:20px}.cards{grid-template-columns:1fr 1fr}.ab{grid-template-columns:1fr 1fr}.mapWrap{height:calc(100vh - 51px)}}@media(max-width:859px){.sheet{max-height:62dvh}.sheet.detailMode{max-height:52dvh;left:10px;right:10px;bottom:10px;grid-template-rows:auto 1fr}.sheet.detailMode .content{padding-top:10px}.sheet.detailMode .grab{height:18px}.sheet.detailMode .detail h2{font-size:30px}.sheet.detailMode .metrics{position:sticky;top:0;z-index:2;box-shadow:0 10px 22px rgba(17,20,15,.08)}.legend{top:12px;left:12px}.leaflet-control-zoom{margin-bottom:54dvh!important}}@media(max-width:430px){.metrics{grid-template-columns:repeat(2,1fr)}.brand{font-size:18px}.sheet{max-height:64dvh}.sheet.detailMode{max-height:50dvh}.mode{font-size:12px}}
</style></head><body><div class="app"><header class="top"><a class="brand" href="https://song-studio.github.io/">路径工作台</a><a class="weather" href="weather-pro.html">天气窗口</a></header><main class="mapWrap"><div id="map"></div><div class="legend">轨迹 / 分段 / 撤退</div><section class="sheet"><div class="grab"></div><div class="tools"><div class="modes" id="modes"><button class="mode active" data-mode="hiking">徒步</button><button class="mode" data-mode="cycling">骑行</button><button class="mode" data-mode="mountaineering">登山</button><button class="mode" data-mode="other">其他</button></div><div class="tabs"><button class="tab active" data-tab="search">搜地点/线路</button><button class="tab" data-tab="ab">起点 → 终点</button></div><form id="form"><div id="searchBox" class="searchLine"><input id="q" placeholder="武功山 / 雨崩 / 独库 / 四姑娘山"><button>查</button></div><div id="abBox" class="ab" style="display:none"><input id="from" placeholder="起点"><input id="to" placeholder="终点"><button class="tab" style="grid-column:1/-1">生成草案</button></div></form></div><div class="content"><button class="backList" onclick="showList()">← 返回线路列表</button><div class="count" id="count">正在读取</div><div class="list" id="list"></div><div class="detail" id="detail"></div></div></section></main></div><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><script>
const PROCESSED='data/processed/outdoor_routes_v4.json';const $=s=>document.querySelector(s);let S={mode:'hiking',tab:'search',routes:[],tracks:{},seg:{},cycle:{},camp:{},other:[],gear:{},ops:{},conf:{},trackQ:{},sel:null,map:null,layer:null};
function group(a,k='route_id'){return a.reduce((m,x)=>{(m[x[k]]||(m[x[k]]=[])).push(x);return m},{})}function one(a,k='route_id'){return Object.fromEntries(a.map(x=>[x[k],x]))}function label(m){return{hiking:'徒步',cycling:'骑行/摩旅',mountaineering:'登山',other:'其他户外'}[m]}
async function load(){const data=await fetch(PROCESSED).then(r=>r.json());S.routes=data.routes||[];S.other=data.other||[];initMap();renderList();select(first()?.route_id)}
function initMap(){S.map=L.map('map',{zoomControl:false}).setView([31,103],5);L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}',{subdomains:'1234',maxZoom:18,attribution:'高德'}).addTo(S.map);L.control.zoom({position:'bottomleft'}).addTo(S.map)}
function pool(){if(S.mode==='other')return[];return S.routes.filter(r=>r.mode===S.mode)}function score(r){const c=r.confidence_grade||'C',g=r.geometry_confidence||'C';return({A:88,B:76,C:62,D:48,high:82,medium:68,low:52}[c]||62)+({A:8,B:5,C:2,D:0}[g]||2)}function first(){return match()[0]}function match(){const q=($('#q')?.value||'').trim().toLowerCase();let a=pool();if(q)a=a.filter(r=>[r.name_zh,...(r.aliases||[]),r.start_poi,r.end_poi,r.region_text,(r.risk_tags||[]).join(' ')].join(' ').toLowerCase().includes(q));return a.sort((a,b)=>score(b)-score(a))}
function renderList(){if(S.mode==='other'){document.querySelector('#count').textContent=`其他户外 / ${S.other.length} 场景`;document.querySelector('#list').innerHTML=S.other.map((o,i)=>`<button class="route ${S.sel?.activity_id===o.activity_id?'active':''}" onclick="selectOther(${i})"><div><h3>${o.name_zh}</h3><p>${o.activity_type} · ${o.location_type}<br>${o.weather_factors}</p></div><span class="score">${o.good_for_beginner?'B':'A'}</span></button>`).join('');return}const a=match();$('#count').textContent=`${label(S.mode).toUpperCase()} / ${a.length} 条线路`;$('#list').innerHTML=a.slice(0,36).map(r=>`<button class="route ${S.sel?.route_id===r.route_id?'active':''}" onclick="select('${r.route_id}')"><div><h3>${r.name_zh}</h3><p>${r.start_poi} → ${r.end_poi}<br>${r.distance_km}km · +${r.elevation_gain_m}m · ${r.max_altitude_m}m</p></div><span class="score">${score(r)}</span></button>`).join('')||'<div class="empty">没有匹配线路。</div>'}
function draw(r){if(S.layer)S.layer.remove();S.layer=L.layerGroup().addTo(S.map);let pts=[];if(r.track_points?.length)pts=r.track_points.map(p=>[p.lat,p.lng]);if(!pts.length){S.map.setView([31,103],5);return}r.track_points.forEach((p,i)=>L.circleMarker([p.lat,p.lng],{radius:i===0||i===r.track_points.length-1?7:5,color:'#11140f',fillColor:i===0?'#c8f05a':i===r.track_points.length-1?'#bf3d2c':'#fffdf3',fillOpacity:1,weight:2}).bindPopup(p.name||'轨迹点').addTo(S.layer));L.polyline(pts,{color:'#11140f',weight:5,opacity:.9}).addTo(S.layer);(r.cycling_poi||[]).slice(0,24).forEach(p=>L.circleMarker([p.lat,p.lng],{radius:5,color:'#2b67d1',fillColor:'#2b67d1',fillOpacity:.75,weight:1}).bindPopup(`${p.name_zh}<br>${p.poi_type||''}<br>${p.mobile_note||''}`).addTo(S.layer));(r.mountaineering_geo||[]).slice(0,24).forEach(p=>L.circleMarker([p.lat,p.lng],{radius:5,color:'#a45a32',fillColor:'#a45a32',fillOpacity:.8,weight:1}).bindPopup(`${p.name_zh}<br>${p.point_type||''}<br>${p.mobile_note||''}`).addTo(S.layer));const mobile=window.matchMedia('(max-width: 859px)').matches;S.map.fitBounds(pts,mobile?{paddingTopLeft:[28,42],paddingBottomRight:[28,Math.round(window.innerHeight*.54)]}:{padding:[40,40]})}
function gear(r){return (r.gear_essential||[]).slice(0,6)}function rows(title,arr){return`<div class="card"><h3>${title}</h3>${arr.map(x=>`<div class="item"><span class="mark">•</span><span>${x}</span></div>`).join('')}</div>`}
function showList(){document.querySelector('.sheet').classList.remove('detailMode');document.querySelector('#detail').innerHTML=''}
function detailRows(r){if(r.activity_type==='hiking'){const ss=(r.segments||[]).slice(0,6);return[rows('徒步分段',ss.length?ss.map(s=>`${s.visual_label_mobile||s.segment_character||'分段'}：${s.from_name} → ${s.to_name}，${s.distance_km}km，+${s.elevation_gain_m}m，${s.water_available} 水源`):['等待分段数据']),rows('水源/撤退/导航',[(r.water_points||[]).slice(0,4).join('、')||'水源待核验',(r.retreat_points||[]).slice(0,4).join('、')||'撤退点待核验',r.navigation?.tip||'离线轨迹优先'])]}if(r.mode==='cycling'){const c=r.cycling_ops;const pois=(r.cycling_poi||[]).slice(0,8);return[rows('道路运营',c?[`道路：${c.road_classes}`,`路面：${c.surface_mix}`,`交通：${c.traffic_level}，横风 ${c.crosswind_exposure}`]:['等待骑行道路数据']),rows('补给/维修/危险段',c?[`维修：${c.repair_points}`,`补给间隔：${c.resupply_interval_km}`,`危险：${c.danger_sections}`]:['等待补给与危险段']),rows('沿途关键点',pois.length?pois.map(p=>`${p.name_zh} · ${p.poi_type} · ${p.mobile_note||''}`):['暂无 POI'])]}if(r.activity_type==='mountaineering'){const c=r.mountaineering;const geo=(r.mountaineering_geo||[]).slice(0,8);return[rows('营地与登顶',c?[`BC：${c.basecamp}`,`出发：${c.summit_push_start_time}，折返：${c.turnaround_time}`,`等级：${c.technical_grade}`]:['等待营地数据']),rows('技术/红线',c?[`地形：${c.terrain_type}`,`装备：${c.required_gear}`,`天气红线：${c.weather_abort_thresholds}`]:['等待技术数据']),rows('地理点位',geo.length?geo.map(p=>`${p.name_zh} · ${p.point_type} · ${p.altitude_m||''}m · ${p.mobile_note||''}`):['暂无点位'])]}return[]}
function select(id){const r=S.routes.find(x=>x.route_id===id);if(!r)return;S.sel=r;renderList();draw(r);document.querySelector('.sheet').classList.add('detailMode');document.querySelector('.content').scrollTop=0;$('#detail').innerHTML=`<h2>${r.name_zh}</h2><p class="summary">${label(r.mode)} · ${r.start_poi} → ${r.end_poi} · 可信 ${r.confidence_grade||'C'} · 轨迹 ${r.geometry_confidence||'C'}</p><div class="metrics"><div class="metric"><b>${r.distance_km}</b><span>公里</span></div><div class="metric"><b>${r.elevation_gain_m}</b><span>爬升</span></div><div class="metric"><b>${r.max_altitude_m}</b><span>海拔</span></div><div class="metric"><b>${r.duration_h}</b><span>小时</span></div></div><div class="cards">${detailRows(r).join('')}${rows('装备底线',gear(r).length?gear(r):['等待装备数据'])}${rows('风险标签',(r.risk_tags||[]).slice(0,6))}${rows('运营与可信度',[`季节状态：${r.ops?.season_status||'待核验'}`,`救援可达：${r.ops?.emergency_access_score||'待核验'}`,`轨迹类型：${r.track_type||'待核验'}`,`导航难度：${r.navigation?.difficulty||'待核验'}`])}${rows('补给与撤退',[`补给：${(r.resupply_points||[]).slice(0,4).join('、')||'待核验'}`,`撤退：${(r.retreat_points||[]).slice(0,4).join('、')||'待核验'}`,`水源：${(r.water_points||[]).slice(0,4).join('、')||'待核验'}`])}</div>${r.gpx_url?`<a class="src" target="_blank" href="${r.gpx_url}"><b>轨迹源</b><span>打开</span></a>`:''}<a class="src" href="weather-pro.html?q=${encodeURIComponent(r.start_poi)}"><b>起点天气</b><span>天气窗口</span></a>`}
function selectOther(i){const o=S.other[i];S.sel=o;renderList();document.querySelector('.sheet').classList.add('detailMode');document.querySelector('.content').scrollTop=0;if(S.layer)S.layer.remove();S.layer=L.layerGroup().addTo(S.map);if(o.example_location?.lat&&o.example_location?.lng){const p=[o.example_location.lat,o.example_location.lng];L.circleMarker(p,{radius:8,color:'#11140f',fillColor:'#c8f05a',fillOpacity:1,weight:2}).bindPopup(o.example_location.example_location_name||o.name_zh).addTo(S.layer);S.map.setView(p,10,{padding:[20,20]})}$('#detail').innerHTML=`<h2>${o.name_zh}</h2><p class="summary">${o.activity_type} · ${o.location_type}</p><div class="cards">${rows('代表地点',[o.example_location?.example_location_name||'待补地点',o.example_location?.best_season?`季节：${o.example_location.best_season}`:'季节待核验'])}${rows('关键天气',String(o.weather_factors).split('、'))}${rows('路线因素',String(o.route_factors).split('、'))}${rows('装备',String(o.gear).split('、'))}${rows('红线',String(o.red_flags).split('、'))}</div>`}
async function ab(){const a=$('#from').value.trim(),b=$('#to').value.trim();if(!a||!b)return;if(S.layer)S.layer.remove();S.layer=L.layerGroup().addTo(S.map);$('#detail').innerHTML=`<h2>${a} → ${b}</h2><p class="summary">A-B 草案会接高德路线和 Nova v3 轨迹字段继续增强。</p><div class="empty">当前先保留入口，不用假轨迹冒充专业路线。</div>`}
$('#modes').onclick=e=>{const b=e.target.closest('.mode');if(!b)return;S.mode=b.dataset.mode;document.querySelectorAll('.mode').forEach(x=>x.classList.toggle('active',x===b));renderList();select(first()?.route_id)};document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{S.tab=t.dataset.tab;document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===t));$('#searchBox').style.display=S.tab==='search'?'grid':'none';$('#abBox').style.display=S.tab==='ab'?'grid':'none'});$('#form').onsubmit=e=>{e.preventDefault();if(S.tab==='ab')ab();else{renderList();select(first()?.route_id)}};$('#q').oninput=renderList;const p=new URLSearchParams(location.search);if(p.get('q'))$('#q').value=p.get('q');load();
</script></body></html>
