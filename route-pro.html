<!doctype html>
<html lang="zh-CN">
<head>

<title>路径工作台 · Song Studio</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=Noto+Serif+SC:wght@600;800;900&display=swap" rel="stylesheet">
<style>
:root{--earth:oklch(18% .035 78);--earth2:oklch(24% .045 78);--paper:oklch(95% .022 86);--paper2:oklch(90% .028 86);--ink:oklch(18% .03 78);--muted:oklch(48% .04 78);--line:oklch(73% .04 82 / .58);--moss:oklch(55% .12 145);--lime:oklch(75% .13 123);--clay:oklch(60% .13 48);--blue:oklch(58% .11 230);--red:oklch(58% .16 30);--shadow:0 24px 64px oklch(13% .03 78 / .24);--r:28px}*{box-sizing:border-box}html{background:var(--earth);color:var(--ink)}body{margin:0;min-height:100vh;font-family:"IBM Plex Sans",system-ui,sans-serif;background:radial-gradient(circle at 85% -8%,oklch(64% .12 145 / .32),transparent 340px),linear-gradient(180deg,oklch(91% .035 92),var(--paper) 42%,oklch(86% .04 102));-webkit-font-smoothing:antialiased}button,input,select{font:inherit}button{cursor:pointer}a{color:inherit;text-decoration:none}.app{width:min(1220px,100%);margin:0 auto;padding:12px 12px 96px}.top{position:sticky;top:0;z-index:80;margin:0 -12px;padding:10px 12px;background:oklch(92% .025 88 / .86);backdrop-filter:blur(20px);border-bottom:1px solid oklch(72% .04 84 / .46);display:flex;align-items:center;justify-content:space-between}.brand{font-family:"IBM Plex Mono",monospace;font-weight:700;font-size:13px;letter-spacing:.12em}.top a:last-child{border:1px solid var(--line);border-radius:999px;padding:8px 10px;color:var(--muted);font-size:13px;background:oklch(98% .015 86 / .54)}.hero{padding:28px 0 16px}.kicker{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--moss);font-weight:700}.hero h1{font-family:"Noto Serif SC",serif;font-size:clamp(46px,15vw,96px);line-height:.9;letter-spacing:-.07em;margin:10px 0 12px}.hero p{margin:0;color:var(--muted);font-size:16px;line-height:1.72;max-width:760px}.console{background:linear-gradient(145deg,var(--earth),oklch(29% .055 82));color:var(--paper);border-radius:34px;padding:16px;box-shadow:0 24px 70px oklch(12% .035 78 / .35)}.label{display:block;font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:oklch(78% .045 92);margin-bottom:8px}.modes{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:13px}.mode{border:1px solid oklch(74% .04 90 / .36);background:oklch(28% .045 78);color:var(--paper);border-radius:18px;padding:11px 8px;text-align:left;font-weight:800;font-size:14px}.mode span{display:block;font-size:11px;color:oklch(78% .04 92);font-weight:500;margin-top:2px}.mode.active{background:var(--lime);color:oklch(16% .04 120);border-color:transparent}.mode.active span{color:oklch(30% .06 120)}.tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}.tab{border:1px solid oklch(74% .04 90 / .36);background:oklch(28% .045 78);color:var(--paper);border-radius:18px;padding:12px;font-weight:800}.tab.active{background:oklch(94% .02 86);color:var(--earth)}.field{margin-top:10px}.search,.select{width:100%;border:1px solid oklch(74% .04 90 / .38);border-radius:19px;padding:14px;background:oklch(27% .04 78);color:var(--paper);outline:none}.search::placeholder{color:oklch(74% .035 90)}.ab{display:grid;grid-template-columns:1fr;gap:8px}.primary{width:100%;border:0;border-radius:21px;padding:15px;background:linear-gradient(135deg,var(--paper),var(--lime));color:var(--earth);font-weight:900;margin-top:12px}.routeHint{margin-top:10px;color:oklch(78% .04 92);font-size:12px;line-height:1.55}.chips{display:flex;gap:8px;overflow:auto;scrollbar-width:none;margin-top:12px}.chip{white-space:nowrap;border:1px solid oklch(74% .04 90 / .36);background:oklch(28% .045 78);color:oklch(84% .03 90);border-radius:999px;padding:8px 11px;font-size:13px}.section{margin-top:18px}.sectionHead{display:flex;justify-content:space-between;gap:12px;align-items:end;margin:22px 0 10px}.sectionHead h2{font-family:"Noto Serif SC",serif;font-size:28px;margin:0;letter-spacing:-.04em}.sectionHead small{font-family:"IBM Plex Mono";color:var(--muted)}.layoutGrid{display:grid;gap:12px}.panel{border:1px solid var(--line);border-radius:32px;background:oklch(97% .016 86);box-shadow:var(--shadow);overflow:hidden}.map{height:360px;background:oklch(82% .035 96)}#map{height:100%;width:100%}.list{display:grid;gap:10px}.routeCard{border:1px solid var(--line);border-radius:26px;background:oklch(98% .014 86);padding:14px;text-align:left;width:100%;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:start}.routeCard.active{outline:3px solid oklch(75% .13 123 / .55)}.routeCard h3{margin:0 0 6px;font-size:18px}.routeCard p{margin:0;color:var(--muted);font-size:13px;line-height:1.55}.badge{font-family:"IBM Plex Mono";font-weight:800;color:var(--moss)}.detailHead{padding:17px;background:linear-gradient(145deg,oklch(28% .05 78),oklch(32% .065 125));color:var(--paper)}.detailHead h2{font-family:"Noto Serif SC",serif;font-size:31px;line-height:1.1;margin:8px 0}.detailHead p{margin:0;color:oklch(84% .03 92);line-height:1.55}.metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--line)}.metric{background:oklch(98% .014 86);padding:13px}.metric b{display:block;font-family:"IBM Plex Mono";font-size:19px}.metric span{display:block;color:var(--muted);font-size:12px;margin-top:3px}.cards{display:grid;gap:10px;padding:12px}.card{border:1px solid var(--line);border-radius:24px;background:oklch(99% .01 86);padding:14px}.card h3{margin:0 0 9px;font-size:18px}.items{display:grid;gap:8px}.items div{display:flex;gap:9px;align-items:flex-start;color:var(--muted);line-height:1.55}.mark{width:22px;height:22px;border-radius:50%;display:inline-grid;place-items:center;background:oklch(88% .06 125);color:oklch(30% .08 130);font-size:12px;font-weight:900;flex:0 0 22px}.empty{border:1px dashed var(--line);border-radius:28px;padding:18px;background:oklch(98% .014 86);color:var(--muted);line-height:1.7}.sourceLink{display:flex;justify-content:space-between;gap:10px;border:1px solid var(--line);border-radius:20px;padding:12px;background:oklch(98% .014 86);margin-top:10px}.toast{position:fixed;left:12px;right:12px;bottom:16px;background:var(--earth);color:var(--paper);border-radius:22px;padding:14px 16px;box-shadow:var(--shadow);transform:translateY(120%);transition:.25s ease;z-index:90}.toast.show{transform:translateY(0)}
@media(min-width:900px){.app{padding:22px 24px 120px}.top{margin:0 -24px;padding-inline:24px}.heroGrid{display:grid;grid-template-columns:1fr 460px;gap:22px;align-items:start}.console{position:sticky;top:76px}.layoutGrid{grid-template-columns:420px 1fr}.map{height:520px}.metrics{grid-template-columns:repeat(4,1fr)}.cards{grid-template-columns:repeat(2,1fr)}}
@media(max-width:430px){.modes{grid-template-columns:repeat(2,1fr)}.map{height:310px}.metrics{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="app">
<header class="top"><a class="brand" href="https://song-studio.github.io/">SONG ROUTE</a><a href="weather-pro.html">天气窗口</a></header>
<section class="heroGrid"><div class="hero"><div class="kicker">Route Archive & Track Desk</div><h1>路径工作台</h1><p>这里才处理徒步、骑行、登山和其他户外。你可以搜地点、搜线路，也可以输入起终点。结果先给线路列表，再给地图轨迹、分段、补给、撤退、装备和可信度。不是社区游记，不用一上来读长文。</p></div><form class="console" id="form"><span class="label">活动类型</span><div class="modes" id="modes"><button type="button" class="mode active" data-mode="hiking">徒步<span>分段/水源</span></button><button type="button" class="mode" data-mode="cycling">骑行<span>道路/补给</span></button><button type="button" class="mode" data-mode="mountaineering">登山<span>营地/登顶</span></button><button type="button" class="mode" data-mode="other">其他<span>露营/越野</span></button></div><div class="tabs"><button type="button" class="tab active" data-tab="search">搜地点/线路</button><button type="button" class="tab" data-tab="ab">起点 → 终点</button></div><div id="searchBox"><label class="label">关键词</label><input class="search" id="q" placeholder="武功山 / 雨崩 / 独库 / 四姑娘山"></div><div id="abBox" style="display:none"><div class="ab"><input class="search" id="from" placeholder="起点，例如 成都"><input class="search" id="to" placeholder="终点，例如 拉萨"></div><div class="routeHint">A-B 模式会先给基础轨迹草案，正式道路、骑行和登山分段等 Nova v3 数据回来后增强。</div></div><button class="primary">查找路径</button><div class="chips" id="chips"></div></form></section>
<section class="section layoutGrid"><aside><div class="sectionHead"><h2>线路列表</h2><small id="count">读取中</small></div><div class="empty" style="padding:12px;margin-bottom:10px">先选活动类型，再搜地点或线路。列表会保留多条候选，方便比较，不会只吐一条结果。</div><div class="list" id="list"></div></aside><main><div class="panel"><div class="map"><div id="map"></div></div></div><div id="detail" class="section"></div></main></section>
</div><div class="toast" id="toast"></div><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const AMAP_KEY='39a8c2f6ef75e494198f3e3751701ebe',ROOT='data/inbox/2026-05-17/';
const $=s=>document.querySelector(s);let state={mode:'hiking',tab:'search',routes:[],ops:{},gear:{},support:{},decisions:{},conf:{},track:{},selected:null,map:null,layer:null};
function toast(t){const el=$('#toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2400)}
function group(a){return a.reduce((m,x)=>{(m[x.route_id]||(m[x.route_id]=[])).push(x);return m},{})}function one(a){return Object.fromEntries(a.map(x=>[x.route_id,x]))}
function region(r){return r?[r.province,r.city_prefecture,r.county].filter(Boolean).join(' · '):'地区待核验'}function modeLabel(m){return {hiking:'徒步',cycling:'骑行',mountaineering:'登山',motorcycle:'摩旅',other:'其他户外'}[m]||m}
function pool(){if(state.mode==='other')return[];if(state.mode==='cycling')return state.routes.filter(r=>['cycling','motorcycle'].includes(r.activity_type));return state.routes.filter(r=>r.activity_type===state.mode)}
function score(r){const c=state.conf[r.route_id]?.overall_confidence||'C',t=state.track[r.route_id]?.gpx_quality_score||5,o=state.ops[r.route_id]?.emergency_access_score||3;return Math.min(98,Math.round(({A:88,B:76,C:62,D:48}[c]||60)+t+o))}
function match(){const q=$('#q').value.trim().toLowerCase();let arr=pool();if(q)arr=arr.filter(r=>[r.name_zh,...(r.aliases||[]),r.start_poi,r.end_poi,region(r.region),(r.risk_tags||[]).join(' ')].join(' ').toLowerCase().includes(q));return arr.sort((a,b)=>score(b)-score(a))}
function renderList(){let arr=match();$('#count').textContent=state.mode==='other'?'6 类场景':`${arr.length} 条`;if(state.mode==='other'){ $('#list').innerHTML=['露营','越野跑','桨板/皮划艇','观星摄影','亲子轻户外','自驾露营'].map(x=>`<button class="routeCard"><div><h3>${x}</h3><p>等待 Nova v3 数据补齐后变成可筛选场景库。现在先保留入口，不乱编数据。</p></div><span class="badge">OTHER</span></button>`).join('');$('#detail').innerHTML='<div class="empty">其他户外活动已经留出专业入口，但不会拿徒步数据硬套。等 Nova 的 other_outdoor_catalog_v3.json 到位后接入。</div>';return}$('#list').innerHTML=arr.slice(0,40).map(r=>`<button class="routeCard ${state.selected?.route_id===r.route_id?'active':''}" onclick="selectRoute('${r.route_id}')"><div><h3>${r.name_zh}</h3><p>${region(r.region)}<br>${r.distance_km}km · 爬升 ${r.elevation_gain_m}m · ${r.typical_duration_h}h</p></div><span class="badge">${score(r)}</span></button>`).join('')||'<div class="empty">没有找到线路。可以换关键词，或用起点终点模式。</div>'}
async function load(){const [routes,ops,gear,support,decisions,conf,track]=await Promise.all(['routes_cn_v1.json','routes_ops_delta_v2.json','gear_strategy_v1.json','route_support_points_v1.json','route_decision_points_v1.json','route_confidence_v1.json','track_quality_v1.json'].map(f=>fetch(ROOT+f).then(r=>r.json()).catch(()=>[])));state.routes=routes;state.ops=one(ops);state.gear=one(gear);state.support=group(support);state.decisions=group(decisions);state.conf=one(conf);state.track=one(track);renderChips();initMap();renderList();selectRoute(match()[0]?.route_id)}
function renderChips(){['雨崩','武功山','独库','青海湖','四姑娘山','虎跳峡','贡嘎','318'].forEach(x=>$('#chips').insertAdjacentHTML('beforeend',`<button class="chip" type="button" onclick="quick('${x}')">${x}</button>`))}function quick(x){$('#q').value=x;renderList();selectRoute(match()[0]?.route_id)}
function initMap(){state.map=L.map('map',{zoomControl:false}).setView([30.6,103.9],5);L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}',{subdomains:'1234',maxZoom:18,attribution:'高德'}).addTo(state.map);L.control.zoom({position:'bottomright'}).addTo(state.map)}
async function geocode(q){const r=await fetch(`https://restapi.amap.com/v3/geocode/geo?key=${AMAP_KEY}&address=${encodeURIComponent(q)}`).then(r=>r.json()).catch(()=>null);const g=r?.geocodes?.[0];if(!g?.location)return null;const [lng,lat]=g.location.split(',').map(Number);return[lat,lng]}
async function drawRoute(r){if(state.layer)state.layer.remove();state.layer=L.layerGroup().addTo(state.map);const names=[r.start_poi,...(r.waypoints||[]),r.end_poi].filter(Boolean).slice(0,9);const pts=[];for(const n of names){const p=await geocode([n,r.region?.county,r.region?.province].filter(Boolean).join(' '));if(p){pts.push(p);L.circleMarker(p,{radius:7,color:'#1d2c19',fillColor:'#9ddb67',fillOpacity:.9,weight:2}).bindPopup(n).addTo(state.layer)}}if(pts.length>1){L.polyline(pts,{color:'#27341f',weight:5,opacity:.86}).addTo(state.layer);state.map.fitBounds(pts,{padding:[34,34]})}else{state.map.setView([30.6,103.9],5)}}
function gear(r){const g=state.gear[r.route_id];let items=[];g?.categories?.forEach(c=>c.items?.forEach(i=>{if(i.essential==='essential')items.push(i.name)}));return[...new Set(items)].slice(0,7)}
function modeCards(r){const s=state.support[r.route_id]||[],d=state.decisions[r.route_id]||[],tr=state.track[r.route_id],cf=state.conf[r.route_id],ops=state.ops[r.route_id]||{};if(r.activity_type==='hiking')return [['分段重点',[`起终点：${r.start_poi} → ${r.end_poi}`,`水源：${(r.water_supply_points||[]).slice(0,4).join('、')||'待核验'}`,`撤退点：${(r.retreat_points||[]).slice(0,4).join('、')||'待核验'}`]],['导航与轨迹',[`轨迹质量：${tr?.gpx_quality_label||'待核验'}`,`导航难度：${tr?.navigation_difficulty||'unknown'}`,`离线建议：${tr?.recommended_offline_download?'必须提前下载':'建议准备'}`]]];if(['cycling','motorcycle'].includes(r.activity_type))return [['骑行运营',[`道路风险：${(r.risk_tags||[]).slice(0,5).join('、')}`,`补给间隔：${ops.fuel_or_supply_gap_km||'待核验'}km`,r.activity_type==='motorcycle'?'油料与维修点优先核验':'风向、返程和补胎点优先核验']],['长距离压力',[`参考用时：${r.typical_duration_h}h`,`累计爬升：${r.elevation_gain_m}m`,`最高海拔：${r.max_altitude_m}m`]]];if(r.activity_type==='mountaineering')return [['登山结构',[`海拔：${r.max_altitude_m}m`,`风险：${(r.risk_tags||[]).slice(0,5).join('、')}`,`许可：${r.permit_required?'需要核验':'暂无特殊许可'}`]],['折返与营地',[`关键点：${d.filter(x=>x.is_critical).slice(0,3).map(x=>x.name_zh).join('、')||'待补'}`,`支援点：${s.slice(0,3).map(x=>x.name_zh).join('、')||'待补'}`,`数据可信：${cf?.overall_confidence||'C'} 级`]]];return[]}
function selectRoute(id){const r=state.routes.find(x=>x.route_id===id);if(!r)return;state.selected=r;renderList();drawRoute(r);const cards=modeCards(r);$('#detail').innerHTML=`<div class="panel"><div class="detailHead"><div class="kicker">${modeLabel(r.activity_type)} · ${state.conf[r.route_id]?.overall_confidence||'C'} confidence</div><h2>${r.name_zh}</h2><p>${region(r.region)} · ${r.start_poi} → ${r.end_poi}</p></div><div class="metrics"><div class="metric"><b>${r.distance_km}km</b><span>距离</span></div><div class="metric"><b>${r.elevation_gain_m}m</b><span>爬升</span></div><div class="metric"><b>${r.max_altitude_m}m</b><span>最高海拔</span></div><div class="metric"><b>${r.typical_duration_h}h</b><span>参考用时</span></div></div><div class="cards">${cards.map(([h,arr])=>`<article class="card"><h3>${h}</h3><div class="items">${arr.map(x=>`<div><span class="mark">•</span><span>${x}</span></div>`).join('')}</div></article>`).join('')}<article class="card"><h3>装备底线</h3><div class="items">${gear(r).map(x=>`<div><span class="mark">✓</span><span>${x}</span></div>`).join('')||'<div><span class="mark">!</span><span>等待装备数据补齐</span></div>'}</div></article><article class="card"><h3>来源与轨迹</h3><div class="items"><div><span class="mark">i</span><span>${state.track[r.route_id]?.navigation_tips||'使用离线地图和轨迹源交叉核验'}</span></div><div><span class="mark">i</span><span>${state.ops[r.route_id]?.verification_note||'数据待复核'}</span></div></div>${r.gpx_url?`<a class="sourceLink" target="_blank" href="${r.gpx_url}"><b>打开 GPX/轨迹源</b><span>外部</span></a>`:''}<a class="sourceLink" href="weather-pro.html?q=${encodeURIComponent(r.start_poi)}"><b>查询起点天气</b><span>天气窗口</span></a></article></div></div>`}
async function planAB(){const a=$('#from').value.trim(),b=$('#to').value.trim();if(!a||!b){toast('起点和终点都要填');return}if(state.layer)state.layer.remove();state.layer=L.layerGroup().addTo(state.map);const [pa,pb]=await Promise.all([geocode(a),geocode(b)]);if(!pa||!pb){toast('起点或终点定位失败');return}L.marker(pa).bindPopup(a).addTo(state.layer);L.marker(pb).bindPopup(b).addTo(state.layer);L.polyline([pa,pb],{color:'#27341f',weight:5,dashArray:'8 8'}).addTo(state.layer);state.map.fitBounds([pa,pb],{padding:[34,34]});$('#detail').innerHTML=`<div class="panel"><div class="detailHead"><div class="kicker">A-B Draft</div><h2>${a} → ${b}</h2><p>这是起终点草案。正式路径会接高德路线和 Nova v3 轨迹数据后进一步增强。</p></div><div class="cards"><article class="card"><h3>下一步</h3><div class="items"><div><span class="mark">1</span><span>用高德生成基础道路/步行路径。</span></div><div><span class="mark">2</span><span>叠加户外模式差异：徒步看水源撤退，骑行看道路补给，登山看营地和登顶窗口。</span></div></div></article></div></div>`}
$('#modes').addEventListener('click',e=>{const b=e.target.closest('.mode');if(!b)return;state.mode=b.dataset.mode;document.querySelectorAll('.mode').forEach(x=>x.classList.toggle('active',x===b));renderList();selectRoute(match()[0]?.route_id)});document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{state.tab=t.dataset.tab;document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===t));$('#searchBox').style.display=state.tab==='search'?'block':'none';$('#abBox').style.display=state.tab==='ab'?'block':'none'});$('#form').addEventListener('submit',e=>{e.preventDefault();if(state.tab==='ab')planAB();else{renderList();selectRoute(match()[0]?.route_id)}});$('#q').addEventListener('input',()=>renderList());const p=new URLSearchParams(location.search);if(p.get('q'))$('#q').value=p.get('q');load().catch(e=>{$('#list').innerHTML='<div class="empty">数据读取失败。</div>';console.error(e)})
</script>
</body>
</html>
