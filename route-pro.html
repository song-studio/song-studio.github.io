<html lang="zh-CN">

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Noto+Serif+SC:wght@500;700;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --soil:oklch(22% .035 78);
  --soil-2:oklch(17% .03 78);
  --paper:oklch(94% .025 83);
  --paper-2:oklch(88% .028 82);
  --ink:oklch(18% .028 77);
  --muted:oklch(48% .035 78);
  --line:oklch(77% .035 80 / .52);
  --moss:oklch(55% .105 146);
  --pine:oklch(36% .09 148);
  --clay:oklch(58% .11 43);
  --sky:oklch(61% .095 226);
  --warn:oklch(66% .135 72);
  --bad:oklch(57% .16 31);
  --good:oklch(58% .13 151);
  --shadow:0 18px 40px oklch(15% .03 75 / .22);
  --radius:26px;
}
*{box-sizing:border-box} html{background:var(--soil-2);color:var(--ink);scroll-behavior:smooth} body{margin:0;font-family:"IBM Plex Sans",system-ui,sans-serif;background:linear-gradient(180deg,var(--paper),oklch(90% .03 89) 45%,oklch(84% .038 103));min-height:100vh;-webkit-font-smoothing:antialiased} button,input,select{font:inherit} button{cursor:pointer} a{color:inherit;text-decoration:none}.shell{width:min(1120px,100%);margin:0 auto;padding:14px 14px 96px}.topbar{position:sticky;top:0;z-index:20;margin:0 -14px;padding:10px 14px;background:oklch(94% .025 83 / .86);backdrop-filter:blur(18px);border-bottom:1px solid oklch(72% .035 80 / .38);display:flex;align-items:center;justify-content:space-between;gap:10px}.brand{font-family:"Space Grotesk",sans-serif;font-weight:700;letter-spacing:.04em}.topbar nav{display:flex;gap:8px}.navlink{font-size:13px;color:var(--muted);padding:8px 10px;border:1px solid var(--line);border-radius:999px;background:oklch(97% .018 83 / .58)}.hero{padding:26px 0 18px}.eyebrow{font-family:"Space Grotesk",sans-serif;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--pine);font-weight:700}.hero h1{font-family:"Noto Serif SC",serif;font-size:clamp(42px,13vw,88px);line-height:.92;margin:10px 0 14px;letter-spacing:-.05em}.hero p{margin:0;color:var(--muted);font-size:17px;line-height:1.75;max-width:760px}.mission{margin-top:18px;border:1px solid var(--line);border-radius:var(--radius);padding:16px;background:linear-gradient(140deg,oklch(98% .02 87),oklch(88% .045 122));box-shadow:var(--shadow)}.mission strong{display:block;font-family:"Noto Serif SC",serif;font-size:24px;margin-bottom:6px}.action-panel{background:var(--soil);color:var(--paper);border-radius:32px;padding:18px;box-shadow:0 24px 60px oklch(13% .03 75 / .32);position:relative;overflow:hidden}.action-panel:before{content:"";position:absolute;inset:-80px -90px auto auto;width:220px;height:220px;border-radius:50%;background:oklch(65% .13 148 / .24)}.field{position:relative;z-index:1;margin-bottom:14px}.label{display:block;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:oklch(78% .04 92);font-family:"Space Grotesk",sans-serif;margin-bottom:8px}.mode-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.mode-btn{border:1px solid oklch(70% .04 91 / .38);background:oklch(29% .04 78);color:var(--paper);border-radius:18px;padding:13px 8px;text-align:left;font-weight:700}.mode-btn span{display:block;font-size:12px;color:oklch(78% .04 91);font-weight:500;margin-top:2px}.mode-btn.active{background:var(--moss);color:oklch(12% .03 145);border-color:transparent}.mode-btn.active span{color:oklch(21% .045 145)}.input-row{display:grid;grid-template-columns:1fr;gap:9px}.search{width:100%;border:1px solid oklch(70% .04 91 / .4);border-radius:19px;padding:14px 15px;background:oklch(28% .036 78);color:var(--paper);outline:none}.search::placeholder{color:oklch(72% .035 88)}.selects{display:grid;grid-template-columns:1fr 1fr;gap:8px}.selects select{width:100%;border:1px solid oklch(70% .04 91 / .4);border-radius:17px;padding:12px;background:oklch(28% .036 78);color:var(--paper);outline:none}.primary{width:100%;border:0;border-radius:22px;padding:16px;background:linear-gradient(135deg,var(--paper),oklch(82% .12 120));color:var(--soil);font-weight:800;box-shadow:0 14px 28px oklch(10% .03 75 / .25)}.chips{display:flex;gap:8px;overflow:auto;padding:2px 0 6px;scrollbar-width:none}.chip{white-space:nowrap;border:1px solid var(--line);background:oklch(97% .018 83 / .72);border-radius:999px;padding:8px 12px;color:var(--muted);font-size:13px}.section{margin-top:18px}.section-title{display:flex;align-items:end;justify-content:space-between;gap:16px;margin:24px 0 10px}.section-title h2{font-family:"Noto Serif SC",serif;font-size:27px;margin:0;letter-spacing:-.03em}.section-title small{color:var(--muted);font-family:"Space Grotesk",sans-serif}.decision{border-radius:32px;background:oklch(96% .022 82);border:1px solid var(--line);box-shadow:var(--shadow);overflow:hidden}.decision-head{padding:18px;background:linear-gradient(135deg,oklch(33% .05 78),oklch(25% .05 140));color:var(--paper)}.verdict{display:inline-flex;align-items:center;gap:8px;border-radius:999px;padding:7px 10px;background:oklch(95% .02 88 / .12);border:1px solid oklch(80% .04 90 / .26);font-weight:800;font-size:13px}.decision-head h2{font-family:"Noto Serif SC",serif;font-size:34px;line-height:1.08;margin:14px 0 8px}.decision-head p{margin:0;color:oklch(84% .03 90);line-height:1.65}.metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--line)}.metric{background:oklch(97% .018 83);padding:14px}.metric b{display:block;font-family:"Space Grotesk",sans-serif;font-size:21px}.metric span{display:block;color:var(--muted);font-size:12px;margin-top:2px}.cards{display:grid;grid-template-columns:1fr;gap:10px;padding:12px}.card{border:1px solid var(--line);border-radius:24px;padding:15px;background:oklch(98% .015 83)}.card h3{margin:0 0 8px;font-size:18px}.list{display:grid;gap:8px}.list div{display:flex;gap:10px;align-items:flex-start;color:var(--muted);line-height:1.55}.mark{width:22px;height:22px;border-radius:50%;display:inline-grid;place-items:center;flex:0 0 22px;background:oklch(88% .06 130);color:var(--pine);font-weight:900;font-size:12px}.risk-line{display:grid;gap:8px}.risk{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center}.risk i{width:10px;height:10px;border-radius:50%;background:var(--good)}.risk.warn i{background:var(--warn)}.risk.bad i{background:var(--bad)}.bar{height:7px;background:oklch(88% .025 83);border-radius:999px;overflow:hidden}.bar span{display:block;height:100%;background:var(--moss);border-radius:999px}.risk.warn .bar span{background:var(--warn)}.risk.bad .bar span{background:var(--bad)}.route-list{display:grid;grid-template-columns:1fr;gap:10px}.route-item{border:1px solid var(--line);border-radius:24px;background:oklch(97% .018 83);padding:14px;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center}.route-item h3{margin:0 0 5px;font-size:18px}.route-item p{margin:0;color:var(--muted);font-size:13px}.score{font-family:"Space Grotesk",sans-serif;font-size:24px;font-weight:700;color:var(--pine)}.map-card{border-radius:32px;background:linear-gradient(135deg,oklch(29% .05 76),oklch(23% .05 145));color:var(--paper);padding:18px;position:relative;overflow:hidden}.map-card:before{content:"";position:absolute;inset:18px;border:1px solid oklch(85% .04 95 / .15);border-radius:24px}.contours{height:190px;border-radius:24px;background:repeating-radial-gradient(circle at 72% 38%,oklch(78% .05 110 / .22) 0 2px,transparent 2px 16px),linear-gradient(160deg,oklch(40% .07 143),oklch(24% .04 72));margin-top:12px;position:relative}.pin{position:absolute;width:12px;height:12px;border-radius:50%;background:var(--paper);box-shadow:0 0 0 8px oklch(94% .02 83 / .18)}.pin.a{left:22%;top:65%}.pin.b{right:20%;top:24%}.map-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;position:relative}.ghost{border:1px solid oklch(84% .04 94 / .35);background:oklch(96% .02 83 / .08);color:var(--paper);border-radius:17px;padding:12px;font-weight:700;text-align:center}.toast{position:fixed;left:14px;right:14px;bottom:18px;z-index:50;background:var(--soil);color:var(--paper);border-radius:20px;padding:14px 16px;box-shadow:var(--shadow);transform:translateY(120%);transition:.28s ease}.toast.show{transform:translateY(0)}.empty{padding:18px;border:1px dashed var(--line);border-radius:24px;color:var(--muted);background:oklch(97% .018 83)}
@media(min-width:780px){.shell{padding:22px 24px 110px}.hero-grid{display:grid;grid-template-columns:1fr 430px;gap:22px;align-items:start}.action-panel{position:sticky;top:84px}.cards{grid-template-columns:repeat(3,1fr)}.metrics{grid-template-columns:repeat(4,1fr)}.route-list{grid-template-columns:repeat(2,1fr)}.topbar{margin:0 -24px;padding-inline:24px}.input-row{grid-template-columns:1fr}.mission{max-width:720px}}
@media(max-width:420px){.shell{padding-inline:12px}.topbar{margin:0 -12px}.navlink{padding:7px 8px}.mode-grid{gap:7px}.mode-btn{font-size:14px}.decision-head h2{font-size:29px}.selects{grid-template-columns:1fr}.metric b{font-size:19px}}
</style>
</head>
<body>
<div class="shell">
  <header class="topbar">
    <a class="brand" href="https://song-studio.github.io/">SONG FIELD</a>
    <nav><a class="navlink" href="weather-pro.html">天气窗口</a><a class="navlink" href="#routes">精选线库</a></nav>
  </header>

  <section class="hero-grid">
    <div>
      <div class="hero">
        <div class="eyebrow">Mobile Outdoor Decision Desk</div>
        <h1>山野行动台</h1>
        <p>不是路线百科，也不是地图导航。它先问你要做什么，再把路线、天气、撤退、补给和装备压缩成一张出发前能看懂的行动判断。</p>
      </div>
      <div class="mission">
        <strong>今天到底能不能去？</strong>
        <div>我们只回答最关键的事：适不适合出发，几点前完成关键路段，哪里该撤，哪些装备不能省。</div>
      </div>
    </div>

    <form class="action-panel" id="planner">
      <div class="field">
        <span class="label">01 活动类型</span>
        <div class="mode-grid" id="modeGrid">
          <button type="button" class="mode-btn active" data-mode="hiking">徒步<span>距离、补给、路面</span></button>
          <button type="button" class="mode-btn" data-mode="cycling">骑行<span>风向、坡度、返程</span></button>
          <button type="button" class="mode-btn" data-mode="mountaineering">登山<span>海拔、雷暴、折返</span></button>
        </div>
      </div>
      <div class="field">
        <span class="label">02 目的地或线路</span>
        <div class="input-row"><input class="search" id="routeQuery" placeholder="例如 雨崩、武功山、独库、青海湖"></div>
      </div>
      <div class="field selects">
        <label><span class="label">强度</span><select id="intensity"><option value="easy">轻松</option><option value="standard" selected>标准</option><option value="hard">挑战</option></select></label>
        <label><span class="label">时间</span><select id="day"><option value="today">今天</option><option value="tomorrow" selected>明天</option><option value="weekend">周末</option></select></label>
      </div>
      <button class="primary" type="submit">生成行动判断</button>
    </form>
  </section>

  <section class="section">
    <div class="chips" id="quickChips"></div>
  </section>

  <main id="result"></main>

  <section class="section" id="routes">
    <div class="section-title"><h2>精选线库</h2><small id="routeCount">读取中</small></div>
    <div class="route-list" id="routeList"></div>
  </section>
</div>
<div class="toast" id="toast"></div>
<script>
const AMAP_KEY='39a8c2f6ef75e494198f3e3751701ebe';
const DATA_ROOT='data/inbox/2026-05-17/';
const modeText={hiking:'徒步',cycling:'骑行',mountaineering:'登山',motorcycle:'摩托'};
let state={mode:'hiking',routes:[],ops:{},gear:{},support:{},decisions:{},confidence:{},track:{},selected:null,weather:null};
const $=s=>document.querySelector(s);
function toast(msg){const el=$('#toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2600)}
function regionText(r){if(!r)return '待核验地区';return [r.province,r.city_prefecture,r.county].filter(Boolean).join(' · ')}
function seasonOK(season){if(!season)return 60;const m=new Date().getMonth()+1;let ok=false;String(season).split(',').forEach(part=>{const [a,b]=part.split('-').map(Number);if(a&&b){if(a<=b&&m>=a&&m<=b)ok=true;if(a>b&&(m>=a||m<=b))ok=true}});return ok?88:52}
function difficulty(r){let s=0;s+=(+r.distance_km||0)/8;s+=(+r.elevation_gain_m||0)/420;s+=(+r.max_altitude_m||0)>3500?2:0;s+=(+r.typical_duration_h||0)>24?2:0;return Math.min(10,Math.round(s))}
function scoreRoute(r){const ops=state.ops[r.route_id]||{};let score=seasonOK(r.season_window);score-=difficulty(r)*3;if(ops.emergency_access_score)score+=Number(ops.emergency_access_score)*2;if(ops.data_confidence==='high')score+=5;if(String(r.signal_coverage).includes('poor'))score-=8;return Math.max(18,Math.min(96,Math.round(score)))}
function riskGrade(r,weather){const d=difficulty(r);const ops=state.ops[r.route_id]||{};const wind=weather?.wind||0, rain=weather?.rain||0, storm=weather?.storm||0;let risk=d*7+(wind>38?18:wind>25?9:0)+(rain>55?16:rain>35?8:0)+(storm>35?24:storm>18?10:0);if((+r.max_altitude_m||0)>4000)risk+=12;if(ops.season_status==='partial')risk+=8;if(ops.season_status==='closed')risk+=40;return Math.min(100,Math.round(risk))}
function verdict(r,weather){const risk=riskGrade(r,weather);if(risk>=70)return ['不建议','bad','今天条件不适合硬上，建议改期或换低风险线路。'];if(risk>=46)return ['谨慎','warn','可以做，但要压缩强度、提前折返，并保留 Plan B。'];return ['适合','good','条件相对友好，按窗口出发，关键路段不要拖到下午。']}
function pickWeatherWindow(weather){if(!weather)return '08:00 至 13:00';if(weather.rain>55||weather.storm>30)return '07:00 至 11:30';if(weather.wind>35)return '09:00 至 14:00';return '08:00 至 15:00'}
function mandatoryGear(r){const g=state.gear[r.route_id];let items=[];if(g?.categories){g.categories.forEach(c=>c.items?.forEach(i=>{if(i.essential==='essential')items.push(i.name)}))}if(!items.length){items=['离线地图','头灯','雨具','保温层','急救包'];if(state.mode==='cycling')items=['头盔','补胎工具','雨衣','前后灯','电解质'];if(state.mode==='mountaineering')items=['头盔','保温层','手套','头灯','高反药','离线轨迹']}return [...new Set(items)].slice(0,6)}
function fieldIntel(r){const support=(state.support[r.route_id]||[]).slice(0,4);const decisions=(state.decisions[r.route_id]||[]).filter(x=>x.is_critical).slice(0,3);const conf=state.confidence[r.route_id];const track=state.track[r.route_id];const out=[];if(decisions.length)out.push('关键决策点：'+decisions.map(x=>x.name_zh).join('、'));if(support.length)out.push('支援点：'+support.map(x=>x.name_zh).join('、'));if(track)out.push(`轨迹质量：${track.gpx_quality_label||'unknown'}，导航难度 ${track.navigation_difficulty||'待核验'}，${track.recommended_offline_download?'必须提前离线':'可现场导航'}`);if(conf)out.push(`数据可信度：${conf.overall_confidence} 级，来源 ${conf.data_freshness?.source_count||'?'} 组，最后核验 ${conf.data_freshness?.last_verified||'待补'}`);return out.length?out:['暂无足够现场点数据，按保守策略处理。']}
function actionBullets(r,weather){const risk=riskGrade(r,weather);const ret=(r.retreat_points||[]).slice(0,3).join('、')||'入口、补给点、最近公路';const bullets=[];bullets.push(`把 ${pickWeatherWindow(weather)} 当作主行动窗口，超过窗口不要继续加码。`);bullets.push(`折返参考点：${ret}。手机里提前保存离线地图和联系人。`);if((+r.max_altitude_m||0)>3500)bullets.push('海拔超过 3500 米，第一天不要冲强度，头痛、恶心、步态异常直接下撤。');if(weather?.storm>25)bullets.push('雷暴信号存在，暴露山脊、垭口、水边和孤立树下都不是安全位置。');if(weather?.wind>32)bullets.push('风力会放大体感和失温风险，骑行和山脊路段尤其要保守。');if(risk<46)bullets.push('今天可以把重点放在节奏控制，不要为了打卡牺牲下撤时间。');return bullets.slice(0,5)}
function routeMatches(q){q=q.trim().toLowerCase();let pool=state.routes.filter(r=>r.activity_type===state.mode||(state.mode==='cycling'&&r.activity_type==='motorcycle'));if(q){pool=pool.filter(r=>[r.name_zh,...(r.aliases||[]),regionText(r.region),r.start_poi,r.end_poi].join(' ').toLowerCase().includes(q))}return pool.sort((a,b)=>scoreRoute(b)-scoreRoute(a)).slice(0,8)}
function groupByRoute(list){return list.reduce((a,x)=>{(a[x.route_id]||(a[x.route_id]=[])).push(x);return a},{})}
async function loadData(){const [routes,ops,gear,support,decisions,conf,track]=await Promise.all([
 fetch(DATA_ROOT+'routes_cn_v1.json').then(r=>r.json()),
 fetch(DATA_ROOT+'routes_ops_delta_v2.json').then(r=>r.json()).catch(()=>[]),
 fetch(DATA_ROOT+'gear_strategy_v1.json').then(r=>r.json()).catch(()=>[]),
 fetch(DATA_ROOT+'route_support_points_v1.json').then(r=>r.json()).catch(()=>[]),
 fetch(DATA_ROOT+'route_decision_points_v1.json').then(r=>r.json()).catch(()=>[]),
 fetch(DATA_ROOT+'route_confidence_v1.json').then(r=>r.json()).catch(()=>[]),
 fetch(DATA_ROOT+'track_quality_v1.json').then(r=>r.json()).catch(()=>[])
]);state.routes=routes;state.ops=Object.fromEntries(ops.map(x=>[x.route_id,x]));state.gear=Object.fromEntries(gear.map(x=>[x.route_id,x]));state.support=groupByRoute(support);state.decisions=groupByRoute(decisions);state.confidence=Object.fromEntries(conf.map(x=>[x.route_id,x]));state.track=Object.fromEntries(track.map(x=>[x.route_id,x]));renderChips();renderRouteList();selectRoute(routeMatches('')[0]);}
function renderChips(){const names=['雨崩','武功山','虎跳峡','独库','青海湖','四姑娘山','贡嘎','环海南岛'];$('#quickChips').innerHTML=names.map(n=>`<button class="chip" onclick="quick('${n}')">${n}</button>`).join('')}
function renderRouteList(){const list=routeMatches($('#routeQuery').value).slice(0,6);$('#routeCount').textContent=`${state.routes.filter(r=>r.activity_type===state.mode||(state.mode==='cycling'&&r.activity_type==='motorcycle')).length} 条可筛选`;$('#routeList').innerHTML=list.map(r=>`<button class="route-item" onclick="selectById('${r.route_id}')"><div><h3>${r.name_zh}</h3><p>${regionText(r.region)} · ${r.distance_km}km · 爬升 ${r.elevation_gain_m}m</p></div><div class="score">${scoreRoute(r)}</div></button>`).join('')||'<div class="empty">没有匹配线路，换个关键词试试。</div>'}
function quick(n){$('#routeQuery').value=n;const match=routeMatches(n)[0];if(match)selectRoute(match);renderRouteList()}
function selectById(id){const r=state.routes.find(x=>x.route_id===id);if(r)selectRoute(r)}
async function geocode(q){const res=await fetch(`https://restapi.amap.com/v3/geocode/geo?key=${AMAP_KEY}&address=${encodeURIComponent(q)}`).then(r=>r.json()).catch(()=>null);const g=res?.geocodes?.[0];if(!g?.location)return null;const [lng,lat]=g.location.split(',').map(Number);return {lat,lng}}
async function weatherFor(r){const q=[r.start_poi,r.region?.county,r.region?.city_prefecture,r.region?.province].filter(Boolean).join(' ');const g=await geocode(q);if(!g)return null;const url=`https://api.open-meteo.com/v1/forecast?latitude=${g.lat}&longitude=${g.lng}&hourly=precipitation_probability,wind_speed_10m,weather_code,temperature_2m,visibility&daily=precipitation_probability_max,wind_speed_10m_max,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=3`;
 const d=await fetch(url).then(r=>r.json()).catch(()=>null);if(!d)return null;const codes=d.hourly?.weather_code||[];return {rain:Math.max(...(d.hourly?.precipitation_probability||[0]).slice(0,24)),wind:Math.max(...(d.hourly?.wind_speed_10m||[0]).slice(0,24)),storm:codes.slice(0,24).some(c=>c>=95)?45:0,tempMax:d.daily?.temperature_2m_max?.[0],tempMin:d.daily?.temperature_2m_min?.[0],lat:g.lat,lng:g.lng}}
async function selectRoute(r){state.selected=r;state.weather=null;renderDecision();weatherFor(r).then(w=>{state.weather=w;renderDecision()})}
function renderDecision(){const r=state.selected;if(!r)return;const w=state.weather;const ops=state.ops[r.route_id]||{};const [v,cls,why]=verdict(r,w);const risks=[['路线强度',difficulty(r)*10,difficulty(r)>6?'warn':'good'],['天气压力',w?Math.max(w.rain,w.wind,w.storm):32,w&&Math.max(w.rain,w.wind,w.storm)>55?'bad':w&&Math.max(w.rain,w.wind,w.storm)>35?'warn':'good'],['救援可达',100-(Number(ops.emergency_access_score||3)*18),Number(ops.emergency_access_score||3)<=2?'bad':'warn'],['数据可信',ops.data_confidence==='high'?24:ops.data_confidence==='medium'?44:62,ops.data_confidence==='high'?'good':ops.data_confidence==='medium'?'warn':'bad']];
 $('#result').innerHTML=`<section class="section"><div class="decision"><div class="decision-head"><span class="verdict">${v}</span><h2>${r.name_zh}</h2><p>${why}</p></div><div class="metrics"><div class="metric"><b>${r.distance_km}km</b><span>路线距离</span></div><div class="metric"><b>${r.elevation_gain_m}m</b><span>累计爬升</span></div><div class="metric"><b>${r.typical_duration_h}h</b><span>参考用时</span></div><div class="metric"><b>${pickWeatherWindow(w)}</b><span>建议窗口</span></div></div><div class="cards"><article class="card"><h3>行动指令</h3><div class="list">${actionBullets(r,w).map(x=>`<div><span class="mark">${cls==='bad'?'!':'✓'}</span><span>${x}</span></div>`).join('')}</div></article><article class="card"><h3>风险仪表</h3><div class="risk-line">${risks.map(([n,val,c])=>`<div class="risk ${c}"><i></i><span>${n}</span><b>${Math.round(100-val)}</b><div></div><div class="bar"><span style="width:${100-val}%"></span></div><span></span></div>`).join('')}</div></article><article class="card"><h3>不能省的装备</h3><div class="list">${mandatoryGear(r).map(x=>`<div><span class="mark">•</span><span>${x}</span></div>`).join('')}</div></article><article class="card"><h3>现场情报</h3><div class="list">${fieldIntel(r).map(x=>`<div><span class="mark">i</span><span>${x}</span></div>`).join('')}</div></article></div></div></section><section class="section"><div class="map-card"><div class="eyebrow">Terrain Preview</div><h2 style="font-family:'Noto Serif SC',serif;margin:8px 0 0;font-size:28px">地形视图先做判断，不抢第一屏</h2><div class="contours"><span class="pin a"></span><span class="pin b"></span></div><div class="map-actions"><a class="ghost" href="https://uri.amap.com/search?keyword=${encodeURIComponent(r.name_zh)}" target="_blank">高德查看</a><a class="ghost" href="weather-pro.html?q=${encodeURIComponent(r.start_poi||r.name_zh)}&mode=${state.mode}">看天气窗口</a></div></div></section>`}
$('#modeGrid').addEventListener('click',e=>{const b=e.target.closest('.mode-btn');if(!b)return;state.mode=b.dataset.mode;document.querySelectorAll('.mode-btn').forEach(x=>x.classList.toggle('active',x===b));renderRouteList();selectRoute(routeMatches($('#routeQuery').value)[0]||state.routes.find(r=>r.activity_type===state.mode));});
$('#routeQuery').addEventListener('input',renderRouteList);
$('#planner').addEventListener('submit',e=>{e.preventDefault();const r=routeMatches($('#routeQuery').value)[0];if(!r){toast('没有找到匹配线路，先换一个关键词');return}selectRoute(r);renderRouteList();document.getElementById('result').scrollIntoView({behavior:'smooth',block:'start'});});
loadData().catch(()=>{$('#routeList').innerHTML='<div class="empty">路线数据读取失败，请检查 data 目录。</div>';toast('路线数据读取失败')});
</script>
