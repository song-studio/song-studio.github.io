ailMode .detail{margin-top:0;border-top:0}.sheet.mapMode{max-height:82px;overflow:hidden}.sheet.mapMode .tools,.sheet.mapMode .list,.sheet.mapMode .detail,.sheet.mapMode .count,.sheet.mapMode .backList{display:none}.grab{height:22px;display:grid;place-items:center}.grab:before{content:"";width:46px;height:4px;background:oklch(70% .035 92)}.tools{padding:0 12px 10px;border-bottom:1px solid var(--line)}.modes,.regions{display:grid;gap:6px;margin-bottom:8px}.modes{grid-template-columns:repeat(3,1fr)}.regions{grid-template-columns:repeat(3,1fr)}.mode,.region{border:1px solid var(--line);background:oklch(94% .035 92);padding:9px 4px;font-size:13px;font-weight:900}.mode.active,.region.active{background:var(--dark);color:var(--panel);border-color:var(--dark)}.tabs{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}.tab{border:1px solid var(--line);background:var(--panel);padding:9px;font-size:13px;font-weight:800}.tab.active{background:var(--acid);border-color:oklch(65% .13 115)}.searchLine{display:grid;grid-template-columns:1fr auto;gap:6px}.searchLine input{min-width:0;border:1px solid var(--line);background:oklch(99% .015 92);padding:12px;outline:none}.searchLine button{border:0;background:var(--olive);color:var(--panel);padding:0 14px;font-weight:900}.ab{display:grid;grid-template-columns:1fr;gap:6px}.ab input{border:1px solid var(--line);padding:12px}.content{overflow:auto;padding:10px 12px 14px}.count{font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:8px}.list{display:grid;gap:8px}.route{border:1px solid var(--line);background:oklch(99% .012 92);padding:11px;text-align:left;display:grid;grid-template-columns:1fr auto;gap:10px}.route.active{outline:3px solid color-mix(in oklch,var(--acid),transparent 15%)}.route h3{margin:0 0 4px;font-size:17px}.route p{margin:0;color:var(--muted);font-size:12px;line-height:1.45}.badges{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}.badge{display:inline-flex;align-items:center;border:1px solid var(--line);background:oklch(95% .025 92);padding:3px 6px;font-family:var(--mono);font-size:10px;color:var(--ink)}.badge.warn{background:oklch(94% .07 76);border-color:oklch(74% .09 76)}.badge.good{background:oklch(93% .08 145);border-color:oklch(70% .1 145)}.badge.bad{background:oklch(94% .06 30);border-color:oklch(70% .1 30)}.grade{font-family:var(--mono);font-size:11px;color:var(--muted);text-align:right;min-width:58px}.detail{margin-top:10px;border-top:2px solid var(--dark);padding-top:10px}.detailTop{display:flex;justify-content:space-between;gap:10px;align-items:start}.detail h2{font-family:var(--cond);font-size:34px;line-height:.95;margin:0 0 8px;letter-spacing:-.03em}.mapBtn{border:1px solid var(--line);background:var(--dark);color:var(--panel);padding:9px 10px;font-weight:900;white-space:nowrap}.mini{display:none;padding:0 12px 12px}.sheet.mapMode .mini{display:flex;justify-content:space-between;align-items:center;gap:10px}.mini b{font-size:14px}.mini span{font-family:var(--mono);font-size:10px;color:var(--muted)}.mini button{border:1px solid var(--line);background:var(--acid);font-weight:900;padding:8px 10px}.summary{color:var(--muted);line-height:1.55;margin:0 0 10px}.metrics{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--line);border-right:0;border-bottom:0;margin-bottom:10px}.metric{background:oklch(99% .012 92);border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:8px}.metric b{font-family:var(--mono);display:block;font-size:15px}.metric span{font-size:10px;color:var(--muted)}.cards{display:grid;gap:8px}.card{background:oklch(99% .012 92);border:1px solid var(--line);padding:10px}.card h3{margin:0 0 7px;font-size:16px}.item{display:grid;grid-template-columns:18px 1fr;gap:7px;color:var(--muted);font-size:13px;line-height:1.5;margin:5px 0}.mark{font-family:var(--mono);color:var(--olive);font-weight:700}.empty{border:1px dashed var(--line);background:oklch(99% .012 92);padding:12px;color:var(--muted);line-height:1.6}.src{display:flex;justify-content:space-between;border:1px solid var(--line);padding:9px;margin-top:6px;background:oklch(95% .025 92);font-size:13px}.backList{display:none;border:1px solid var(--line);background:var(--acid);padding:10px 12px;font-weight:900;margin-bottom:10px;width:100%;text-align:left}.sheet.detailMode .backList{display:block}@media(min-width:860px){.sheet{left:auto;right:14px;top:14px;bottom:14px;width:440px;max-height:none}.content{padding-bottom:20px}.cards{grid-template-columns:1fr 1fr}.ab{grid-template-columns:1fr 1fr}.mapWrap{height:calc(100vh - 51px)}.sheet.mapMode{max-height:none;width:260px;top:auto;bottom:14px}}@media(max-width:859px){.sheet{max-height:58dvh}.sheet.detailMode{max-height:42dvh;left:10px;right:10px;bottom:10px;grid-template-rows:auto 1fr}.sheet.detailMode .content{padding-top:8px}.sheet.detailMode .grab{height:16px}.sheet.detailMode .detail h2{font-size:30px}.sheet.detailMode .metrics{position:sticky;top:0;z-index:2;box-shadow:0 10px 22px color-mix(in oklch,var(--ink),transparent 92%)}.legend{top:12px;left:12px}.leaflet-control-zoom{margin-bottom:44dvh!important}}@media(max-width:430px){.metrics{grid-template-columns:repeat(2,1fr)}.brand{font-size:20px}.sheet{max-height:58dvh}.sheet.detailMode{max-height:40dvh}.mode,.region{font-size:12px}.mapControls{top:48px}}

<body><div class="app"><header class="top"><a class="brand" href="https://song-studio.github.io/">路线决策台</a><a class="weather" href="weather-pro.html">山野气象台</a></header><main class="mapWrap"><div id="map"></div><div class="legend" id="legend">轨迹分级：实走 / 来源 / 关键点示意 / 待核验</div><div class="mapControls"><button data-layer="std" class="active">标准</button><button data-layer="sat">卫星</button><button data-layer="hyb">路网</button></div><section class="sheet"><div class="grab"></div><div class="tools"><div class="modes" id="modes"><button class="mode active" data-mode="hiking">徒步</button><button class="mode" data-mode="cycling">骑行</button><button class="mode" data-mode="mountaineering">登山</button></div><div class="regions" id="regions"><button class="region active" data-region="all">全部</button><button class="region" data-region="domestic">国内</button><button class="region" data-region="global">国外</button></div><div class="tabs"><button class="tab active" data-tab="search">搜地点/线路</button><button class="tab" data-tab="ab">起点 → 终点</button></div><form id="form"><div id="searchBox" class="searchLine"><input id="q" placeholder="武功山 / 雨崩 / 独库 / 四姑娘山"><button>查</button></div><div id="abBox" class="ab" style="display:none"><input id="from" placeholder="起点"><input id="to" placeholder="终点"><button class="tab" style="grid-column:1/-1">生成草案</button></div></form></div><div class="mini" id="mini"></div><div class="content"><button class="backList" onclick="showList()">← 返回线路列表</button><div class="count" id="count">正在读取</div><div class="list" id="list"></div><div class="detail" id="detail"></div></div></section></main></div><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><script>
const PROCESSED='data/processed/outdoor_routes_v5.json';const $=s=>document.querySelector(s);let S={mode:'hiking',region:'all',tab:'search',routes:[],sel:null,map:null,layer:null,base:{},baseNow:null};
function label(m){return{hiking:'徒步',cycling:'骑行/摩旅',mountaineering:'登山'}[m]||m}function regionOf(r){return r.region_scope||(/[A-Za-z]|尼泊尔|日本|冰岛|瑞士|法国|意大利|秘鲁|新西兰/.test([r.country_or_region,r.region_text,r.region_text_zh,r.name_en].join(' '))?'global':'domestic')}function regionLabel(r){return regionOf(r)==='global'?'国外':'国内'}
function trackGrade(r){if(r.track_grade)return r.track_grade;if(r.track_type==='gpx_url_only')return'source_track';if(r.track_type==='key_points')return'key_points';if(r.gpx_url&&r.track_points?.length&&r.geometry_confidence==='A')return'source_track';if(r.track_points?.length)return'key_points';return'unverified'}
function trackInfo(r){const g=trackGrade(r),m={real_track:['实走轨迹','good','可导航参考'],source_track:['来源轨迹','warn','外部来源，本站未解析'],key_points:['关键点示意','warn','直线连接，不可直接导航'],unverified:['待核验','bad','资料不足']};return m[g]||m.unverified}function dataBadge(r){return`资料 ${r.confidence_grade||r.data_confidence||'C'}`}function geomBadge(r){return`轨迹 ${r.geometry_confidence||'C'}`}
async function load(){const data=await fetch(PROCESSED).then(r=>r.json());S.routes=(data.routes||[]).filter(r=>['hiking','cycling','mountaineering'].includes(r.mode));initMap();renderList();select(first()?.route_id)}
function initMap(){S.map=L.map('map',{zoomControl:false}).setView([31,103],5);S.base.std=L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}',{subdomains:'1234',maxZoom:18,attribution:'高德'});S.base.sat=L.tileLayer('https://webst0{s}.is.autonavi.com/appmaptile?style=6&x={x}&y={y}&z={z}',{subdomains:'1234',maxZoom:18,attribution:'高德卫星'});S.base.road=L.tileLayer('https://webst0{s}.is.autonavi.com/appmaptile?style=8&x={x}&y={y}&z={z}',{subdomains:'1234',maxZoom:18,attribution:'高德路网'});S.baseNow=S.base.std.addTo(S.map);L.control.zoom({position:'bottomleft'}).addTo(S.map)}
function switchLayer(k){if(S.baseNow)S.baseNow.remove();S.baseNow=S.base[k==='hyb'? 'sat':k].addTo(S.map);if(k==='hyb')S.base.road.addTo(S.map);else if(S.map.hasLayer(S.base.road))S.base.road.remove();document.querySelectorAll('.mapControls button').forEach(b=>b.classList.toggle('active',b.dataset.layer===k))}
function pool(){return S.routes.filter(r=>r.mode===S.mode&&(S.region==='all'||regionOf(r)===S.region))}function rank(r){const c={A:4,B:3,C:2,D:1}[r.confidence_grade||'C']||2,g={A:4,B:3,C:2,D:1}[r.geometry_confidence||'C']||2;return c*10+g}function first(){return match()[0]}function match(){const q=($('#q')?.value||'').trim().toLowerCase();let a=pool();if(q)a=a.filter(r=>[r.name_zh,r.name_en,...(r.aliases||[]),r.start_poi,r.end_poi,r.region_text,r.region_text_zh,(r.risk_tags||[]).join(' ')].join(' ').toLowerCase().includes(q));return a.sort((a,b)=>rank(b)-rank(a))}
function badgeHtml(r){const t=trackInfo(r);return`<div class="badges"><span class="badge">${dataBadge(r)}</span><span class="badge">${geomBadge(r)}</span><span class="badge ${t[1]}">${t[0]}</span><span class="badge">${regionLabel(r)}</span></div>`}
function renderList(){const a=match();$('#count').textContent=`${label(S.mode)} / ${S.region==='all'?'全部':S.region==='global'?'国外':'国内'} / ${a.length} 条线路`;$('#list').innerHTML=a.slice(0,40).map(r=>`<button class="route ${S.sel?.route_id===r.route_id?'active':''}" onclick="select('${r.route_id}')"><div><h3>${r.name_zh}</h3><p>${r.start_poi||'起点待核验'} → ${r.end_poi||'终点待核验'}<br>${r.distance_km||'--'}km · +${r.elevation_gain_m||'--'}m · ${r.max_altitude_m||'--'}m</p>${badgeHtml(r)}</div><span class="grade">${trackInfo(r)[0]}</span></button>`).join('')||'<div class="empty">没有匹配线路。国外精选数据等 Nova 补充后进入这里。</div>'}
function draw(r){if(S.layer)S.layer.remove();S.layer=L.layerGroup().addTo(S.map);let pts=[];if(r.track_points?.length)pts=r.track_points.map(p=>[p.lat,p.lng]);if(!pts.length){S.map.setView([31,103],5);return}const ti=trackInfo(r),lineColor=ti[1]==='good'?'#2f7b4f':ti[1]==='bad'?'#bf3d2c':'#11140f';r.track_points.forEach((p,i)=>L.circleMarker([p.lat,p.lng],{radius:i===0||i===r.track_points.length-1?7:5,color:'#11140f',fillColor:i===0?'#c8f05a':i===r.track_points.length-1?'#bf3d2c':'#fffdf3',fillOpacity:1,weight:2}).bindPopup(`${p.name||'轨迹点'}<br>${ti[0]}`).addTo(S.layer));L.polyline(pts,{color:lineColor,weight:5,opacity:.9,dashArray:trackGrade(r)==='key_points'?'9 8':null}).addTo(S.layer);(r.cycling_poi||[]).slice(0,24).forEach(p=>L.circleMarker([p.lat,p.lng],{radius:5,color:'#2b67d1',fillColor:'#2b67d1',fillOpacity:.75,weight:1}).bindPopup(`${p.name_zh}<br>${p.poi_type||''}<br>${p.mobile_note||''}`).addTo(S.layer));(r.mountaineering_geo||[]).slice(0,24).forEach(p=>L.circleMarker([p.lat,p.lng],{radius:5,color:'#a45a32',fillColor:'#a45a32',fillOpacity:.8,weight:1}).bindPopup(`${p.name_zh}<br>${p.point_type||''}<br>${p.mobile_note||''}`).addTo(S.layer));const mobile=window.matchMedia('(max-width: 859px)').matches;S.map.fitBounds(pts,mobile?{paddingTopLeft:[28,42],paddingBottomRight:[28,Math.round(window.innerHeight*.43)]}:{padding:[40,40]})}
function rows(title,arr){return`<div class="card"><h3>${title}</h3>${(arr?.length?arr:['待补充']).map(x=>`<div class="item"><span class="mark">•</span><span>${x}</span></div>`).join('')}</div>`}function gear(r){return (r.gear_essential||[]).slice(0,6)}function showList(){document.querySelector('.sheet').classList.remove('detailMode','mapMode');$('#detail').innerHTML=''}function enterMap(){document.querySelector('.sheet').classList.add('mapMode');setTimeout(()=>S.map.invalidateSize(),80)}function exitMap(){document.querySelector('.sheet').classList.remove('mapMode');setTimeout(()=>S.map.invalidateSize(),80)}
function detailRows(r){if(r.activity_type==='hiking'){const ss=(r.segments||[]).slice(0,6);return[rows('徒步分段',ss.map(s=>`${s.visual_label_mobile||s.segment_character||'分段'}：${s.from_name} → ${s.to_name}，${s.distance_km}km，+${s.elevation_gain_m}m，${s.water_available} 水源`)),rows('水源/撤退/导航',[(r.water_points||[]).slice(0,4).join('、')||'水源待核验',(r.retreat_points||[]).slice(0,4).join('、')||'撤退点待核验',r.navigation?.tip||'离线轨迹优先'])]}if(r.mode==='cycling'){const c=r.cycling_ops,pois=(r.cycling_poi||[]).slice(0,8);return[rows('道路运营',c?[`道路：${c.road_classes}`,`路面：${c.surface_mix}`,`交通：${c.traffic_level}，横风 ${c.crosswind_exposure}`]:[]),rows('补给/维修/危险段',c?[`维修：${c.repair_points}`,`补给间隔：${c.resupply_interval_km}`,`危险：${c.danger_sections}`]:[]),rows('沿途关键点',pois.map(p=>`${p.name_zh} · ${p.poi_type} · ${p.mobile_note||''}`))]}if(r.activity_type==='mountaineering'){const c=r.mountaineering,geo=(r.mountaineering_geo||[]).slice(0,8);return[rows('营地与登顶',c?[`BC：${c.basecamp}`,`出发：${c.summit_push_start_time}，折返：${c.turnaround_time}`,`等级：${c.technical_grade}`]:[]),rows('技术/红线',c?[`地形：${c.terrain_type}`,`装备：${c.required_gear}`,`天气红线：${c.weather_abort_thresholds}`]:[]),rows('地理点位',geo.map(p=>`${p.name_zh} · ${p.point_type} · ${p.altitude_m||''}m · ${p.mobile_note||''}`))]}return[]}
function select(id){const r=S.routes.find(x=>x.route_id===id);if(!r)return;S.sel=r;renderList();draw(r);const ti=trackInfo(r);document.querySelector('.sheet').classList.add('detailMode');document.querySelector('.sheet').classList.remove('mapMode');$('.content').scrollTop=0;$('#mini').innerHTML=`<div><b>${r.name_zh}</b><br><span>${ti[0]} · ${r.distance_km||'--'}km · +${r.elevation_gain_m||'--'}m</span></div><button onclick="exitMap()">看详情</button>`;$('#legend').textContent=`${ti[0]}：${ti[2]}`;$('#detail').innerHTML=`<div class="detailTop"><div><h2>${r.name_zh}</h2><p class="summary">${label(r.mode)} · ${regionLabel(r)} · ${r.start_poi||'起点待核验'} → ${r.end_poi||'终点待核验'} · ${ti[0]}，${ti[2]}</p>${badgeHtml(r)}</div><button class="mapBtn" onclick="enterMap()">大地图</button></div><div class="metrics"><div class="metric"><b>${r.distance_km||'--'}</b><span>公里</span></div><div class="metric"><b>${r.elevation_gain_m||'--'}</b><span>爬升</span></div><div class="metric"><b>${r.max_altitude_m||'--'}</b><span>海拔</span></div><div class="metric"><b>${r.duration_h||r.duration_days||'--'}</b><span>时间</span></div></div><div class="cards">${rows('轨迹说明',[`${ti[0]}：${ti[2]}`,trackGrade(r)==='key_points'?'关键点示意不可直接导航，需要外部轨迹或离线地图核验。':'使用前仍需核验实时封控、天气和路况。'])}${detailRows(r).join('')}${rows('装备底线',gear(r))}${rows('风险标签',(r.risk_tags||[]).slice(0,6))}${rows('运营与可信度',[`季节状态：${r.ops?.season_status||'待核验'}`,`救援可达：${r.ops?.emergency_access_score||'待核验'}`,`资料等级：${r.confidence_grade||'C'}`,`轨迹等级：${r.geometry_confidence||'C'}`])}${rows('补给与撤退',[`补给：${(r.resupply_points||[]).slice(0,4).join('、')||'待核验'}`,`撤退：${(r.retreat_points||[]).slice(0,4).join('、')||'待核验'}`,`水源：${(r.water_points||[]).slice(0,4).join('、')||'待核验'}`])}</div>${r.gpx_url?`<a class="src" target="_blank" href="${r.gpx_url}"><b>轨迹来源</b><span>打开外部来源</span></a>`:''}<a class="src" href="weather-pro.html?q=${encodeURIComponent(r.start_poi||r.name_zh)}"><b>起点天气</b><span>山野气象台</span></a>`}
async function ab(){const a=$('#from').value.trim(),b=$('#to').value.trim();if(!a||!b)return;if(S.layer)S.layer.remove();S.layer=L.layerGroup().addTo(S.map);$('#detail').innerHTML=`<h2>${a} → ${b}</h2><p class="summary">A-B 草案保留入口，不用假轨迹冒充专业路线。</p><div class="empty">等待高德路线和真实轨迹数据接入。</div>`;document.querySelector('.sheet').classList.add('detailMode')}
$('#modes').onclick=e=>{const b=e.target.closest('.mode');if(!b)return;S.mode=b.dataset.mode;document.querySelectorAll('.mode').forEach(x=>x.classList.toggle('active',x===b));renderList();select(first()?.route_id)};$('#regions').onclick=e=>{const b=e.target.closest('.region');if(!b)return;S.region=b.dataset.region;document.querySelectorAll('.region').forEach(x=>x.classList.toggle('active',x===b));renderList();select(first()?.route_id)};document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{S.tab=t.dataset.tab;document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===t));$('#searchBox').style.display=S.tab==='search'?'grid':'none';$('#abBox').style.display=S.tab==='ab'?'grid':'none'});document.querySelector('.mapControls').onclick=e=>{const b=e.target.closest('button');if(b)switchLayer(b.dataset.layer)};$('#form').onsubmit=e=>{e.preventDefault();if(S.tab==='ab')ab();else{renderList();select(first()?.route_id)}};$('#q').oninput=renderList;const p=new URLSearchParams(location.search);if(p.get('q'))$('#q').value=p.get('q');load();
</script></body></html>
