<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300;1,500&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Serif+SC:wght@400;700&family=Jost:ital,wght@0,300;0,500;0,700;1,300&family=JetBrains+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>路线规划 · Song Studio</title>
<style>
/* ═══════════════════════════════════════════
   Grove Route · 路线规划
   Dark forest immersive · warm cream text
   ═══════════════════════════════════════════ */
:root{
  --bg:#192B1B;
  --bg-elevated:#1E3320;
  --text:#D4CFBF;
  --text-dim:#A8A090;
  --text-muted:#6B6758;
  --sub:#8A8575;
  --ink:#EDE8DC;
  --accent:#C8524A;
  --accent-dim:rgba(200,82,74,.12);
  --cool:#7BA4B8;
  --cool-dim:rgba(123,164,184,.12);
  --warm:#D4943A;
  --warm-dim:rgba(212,148,58,.12);
  --green:#6B9E6F;
  --green-dim:rgba(107,158,111,.12);
  --rule:rgba(212,207,191,.08);
  --rule-strong:rgba(212,207,191,.15);
  --surface:#1E3320;
}
*{margin:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{background:var(--bg)}
body{
  font-family:'Jost','Noto Serif SC',-apple-system,sans-serif;
  font-weight:300;
  background:var(--bg);color:var(--text);
  min-height:100vh;-webkit-font-smoothing:antialiased;
  line-height:1.55;font-size:17px;text-wrap:pretty;
}
.wrap{max-width:780px;margin:0 auto;padding:0 24px 80px}

/* ── Header ── */
.page-header{
  text-align:center;padding:36px 0 24px;
}
.page-header h1{
  font-family:'Noto Serif SC','Playfair Display',Georgia,serif;
  font-size:clamp(2em,5vw,2.6em);font-weight:700;color:var(--ink);
  letter-spacing:.04em;line-height:1.1;
}
.page-header .sub{
  font-size:.62em;color:var(--text-dim);margin-top:4px;
  font-family:'Cormorant Garamond','Playfair Display',Georgia,serif;
  font-style:italic;font-weight:300;letter-spacing:.05em;text-transform:none;
}
.back-link{
  display:inline-block;font-size:.5em;color:var(--text-dim);text-decoration:none;
  font-family:'JetBrains Mono',monospace;letter-spacing:.04em;
  margin-bottom:8px;transition:color .2s;
}
.back-link:hover{color:var(--accent)}

/* ── Route search ── */
.route-search{
  padding:20px;margin-bottom:2px;
  background:var(--bg-elevated);
  border:1px solid var(--rule-strong);
}
.route-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.route-row .rdot{width:8px;height:8px;flex-shrink:0;border-radius:50%}
.route-row .rdot.from{background:var(--green)}
.route-row .rdot.to{background:var(--accent)}
.route-row input{
  flex:1;border:none;border-bottom:1px solid var(--rule-strong);color:var(--text);
  padding:10px 0;font-size:.88em;outline:none;background:none;min-width:0;
  font-family:'Jost','Noto Serif SC',sans-serif;font-weight:300;
}
.route-row input:focus{border-bottom-color:var(--accent)}
.route-row input::placeholder{color:var(--text-muted)}
.swap-btn{
  flex-shrink:0;width:34px;height:34px;
  border:1px solid var(--rule-strong);background:transparent;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:1em;transition:all .3s;color:var(--text-dim);
}
.swap-btn:hover{transform:rotate(180deg);color:var(--accent);border-color:var(--accent)}
.modes{display:flex;gap:1px;margin-bottom:2px;background:var(--rule-strong)}
.mode-chip{
  flex:1;text-align:center;padding:12px 10px;border-radius:10px;
  background:transparent;cursor:pointer;font-size:.82em;font-weight:500;
  transition:all .2s;letter-spacing:.02em;color:var(--text-dim);
}
.mode-chip:hover{color:var(--ink);background:rgba(255,255,255,.03)}
.mode-chip.sel{color:var(--ink);font-weight:600;background:rgba(255,255,255,.05);box-shadow:inset 0 -2px 0 var(--cool)}
.go-btn{
  width:100%;padding:16px;border:none;background:var(--cool);color:#FFF;
  font-size:.88em;cursor:pointer;letter-spacing:.08em;font-weight:700;
  transition:all .2s;font-family:'Jost','Noto Serif SC',sans-serif;
}
.go-btn:hover{background:#8CB8C8}
.go-btn:disabled{opacity:.3;pointer-events:none}
.map-wrap{overflow:hidden;height:420px;margin-bottom:2px;border:1px solid var(--rule-strong)}
@media(max-width:480px){.map-wrap{height:280px}}
#rmap{width:100%;height:100%}

/* ── Route summary ── */
.route-summary{padding:20px;margin-bottom:2px;background:var(--bg-elevated);border:1px solid var(--rule-strong);display:none}
.route-summary .rs-header{
  display:flex;align-items:center;gap:12px;
  margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--rule-strong);
}
.rs-header .rs-mode-icon{width:42px;height:42px;display:flex;align-items:center;justify-content:center;font-size:1.1em;flex-shrink:0;font-weight:700;border:2px solid var(--rule-strong);color:var(--ink)}
.rs-header .rs-route-name{font-weight:500;font-size:.78em;color:var(--ink)}
.rs-header .rs-route-sub{font-size:.48em;color:var(--text-dim);font-weight:300}
.rs-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--rule-strong)}
@media(max-width:480px){.rs-grid{grid-template-columns:repeat(2,1fr)}}
.rs-item{text-align:center;padding:14px 6px;background:var(--bg)}
.rs-item .rsv{font-size:1em;font-weight:700;color:var(--ink)}
.rs-item .rsl{font-size:.42em;color:var(--text-muted);margin-top:4px;text-transform:uppercase;letter-spacing:.06em;font-weight:500;font-family:'JetBrains Mono',monospace}
.rs-mini{display:grid;grid-template-columns:1fr 1fr;gap:1px;margin-top:1px;background:var(--rule-strong)}

/* ── Route steps ── */
.route-steps{margin-top:16px;padding-top:16px;border-top:1px solid var(--rule-strong)}
.route-steps .steps-title{font-size:.58em;font-weight:500;margin-bottom:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);font-family:'JetBrains Mono',monospace}
.step-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--rule);align-items:flex-start}
.step-item:last-child{border-bottom:none}
.step-turn{flex-shrink:0;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:.7em;font-weight:700}
.step-turn.left,.step-turn.right,.step-turn.arrive,.step-turn.depart{background:var(--green-dim);color:var(--green)}
.step-turn.straight{background:transparent;color:var(--text-dim)}
.step-turn.rotary{background:var(--warm-dim);color:var(--warm)}
.step-info{flex:1;min-width:0}
.step-info .step-dir{font-size:.5em;color:var(--text-dim);margin-bottom:1px}
.step-info .step-road{font-size:.58em;font-weight:500;color:var(--ink)}
.step-info .step-dist{font-size:.48em;color:var(--text-muted);margin-top:2px}

/* ── Waypoint weather panels ── */
.weather-panels{display:grid;grid-template-columns:1fr 1fr;gap:1px;margin-bottom:2px;background:var(--rule-strong)}
@media(max-width:500px){.weather-panels{grid-template-columns:1fr}}
.wp{padding:18px;background:var(--bg-elevated)}
.wp.from{border-left:3px solid var(--green)}
.wp.to{border-left:3px solid var(--accent)}
.wp .wpn{font-size:.46em;color:var(--accent);margin-bottom:4px;letter-spacing:.12em;font-weight:500;text-transform:uppercase;font-family:'JetBrains Mono',monospace}
.wp .wpt{font-size:.7em;font-weight:500;margin-bottom:10px;color:var(--ink)}
.wp .wph{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.wp .wph .big{font-size:2em;font-weight:400;color:var(--ink);font-family:'Playfair Display','Noto Serif SC',Georgia,serif}
.wp .wph .icon{font-size:1.4em}
.wpg{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--rule-strong)}
.wgi{padding:8px;text-align:center;font-size:.52em;background:var(--bg)}
.wgi .wgiv{font-weight:700;display:block;margin-bottom:2px}
.wgi .wgil{color:var(--text-dim);font-size:.85em}

/* ── Elevation profile ── */
.elev-profile{margin:16px 0;padding:16px;background:var(--bg-elevated);border:1px solid var(--rule-strong)}
.elev-profile .ep-title{font-size:.5em;font-weight:500;letter-spacing:.08em;color:var(--accent);margin-bottom:10px;text-transform:uppercase;font-family:'JetBrains Mono',monospace}

/* ── Feature bar ── */
.feat-bar{
  display:grid;grid-template-columns:1fr 1fr;gap:1px;
  background:var(--rule-strong);margin-top:1px;
}
@media(max-width:480px){.feat-bar{grid-template-columns:1fr}}
.ft-item{padding:14px 16px;background:var(--bg-elevated);display:flex;align-items:center;gap:10px}
.ft-item .fti{font-size:1.1em;flex-shrink:0}
.ft-item .ftt{flex:1;min-width:0}
.ft-item .ftl{font-size:.48em;color:var(--text-muted);display:block;text-transform:uppercase;letter-spacing:.08em;font-family:'JetBrains Mono',monospace}
.ft-item .ftv{font-size:.68em;font-weight:500;color:var(--ink)}
.ftv.good{color:var(--green)}.ftv.warn{color:var(--warm)}.ftv.bad{color:var(--accent)}
.ft-actions{
  grid-column:1/-1;display:flex;gap:1px;background:var(--rule-strong);
}
.ft-btn{
  flex:1;padding:12px;text-align:center;cursor:pointer;
  background:var(--bg-elevated);border:none;color:var(--text-dim);
  font-size:.58em;transition:all .2s;font-family:'Jost','Noto Serif SC',sans-serif;font-weight:300;
}
.ft-btn:hover{background:var(--accent-dim);color:var(--accent)}

/* ── Preset routes ── */
.route-sug{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.rsug{
  font-size:.5em;padding:4px 10px;background:none;cursor:pointer;
  color:var(--text-dim);border:1px solid var(--rule-strong);font-weight:300;
  transition:all .2s;
}
.rsug:hover{background:var(--accent);color:#FFF;border-color:var(--accent)}

.mode-chip i,.rs-mode-icon i,.step-turn i{font-size:inherit}
.ft-item .fti i{font-size:1.05em;color:var(--text-dim)}
footer{
  text-align:center;padding:48px 0 0;color:var(--text-muted);
  font-size:.5em;letter-spacing:.04em;font-weight:300;
}
footer a{color:var(--text-dim);text-decoration:none}
footer a:hover{color:var(--accent)}
.hidden{display:none}
</style>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
<div class="wrap" id="app">



<div class="tab-panel" id="tab-route">
<div class="page-header">
  <a href="weather-pro.html" class="back-link">← 气象查询</a>
  <h1>路线规划</h1>
  <div class="sub">Route Planner</div>
  <div style="font-size:.50em;color:var(--text-muted);margin-top:8px;font-family:'JetBrains Mono',monospace;letter-spacing:.08em">驾车 · 骑行 · 步行</div>
</div>

<div class="route-search">
  <div class="route-row">
    <span class="rdot from"></span>
    <input type="text" id="fromInput" placeholder="起点… 例：贵阳" autocomplete="off">
    <button class="swap-btn" onclick="swap()" title="交换起终点"><i class="fa-solid fa-arrow-up-arrow-down"></i></button>
  </div>
  <div class="route-row">
    <span class="rdot to"></span>
    <input type="text" id="toInput" placeholder="终点… 例：六盘水" autocomplete="off">
  </div>
  <div class="modes">
    <div class="mode-chip sel" data-mode="driving" onclick="setMode('driving')"><i class="fa-solid fa-car"></i> 驾车</div>
    <div class="mode-chip" data-mode="cycling" onclick="setMode('cycling')"><i class="fa-solid fa-bicycle"></i> 骑行</div>
    <div class="mode-chip" data-mode="walking" onclick="setMode('walking')"><i class="fa-solid fa-person-walking"></i> 步行</div>
  </div>
  <button class="go-btn" id="goBtn" onclick="plan()">开始规划</button>
  <div style="text-align:center;font-size:.62em;color:var(--text-muted);margin:6px 0 12px;font-weight:300">支持乡镇·村庄·景区·小区等小地名输入，高德地图精准编码</div>
  <div class="route-sug">
    <span class="rsug" onclick="preset('北京','上海','driving')">北京 → 上海</span>
    <span class="rsug" onclick="preset('北京','天津','cycling')">北京 → 天津</span>
    <span class="rsug" onclick="preset('成都','重庆','driving')">成都 → 重庆</span>
    <span class="rsug" onclick="preset('贵阳','遵义','cycling')">贵阳 → 遵义</span>
    <span class="rsug" onclick="preset('昆明','大理','driving')">昆明 → 大理</span>
    <span class="rsug" onclick="preset('六盘水','贵阳','driving')">六盘水 → 贵阳</span>
    <span class="rsug" onclick="preset('凤凰','张家界','driving')">凤凰 → 张家界</span>
    <span class="rsug" onclick="preset('黄果树','贵阳','driving')">黄果树 → 贵阳</span>
  </div>
</div>

<div class="map-wrap"><div id="rmap"></div></div>

<div class="route-summary" id="routeSummary"></div>
<div class="weather-panels" id="weatherPanels"></div>
</div>

<footer><a href="https://song-studio.github.io">song-studio.github.io</a> · <a href="weather-pro.html">气象查询</a></footer>
</div>

<script>
// ── State ────────────────────────────────────────────
const WMO={0:{i:'sun',l:'晴'},1:{i:'sun',l:'少云'},2:{i:'cloud-sun',l:'多云'},3:{i:'cloud',l:'阴'},45:{i:'smog',l:'雾'},48:{i:'smog',l:'冻雾'},51:{i:'cloud-rain',l:'小雨'},53:{i:'cloud-rain',l:'中雨'},55:{i:'cloud-showers-heavy',l:'大雨'},56:{i:'cloud-rain',l:'冻雨'},57:{i:'cloud-rain',l:'冻雨'},61:{i:'cloud-rain',l:'小阵雨'},63:{i:'cloud-showers-heavy',l:'中阵雨'},65:{i:'cloud-showers-heavy',l:'大阵雨'},66:{i:'cloud-rain',l:'冻雨'},67:{i:'cloud-rain',l:'冻雨'},71:{i:'snowflake',l:'小雪'},73:{i:'snowflake',l:'中雪'},75:{i:'snowflake',l:'大雪'},77:{i:'snowflake',l:'雪粒'},80:{i:'cloud-rain',l:'阵雨'},81:{i:'cloud-showers-heavy',l:'中阵雨'},82:{i:'cloud-showers-heavy',l:'大阵雨'},85:{i:'snowflake',l:'小阵雪'},86:{i:'snowflake',l:'大阵雪'},95:{i:'bolt',l:'雷暴'},96:{i:'bolt',l:'雷暴冰雹'},99:{i:'bolt',l:'强雷暴冰雹'}};
function w(c){return WMO[c]||{i:'cloud',l:'未知'}}
const WK=['周日','周一','周二','周三','周四','周五','周六'];
const AMAP_KEY='39a8c2f6ef75e494198f3e3751701ebe';

// GCJ-02 → WGS-84 (Amap coords → OSM/Open-Meteo compatibility)
function gcj2wgs(lng,lat){
  const PI=Math.PI,a=6378245,ee=0.006693421622965943;
  function tx(x,y){let r=300+x+2*y+0.1*x*x+0.1*x*y+0.1*Math.sqrt(Math.abs(x));r+=(20*Math.sin(6*x*PI)+20*Math.sin(2*x*PI))*2/3;r+=(20*Math.sin(x*PI)+40*Math.sin(x/3*PI))*2/3;r+=(150*Math.sin(x/12*PI)+300*Math.sin(x/30*PI))*2/3;return r}
  function ty(x,y){let r=-100+2*x+3*y+0.2*y*y+0.1*x*y+0.2*Math.sqrt(Math.abs(x));r+=(20*Math.sin(6*x*PI)+20*Math.sin(2*x*PI))*2/3;r+=(20*Math.sin(y*PI)+40*Math.sin(y/3*PI))*2/3;r+=(160*Math.sin(y/12*PI)+320*Math.sin(y*PI/30))*2/3;return r}
  const dlng=tx(lng-105,lat-35),dlat=ty(lng-105,lat-35);
  const radLat=lat/180*PI,magic=1-ee*Math.sin(radLat)*Math.sin(radLat);
  return[lng-dlng*180/(a/Math.sqrt(magic)*Math.cos(radLat)*PI),lat-dlat*180/(a*(1-ee)/(magic*Math.sqrt(magic))*PI)];
}

// ── Geocode (高德 + Open-Meteo 双源) ──────────────────
async function geocode(q){
  const hasLatin=/[a-zA-Z]/.test(q);

  async function omGeo(){
    try{
      const r=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=1&language=zh&format=json`);
      const d=await r.json();
      if(d.results&&d.results.length)return d.results[0];
    }catch(e){}
    return null;
  }

  // Latin-script → Open-Meteo
  if(hasLatin){
    const om=await omGeo();
    if(om)return{latitude:om.latitude,longitude:om.longitude,name:om.name||q,country:om.country||'',admin1:om.admin1||'',elevation:om.elevation||0,rawLat:om.latitude,rawLng:om.longitude};
    return null;
  }

  // Chinese → Amap geocode
  const amapR=await fetch(`https://restapi.amap.com/v3/geocode/geo?key=${AMAP_KEY}&address=${encodeURIComponent(q)}`).then(r=>r.json());
  if(!amapR.geocodes||!amapR.geocodes.length){
    const om=await omGeo();
    if(om)return{latitude:om.latitude,longitude:om.longitude,name:om.name||q,country:om.country||'',admin1:om.admin1||'',elevation:om.elevation||0,rawLat:om.latitude,rawLng:om.longitude};
    return null;
  }

  function fmt(g){
    const [lng,lat]=g.location.split(',').map(Number);
    const [wgsLng,wgsLat]=gcj2wgs(lng,lat);
    let short=g.name||q;
    if(!g.name&&g.formatted_address){
      const parts=g.formatted_address.split(/省|市|区|县|自治州/);
      short=parts[parts.length-1]||g.formatted_address;
    }
    let admin=g.province||g.city||'';
    if(g.city&&g.city!==g.province)admin=g.city;
    return{
      latitude:wgsLat,longitude:wgsLng,
      name:short,country:g.country||'中国',
      admin1:admin,elevation:0,
      rawLat:lat,rawLng:lng
    };
  }

  // Single result → use directly
  if(amapR.geocodes.length===1)return fmt(amapR.geocodes[0]);

  // Multiple results → use input tips to find the right province
  try{
    const tipsR=await fetch(`https://restapi.amap.com/v3/assistant/inputtips?key=${AMAP_KEY}&keywords=${encodeURIComponent(q)}`);
    const tipsD=await tipsR.json();
    if(tipsD.tips&&tipsD.tips.length){
      const tip=tipsD.tips.find(t=>t.district&&t.district.length>0);
      if(tip){
        const match=amapR.geocodes.find(g=>g.province&&tip.district.includes(g.province));
        if(match)return fmt(match);
      }
    }
  }catch(e){}

  // Fallback: first geocode result
  return fmt(amapR.geocodes[0]);
}



// ── Route state ─────────────────────────────────────────
let RSTATE={mode:'driving',fromGeo:null,toGeo:null,route:null,rmap:null,markers:[],routeLine:null,_hikingOn:false,mapStyle:'amap'};



function initRMap(){
  RSTATE.rmap=L.map('rmap').setView([27,106],6);
  // Amap tiles (GCJ-02) — road names in Chinese, perfect route alignment
  L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}',{
    subdomains:'1234',attribution:'&copy; 高德地图',
    maxZoom:18
  }).addTo(RSTATE.rmap);
  // OSM hiking trail overlay
  RSTATE.hikingLayer=L.tileLayer('https://tile.waymarkedtrails.org/hiking/{z}/{x}/{y}.png',{
    opacity:.5,attribution:'WaymarkedTrails'
  });
  RSTATE.mapStyle='amap';
}

function setMode(m){
  RSTATE.mode=m;
  document.querySelectorAll('#tab-route .mode-chip').forEach(c=>{
    c.classList.remove('sel');
    if(c.dataset.mode===m)c.classList.add('sel');
  });
}

async function swap(){
  const t=document.getElementById('fromInput').value;
  document.getElementById('fromInput').value=document.getElementById('toInput').value;
  document.getElementById('toInput').value=t;
  if(RSTATE.fromGeo&&RSTATE.toGeo)plan();
}

function preset(f,t,m){
  document.getElementById('fromInput').value=f;
  document.getElementById('toInput').value=t;
  setMode(m);
  plan();
}

async function getRoute(from,to,mode){
  const [flng,flat]=[from.rawLng,from.rawLat];
  const [tlng,tlat]=[to.rawLng,to.rawLat];
  let url;
  if(mode==='cycling'){
    url=`https://restapi.amap.com/v4/direction/bicycling?key=${AMAP_KEY}&origin=${flng},${flat}&destination=${tlng},${tlat}`;
  }else if(mode==='walking'){
    url=`https://restapi.amap.com/v3/direction/walking?key=${AMAP_KEY}&origin=${flng},${flat}&destination=${tlng},${tlat}`;
  }else{
    url=`https://restapi.amap.com/v3/direction/driving?key=${AMAP_KEY}&origin=${flng},${flat}&destination=${tlng},${tlat}&extensions=all`;
  }
  const r=await fetch(url);
  const d=await r.json();
  // Normalize v3 (route.paths) and v4 (data.paths) formats
  let path;
  if(d.route&&d.route.paths&&d.route.paths.length)path=d.route.paths[0];
  else if(d.data&&d.data.paths&&d.data.paths.length)path=d.data.paths[0];
  if(!path){
    if(!path)return null;
  }
  // Build polyline coords (keep GCJ-02 — display on Amap tiles)
  const coords=[];
  if(path.steps){
    path.steps.forEach(s=>{
      if(s.polyline){
        s.polyline.split(';').forEach(p=>{
          const [lng,lat]=p.split(',').map(Number);
          coords.push([lng,lat]);
        });
      }
    });
  }
  var wgsCoords=coords.map(function(c){var w=gcj2wgs(c[0],c[1]);return[w[0],w[1]];});
  return {
    distance:parseInt(path.distance),duration:parseInt(path.duration),
    steps:path.steps||[],geometry:{coordinates:coords,wgsCoordinates:wgsCoords}
  };
}

async function getRouteWeather(lat,lon){
  const u=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,relative_humidity_2m,pressure_msl&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weather_code,wind_speed_10m_max,uv_index_max,sunshine_duration,sunrise,sunset,precipitation_sum&hourly=cloud_cover,precipitation_probability,temperature_2m&timezone=auto&forecast_days=3`;
  const r=await fetch(u);
  return await r.json();
}

async function plan(){
  const fromQ=document.getElementById('fromInput').value.trim();
  const toQ=document.getElementById('toInput').value.trim();
  if(!fromQ||!toQ)return;

  document.getElementById('routeSummary').style.display='none';
  document.getElementById('weatherPanels').innerHTML='';
  const fb=document.getElementById('featBar');if(fb)fb.style.display='none';
  const goBtn=document.getElementById('goBtn');
  goBtn.disabled=true;goBtn.textContent='规划中…';

  try{
    const[fg,tg]=await Promise.all([geocode(fromQ),geocode(toQ)]);
    if(!fg||!tg){
      alert('未找到：'+[!fg?fromQ:'',!tg?toQ:''].filter(Boolean).join('、'));
      goBtn.disabled=false;goBtn.textContent='开始规划';
      return;
    }
    RSTATE.fromGeo=fg;RSTATE.toGeo=tg;

    // Fetch route first (critical path)
    const route=await getRoute(fg,tg,RSTATE.mode);
    if(!route){
      alert('未找到可行路线\n\n可能原因：\n1. 两地距离太远\n2. 该区域不支持所选交通方式\n3. 网络问题\n\n请尝试：更换交通方式、调整起终点、或选择预设路线');
      goBtn.disabled=false;goBtn.textContent='开始规划';
      return;
    }
    RSTATE.route=route;

    // Weather is non-critical — fetch independently
    try{RSTATE.fromW=await getRouteWeather(fg.latitude,fg.longitude);}catch(e){RSTATE.fromW=null;}
    try{RSTATE.toW=await getRouteWeather(tg.latitude,tg.longitude);}catch(e){RSTATE.toW=null;}

    await renderRouteAll();
  }catch(e){
    alert('网络错误：'+e.message);
  }
  goBtn.disabled=false;goBtn.textContent='开始规划';
}

function switchMapStyle(style){
  var m=RSTATE.rmap;if(!m)return;
  RSTATE.mapStyle=style;
  // Remove all tile layers except hiking
  m.eachLayer(l=>{if(l instanceof L.TileLayer&&l!==RSTATE.hikingLayer&&l._url&&!l._url.includes('waymarkedtrails'))m.removeLayer(l);});
  if(style==='amap'){
    // Hiking trails don't align with GCJ-02 Amap tiles
    if(RSTATE._hikingOn){m.removeLayer(RSTATE.hikingLayer);RSTATE._hikingOn=false;}
    RSTATE.baseLayer=L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}',{subdomains:'1234',attribution:'&copy; 高德',maxZoom:18}).addTo(m);
    // Switch route line + markers to GCJ-02 coords
    if(RSTATE.route&&RSTATE.routeLine){
      var gcj=RSTATE.route.geometry.coordinates.map(function(c){return[c[1],c[0]];});
      RSTATE.routeLine.setLatLngs(gcj);
      RSTATE.markers[0].setLatLng([RSTATE.fromGeo.rawLat||RSTATE.fromGeo.latitude,RSTATE.fromGeo.rawLng||RSTATE.fromGeo.longitude]);
      RSTATE.markers[1].setLatLng([RSTATE.toGeo.rawLat||RSTATE.toGeo.latitude,RSTATE.toGeo.rawLng||RSTATE.toGeo.longitude]);
    }
  }else{
    RSTATE.baseLayer=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'&copy; OSM',maxZoom:18}).addTo(m);
    // Switch route line + markers to WGS-84 coords
    if(RSTATE.route&&RSTATE.route.geometry.wgsCoordinates&&RSTATE.routeLine){
      var wgs=RSTATE.route.geometry.wgsCoordinates.map(function(c){return[c[1],c[0]];});
      RSTATE.routeLine.setLatLngs(wgs);
      RSTATE.markers[0].setLatLng([RSTATE.fromGeo.latitude,RSTATE.fromGeo.longitude]);
      RSTATE.markers[1].setLatLng([RSTATE.toGeo.latitude,RSTATE.toGeo.longitude]);
    }
  }
  // Update toggle buttons in DOM
  var btns=document.querySelectorAll('#routeSummary [data-map-btn]');
  btns.forEach(function(b){
    var v=b.getAttribute('data-map-btn');
    if(v==='amap'){b.style.background=style==='amap'?'var(--accent)':'none';b.style.color=style==='amap'?'#fff':'var(--sub)';}
    else if(v==='osm'){b.style.background=style==='osm'?'var(--cool)':'none';b.style.color=style==='osm'?'#fff':'var(--sub)';}
    else if(v==='hiking'){b.style.background=RSTATE._hikingOn?'var(--accent)':'none';b.style.color=RSTATE._hikingOn?'#fff':'var(--sub)';}
  });
}
function toggleHiking(){
  var m=RSTATE.rmap;if(!m)return;
  RSTATE._hikingOn=!RSTATE._hikingOn;
  if(RSTATE._hikingOn){
    // Auto-switch to OSM for proper hiking trail alignment (WGS-84)
    if(RSTATE.mapStyle!=='osm')switchMapStyle('osm');
    m.addLayer(RSTATE.hikingLayer);
  }else{
    m.removeLayer(RSTATE.hikingLayer);

  var btn=document.querySelector('#routeSummary [data-map-btn="hiking"]');

}

function drawElevProfile(data){
  const c=document.getElementById('elevCanvas');if(!c)return;
  const W=c.parentElement.clientWidth-32;c.width=W;c.height=120;
  const ctx=c.getContext('2d');
  const ev=data.elevations,ds=data.distances;
  const min=Math.min(...ev),max=Math.max(...ev),range=max-min||1;
  const pad=10,h=c.height-pad*2,w=c.width-pad*2;
  ctx.clearRect(0,0,c.width,c.height);
  // Fill
  ctx.beginPath();
  ctx.moveTo(pad,c.height-pad);
  for(let i=0;i<ev.length;i++){
    const x=pad+(i/(ev.length-1))*w;
    const y=pad+h-((ev[i]-min)/range)*h;
    ctx.lineTo(x,y);
  }
  ctx.lineTo(pad+(ev.length-1)/(ev.length-1)*w,c.height-pad);
  ctx.closePath();
  ctx.fillStyle='rgba(200,82,74,.12)';ctx.fill();
  // Line
  ctx.beginPath();
  ctx.strokeStyle='#E03C31';ctx.lineWidth=2;ctx.lineJoin='round';
  for(let i=0;i<ev.length;i++){
    const x=pad+(i/(ev.length-1))*w;
    const y=pad+h-((ev[i]-min)/range)*h;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.stroke();
  // Labels
  ctx.fillStyle='#6E6E6E';ctx.font='10px -apple-system,PingFang SC,sans-serif';
  ctx.fillText(min+'m',4,c.height-4);
  ctx.fillText(max+'m',4,pad+10);
  if(ds.length)ctx.fillText(ds[ds.length-1].toFixed(0)+'km',c.width-40,c.height-4);
}

function buildRouteSteps(){
  const steps=RSTATE.route.steps;
  if(!steps||steps.length===0)return'';
  if(steps.length<2)return'';
  function parseStep(s){
    const inst=s.instruction||'';
    const road=s.road||'';
    let icon='<i class="fa-solid fa-arrow-up"></i>',cls='straight',dir='直行';
    if(inst.includes('左转')||inst.includes('向左')){icon='<i class="fa-solid fa-arrow-left"></i>';cls='left';dir='左转'}
    else if(inst.includes('右转')||inst.includes('向右')){icon='<i class="fa-solid fa-arrow-right"></i>';cls='right';dir='右转'}
    else if(inst.includes('调头')||inst.includes('掉头')){icon='<i class="fa-solid fa-rotate-reverse"></i>';cls='rotary';dir='调头'}
    else if(inst.includes('到达')||inst.includes('终点')||inst.includes('目的地')){icon='<i class="fa-solid fa-flag-checkered"></i>';cls='arrive';dir='到达'}
    else if(inst.includes('出发')||inst.includes('起点')||inst.includes('开始')){icon='<i class="fa-solid fa-play"></i>';cls='depart';dir='出发'}
    else if(inst.includes('环岛')||inst.includes('转盘')){icon='<i class="fa-solid fa-arrow-rotate-right"></i>';cls='rotary';dir='环岛'}
    else if(inst.includes('左前方')||inst.includes('左后方')){icon='<i class="fa-solid fa-arrow-left"></i>';cls='left';dir='左前方'}
    else if(inst.includes('右前方')||inst.includes('右后方')){icon='<i class="fa-solid fa-arrow-right"></i>';cls='right';dir='右前方'}
    return{icon,cls,dir,road:road||inst.replace(/^沿?/,'').replace(/[，,].*/,'')||'前行'};
  }
  let html='<div class="route-steps"><div class="steps-title">逐段导航</div><div class="step-list">';
  for(let i=0;i<Math.min(steps.length,80);i++){
    const s=steps[i];
    const si=parseStep(s);
    const distM=parseInt(s.distance);
    const d=distM>=1000?(distM/1000).toFixed(1)+' km':distM+' m';
    const dur=Math.round(parseInt(s.duration)/60);
    html+=`<div class="step-item">
      <div class="step-turn ${si.cls}">${si.icon}</div>
      <div class="step-info">
        <div class="step-dir">${si.dir}</div>
        <div class="step-road">${si.road}</div>
        <div class="step-dist">${d} · ${dur}分钟</div>
      </div>
    </div>`;
  }
  html+='</div></div>';
  return html;
}

// ── Feature: Best departure time ───────────────────────
function bestDeparture(){
  var toW=RSTATE.toW;
  if(!toW||!toW.hourly||!toW.daily||!toW.hourly.precipitation_probability)return null;
  var hrs=toW.hourly;
  var durH=RSTATE.route.duration/3600;
  var sunset=toW.daily.sunset&&toW.daily.sunset[0]?toW.daily.sunset[0]:null;
  var bestScore=999,bestH=8;
  for(var h=6;h<20&&h<hrs.precipitation_probability.length;h++){
    var score=hrs.precipitation_probability[h]*1.5;
    var temp=hrs.temperature_2m[h];
    if(temp<5||temp>32)score+=20;else if(temp<10||temp>28)score+=10;
    if(sunset){
      var sH=parseInt(sunset.slice(11,13)),sM=parseInt(sunset.slice(14,16));
      var arrH=h+durH;
      if(arrH>sH-1)score+=15;
    }
    if(score<bestScore){bestScore=score;bestH=h;}
  }
  var label=bestH<10?'上午':bestH<12?'中午':bestH<18?'下午':'傍晚';
  return{hour:bestH,time:String(bestH).padStart(2,'0')+':00',rainProb:hrs.precipitation_probability[bestH],label:label};
}

// ── Feature: Sunset arrival check ──────────────────────
function checkSunset(){
  if(!RSTATE.route)return null;
  const toW=RSTATE.toW;
  if(!toW||!toW.daily||!toW.daily.sunset||!toW.daily.sunset[0])return null;
  const ss=toW.daily.sunset[0];
  const sH=parseInt(ss.slice(11,13)),sM=parseInt(ss.slice(14,16));
  const sunsetMin=sH*60+sM;
  const eta=new Date(Date.now()+RSTATE.route.duration*1000);
  const etaMin=eta.getHours()*60+eta.getMinutes();
  const diff=sunsetMin-etaMin;
  return{
    sunsetStr:ss.slice(11,16),
    status:diff>30?'good':diff>-30?'warn':'bad',
    label:diff>30?'日落前到达':diff>-30?'日落前后到达':'日落后到达',
    detail:diff>30?`提前${Math.round(diff)}分钟`:diff>-30?'接近日落时分':`日落后${Math.round(-diff)}分钟`
  };
}

// ── Feature: Difficulty score ──────────────────────────
function calcDifficulty(){
  if(!RSTATE.route)return{score:1,label:'未知',color:'good'};
  const dist=RSTATE.route.distance/1000;
  const elev=RSTATE._elevGain||0;
  let dS=dist<10?1:dist<30?2:dist<60?3:dist<100?4:5;
  let eS=elev<100?1:elev<300?2:elev<600?3:elev<1000?4:5;
  let wS=0;
  const toW=RSTATE.toW;
  if(toW&&toW.daily&&toW.daily.precipitation_probability_max){
    const rain=toW.daily.precipitation_probability_max[0];
    wS=rain<20?0:rain<50?1:rain<80?2:3;
  }
  const mF=RSTATE.mode==='cycling'?1.2:RSTATE.mode==='walking'?1.1:0.9;
  const raw=(dS+eS+wS)/3*mF;
  const score=Math.min(5,Math.max(1,Math.round(raw)));
  return{score,label:['','轻松','中等','较难','困难','极限'][score],color:score<=2?'good':score===3?'warn':'bad'};
}

// ── Feature: Wind analysis (cycling) ──────────────────
function analyzeWind(){
  if(RSTATE.mode!=='cycling')return null;
  if(!RSTATE.route||!RSTATE.fromGeo||!RSTATE.toGeo)return null;
  const toW=RSTATE.toW;
  if(!toW||!toW.current)return null;
  const wDir=toW.current.wind_direction_10m;
  const wSpd=toW.current.wind_speed_10m;
  const fLat=RSTATE.fromGeo.latitude*Math.PI/180;
  const fLng=RSTATE.fromGeo.longitude*Math.PI/180;
  const tLat=RSTATE.toGeo.latitude*Math.PI/180;
  const tLng=RSTATE.toGeo.longitude*Math.PI/180;
  const dL=tLng-fLng;
  const y=Math.sin(dL)*Math.cos(tLat);
  const x=Math.cos(fLat)*Math.sin(tLat)-Math.sin(fLat)*Math.cos(tLat)*Math.cos(dL);
  let bearing=Math.atan2(y,x)*180/Math.PI;
  bearing=(bearing+360)%360;
  const aDiff=Math.min(Math.abs(bearing-wDir),360-Math.abs(bearing-wDir));
  let type,color;
  if(aDiff<30){type='逆风';color='bad';}
  else if(aDiff>150){type='顺风';color='good';}
  else if(aDiff>60&&aDiff<120){type='侧风';color='warn';}
  else{type='侧顺风';color='good';}
  return{type,color,label:type+'骑行',windDir:wDir,windSpeed:wSpd,bearing:Math.round(bearing),angleDiff:Math.round(aDiff)};
}

// ── Feature: GPX export ────────────────────────────────
function downloadGPX(){
  const route=RSTATE.route;
  if(!route||!route.geometry||!route.geometry.coordinates)return;
  const coords=route.geometry.coordinates;
  let gpx='<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="Song Studio Route Planner" xmlns="http://www.topografix.com/GPX/1/1">\n  <trk>\n    <name>'+RSTATE.fromGeo.name+' → '+RSTATE.toGeo.name+'</name>\n    <trkseg>\n';
  for(let i=0;i<coords.length;i++)gpx+='      <trkpt lat="'+coords[i][1]+'" lon="'+coords[i][0]+'"></trkpt>\n';
  gpx+='    </trkseg>\n  </trk>\n</gpx>';
  const blob=new Blob([gpx],{type:'application/gpx+xml'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=RSTATE.fromGeo.name+'-'+RSTATE.toGeo.name+'.gpx';
  a.click();URL.revokeObjectURL(url);
}

// ── Feature: Share route URL ───────────────────────────
function shareRoute(){
  const from=document.getElementById('fromInput').value.trim();
  const to=document.getElementById('toInput').value.trim();
  const url=location.origin+location.pathname+'?from='+encodeURIComponent(from)+'&to='+encodeURIComponent(to)+'&mode='+RSTATE.mode;
  if(navigator.clipboard){
    navigator.clipboard.writeText(url).then(function(){
      alert('链接已复制到剪贴板！\n\n'+url);
    }).catch(function(){
      prompt('复制此链接分享路线：',url);
    });
  }else{
    prompt('复制此链接分享路线：',url);
  }
}

// ── Render feature bar ─────────────────────────────────
function renderFeatBar(){
  var sunset=checkSunset();
  var diff=calcDifficulty();
  var wind=analyzeWind();
  var items='';
  if(sunset){
    items+='<div class="ft-item"><span class="fti"><i class="fa-solid fa-moon"></i></span><div class="ftt"><span class="ftl">日落前能到吗</span><span class="ftv '+sunset.status+'">'+sunset.label+' · '+sunset.detail+'</span></div></div>';
  }
  items+='<div class="ft-item"><span class="fti"><i class="fa-solid fa-gauge-high"></i></span><div class="ftt"><span class="ftl">路线难度</span><span class="ftv '+diff.color+'">'+diff.label+' · '+diff.score+'/5</span></div></div>';
  var depart=bestDeparture();
  if(depart){
    var dColor=depart.rainProb<20?'good':depart.rainProb<50?'warn':'bad';
    items+='<div class="ft-item"><span class="fti"><i class="fa-solid fa-clock"></i></span><div class="ftt"><span class="ftl">推荐出发</span><span class="ftv '+dColor+'">'+depart.label+depart.time+' · 降雨概率'+depart.rainProb+'%</span></div></div>';
  }
  if(wind){
    items+='<div class="ft-item"><span class="fti"><i class="fa-solid fa-wind"></i></span><div class="ftt"><span class="ftl">风向分析</span><span class="ftv '+wind.color+'">'+wind.label+' · '+wind.windSpeed+'km/h '+wind.windDir+'°</span></div></div>';
  }else{
    var toW=RSTATE.toW;
    if(toW&&toW.current){
      var wc2=w(toW.current.weather_code);
      items+='<div class="ft-item"><span class="fti"><i class="fa-solid fa-'+wc2.i+'"></i></span><div class="ftt"><span class="ftl">目的地天气</span><span class="ftv">'+wc2.l+' · '+toW.current.temperature_2m.toFixed(0)+'°</span></div></div>';
    }
  }
  var html='<div class="feat-bar">'+items+'<div class="ft-actions"><button class="ft-btn" onclick="downloadGPX()"><i class="fa-solid fa-download"></i> 导出 GPX</button><button class="ft-btn" onclick="shareRoute()"><i class="fa-solid fa-share-nodes"></i> 分享路线</button></div></div>';
  var summary=document.getElementById('routeSummary');
  var bar=document.getElementById('featBar');
  if(!bar){
    bar=document.createElement('div');
    bar.id='featBar';
    summary.after(bar);
  }
  bar.innerHTML=html;
  bar.style.display='block';
}
