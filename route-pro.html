<body><div class="app"><header class="top"><a class="brand" href="https://song-studio.github.io/" aria-label="路线决策台"><img class="brandLogo" src="assets/brand/route-wordmark.svg" alt="路线决策台"></a><a class="weather" href="weather-pro.html">气象山野</a></header><main class="mapWrap"><div id="map"></div><div class="legend" id="legend">轨迹说明：真实轨迹 / 来源轨迹 / 关键点示意 / 待核验</div><div class="mapControls"><button data-layer="std" class="active">标准图</button><button data-layer="sat">卫星图</button><button data-layer="hyb">叠路网</button></div><section class="sheet"><div class="grab"></div><div class="tools"><div class="modes" id="modes"><button class="mode active" data-mode="hiking">徒步</button><button class="mode" data-mode="cycling">骑行</button><button class="mode" data-mode="motorcycle">摩旅</button><button class="mode" data-mode="mountaineering">登山</button></div><div class="regions" id="regions"><button class="region active" data-region="all">全部地区</button><button class="region" data-region="domestic">国内主线</button><button class="region" data-region="global">国外精选</button></div><div class="filterNote">先选活动类型，再筛地区。筛选只更新列表，不会替你跳到某条线路。</div><div class="tabs"><button class="tab active" data-tab="search">搜线路或地点</button><button class="tab" data-tab="ab">起点 → 终点</button></div><form id="form"><div id="searchBox" class="searchLine"><input id="q" placeholder="武功山 / 雨崩 / 独库 / 四姑娘山"><button>查</button></div><div id="abBox" class="ab" style="display:none"><input id="from" placeholder="起点"><input id="to" placeholder="终点"><button class="tab" style="grid-column:1/-1">规划草案</button></div></form></div><div class="mini" id="mini"></div><div class="content"><button class="backList" onclick="showList()">返回线路列表</button><div class="count" id="count">正在读取线路库</div><div class="list" id="list"></div><div class="detail" id="detail"></div></div></section></main></div><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><script>
const PROCESSED='data/processed/outdoor_routes_v10.json';const $=s=>document.querySelector(s);let S={mode:'hiking',region:'all',tab:'search',routes:[],sel:null,map:null,layer:null,base:{},baseNow:null};
function label(m){return{hiking:'徒步',cycling:'骑行',motorcycle:'摩旅',mountaineering:'登山'}[m]||m}function regionOf(r){return r.region_scope||(/[A-Za-z]|尼泊尔|日本|冰岛|瑞士|法国|意大利|秘鲁|新西兰/.test([r.country_or_region,r.region_text,r.region_text_zh,r.name_en].join(' '))?'global':'domestic')}function regionLabel(r){return regionOf(r)==='global'?'国外':'国内'}
function trackGrade(r){return r.track_truth_v7?.grade||r.track_grade||(r.track_type==='gpx_url_only'?'source_track':r.track_type==='key_points'?'key_points':(r.gpx_url&&r.track_points?.length&&r.geometry_confidence==='A')?'source_track':r.track_points?.length?'key_points':'unverified')}
function trackInfo(r){const g=trackGrade(r),m={real_track:['实走轨迹','good','可作导航参考'],source_track:['来源轨迹','warn','有外部轨迹，出发前仍需复核'],key_points:['关键点示意','warn','只展示关键点，不可直接导航'],road_navigation:['道路导航','good','道路骑行/摩旅线路，使用导航应用复核'],banned:['禁行/关闭','bad','路线已关闭或禁止穿越，不提供导航'],unverified:['待核验','bad','资料不足，不可直接导航']};const base=m[g]||m.unverified;return[base[0],base[1],r.track_truth_v7?.user_warning_zh||base[2]]}function dataBadge(r){return`资料 ${r.confidence_grade||r.data_confidence||'C'}`}function geomBadge(r){return`轨迹 ${r.geometry_confidence||'C'}`}
async function load(){const data=await fetch(PROCESSED).then(r=>r.json());S.routes=(data.routes||[]).filter(r=>['hiking','cycling','motorcycle','mountaineering'].includes(r.mode));initMap();renderList();showList()}
function initMap(){S.map=L.map('map',{zoomControl:false}).setView([31,103],5);S.base.std=L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}',{subdomains:'1234',maxZoom:18,attribution:'高德'});S.base.sat=L.tileLayer('https://webst0{s}.is.autonavi.com/appmaptile?style=6&x={x}&y={y}&z={z}',{subdomains:'1234',maxZoom:18,attribution:'高德卫星图'});S.base.road=L.tileLayer('https://webst0{s}.is.autonavi.com/appmaptile?style=8&x={x}&y={y}&z={z}',{subdomains:'1234',maxZoom:18,attribution:'高德叠路网'});S.baseNow=S.base.std.addTo(S.map);L.control.zoom({position:'bottomleft'}).addTo(S.map)}
function switchLayer(k){if(S.baseNow)S.baseNow.remove();S.baseNow=S.base[k==='hyb'? 'sat':k].addTo(S.map);if(k==='hyb')S.base.road.addTo(S.map);else if(S.map.hasLayer(S.base.road))S.base.road.remove();document.querySelectorAll('.mapControls button').forEach(b=>b.classList.toggle('active',b.dataset.layer===k))}
function pool(){return S.routes.filter(r=>r.mode===S.mode&&(S.region==='all'||regionOf(r)===S.region))}function rank(r){const c={A:4,B:3,C:2,D:1}[r.confidence_grade||'C']||2,g={A:4,B:3,C:2,D:1}[r.geometry_confidence||'C']||2;return c*10+g}function first(){return match()[0]}function match(){const q=($('#q')?.value||'').trim().toLowerCase();let a=pool();if(q)a=a.filter(r=>[r.name_zh,r.name_en,...(r.aliases||[]),r.start_poi,r.end_poi,r.region_text,r.region_text_zh,(r.risk_tags||[]).join(' ')].join(' ').toLowerCase().includes(q));return a.sort((a,b)=>rank(b)-rank(a))}
function badgeHtml(r){const t=trackInfo(r);return`<div class="badges"><span class="badge">${dataBadge(r)}</span><span class="badge">${geomBadge(r)}</span><span class="badge ${t[1]}">${t[0]}</span><span class="badge">${regionLabel(r)}</span></div>`}
function renderList(){const a=match();$('#count').textContent=`${label(S.mode)} · ${S.region==='all'?'全部地区':S.region==='global'?'国外精选':'国内主线'} · ${a.length} 条线路`;$('#list').innerHTML=a.slice(0,40).map(r=>`<button class="route ${S.sel?.route_id===r.route_id?'active':''}" onclick="select('${r.route_id}')"><div><h3>${r.name_zh}</h3><p>${r.start_poi||'起点待核验'} → ${r.end_poi||'终点待核验'}<br>${r.distance_km||'--'}km · +${r.elevation_gain_m||'--'}m · ${r.max_altitude_m||'--'}m</p>${badgeHtml(r)}</div><span class="grade">${trackInfo(r)[0]}</span></button>`).join('')||'<div class="empty">没有匹配线路。可换关键词，或切换活动类型和地区。</div>'}
function draw(r){if(S.layer)S.layer.remove();S.layer=L.layerGroup().addTo(S.map);let pts=[];if(arrify(r.track_points).length)pts=arrify(r.track_points).map(p=>[p.lat,p.lng]);if(!pts.length){S.map.setView([31,103],5);return}const ti=trackInfo(r),lineColor=ti[1]==='good'?'#2f7b4f':ti[1]==='bad'?'#bf3d2c':'#11140f';arrify(r.track_points).forEach((p,i)=>L.circleMarker([p.lat,p.lng],{radius:i===0||i===r.track_points.length-1?7:5,color:'#11140f',fillColor:i===0?'#c8f05a':i===r.track_points.length-1?'#bf3d2c':'#fffdf3',fillOpacity:1,weight:2}).bindPopup(`${p.name||'轨迹点'}<br>${ti[0]}`).addTo(S.layer));L.polyline(pts,{color:lineColor,weight:5,opacity:.9,dashArray:trackGrade(r)==='key_points'?'9 8':null}).addTo(S.layer);arrify(r.cycling_poi).slice(0,24).forEach(p=>L.circleMarker([p.lat,p.lng],{radius:5,color:'#2b67d1',fillColor:'#2b67d1',fillOpacity:.75,weight:1}).bindPopup(`${p.name_zh}<br>${p.poi_type||''}<br>${p.mobile_note||''}`).addTo(S.layer));arrify(r.mountaineering_geo).slice(0,24).forEach(p=>L.circleMarker([p.lat,p.lng],{radius:5,color:'#a45a32',fillColor:'#a45a32',fillOpacity:.8,weight:1}).bindPopup(`${p.name_zh}<br>${p.point_type||''}<br>${p.mobile_note||''}`).addTo(S.layer));const mobile=window.matchMedia('(max-width: 859px)').matches;S.map.fitBounds(pts,mobile?{paddingTopLeft:[28,42],paddingBottomRight:[28,Math.round(window.innerHeight*.43)]}:{padding:[40,40]})}
function arrify(x){return Array.isArray(x)?x:(x?[x]:[])}function cleanText(x){return String(x??'').trim()}function useful(x){const t=cleanText(x);return t&&t!=='待补充'&&t!=='待核验'&&!/^.+：待补充$/.test(t)&&!/^.+：待核验$/.test(t)&&!t.includes('undefined')}function yn(v){return String(v).toLowerCase()==='yes'?'有':String(v).toLowerCase()==='no'?'无':(useful(v)?v:'待核验')}function permitText(r){const level=r.decision_v7?.permit_level;const levelText={none:'通常不需要',strict:'严格许可',review:'需复核',unknown:'待核验'}[level]||'';const base=r.permit_required?'需要':'通常不需要';const note=r.permit_how&&r.permit_how!=='待补充'?`，${r.permit_how}`:'';return `${levelText||base}${note}`}function campText(c){return typeof c==='string'?c:`${c.name||'营地'}${c.altitude_m?' · '+c.altitude_m+'m':''}${c.water?' · '+c.water:''}`}function textify(x){return typeof x==='object'?Object.entries(x).filter(([,v])=>useful(Array.isArray(v)?v.join('、'):v)).map(([k,v])=>`${k}：${Array.isArray(v)?v.join('、'):v}`).join('；'):x}function rows(title,arr,cls=''){const clean=arrify(arr).flat().map(textify).filter(useful);if(!clean.length)return'';return`<div class="card ${cls}"><h3>${title}</h3>${clean.map(x=>`<div class="item"><span class="mark">•</span><span>${x}</span></div>`).join('')}</div>`}function decisionPanel(r){const d=r.decision_v7||{},level=d.decision_level||'green';const factors=[...(d.go_no_go_factors||[]).slice(0,4),d.best_window&&`最佳窗口：${d.best_window}`].filter(Boolean);const stops=(d.hard_stop_rules||[]).slice(0,4);return`<div class="card decision ${level}"><h3>行动判断</h3><p class="decisionLead">${d.summary||'资料已入库。出发前仍需复核天气、封控、许可和离线轨迹。'}</p>${factors.map(x=>`<div class="item"><span class="mark">判</span><span>${x}</span></div>`).join('')}${stops.map(x=>`<div class="item"><span class="mark">停</span><span>${x}</span></div>`).join('')}${d.who_should_avoid_zh?`<div class="item"><span class="mark">避</span><span>${d.who_should_avoid_zh}</span></div>`:''}</div>`}function gear(r){return arrify(r.gear_essential).slice(0,6).filter(useful)}function showList(){document.querySelector('.sheet').classList.remove('detailMode','mapMode');$('#detail').innerHTML=''}function enterMap(){document.querySelector('.sheet').classList.add('mapMode');setTimeout(()=>S.map.invalidateSize(),80)}function exitMap(){document.querySelector('.sheet').classList.remove('mapMode');setTimeout(()=>S.map.invalidateSize(),80)}
function detailRows(r){if(r.activity_type==='hiking'){const ss=arrify(r.segments).slice(0,6);return[rows('徒步分段',ss.map(s=>`${s.visual_label_mobile||s.segment_character||'分段'}：${s.from_name} → ${s.to_name}，${s.distance_km}km，+${s.elevation_gain_m}m，${yn(s.water_available)}水源`)),rows('水源、撤退、导航',[arrify(r.water_points).slice(0,4).join('、')||'水源待核验',arrify(r.retreat_points).slice(0,4).join('、')||'撤退点待核验',r.navigation?.tip||'离线轨迹优先'])]}if(r.mode==='cycling'||r.mode==='motorcycle'){const c=r.cycling_ops,pois=arrify(r.cycling_poi).slice(0,8),d=r.cycling_depth||{};return[rows(r.mode==='motorcycle'?'摩旅路况':'骑行路况',[d.surface_mix&&`路面：${d.surface_mix}`,d.shoulder_width&&`路肩：${d.shoulder_width}`,d.traffic_level&&`交通：${d.traffic_level}`,d.fuel_stops&&`油站：${d.fuel_stops}`,d.road_closure_risk&&`封路风险：${d.road_closure_risk}`,d.accommodation&&`住宿：${d.accommodation}`,c&&`道路：${c.road_classes||''} ${c.surface_mix||''}`]),rows('补给/维修/危险段',c?[`维修：${c.repair_points}`,`补给间隔：${c.resupply_interval_km}`,`危险：${c.danger_sections}`]:[d.fuel_stops&&`油站：${d.fuel_stops}`,d.road_closure_risk&&`封路：${d.road_closure_risk}`]),rows('沿途关键点',pois.map(p=>`${p.name_zh} · ${p.poi_type} · ${p.mobile_note||''}`))]}if(r.activity_type==='mountaineering'){const c=r.mountaineering,geo=arrify(r.mountaineering_geo).slice(0,8);return[rows('营地与登顶',c?[`BC：${c.basecamp}`,`出发：${c.summit_push_start_time}，折返：${c.turnaround_time}`,`等级：${c.technical_grade}`]:[]),rows('技术/红线',c?[`地形：${c.terrain_type}`,`装备：${c.required_gear}`,`天气红线：${c.weather_abort_thresholds}`]:[]),rows('地理点位',geo.map(p=>`${p.name_zh} · ${p.point_type} · ${p.altitude_m||''}m · ${p.mobile_note||''}`))]}return[]}
function clearSelection(){S.sel=null;document.querySelector('.sheet').classList.remove('detailMode','mapMode');$('#detail').innerHTML='';$('#mini').innerHTML='';$('#legend').textContent='轨迹说明：真实轨迹 / 来源轨迹 / 关键点示意 / 待核验';if(S.map)S.map.setView([31,103],5)}
function select(id){const r=S.routes.find(x=>x.route_id===id);if(!r)return;S.sel=r;renderList();draw(r);const ti=trackInfo(r);document.querySelector('.sheet').classList.add('detailMode');document.querySelector('.sheet').classList.remove('mapMode');document.querySelector('.sheet').scrollTop=0;$('#mini').innerHTML=`<div><b>${r.name_zh}</b><br><span>${ti[0]} · ${r.distance_km||'--'}km · +${r.elevation_gain_m||'--'}m</span></div><button onclick="exitMap()">看详情</button>`;$('#legend').textContent=`${ti[0]}：${ti[2]}`;$('#detail').innerHTML=`<div class="detailTop"><div><h2>${r.name_zh}</h2><p class="summary">${label(r.mode)} · ${regionLabel(r)} · ${r.start_poi||'起点待核验'} → ${r.end_poi||'终点待核验'} · ${ti[0]}，${ti[2]}</p>${badgeHtml(r)}</div><button class="mapBtn" onclick="enterMap()">大地图</button></div><div class="metrics"><div class="metric"><b>${r.distance_km||'--'}</b><span>公里</span></div><div class="metric"><b>${r.elevation_gain_m||'--'}</b><span>爬升</span></div><div class="metric"><b>${r.max_altitude_m||'--'}</b><span>海拔</span></div><div class="metric"><b>${r.duration_h||r.duration_days||'--'}</b><span>时间</span></div></div><div class="cards">${decisionPanel(r)}${rows('轨迹可信度',[`${ti[0]}：${ti[2]}`,r.track_truth_v7?.evidence_note&&`依据：${r.track_truth_v7.evidence_note}`,useful(r.track_truth_v7?.source_name)&&`来源：${r.track_truth_v7.source_name}`,r.track_truth_v7?.can_navigate?'可作为导航参考，仍建议下载离线轨迹。':'不可直接导航。请下载 GPX、两步路或官方轨迹交叉核验。'],'trackTruth')}${detailRows(r).join('')}${rows('季节、许可、通行',[`季节：${r.season_status||r.ops?.season_status||'待核验'}`,`许可：${permitText(r)}`,`通行：${r.access_status||r.ops?.access_status||'待核验'}`,r.regulation_note&&`规则：${r.regulation_note}`])}${rows('营地与住宿',[arrify(r.campsites).slice(0,4).map(campText).join('；')||'',...arrify(r.huts).slice(0,3),r.camping_restriction&&`限制：${r.camping_restriction}`,r.decision_v7?.camping_reality_zh&&`现实：${r.decision_v7.camping_reality_zh}`])}${rows('信号与救援',[r.signal_coverage&&`信号：${r.signal_coverage}`,r.decision_v7?.signal_reality_zh&&`信号现实：${r.decision_v7.signal_reality_zh}`,r.signal_dead_zones&&`盲区：${r.signal_dead_zones}`,r.last_signal_point&&`最后信号：${r.last_signal_point}`,`救援可达：${r.emergency_access_score||r.ops?.emergency_access_score||'待核验'}`,r.emergency_access_note&&`说明：${r.emergency_access_note}`,r.decision_v7?.rescue_reality_zh&&`救援现实：${r.decision_v7.rescue_reality_zh}`])}${rows('变体与交通',[...arrify(r.route_variants).slice(0,4),r.variant_differences&&`差异：${r.variant_differences}`,r.trailhead_access&&`进山：${r.trailhead_access}`,r.return_from_endpoint&&`返程：${r.return_from_endpoint}`])}${rows('最低装备',gear(r))}${rows('风险标签',arrify(r.risk_tags).slice(0,8))}${rows('数据可信度',[`最近城市：${r.nearest_city||'待核验'}`,`交通枢纽：${r.nearest_transport_hub||'待核验'}`,`资料等级：${r.confidence_grade||'C'}`,`轨迹等级：${r.geometry_confidence||'C'}`])}${rows('补给、撤退、水源',[`补给：${arrify(r.resupply_points).slice(0,4).join('、')||'待核验'}`,`撤退：${arrify(r.retreat_points).slice(0,4).join('、')||'待核验'}`,`水源：${arrify(r.water_points).slice(0,4).join('、')||'待核验'}`])}</div>${r.track_truth_v7?.public_track_url?`<a class="src" target="_blank" href="${r.track_truth_v7.public_track_url}"><b>${r.track_truth_v7.public_track_label||'外部轨迹'}</b><span>打开公开来源</span></a>`:''}<a class="src" href="weather-pro.html?q=${encodeURIComponent(r.start_poi||r.name_zh)}"><b>查看起点天气</b><span>气象山野</span></a>`}
async function ab(){const a=$('#from').value.trim(),b=$('#to').value.trim();if(!a||!b)return;if(S.layer)S.layer.remove();S.layer=L.layerGroup().addTo(S.map);$('#detail').innerHTML=`<h2>${a} → ${b}</h2><p class="summary">规划草案只保留入口，不用直线冒充真实轨迹。</p><div class="empty">等路线服务和真实轨迹接入后，再生成可用方案。</div>`;document.querySelector('.sheet').classList.add('detailMode')}
