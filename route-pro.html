:1px solid var(--line);background:var(--acid);font-weight:900;padding:8px 10px}.summary{color:var(--muted);line-height:1.55;margin:0 0 10px}.metrics{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--line);border-right:0;border-bottom:0;margin-bottom:10px}.metric{background:oklch(99% .012 92);border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:8px}.metric b{font-family:var(--mono);display:block;font-size:15px}.metric span{font-size:10px;color:var(--muted)}.cards{display:grid;gap:8px}.card{background:oklch(99% .012 92);border:1px solid var(--line);padding:10px}.card h3{margin:0 0 7px;font-size:16px}.decision{background:oklch(96% .035 112);border-color:oklch(68% .09 115)}.decision.red{background:oklch(96% .035 35);border-color:oklch(67% .12 35)}.decision.amber{background:oklch(97% .045 78);border-color:oklch(70% .11 78)}.decisionLead{font-size:14px;line-height:1.58;margin:0 0 8px;color:var(--ink);font-weight:700}.trackTruth{background:oklch(96% .025 210);border-color:oklch(74% .06 215)}.item{display:grid;grid-template-columns:18px 1fr;gap:7px;color:var(--muted);font-size:13px;line-height:1.5;margin:5px 0}.mark{font-family:var(--mono);color:var(--olive);font-weight:700}.empty{border:1px dashed var(--line);background:oklch(99% .012 92);padding:12px;color:var(--muted);line-height:1.6}.src{display:flex;justify-content:space-between;border:1px solid var(--line);padding:9px;margin-top:6px;background:oklch(95% .025 92);font-size:13px}.backList{display:none;border:1px solid var(--line);background:var(--acid);padding:10px 12px;font-weight:900;margin-bottom:10px;width:100%;text-align:left}.sheet.detailMode .backList{display:block}@media(min-width:860px){.sheet{left:auto;right:14px;top:14px;bottom:14px;width:440px;max-height:none}.content{padding-bottom:20px}.cards{grid-template-columns:1fr 1fr}.ab{grid-template-columns:1fr 1fr}.mapWrap{height:calc(100vh - 51px)}.sheet.mapMode{max-height:none;width:260px;top:auto;bottom:14px}}@medi <body><div class="app"><header class="top"><a class="brand" href="https://song-studio.github.io/" aria-label="路线决策台"><img class="brandLogo" src="assets/brand/route-wordmark.png" alt="路线决策台"></a><a class="weather" href="weather-pro.html">气象山野</a></header><main class="mapWrap"><div id="map"></div><div class="legend" id="legend">轨迹说明：真实轨迹 / 来源轨迹 / 关键点示意 / 待核验</div><div class="mapControls"><button data-layer="std" class="active">标准图</button><button data-layer="sat">卫星图</button><button data-layer="hyb">叠路网</button></div><section class="sheet"><div class="grab"></div><div class="tools"><div class="modes" id="modes"><button class="mode active" data-mode="hiking">徒步</button><button class="mode" data-mode="cycling">骑行</button><button class="mode" data-mode="motorcycle">摩旅</button><button class="mode" data-mode="mountaineering">登山</button></div><div class="regions" id="regions"><button class="region active" data-region="all">全部地区</button><button class="region" data-region="domestic">国内主线</button><button class="region" data-region="global">国外精选</button></div><div class="filterNote">先选活动类型，再筛地区。筛选只更新列表，不会替你跳到某条线路。</div><div class="tabs"><button type="button" class="tab active" data-tab="search">搜线路或地点</button><button type="button" class="tab" data-tab="ab">起点 → 终点</button></div><form id="form"><div id="searchBox" class="searchLine"><input id="q" placeholder="武功山 / 雨崩 / 独库 / 四姑娘山"><button type="submit">查</button></div><div id="abBox" class="ab" style="display:none"><input id="from" placeholder="起点"><input id="to" placeholder="终点"><button type="submit" class="planBtn" style="grid-column:1/-1">规划草案</button></div></form></div><div class="mini" id="mini"></div><div class="content"><button class="backList" onclick="showList()">返回线路列表</button><div class="count" id="count">正在读取线路库</div><div class="list" id="list"></div><div class="detail" id="detail"></div></div></section></main></div><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><script>
const PROCESSED='data/processed/outdoor_routes_v13.json',AMAP_KEY='39a8c2f6ef75e494198f3e3751701ebe';const $=s=>document.querySelector(s);let S={mode:'hiking',region:'all',tab:'search',routes:[],sel:null,map:null,layer:null,base:{},baseNow:null};
function label(m){return{hiking:'徒步',cycling:'骑行',motorcycle:'摩旅',mountaineering:'登山'}[m]||m}function regionOf(r){return r.region_scope||(/[A-Za-z]|尼泊尔|日本|冰岛|瑞士|法国|意大利|秘鲁|新西兰/.test([r.country_or_region,r.region_text,r.region_text_zh,r.name_en].join(' '))?'global':'domestic')}function regionLabel(r){return regionOf(r)==='global'?'国外':'国内'}
function trackGrade(r){return r.track_truth_v7?.grade||r.track_grade||(r.track_type==='gpx_url_only'?'source_track':r.track_type==='key_points'?'key_points':(r.gpx_url&&r.track_points?.length&&r.geometry_confidence==='A')?'source_track':r.track_points?.length?'key_points':'unverified')}
function trackInfo(r){const g=trackGrade(r),m={real_track:['实走轨迹','good','可作导航参考'],source_track:['来源轨迹','warn','有外部轨迹，出发前仍需复核'],key_points:['关键点示意','warn','只展示关键点，不可直接导航'],road_navigation:['道路导航','good','道路骑行/摩旅线路，使用导航应用复核'],banned:['禁行/关闭','bad','路线已关闭或禁止穿越，不提供导航'],unverified:['待核验','bad','资料不足，不可直接导航']};const base=m[g]||m.unverified;return[base[0],base[1],r.track_truth_v7?.user_warning_zh||base[2]]}function linkAccessText(r){const st=r.track_link_v10?.link_access_status||'unknown',m={ok:'公开链接可打开',blocked:'公开链接受限（平台风控/权限）',broken:'公开链接已失效',error:'公开链接探测异常',unknown:'无公开链接'};return m[st]||m.unknown}function linkAction(r){const st=r.track_link_v10?.link_access_status||'unknown';const urlOk=r.track_truth_v7?.public_track_url;const backup=r.gpx_search_url||r.gpx_url||'';if(st==='ok'&&urlOk)return`<a class="src" target="_blank" href="${urlOk}"><b>${r.track_truth_v7?.public_track_label||'外部轨迹'}</b><span>打开公开来源</span></a>`;if((st==='blocked'||st==='error')&&backup)return`<a class="src" target="_blank" href="${backup}"><b>公开链接受限</b><span>打开备用检索页</span></a>`;return''}function dataBadge(r){return`资料 ${r.confidence_grade||r.data_confidence||'C'}`}function geomBadge(r){return`轨迹 ${r.geometry_confidence||'C'}`}
async function load(){const data=await fetch(PROCESSED).then(r=>r.json());S.routes=(data.routes||[]).filter(r=>['hiking','cycling','motorcycle','mountaineering'].includes(r.mode));initMap();renderList();showList()}
function initMap(){S.map=L.map('map',{zoomControl:false}).setView([31,103],5);S.base.std=L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}',{subdomains:'1234',maxZoom:18,attribution:'高德'});S.base.sat=L.tileLayer('https://webst0{s}.is.autonavi.com/appmaptile?style=6&x={x}&y={y}&z={z}',{subdomains:'1234',maxZoom:18,attribution:'高德卫星图'});S.base.road=L.tileLayer('https://webst0{s}.is.autonavi.com/appmaptile?style=8&x={x}&y={y}&z={z}',{subdomains:'1234',maxZoom:18,attribution:'高德叠路网'});S.baseNow=S.base.std.addTo(S.map);L.control.zoom({position:'bottomleft'}).addTo(S.map)}
function switchLayer(k){if(S.baseNow)S.baseNow.remove();S.baseNow=S.base[k==='hyb'? 'sat':k].addTo(S.map);if(k==='hyb')S.base.road.addTo(S.map);else if(S.map.hasLayer(S.base.road))S.base.road.remove();document.querySelectorAll('.mapControls button').forEach(b=>b.classList.toggle('active',b.dataset.layer===k))}
function pool(){return S.routes.filter(r=>r.mode===S.mode&&(S.region==='all'||regionOf(r)===S.region))}function rank(r){const c={A:4,B:3,C:2,D:1}[r.confidence_grade||'C']||2,g={A:4,B:3,C:2,D:1}[r.geometry_confidence||'C']||2;return c*10+g}function first(){return match()[0]}function match(){const q=($('#q')?.value||'').trim().toLowerCase();let a=pool();if(q)a=a.filter(r=>[r.name_zh,r.name_en,...(r.aliases||[]),r.start_poi,r.end_poi,r.region_text,r.region_text_zh,(r.risk_tags||[]).join(' ')].join(' ').toLowerCase().includes(q));return a.sort((a,b)=>rank(b)-rank(a))}
function parseABQuery(q){const s=String(q||'').trim();if(!s)return null;const m=s.match(/^\s*(.+?)\s*(?:→|->|到|-)\s*(.+?)\s*$/);if(!m)return null;const from=m[1]?.trim(),to=m[2]?.trim();if(!from||!to)return null;return{from,to}}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]))}
function switchToAb(from,to){S.tab='ab';document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.dataset.tab==='ab'));$('#searchBox').style.display='none';$('#abBox').style.display='grid';$('#from').value=from||'';$('#to').value=to||'';ab()}

></div><div class="metric"><b>${hasExternal?'外部路径':'库内匹配'}</b><span>路径来源</span></div><div class="metric"><b>${bestS?(bestS.score||0).toFixed(1):'--'}</b><span>匹配分</span></div></div><div class="cards">${rows('路径依据',[`起点解析：${from.name}（${from.source}）`,`终点解析：${to.name}（${to.source}）`,hasExternal?`路径引擎：高德 ${ext.kind}`:'路径引擎：外部失败，已回退库内',hasExternal?`外部距离：${ext.meter}m`:null,best?`库内参考：${best.name_zh}`:'库内参考：无',best?`轨迹可信度：${t[0]}，${t[2]}`:null])}${rows('安全提示',[mode==='motorcycle'?'摩旅建议：注意落石、封路、油站间隔。':mode==='cycling'?'骑行建议：优先检查路肩、车流、施工绕行。':'徒步/登山建议：本结果为参考草案，出发前下载离线轨迹并核对许可。',!reliable?'当前可靠性不足：建议改更具体地名，或直接从下方候选线路进入。':null,...(best?arrify(best.risk_tags).slice(0,5):[])])}${best?rows('季节、许可、通行',[`季节：${best.season_status||best.ops?.season_status||'待核验'}`,`许可：${permitText(best)}`,`通行：${best.access_status||best.ops?.access_status||'待核验'}`,best.regulation_note&&`规则：${best.regulation_note}`]):''}${best?rows('补给、撤退、水源',[`补给：${arrify(best.resupply_points).slice(0,4).join('、')||'待核验'}`,`撤退：${arrify(best.retreat_points).slice(0,4).join('、')||'待核验'}`,`水源：${arrify(best.water_points).slice(0,4).join('、')||'待核验'}`]):''}${best?rows('信号与救援',[best.signal_coverage&&`信号：${best.signal_coverage}`,best.signal_dead_zones&&`盲区：${best.signal_dead_zones}`,best.last_signal_point&&`最后信号：${best.last_signal_point}`,`救援可达：${best.emergency_access_score||best.ops?.emergency_access_score||'待核验'}`,best.emergency_access_note&&`说明：${best.emergency_access_note}`]):''}${candidateHtml(candidates.slice(0,4).map(x=>x.r))}</div><a class="src" href="weather-pro.html?q=${encodeURIComponent((best?.start_poi)||a)}"><b>查看起点天气</b><span>气象山野</span></a>`;document.querySelector('.sheet').classList.add('detailMode');document.querySelector('.sheet').classList.remove('mapMode')}
$('#modes').onclick=e=>{const b=e.target.closest('.mode');if(!b)return;S.mode=b.dataset.mode;document.querySelectorAll('.mode').forEach(x=>x.classList.toggle('active',x===b));clearSelection();renderList()};$('#regions').onclick=e=>{const b=e.target.closest('.region');if(!b)return;S.region=b.dataset.region;document.querySelectorAll('.region').forEach(x=>x.classList.toggle('active',x===b));clearSelection();renderList()};document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{S.tab=t.dataset.tab;document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===t));$('#searchBox').style.display=S.tab==='search'?'grid':'none';$('#abBox').style.display=S.tab==='ab'?'grid':'none'});document.querySelector('.mapControls').onclick=e=>{const b=e.target.closest('button');if(b)switchLayer(b.dataset.layer)};$('#form').onsubmit=e=>{e.preventDefault();const isAb=$('#abBox').style.display!=='none';if(isAb)ab();else{clearSelection();renderList()}};$('#q').oninput=()=>{clearSelection();renderList()};const p=new URLSearchParams(location.search);if(p.get('q'))$('#q').value=p.get('q');load();
</script></body></html>
