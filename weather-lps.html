<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>六盘水师范学院家属区 — 6日气象</title>
<style>
  :root {
    --bg: #f5f3ef; --card: #ffffff; --text: #2c2c2c; --sub: #767676;
    --accent: #4a7eb5; --rain: #5b8cb8; --line: #e8e4df; --shadow: 0 1px 3px rgba(0,0,0,.06);
  }
  * { margin:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system,'PingFang SC','Noto Sans SC',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; -webkit-font-smoothing:antialiased; }

  .wrap { max-width:760px; margin:0 auto; padding:20px 14px 50px; }

  header { text-align:center; padding:30px 0 14px; }
  header h1 { font-size:1.3em; font-weight:600; }
  header .loc { font-size:.82em; color:var(--sub); margin-top:4px; }
  header .meta { font-size:.7em; color:#bbb; margin-top:3px; line-height:1.4; }

  .now-line { display:flex; align-items:center; justify-content:center; gap:10px; padding:10px 0 20px; font-size:.8em; color:var(--sub); }
  .now-line .bullet { width:6px; height:6px; border-radius:50%; background:#6aaa6a; animation:pulse 2s infinite; }
  @keyframes pulse { 50%{opacity:.3} }

  /* ── Day cards ─────────────────── */
  .days { display:grid; grid-template-columns:repeat(6,1fr); gap:8px; margin-bottom:24px; }
  @media (max-width:680px) { .days { grid-template-columns:repeat(3,1fr); gap:6px; } }
  @media (max-width:380px) { .days { grid-template-columns:repeat(2,1fr); } }

  .day-card {
    background:var(--card); border-radius:12px; padding:14px 8px 12px; text-align:center;
    cursor:pointer; transition:all .18s; box-shadow:var(--shadow); user-select:none;
  }
  .day-card:active { transform:scale(.96); }
  .day-card.active { box-shadow:0 0 0 2px var(--accent); }
  .day-card .dow { font-size:.78em; font-weight:600; }
  .day-card .date { font-size:.66em; color:var(--sub); margin-bottom:6px; }
  .day-card .icon { font-size:1.9em; margin:4px 0; display:block; }
  .day-card .temps { font-size:.88em; font-weight:500; }
  .day-card .temps .lo { color:var(--sub); margin-left:3px; }
  .day-card .rain-bar { margin-top:7px; height:3px; background:#eee; border-radius:2px; overflow:hidden; }
  .day-card .rain-bar .fill { height:100%; background:var(--rain); border-radius:2px; transition:width .3s; }
  .day-card .tag { font-size:.62em; color:var(--sub); margin-top:3px; }

  /* ── Insight ───────────────────── */
  .insight-box { background:#edf3f8; border-radius:11px; padding:14px 16px; margin-bottom:22px; font-size:.82em; line-height:1.65; }
  @media (max-width:480px) { .insight-box { font-size:.76em; padding:12px 14px; } }
  .insight-box strong { color:var(--accent); }

  /* ── Detail panel ──────────────── */
  .detail-panel { background:var(--card); border-radius:14px; padding:20px 16px; margin-bottom:20px; box-shadow:var(--shadow); display:none; }
  .detail-panel.show { display:block; }
  .detail-panel h3 { font-size:.95em; margin-bottom:14px; color:var(--accent); }

  .detail-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  @media (max-width:480px) { .detail-grid { grid-template-columns:repeat(2,1fr); gap:8px; } }
  .detail-item { background:#fafaf8; border-radius:10px; padding:12px 10px; text-align:center; }
  .detail-item .label { font-size:.66em; color:var(--sub); letter-spacing:.03em; }
  .detail-item .value { font-size:1.05em; font-weight:600; margin-top:4px; }

  .sun-row { display:flex; gap:10px; margin-top:10px; flex-wrap:wrap; }
  .sun-item { display:flex; align-items:center; gap:5px; font-size:.78em; color:var(--sub); }

  /* ── Hourly strip ──────────────── */
  .hourly-section { margin-top:16px; }
  .hourly-label { font-size:.72em; color:var(--sub); margin-bottom:8px; letter-spacing:.03em; }
  .hourly-strip { display:flex; overflow-x:auto; gap:5px; padding-bottom:8px; -webkit-overflow-scrolling:touch; scroll-behavior:smooth; }
  .hourly-strip::-webkit-scrollbar { height:3px; }
  .hourly-strip::-webkit-scrollbar-thumb { background:#ddd; border-radius:2px; }
  .hr-chip {
    flex:0 0 auto; min-width:50px; text-align:center; padding:7px 5px;
    background:#fafaf8; border-radius:8px; font-size:.68em;
  }
  .hr-chip.now { background:#e8f0f8; border:1px solid #c8d8e8; }
  .hr-chip .h { font-weight:600; margin-bottom:4px; display:block; }
  .hr-chip .t { margin-bottom:1px; }
  .hr-chip .r { color:var(--rain); }

  /* ── Chart ─────────────────────── */
  .temp-chart { margin-top:16px; width:100%; overflow-x:auto; -webkit-overflow-scrolling:touch; }
  .temp-chart svg { min-width:500px; width:100%; height:auto; }

  .wmo-legend { font-size:.62em; color:#ccc; text-align:center; margin-top:12px; }
  footer { text-align:center; padding:30px 0; color:#ccc; font-size:.66em; }
  footer a { color:#bbb; }

  /* Mobile tweaks */
  @media (max-width:480px) {
    .wrap { padding:12px 10px 40px; }
    header { padding:20px 0 10px; }
    header h1 { font-size:1.15em; }
    .day-card { padding:12px 6px 10px; border-radius:10px; }
    .day-card .icon { font-size:1.6em; }
    .day-card .temps { font-size:.8em; }
    .detail-panel { padding:16px 12px; border-radius:12px; }
    .hr-chip { min-width:44px; padding:6px 4px; font-size:.64em; }
  }
</style>
</head>
<body>
<div class="wrap">
<header>
  <h1>🌦️ 六盘水师范学院 · 家属区</h1>
  <div class="loc">贵州 · 六盘水 · 钟山区 · 海拔 1884m</div>
  <div class="meta">数据源 Open-Meteo 全球气象模型 &nbsp;·&nbsp; 更新于 <span id="update-time"></span></div>
</header>
<div class="now-line"><span class="bullet"></span> 点击日期卡片查看逐时详情</div>

<div class="days" id="days"></div>
<div class="insight-box" id="insight"></div>

<div class="detail-panel" id="detail">
  <h3 id="detail-title"></h3>
  <div class="detail-grid" id="detail-grid"></div>
  <div class="sun-row" id="sun-row"></div>
  <div class="hourly-section">
    <div class="hourly-label">24 小时逐时预报 · 左右滑动</div>
    <div class="hourly-strip" id="hourly"></div>
  </div>
  <div class="temp-chart"><svg id="chart"></svg></div>
</div>

<div class="wmo-legend">WMO 4680 气象编码 · 数据仅供出行参考</div>
<footer>song-studio.github.io</footer>
</div>

<script>
const DATA = {"daily":{"time":["2026-05-14","2026-05-15","2026-05-16","2026-05-17","2026-05-18","2026-05-19"],"temp_max":[23.5,22.8,24.0,25.4,26.3,25.1],"temp_min":[13.5,14.6,14.4,14.9,17.2,16.4],"precip_max":[99,98,99,100,92,86],"weather":[63,80,80,63,53,80],"wind_max":[14.9,10.3,13.6,19.9,18.0,15.5],"humid_max":[100,100,100,100,98,100],"sunrise":["06:13","06:13","06:12","06:12","06:11","06:11"],"sunset":["19:39","19:40","19:40","19:41","19:41","19:42"]},"hourly":{"temp":[14.5,13.5,13.9,14.1,14.9,15.2,15.1,15.2,15.8,17.4,19.8,20.8,21.6,22.9,22.9,23.5,22.6,21.2,17.4,16.7,16.3,16.1,16.0,15.6,15.1,15.0,14.6,14.9,15.1,15.1,15.2,15.4,15.6,15.7,16.3,17.7,19.4,20.8,22.6,22.8,18.5,19.3,18.1,17.1,16.3,15.8,15.6,15.5,15.2,15.4,14.4,14.8,15.0,14.8,14.6,14.9,16.1,17.6,18.7,20.1,21.8,23.4,24.0,24.0,24.0,22.9,21.7,17.8,16.9,16.1,16.4,16.0,15.9,15.8,15.4,15.4,15.2,14.9,15.5,16.1,16.8,18.3,20.2,22.2,24.3,24.2,24.4,25.4,23.9,23.4,22.6,20.9,19.1,18.1,17.5,17.1,17.2,17.5,17.8,17.8,17.7,17.7,17.9,18.2,18.9,20.4,22.2,23.8,25.0,25.9,26.3,26.1,25.4,24.3,22.4,20.1,18.4,18.0,18.1,18.2,18.0,17.8,17.6,17.5,17.3,17.3,17.2,17.2,17.8,19.5,21.8,23.5,24.5,25.1,24.8,23.3,21.0,19.2,18.5,18.3,18.0,17.4,16.8,16.4],"precip":[0,0,0,0,0,0,0,0,0,3,7,14,23,33,46,64,84,98,99,94,90,91,93,92,88,81,72,57,40,26,16,9,12,32,62,84,91,90,90,93,96,98,97,95,92,89,87,86,89,93,94,88,78,66,48,29,18,24,39,52,60,67,74,83,92,98,99,97,94,89,83,78,77,77,76,75,73,68,57,44,36,39,47,56,63,71,78,87,97,100,92,77,64,56,49,46,48,53,56,56,54,50,41,31,28,38,56,70,78,82,86,89,92,92,89,84,80,77,74,72,72,74,74,71,67,62,55,47,42,43,48,54,61,69,76,81,85,86,83,78,74,73,74,75],"weather":[0,1,1,3,3,3,3,3,51,2,3,51,51,51,51,51,51,55,63,51,3,51,51,53,53,53,51,3,3,3,3,3,51,55,51,51,3,51,51,51,63,80,53,53,63,61,61,61,61,53,51,51,51,0,3,3,3,51,3,51,51,51,51,51,51,53,51,80,80,51,80,63,63,53,63,63,51,2,3,3,3,51,51,51,51,53,53,53,51,51,51,0,0,0,0,0,1,2,3,3,2,1,1,2,2,1,1,1,1,3,3,53,53,53,51,51,51,1,2,3,51,51,51,2,3,3,3,3,3,51,51,51,53,53,53,80,80,80,51,51,51,55,55,55],"wind":[1.3,1.5,2.4,0.9,1.1,2.1,3.4,4.7,3.4,2.4,3.1,6.3,7.0,9.8,13.5,14.9,12.5,9.8,9.9,3.6,5.1,3.9,6.4,6.0,4.3,2.7,0.2,2.6,4.6,4.0,3.3,2.9,6.1,8.9,10.0,9.1,7.9,7.6,7.0,10.3,9.2,7.9,10.2,7.3,6.1,8.0,6.2,6.5,6.3,3.0,2.6,3.7,3.7,1.7,4.4,3.2,4.9,8.0,9.8,9.9,9.7,9.7,12.6,13.5,12.1,12.8,11.2,13.6,5.0,2.7,5.2,7.5,3.9,5.5,3.8,4.0,3.1,3.6,2.6,0.5,1.9,3.6,8.3,11.9,12.0,14.5,14.2,14.5,18.0,18.0,19.9,17.8,17.1,15.4,13.4,12.3,12.3,13.0,13.3,13.0,12.5,11.8,10.8,9.9,9.7,11.1,13.5,15.1,15.2,15.0,15.5,16.5,17.8,18.0,16.2,13.3,10.4,7.6,4.8,3.1,3.4,5.1,6.2,5.6,4.6,4.1,4.6,5.6,6.7,8.2,10.4,12.3,13.1,13.2,13.4,14.4,15.5,15.0,11.3,6.2,3.4,3.2,3.3,2.8],"humid":[91,96,99,100,97,97,97,97,94,83,69,64,62,57,60,58,59,71,93,96,98,96,97,99,99,97,97,98,99,99,99,99,97,96,90,82,73,69,63,63,90,89,93,97,99,100,99,99,100,99,100,100,99,99,100,99,96,88,82,75,67,63,64,65,67,71,76,98,98,99,100,100,99,100,100,99,99,98,98,98,97,90,80,69,59,62,64,63,67,69,71,79,89,92,94,95,95,95,94,95,96,95,94,92,88,79,69,62,59,58,58,59,60,64,72,84,94,98,97,97,98,98,98,98,99,99,100,100,98,86,72,64,61,62,65,72,84,95,98,98,98,99,99,100]}};

const WMO={0:{icon:'☀️',label:'晴'},1:{icon:'🌤️',label:'少云'},2:{icon:'⛅',label:'多云'},3:{icon:'☁️',label:'阴'},51:{icon:'🌧️',label:'小雨'},53:{icon:'🌧️',label:'中雨'},55:{icon:'🌧️',label:'大雨'},61:{icon:'🌦️',label:'小阵雨'},63:{icon:'🌧️',label:'中阵雨'},80:{icon:'🌦️',label:'阵雨'}};
function wmo(c){return WMO[c]||{icon:'🌥️',label:'未知'}}
const WK=['周日','周一','周二','周三','周四','周五','周六'];

document.getElementById('update-time').textContent=new Date().toLocaleString('zh-CN');

// Build day cards
const daysEl=document.getElementById('days');
DATA.daily.time.forEach((d,i)=>{
  const dt=new Date(d+'T12:00');
  const w=wmo(DATA.daily.weather[i]);
  const c=document.createElement('div');
  c.className='day-card'+(i===0?' active':'');
  c.dataset.idx=i;
  c.innerHTML=`<div class="dow">${WK[dt.getDay()]}</div><div class="date">${(dt.getMonth()+1)+'/'+dt.getDate()}</div><span class="icon">${w.icon}</span><div class="temps"><span>${DATA.daily.temp_max[i]}°</span><span class="lo">${DATA.daily.temp_min[i]}°</span></div><div class="rain-bar"><div class="fill" style="width:${DATA.daily.precip_max[i]}%"></div></div><div class="tag">${w.label} · 雨${DATA.daily.precip_max[i]}%</div>`;
  c.onclick=()=>showDetail(i);
  daysEl.appendChild(c);
});

// Insight
const avgR=Math.round(DATA.daily.precip_max.reduce((a,b)=>a+b,0)/6);
const avgT=(DATA.daily.temp_max.reduce((a,b)=>a+b,0)/6).toFixed(1);
const avgH=Math.round(DATA.daily.humid_max.reduce((a,b)=>a+b,0)/6);
const maxW=Math.max(...DATA.daily.wind_max);
document.getElementById('insight').innerHTML=`<strong>📊 6日概览</strong><br>未来六天平均气温 <strong>${avgT}°C</strong>（最高 26.3° / 最低 13.5°），平均降雨概率 <strong>${avgR}%</strong>，日均湿度 <strong>${avgH}%</strong>。最大风速 <strong>${maxW} km/h</strong>（5/17 周六）。典型贵州高原气候——<strong>凉爽潮湿，出门建议随身带伞</strong>。海拔 1884m，体感温度偏低，薄外套建议备着。`;

// Detail
function showDetail(i){
  document.querySelectorAll('.day-card').forEach((c,j)=>c.classList.toggle('active',j===i));
  const dt=new Date(DATA.daily.time[i]+'T12:00');
  const w=wmo(DATA.daily.weather[i]);
  const p=document.getElementById('detail');
  p.classList.add('show');
  document.getElementById('detail-title').textContent=`${WK[dt.getDay()]} ${(dt.getMonth()+1)+'月'+dt.getDate()+'日'} · ${w.label}`;
  document.getElementById('detail-grid').innerHTML=`<div class="detail-item"><div class="label">最高温</div><div class="value">${DATA.daily.temp_max[i]}°C</div></div><div class="detail-item"><div class="label">最低温</div><div class="value">${DATA.daily.temp_min[i]}°C</div></div><div class="detail-item"><div class="label">降雨概率</div><div class="value" style="color:var(--rain)">${DATA.daily.precip_max[i]}%</div></div><div class="detail-item"><div class="label">最大风速</div><div class="value">${DATA.daily.wind_max[i]} km/h</div></div><div class="detail-item"><div class="label">最高湿度</div><div class="value">${DATA.daily.humid_max[i]}%</div></div><div class="detail-item"><div class="label">天气</div><div class="value">${w.label}</div></div>`;
  document.getElementById('sun-row').innerHTML=`<div class="sun-item">🌅 ${DATA.daily.sunrise[i]}</div><div class="sun-item">🌇 ${DATA.daily.sunset[i]}</div><div class="sun-item">⏱️ ${dayLen(DATA.daily.sunrise[i],DATA.daily.sunset[i])}</div>`;
  const s=i*24,e=s+24;
  let nowH=new Date().getHours();
  let hrs='';
  for(let h=s;h<e;h++){
    const hour=h%24;
    const wc=wmo(DATA.hourly.weather[h]);
    const isNow=(i===0&&hour===nowH);
    hrs+=`<div class="hr-chip${isNow?' now':''}"><span class="h">${String(hour).padStart(2,'0')}:00</span><span class="t">${DATA.hourly.temp[h].toFixed(1)}°</span><span class="r">${wc.icon} ${DATA.hourly.precip[h]}%</span></div>`;
  }
  document.getElementById('hourly').innerHTML=hrs;
  drawChart(s,e);
  p.scrollIntoView({behavior:'smooth',block:'center'});
}

function dayLen(rise,set){
  const[rh,rm]=rise.split(':').map(Number);const[sh,sm]=set.split(':').map(Number);
  const m=(sh*60+sm)-(rh*60+rm);return Math.floor(m/60)+'h'+(m%60)+'m';
}

function drawChart(s,e){
  const temps=DATA.hourly.temp.slice(s,e);
  const min=Math.floor(Math.min(...temps))-1,max=Math.ceil(Math.max(...temps))+1,range=max-min;
  const W=720,H=120,pad=28;
  const pts=temps.map((t,i)=>({x:pad+(i/(temps.length-1))*(W-pad*2),y:H-pad-((t-min)/range)*(H-pad*2),t}));
  let path=pts.map((p,i)=>(i===0?'M':'L')+p.x.toFixed(1)+','+p.y.toFixed(1)).join(' ');
  let fill=path+' L'+pts[pts.length-1].x.toFixed(1)+','+(H-pad)+' L'+pad+','+(H-pad)+' Z';
  let labels=''; for(let h=0;h<24;h+=3)labels+=`<text x="${pts[h].x.toFixed(1)}" y="${H-6}" text-anchor="middle" font-size="9" fill="#aaa">${h}h</text>`;
  let dots=pts.filter((_,i)=>i%3===0).map(p=>`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="2.8" fill="#4a7eb5"/><text x="${p.x.toFixed(1)}" y="${p.y-8}" text-anchor="middle" font-size="10" font-weight="600" fill="#333">${p.t.toFixed(1)}°</text>`).join('');
  document.getElementById('chart').innerHTML=`<path d="${fill}" fill="rgba(74,126,181,0.07)"/><path d="${path}" fill="none" stroke="#4a7eb5" stroke-width="2" stroke-linejoin="round"/>${dots}${labels}`;
  document.getElementById('chart').setAttribute('viewBox',`0 0 ${W} ${H}`);
}

showDetail(0);
</script>
</body>
</html>
